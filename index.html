<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>百家樂 - 自適應動態引擎版</title>
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --border: #27272a;
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --b-color: #ef4444; --p-color: #3b82f6; --t-color: #22c55e;
            --highlight: #eab308; --warning: #f97316; --purple: #a855f7;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; user-select: none; overflow-x: hidden; }
        * { box-sizing: border-box; }

        /* 🚁 懸浮抬頭顯示器 (Sticky HUD) */
        .sticky-hud {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(18, 18, 21, 0.92); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1); padding: env(safe-area-inset-top) 8px 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); transition: all 0.3s ease;
        }

        .hud-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-top: 4px; }
        .hud-stats { font-size: 13px; font-weight: 800; color: var(--text-muted); }
        .hud-stats span { color: var(--highlight); font-variant-numeric: tabular-nums; margin-right: 8px;}
        .hud-actions { display: flex; gap: 8px; }
        .hud-btn { background: #27272a; border: 1px solid #3f3f46; color: var(--text-main); border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 800; cursor: pointer; }
        .hud-btn.undo { color: var(--warning); } .hud-btn.reset { color: var(--b-color); } .hud-btn.db { color: var(--p-color); }

        /* 🎯 決策面板 */
        .oracle-box { text-align: center; padding: 12px 8px; border-radius: 12px; border: 2px solid var(--border); background: #000; position: relative; }
        .oracle-box.pass { border-color: #3f3f46; }
        .oracle-box.banker { border-color: var(--b-color); background: linear-gradient(180deg, rgba(239, 68, 68, 0.15) 0%, #000 100%); box-shadow: 0 0 15px rgba(239, 68, 68, 0.25); }
        .oracle-box.player { border-color: var(--p-color); background: linear-gradient(180deg, rgba(59, 130, 246, 0.15) 0%, #000 100%); box-shadow: 0 0 15px rgba(59, 130, 246, 0.25); }
        .oracle-box.locked { border-color: var(--highlight); background: repeating-linear-gradient(45deg, rgba(234, 179, 8, 0.05), rgba(234, 179, 8, 0.05) 10px, rgba(0,0,0,0) 10px, rgba(0,0,0,0) 20px); }
        
        .oracle-main { font-size: 26px; font-weight: 900; letter-spacing: 1px; margin-bottom: 6px; line-height: 1.1; }
        .oracle-box.banker .oracle-main { color: var(--b-color); text-shadow: 0 0 10px var(--b-color); }
        .oracle-box.player .oracle-main { color: var(--p-color); text-shadow: 0 0 10px var(--p-color); }
        .oracle-box.locked .oracle-main { color: var(--highlight); }
        
        /* 🤖 自適應策略儀表板 (Strategy Scoreboard) */
        .strategy-board { display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); padding: 6px 4px; border-radius: 8px; border: 1px solid #333; margin-bottom: 8px; }
        .strat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .strat-name { font-size: 9px; font-weight: 800; color: var(--text-muted); }
        .strat-score { font-size: 11px; font-weight: 900; font-variant-numeric: tabular-nums; }
        .strat-item.leader .strat-name { color: var(--highlight); }
        .strat-item.leader .strat-score { color: var(--highlight); text-shadow: 0 0 5px var(--highlight); }

        .reason-badge { display: inline-flex; justify-content: center; font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: var(--text-main); }
        .trend-alert { font-size: 11px; font-weight: 900; margin-bottom: 6px; color: var(--highlight); letter-spacing: 0.5px; }

        /* 📜 滾動內容區 */
        .scroll-container { padding: 12px; padding-bottom: 40px; }

        /* 🀄 五路圖模組 */
        .roads-card { background: var(--card); border-radius: 16px; padding: 10px; border: 1px solid var(--border); margin-bottom: 12px; }
        .road-title { font-size: 11px; font-weight: 800; color: var(--text-muted); margin: 4px 0; text-transform: uppercase; }
        .road-container { width: 100%; overflow-x: auto; background: #fff; padding: 4px; border-radius: 8px; margin-bottom: 6px; }
        .road-grid { display: flex; min-width: max-content; gap: 1px; }
        .road-col { display: flex; flex-direction: column; gap: 1px; }
        
        .cell-lg { width: 16px; height: 16px; border: 1px solid #f4f4f5; display: flex; align-items: center; justify-content: center; position: relative; }
        .cell-sm { width: 8px; height: 8px; border: 1px solid #f4f4f5; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .bead-dot { width: 12px; height: 12px; border-radius: 50%; position: relative; }
        .bead-dot.B { background-color: var(--b-color); } .bead-dot.P { background-color: var(--p-color); } .bead-dot.T { background-color: var(--t-color); }
        .bead-text { font-size: 8px; color: #fff; font-weight: bold; }
        
        .circle-hollow { width: 12px; height: 12px; border-radius: 50%; border: 2px solid transparent; position: relative; }
        .circle-hollow.B, .circle-hollow.R { border-color: var(--b-color); } 
        .circle-hollow.P, .circle-hollow.Blue { border-color: var(--p-color); }
        .tie-line { background: linear-gradient(to top right, transparent 45%, var(--t-color) 45%, var(--t-color) 55%, transparent 55%); }
        .tie-text { position: absolute; font-size: 9px; font-weight: 900; color: var(--t-color); z-index: 2; }
        .has-bp::before { content:''; position:absolute; top:-2px; left:-2px; width:4px; height:4px; background:var(--b-color); border-radius:50%; border:1px solid #fff; z-index:5; }
        .has-pp::after { content:''; position:absolute; bottom:-2px; right:-2px; width:4px; height:4px; background:var(--p-color); border-radius:50%; border:1px solid #fff; z-index:5; }

        .circle-solid { width: 5px; height: 5px; border-radius: 50%; }
        .circle-solid.R { background-color: var(--b-color); } .circle-solid.Blue { background-color: var(--p-color); }
        .slash { width: 6px; height: 6px; }
        .slash.R { background: linear-gradient(to bottom left, transparent 40%, var(--b-color) 40%, var(--b-color) 60%, transparent 60%); }
        .slash.Blue { background: linear-gradient(to bottom left, transparent 40%, var(--p-color) 40%, var(--p-color) 60%, transparent 60%); }

        .derived-roads { display: flex; gap: 4px; } .derived-col { flex: 1; min-width: 0; }

        /* 🃏 實體手牌輸入區 */
        .input-card { background: var(--card); border-radius: 16px; padding: 12px; border: 1px solid var(--border); }
        .input-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .toggle-guide { font-size: 12px; font-weight: 800; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .order-select { background: #27272a; color: #fff; border: 1px solid #3f3f46; border-radius: 6px; font-size: 12px; padding: 4px 6px; font-weight: bold; outline: none; }
        
        .table-layout { display: flex; gap: 8px; }
        .table-side { flex: 1; background: #000; border-radius: 12px; padding: 8px; border: 1px solid var(--border); }
        .side-label { text-align: center; font-size: 11px; font-weight: 900; margin-bottom: 8px; padding: 4px 0; border-radius: 6px; letter-spacing: 1px; }
        .side-label.p { background: rgba(59, 130, 246, 0.15); color: var(--p-color); }
        .side-label.b { background: rgba(239, 68, 68, 0.15); color: var(--b-color); }
        .cards-row { display: flex; gap: 4px; }
        .playing-card { flex: 1; aspect-ratio: 2/3; background: #27272a; border-radius: 8px; border: 1px solid #3f3f46; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: #fff; cursor: pointer; transition: 0.2s; }
        .playing-card.active { background: #3f3f46; border-color: var(--highlight); box-shadow: 0 0 10px rgba(234, 179, 8, 0.3); color: var(--highlight); transform: translateY(-2px); }
        .playing-card.filled { background: #e4e4e7; color: #000; }
        .playing-card.disabled { opacity: 0.2; pointer-events: none; background: #000; }

        /* ⌨️ 鍵盤 */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 12px; }
        .key { background: #27272a; border-radius: 10px; padding: 8px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #3f3f46; transition: 0.1s; }
        .key:active { transform: translateY(2px); background: #3f3f46; }
        .key-val { font-size: 20px; font-weight: 800; line-height: 1; margin-bottom: 2px; }
        .key-count { font-size: 10px; font-weight: 700; color: var(--text-muted); }
        .key-count.low { color: var(--b-color); }
        .key.action-clear { background: rgba(249, 115, 22, 0.1); color: var(--warning); border-color: rgba(249, 115, 22, 0.3); grid-column: span 2; flex-direction: row; font-size: 14px; gap: 4px; font-weight: 800; }

        .submit-btn { width: 100%; padding: 16px; background: #27272a; color: #71717a; font-size: 16px; font-weight: 900; border: none; border-radius: 12px; margin-top: 12px; transition: 0.3s; letter-spacing: 1px; }
        .submit-btn.ready { background: var(--t-color); color: #000; box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); cursor: pointer; }
        .submit-btn:disabled { pointer-events: none; }
    </style>
</head>
<body>

    <div class="sticky-hud">
        <div class="hud-header">
            <div class="hud-stats">剩牌: <span id="hdrRemain">416</span> 局數: <span id="hdrRound">0</span></div>
            <div class="hud-actions">
                <button class="hud-btn undo" onclick="undoLastRound()">↩ 撤銷</button>
                <button class="hud-btn reset" onclick="resetShoe()">換靴</button>
            </div>
        </div>
        
        <div id="oracleBox" class="oracle-box locked">
            <div class="trend-alert" id="trendAlert">📊 分析牌局走勢中...</div>
            <div class="oracle-main" id="oracleMain">🔒 規律收集中</div>
            
            <div class="strategy-board">
                <div class="strat-item" id="stEV">
                    <span class="strat-name">物理EV</span><span class="strat-score" id="scEV">0/0</span>
                </div>
                <div class="strat-item" id="stTrend">
                    <span class="strat-name">大路</span><span class="strat-score" id="scTrend">0/0</span>
                </div>
                <div class="strat-item" id="stDerived">
                    <span class="strat-name">下三路</span><span class="strat-score" id="scDerived">0/0</span>
                </div>
                <div class="strat-item" id="stML">
                    <span class="strat-name">大數據</span><span class="strat-score" id="scML">0/0</span>
                </div>
            </div>
            
            <div class="reason-badge" id="reasonBadge">前 15 局強制收集，不提供預測</div>
        </div>
    </div>

    <div class="scroll-container">
        <div class="roads-card">
            <div class="road-title">珠盤路 (含對子)</div>
            <div class="road-container"><div class="road-grid" id="grid-bead"></div></div>
            <div class="road-title">大路 (Big Road)</div>
            <div class="road-container"><div class="road-grid" id="grid-big"></div></div>
            <div class="derived-roads">
                <div class="derived-col"><div class="road-title">大眼仔</div><div class="road-container"><div class="road-grid" id="grid-eye"></div></div></div>
                <div class="derived-col"><div class="road-title">小路</div><div class="road-container"><div class="road-grid" id="grid-small"></div></div></div>
                <div class="derived-col"><div class="road-title">蟑螂路</div><div class="road-container"><div class="road-grid" id="grid-roach"></div></div></div>
            </div>
        </div>

        <div class="input-card">
            <div class="input-header">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;">順序:</span>
                    <select id="inputOrderSelect" class="order-select" onchange="changeInputOrder()">
                        <option value="PBPB">閒莊閒莊 (國際)</option>
                        <option value="PPBB">閒閒莊莊 (區塊)</option>
                        <option value="BPBP">莊閒莊閒</option>
                        <option value="BBPP">莊莊閒閒</option>
                    </select>
                </div>
                <label class="toggle-guide"><input type="checkbox" id="autoGuideToggle" checked onchange="evaluateDrawRules()" style="accent-color: var(--t-color);"> 🛡️ 防呆</label>
            </div>
            
            <div class="table-layout">
                <div class="table-side">
                    <div class="side-label p">PLAYER 閒</div>
                    <div class="cards-row">
                        <div class="playing-card active" id="slot-p1" onclick="setActiveSlot('p1')"></div>
                        <div class="playing-card" id="slot-p2" onclick="setActiveSlot('p2')"></div>
                        <div class="playing-card disabled" id="slot-p3" onclick="setActiveSlot('p3')"></div>
                    </div>
                </div>
                <div class="table-side">
                    <div class="side-label b">BANKER 莊</div>
                    <div class="cards-row">
                        <div class="playing-card" id="slot-b1" onclick="setActiveSlot('b1')"></div>
                        <div class="playing-card" id="slot-b2" onclick="setActiveSlot('b2')"></div>
                        <div class="playing-card disabled" id="slot-b3" onclick="setActiveSlot('b3')"></div>
                    </div>
                </div>
            </div>
            <div class="keypad">
                <div class="key" onclick="inputKey('1')"><div class="key-val">A</div><div class="key-count" id="kcnt-1">32</div></div>
                <div class="key" onclick="inputKey('2')"><div class="key-val">2</div><div class="key-count" id="kcnt-2">32</div></div>
                <div class="key" onclick="inputKey('3')"><div class="key-val">3</div><div class="key-count" id="kcnt-3">32</div></div>
                <div class="key" onclick="inputKey('4')"><div class="key-val">4</div><div class="key-count" id="kcnt-4">32</div></div>
                <div class="key" onclick="inputKey('5')"><div class="key-val">5</div><div class="key-count" id="kcnt-5">32</div></div>
                <div class="key" onclick="inputKey('6')"><div class="key-val">6</div><div class="key-count" id="kcnt-6">32</div></div>
                <div class="key" onclick="inputKey('7')"><div class="key-val">7</div><div class="key-count" id="kcnt-7">32</div></div>
                <div class="key" onclick="inputKey('8')"><div class="key-val">8</div><div class="key-count" id="kcnt-8">32</div></div>
                <div class="key" onclick="inputKey('9')"><div class="key-val">9</div><div class="key-count" id="kcnt-9">32</div></div>
                <div class="key" onclick="inputKey('10')"><div class="key-val">10</div><div class="key-count" id="kcnt-10">32</div></div>
                <div class="key" onclick="inputKey('11')"><div class="key-val">J</div><div class="key-count" id="kcnt-11">32</div></div>
                <div class="key" onclick="inputKey('12')"><div class="key-val">Q</div><div class="key-count" id="kcnt-12">32</div></div>
                <div class="key" onclick="inputKey('13')"><div class="key-val">K</div><div class="key-count" id="kcnt-13">32</div></div>
                <div class="key action-clear" onclick="clearAllSlots()">⌫ 清空重填</div>
            </div>
            <button class="submit-btn" id="submitBtn" onclick="submitData()" disabled>需符合法定發牌規則</button>
        </div>
    </div>

<script>
/* =========================================================
   1) 核心狀態變數
========================================================= */
const STATE_KEY = "baccarat_state_v13_adaptive";

let S = { 
    totalCards: 416, deck: {1:32, 2:32, 3:32, 4:32, 5:32, 6:32, 7:32, 8:32, 9:32, 10:32, 11:32, 12:32, 13:32}, 
    history: [], runningCount: 0,
    // 四大策略的戰績追蹤 (plays, hits)
    stats: { ev: {p:0,h:0}, trend: {p:0,h:0}, derived: {p:0,h:0}, ml: {p:0,h:0} },
    // 預先儲存「下一把」四大策略各自的預測
    shadowPreds: { ev: null, trend: null, derived: null, ml: null }
};
let backupState = null;

const baseBankerProb = 0.458597; const basePlayerProb = 0.446247; 
const countWeights = {1:1, 2:1, 3:2, 4:2, 5:1, 6:-1, 7:-2, 8:-2, 9:-2, 10:0, 11:0, 12:0, 13:0};
let currentSlotOrder = ['p1', 'b1', 'p2', 'b2', 'p3', 'b3']; 
let currentSlotIdx = 0;

// 簡單的機器學習資料庫 mock (實戰中應接回您的 BigData)
let BigData = { patterns: {} }; 
try { let db = localStorage.getItem("baccarat_bigdata_v12_cross"); if (db) BigData = JSON.parse(db); } catch(e){}

loadState(); loadInputOrder(); recalcAndRender(); evaluateDrawRules();

/* =========================================================
   1.5) 自訂發牌順序功能
========================================================= */
function loadInputOrder() {
    let savedOrder = localStorage.getItem('baccarat_input_order') || 'PBPB';
    document.getElementById('inputOrderSelect').value = savedOrder; applyInputOrder(savedOrder);
}
function changeInputOrder() {
    const val = document.getElementById('inputOrderSelect').value; localStorage.setItem('baccarat_input_order', val);
    applyInputOrder(val); clearAllSlots();
}
function applyInputOrder(val) {
    if (val === 'PBPB') currentSlotOrder = ['p1', 'b1', 'p2', 'b2', 'p3', 'b3'];
    else if (val === 'PPBB') currentSlotOrder = ['p1', 'p2', 'b1', 'b2', 'p3', 'b3'];
    else if (val === 'BPBP') currentSlotOrder = ['b1', 'p1', 'b2', 'p2', 'p3', 'b3'];
    else if (val === 'BBPP') currentSlotOrder = ['b1', 'b2', 'p1', 'p2', 'p3', 'b3'];
}

/* =========================================================
   3) 單靴防呆與狀態管理
========================================================= */
function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(S)); }
function loadState() { try { let st = localStorage.getItem(STATE_KEY); if (st) { S = JSON.parse(st); if(!S.stats) S.stats = {ev:{p:0,h:0}, trend:{p:0,h:0}, derived:{p:0,h:0}, ml:{p:0,h:0}}; if(!S.shadowPreds) S.shadowPreds = {ev:null, trend:null, derived:null, ml:null}; } } catch(e){} }
function snapshot() { backupState = JSON.parse(JSON.stringify(S)); }
function undoLastRound() { if (!backupState) return alert("無資料可撤銷"); S = JSON.parse(JSON.stringify(backupState)); backupState = null; saveState(); clearAllSlots(); recalcAndRender(); }
function resetShoe() { if(confirm("確定重置本靴牌？")) { S = { totalCards: 416, deck: {1:32, 2:32, 3:32, 4:32, 5:32, 6:32, 7:32, 8:32, 9:32, 10:32, 11:32, 12:32, 13:32}, history: [], runningCount: 0, stats: {ev:{p:0,h:0}, trend:{p:0,h:0}, derived:{p:0,h:0}, ml:{p:0,h:0}}, shadowPreds: {ev:null, trend:null, derived:null, ml:null} }; backupState = null; saveState(); clearAllSlots(); recalcAndRender(); } }
function updateKeypadCounts() { for(let i=1; i<=13; i++) { let el = document.getElementById(`kcnt-${i}`); if(el) { el.innerText = S.deck[i]; el.className = S.deck[i] < 10 ? "key-count low" : "key-count"; } } }
function getBaccaratVal(id) { let v = document.getElementById(`slot-${id}`).dataset.val; if(!v) return null; let n=parseInt(v); return n>=10?0:n; }
function getRawVal(id) { let v = document.getElementById(`slot-${id}`).dataset.val; return v ? parseInt(v) : null; }

function evaluateDrawRules() {
    const isAuto = document.getElementById('autoGuideToggle').checked;
    const p3El = document.getElementById('slot-p3'), b3El = document.getElementById('slot-b3'), btn = document.getElementById('submitBtn');
    if(!isAuto) { p3El.classList.remove('disabled'); b3El.classList.remove('disabled'); btn.disabled=false; btn.className="submit-btn ready"; btn.innerText="手動覆寫結算"; return; }
    let p1 = getBaccaratVal('p1'), p2 = getBaccaratVal('p2'), b1 = getBaccaratVal('b1'), b2 = getBaccaratVal('b2');
    if(p1===null||p2===null||b1===null||b2===null) { p3El.classList.add('disabled'); b3El.classList.add('disabled'); btn.className="submit-btn"; btn.disabled=true; btn.innerText="等待完成前四張..."; return; }
    let pTotal=(p1+p2)%10, bTotal=(b1+b2)%10, isNat=(pTotal>=8||bTotal>=8), nP3=false, nB3=false;
    const p3v = getBaccaratVal('p3'), b3v = getBaccaratVal('b3');
    if(!isNat){
        if(pTotal<=5) nP3=true;
        if(!nP3){ if(bTotal<=5) nB3=true; }
        else if(p3v!==null) {
            if(bTotal<=2) nB3=true; else if(bTotal===3 && p3v!==8) nB3=true; else if(bTotal===4 && p3v>=2 && p3v<=7) nB3=true; else if(bTotal===5 && p3v>=4 && p3v<=7) nB3=true; else if(bTotal===6 && (p3v===6 || p3v===7)) nB3=true;
        }
    }
    let valid = true;
    if (isNat && (p3v!==null || b3v!==null)) valid = false;
    if (nP3 && p3v===null) valid = false; if (!nP3 && p3v!==null) valid = false;
    if (valid && nP3 && p3v!==null) { if (nB3 && b3v===null) valid = false; if (!nB3 && b3v!==null) valid = false; } 
    else if (valid && !nP3) { if (nB3 && b3v===null) valid = false; if (!nB3 && b3v!==null) valid = false; }
    if(nP3) p3El.classList.remove('disabled'); else p3El.classList.add('disabled');
    if(nP3 && p3v===null) b3El.classList.add('disabled'); else { if(nB3) b3El.classList.remove('disabled'); else b3El.classList.add('disabled'); }
    btn.disabled = !valid; btn.className = valid ? "submit-btn ready" : "submit-btn"; btn.innerText = valid ? "✓ 牌局合法，點擊結算" : "需符合法定發牌規則";
}

function setActiveSlot(id) { let el = document.getElementById(`slot-${id}`); if(el.classList.contains('disabled')) return; document.querySelectorAll('.playing-card').forEach(e=>e.classList.remove('active')); el.classList.add('active'); currentSlotIdx = currentSlotOrder.indexOf(id); }
function inputKey(val) {
    if(S.deck[val] <= 0) { alert(`庫存不足！`); return; }
    while(currentSlotIdx < currentSlotOrder.length && document.getElementById(`slot-${currentSlotOrder[currentSlotIdx]}`).classList.contains('disabled')) currentSlotIdx++;
    if(currentSlotIdx >= currentSlotOrder.length) return;
    const id = currentSlotOrder[currentSlotIdx], el = document.getElementById(`slot-${id}`);
    let dVal=val; if(val==='1') dVal='A'; if(val==='11') dVal='J'; if(val==='12') dVal='Q'; if(val==='13') dVal='K';
    el.innerText = dVal; el.dataset.val = val; el.classList.add('filled'); evaluateDrawRules();
    currentSlotIdx++; while(currentSlotIdx < currentSlotOrder.length && document.getElementById(`slot-${currentSlotOrder[currentSlotIdx]}`).classList.contains('disabled')) currentSlotIdx++;
    if(currentSlotIdx < currentSlotOrder.length) setActiveSlot(currentSlotOrder[currentSlotIdx]); else document.querySelectorAll('.playing-card').forEach(e=>e.classList.remove('active'));
}
function clearAllSlots() { currentSlotOrder.forEach(id=>{ let el=document.getElementById(`slot-${id}`); el.innerText=''; el.dataset.val=''; el.classList.remove('filled'); }); currentSlotIdx=0; evaluateDrawRules(); setActiveSlot(currentSlotOrder[0]); }

/* =========================================================
   4) 結算與後台策略評估 (Strategy Backtesting)
========================================================= */
function submitData() {
    const btn = document.getElementById('submitBtn'); if(btn.disabled) return;
    btn.disabled=true; btn.innerText="演算中..."; snapshot();

    let pRaw=[], bRaw=[], pPts=0, bPts=0, consumed=[];
    let rp1 = getRawVal('p1'), rp2 = getRawVal('p2'), rp3 = getRawVal('p3');
    let rb1 = getRawVal('b1'), rb2 = getRawVal('b2'), rb3 = getRawVal('b3');
    if(rp1) { pRaw.push(rp1); consumed.push(rp1); pPts += rp1>=10?0:rp1; } if(rp2) { pRaw.push(rp2); consumed.push(rp2); pPts += rp2>=10?0:rp2; } if(rp3) { pRaw.push(rp3); consumed.push(rp3); pPts += rp3>=10?0:rp3; }
    if(rb1) { bRaw.push(rb1); consumed.push(rb1); bPts += rb1>=10?0:rb1; } if(rb2) { bRaw.push(rb2); consumed.push(rb2); bPts += rb2>=10?0:rb2; } if(rb3) { bRaw.push(rb3); consumed.push(rb3); bPts += rb3>=10?0:rb3; }

    let isPPair = (pRaw.length >= 2 && pRaw[0] === pRaw[1]); let isBPair = (bRaw.length >= 2 && bRaw[0] === bRaw[1]);
    let winner = 'T', fP = pPts%10, fB = bPts%10;
    if(fP > fB) winner = 'P'; else if(fB > fP) winner = 'B';
    
    // 評估剛才四個策略的預測是否正確
    if (winner !== 'T') {
        if(S.shadowPreds.ev) { S.stats.ev.p++; if(S.shadowPreds.ev === winner) S.stats.ev.h++; }
        if(S.shadowPreds.trend) { S.stats.trend.p++; if(S.shadowPreds.trend === winner) S.stats.trend.h++; }
        if(S.shadowPreds.derived) { S.stats.derived.p++; if(S.shadowPreds.derived === winner) S.stats.derived.h++; }
        if(S.shadowPreds.ml) { S.stats.ml.p++; if(S.shadowPreds.ml === winner) S.stats.ml.h++; }
    }

    let roundData = { w: winner, bp: isBPair, pp: isPPair };
    S.history.push(roundData);
    consumed.forEach(v => { S.deck[v]--; S.totalCards--; S.runningCount += countWeights[v]; });
    
    saveState(); clearAllSlots(); recalcAndRender();
    setTimeout(() => { if(S.totalCards >= 6) evaluateDrawRules(); }, 400);
}

/* =========================================================
   5) 四維度自適應權重引擎 (4D Adaptive Engine)
========================================================= */
function simulateAskRoad(hyp) {
    let testArr = [...S.history, {w: hyp, bp:false, pp:false}];
    let d = buildBigRoadAndDerived(testArr);
    return [d.eye.length > 0 ? d.eye[d.eye.length-1].val : null, d.small.length > 0 ? d.small[d.small.length-1].val : null, d.roach.length > 0 ? d.roach[d.roach.length-1].val : null];
}

function recalcAndRender() {
    let pureHist = S.history.map(x=>x.w).filter(x => x !== 'T');
    
    // 1. 生成四個策略的「下一把」虛擬預測
    // 策略A：物理EV
    let tc = (S.totalCards / 52) > 0 ? S.runningCount / (S.totalCards / 52) : 0;
    let p_p = basePlayerProb + (tc * 0.0005); let p_b = baseBankerProb - (tc * 0.0005);
    let evBanker = (p_b * 0.95) - p_p; let evPlayer = p_p - p_b;
    S.shadowPreds.ev = evBanker > 0.002 ? 'B' : (evPlayer > 0.002 ? 'P' : null);

    // 策略B：大路動能 (簡單跟隨最後一把，若單跳則反打)
    let trendSide = null;
    if (pureHist.length > 0) {
        let last = pureHist[pureHist.length-1];
        // 檢查是否處於單跳 (P-B-P-B)
        let isChop = false;
        if (pureHist.length >= 4 && pureHist[pureHist.length-1] !== pureHist[pureHist.length-2] && pureHist[pureHist.length-2] !== pureHist[pureHist.length-3]) isChop = true;
        trendSide = isChop ? (last === 'B' ? 'P' : 'B') : last;
    }
    S.shadowPreds.trend = trendSide;

    // 策略C：下三路共振
    let derivedSide = null;
    let askB = simulateAskRoad('B'); let askP = simulateAskRoad('P');
    let bReds = askB.filter(x => x === 'R').length; let pReds = askP.filter(x => x === 'R').length;
    if (bReds >= 2 && pReds <= 1) derivedSide = 'B'; else if (pReds >= 2 && bReds <= 1) derivedSide = 'P';
    S.shadowPreds.derived = derivedSide;

    // 策略D：歷史 ML
    let mlSide = null;
    if (pureHist.length >= 3) {
        let seq = pureHist.slice(-3).join(","); let ptn = BigData.patterns[seq];
        if (ptn && (ptn.B + ptn.P) >= 5) {
            let bR = ptn.B / (ptn.B + ptn.P); let pR = ptn.P / (ptn.B + ptn.P);
            if (bR >= 0.55) mlSide = "B"; else if (pR >= 0.55) mlSide = "P";
        }
    }
    S.shadowPreds.ml = mlSide;

    // 2. 評估當前勝率並選出「主導策略」
    let winRates = {
        ev: S.stats.ev.p > 0 ? S.stats.ev.h / S.stats.ev.p : 0,
        trend: S.stats.trend.p > 0 ? S.stats.trend.h / S.stats.trend.p : 0,
        derived: S.stats.derived.p > 0 ? S.stats.derived.h / S.stats.derived.p : 0,
        ml: S.stats.ml.p > 0 ? S.stats.ml.h / S.stats.ml.p : 0
    };
    
    // 更新 Scoreboard UI
    const stEls = { ev: document.getElementById('stEV'), trend: document.getElementById('stTrend'), derived: document.getElementById('stDerived'), ml: document.getElementById('stML') };
    const scEls = { ev: document.getElementById('scEV'), trend: document.getElementById('scTrend'), derived: document.getElementById('scDerived'), ml: document.getElementById('scML') };
    
    let bestStrat = 'trend'; let maxRate = -1;
    for (let s in winRates) {
        stEls[s].className = 'strat-item';
        scEls[s].innerText = S.stats[s].p > 0 ? `${(winRates[s]*100).toFixed(0)}%` : '0%';
        // 必須至少有打過 3 把才承認勝率
        if (S.stats[s].p >= 3 && winRates[s] > maxRate) { maxRate = winRates[s]; bestStrat = s; }
    }
    
    // 3. 處理明顯規律的絕對優先權 (Extreme Pattern Override)
    let extremeOverride = null;
    let currentStreakSide = pureHist.length > 0 ? pureHist[pureHist.length-1] : null;
    let currentStreakLength = 0;
    if (pureHist.length > 0) {
        currentStreakLength = 1;
        for(let i=pureHist.length-2; i>=0; i--) { if(pureHist[i]===currentStreakSide) currentStreakLength++; else break; }
    }
    
    let isChoppingHard = false;
    if (pureHist.length >= 4) {
        if (pureHist[pureHist.length-1] !== pureHist[pureHist.length-2] && pureHist[pureHist.length-2] !== pureHist[pureHist.length-3] && pureHist[pureHist.length-3] !== pureHist[pureHist.length-4]) isChoppingHard = true;
    }

    if (currentStreakLength >= 4) extremeOverride = { side: currentStreakSide, reason: "發現極端長龍，強制順勢" };
    else if (isChoppingHard) extremeOverride = { side: (currentStreakSide === 'B' ? 'P' : 'B'), reason: "發現極端單跳，強制順跳" };

    // 4. 決策輸出
    const obox = document.getElementById('oracleBox'), omain = document.getElementById('oracleMain');
    const badgeReason = document.getElementById('reasonBadge');
    
    document.getElementById('hdrRemain').innerText = S.totalCards;
    document.getElementById('hdrRound').innerText = S.history.length;
    updateKeypadCounts();

    if (S.history.length < 15) {
        obox.className = "oracle-box locked";
        omain.innerHTML = `🔒 規律收集中 (${S.history.length}/15)`;
        badgeReason.innerText = `前 15 局策略適配中，強制不預測`;
    } else {
        let finalDecision = 'PASS';
        let rsn = "當前主導策略無強烈訊號";

        // 優先套用極端規律
        if (extremeOverride) {
            finalDecision = extremeOverride.side;
            rsn = extremeOverride.reason;
            // Highlight trend
            stEls['trend'].className = 'strat-item leader';
        } else {
            // 套用主導策略
            if (maxRate >= 0.5) { // 只有當最好的策略勝率大於 50% 才聽它的
                stEls[bestStrat].className = 'strat-item leader';
                finalDecision = S.shadowPreds[bestStrat] || 'PASS';
                
                let sName = bestStrat === 'ev' ? '物理算牌' : bestStrat === 'trend' ? '大路動能' : bestStrat === 'derived' ? '下三路共振' : '大數據ML';
                if (finalDecision !== 'PASS') {
                    rsn = `採用當靴勝率最高 (${(maxRate*100).toFixed(0)}%) 的 [${sName}]`;
                }
            } else {
                rsn = "當前所有策略勝率皆低於 50%，建議觀望";
            }
        }

        if (finalDecision === 'B') {
            obox.className = "oracle-box banker"; omain.innerHTML = `🔥 推薦莊家`; badgeReason.innerText = rsn;
        } else if (finalDecision === 'P') {
            obox.className = "oracle-box player"; omain.innerHTML = `🔥 推薦閒家`; badgeReason.innerText = rsn;
        } else {
            obox.className = "oracle-box pass"; omain.innerHTML = `🛡️ 動態觀望`; badgeReason.innerText = rsn;
        }
    }

    renderAllRoads();
}

function renderAllRoads() {
    renderBeadPlate();
    let bd = buildBigRoadAndDerived(S.history); 
    renderRoadGrid("grid-big", bd.bigGrid, bd.maxCol, "big");
    let derived = buildBigRoadAndDerived(S.history.map(x => ({w: x.w, bp:false, pp:false}))); 
    renderRoadGrid("grid-eye", mapRoadLike(derived.eye).grid, mapRoadLike(derived.eye).maxCol, "eye");
    renderRoadGrid("grid-small", mapRoadLike(derived.small).grid, mapRoadLike(derived.small).maxCol, "small");
    renderRoadGrid("grid-roach", mapRoadLike(derived.roach).grid, mapRoadLike(derived.roach).maxCol, "roach");
}

function renderBeadPlate() {
    const cont = document.getElementById('grid-bead'); cont.innerHTML = '';
    let grid = {}, maxC = 0, c=0, r=0;
    S.history.forEach(data => { grid[`${c},${r}`] = data; r++; if(r>=6){r=0; c++; maxC=c;} });
    const cols = Math.max(12, maxC+1);
    for(let i=0; i<cols; i++){
        let col = document.createElement('div'); col.className='road-col';
        for(let j=0; j<6; j++){
            let cell = document.createElement('div'); cell.className='cell-lg';
            if(grid[`${i},${j}`]){
                let d = grid[`${i},${j}`];
                let dot = document.createElement('div'); dot.className=`bead-dot ${d.w}`;
                if(d.bp) dot.classList.add('has-bp'); if(d.pp) dot.classList.add('has-pp');
                dot.innerHTML = `<span class="bead-text">${d.w==='B'?'莊':d.w==='P'?'閒':'和'}</span>`;
                dot.style.display="flex"; dot.style.alignItems="center"; dot.style.justifyContent="center";
                cell.appendChild(dot);
            }
            col.appendChild(cell);
        }
        cont.appendChild(col);
    }
    cont.scrollLeft = cont.scrollWidth;
}

// 🎯 大路和局完美修正版 (Tie attached to previous hand)
function buildBigRoadAndDerived(hist) {
    let bigGrid={}, coords=[], lastRes=null, startC=0, c=0, r=0, maxC=0, pendingTies=0, lastCrd=null;
    function cellExists(cc, rr){ return !!bigGrid[`${cc},${rr}`]; }
    function colHeight(cc){ let h=0; while(cellExists(cc,h)) h++; return h; }

    for(let data of hist) {
        if(data.w === "T") { 
            if(lastCrd) bigGrid[lastCrd].t++; else pendingTies++; 
            continue; 
        }
        if(lastRes === null) { 
            c=0; r=0; lastRes=data.w; lastCrd=`${c},${r}`;
            bigGrid[lastCrd]={v:data.w, t:pendingTies, bp:data.bp, pp:data.pp}; 
            pendingTies=0; coords.push({c,r,val:data.w}); maxC=Math.max(maxC,c); continue; 
        }
        if(data.w === lastRes) { 
            let nr=r+1; if(nr<=5 && !cellExists(c,nr)) r=nr; else { c++; while(cellExists(c,r)) c++; } 
        } else { 
            startC++; while(cellExists(startC,0)) startC++; c=startC; r=0; lastRes=data.w; 
        }
        lastCrd=`${c},${r}`;
        bigGrid[lastCrd]={v:data.w, t:pendingTies, bp:data.bp, pp:data.pp}; 
        pendingTies=0; coords.push({c,r,val:data.w}); maxC=Math.max(maxC,c);
    }

    function getDerived(offset, coord) {
        let cc=coord.c, rr=coord.r, need=offset+1;
        if(rr===0) { if(cc<need) return null; return (colHeight(cc-1) === colHeight(cc-need)) ? "R" : "Blue"; }
        let ref=cc-offset; if(ref<0) return null; return (cellExists(ref,rr) === cellExists(ref,rr-1)) ? "R" : "Blue";
    }

    let eye=[], small=[], roach=[];
    coords.forEach(coord => {
        let e=getDerived(1,coord); if(e) eye.push(e);
        let s=getDerived(2,coord); if(s) small.push(s);
        let ro=getDerived(3,coord); if(ro) roach.push(ro);
    });
    return { bigGrid, maxCol: maxC, eye, small, roach };
}

function mapRoadLike(arr) {
    let grid={}, last=null, sc=0, c=0, r=0, maxC=0;
    for(let res of arr){
        if(last===null) { c=0;r=0;sc=0; grid[`${c},${r}`]={val:res}; last=res; continue; }
        if(res===last) { let nr=r+1; if(nr<=5 && !grid[`${c},${nr}`]) r=nr; else { c++; while(grid[`${c},${r}`]) c++; } }
        else { sc++; while(grid[`${sc},0`]) sc++; c=sc; r=0; last=res; }
        grid[`${c},${r}`]={val:res}; maxC=Math.max(maxC,c);
    }
    return {grid, maxCol:maxC};
}

function renderRoadGrid(id, map, maxC, type) {
    const cont = document.getElementById(id); cont.innerHTML='';
    const isSm = (type!=='big'); const cols = Math.max(isSm?24:18, maxC+1);
    for(let c=0; c<cols; c++){
        let col = document.createElement('div'); col.className='road-col';
        for(let r=0; r<6; r++){
            let cell = document.createElement('div'); cell.className=isSm?'cell-sm':'cell-lg';
            if(map[`${c},${r}`]){
                let data=map[`${c},${r}`], item=document.createElement('div');
                if(type==='big') { 
                    item.className=`circle-hollow ${data.v}`; 
                    if(data.bp) item.classList.add('has-bp');
                    if(data.pp) item.classList.add('has-pp');
                    if(data.t>0) { item.classList.add('tie-line'); if(data.t>1){ let t=document.createElement('span'); t.className='tie-text'; t.innerText=data.t; item.appendChild(t); } }
                } else if(type==='eye') { item.className=`circle-hollow ${data.val==='R'?'R':'Blue'}`; }
                else if(type==='small') { item.className=`circle-solid ${data.val}`; }
                else if(type==='roach') { item.className=`slash ${data.val}`; }
                cell.appendChild(item);
            }
            col.appendChild(cell);
        }
        cont.appendChild(col);
    }
    cont.scrollLeft = cont.scrollWidth;
}
