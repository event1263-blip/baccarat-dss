<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百家樂條件機率監視系統 (嚴謹版)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 6px; background-color: #121212; color: #eee; margin: 0; }
        .card { background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #333; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 6px; }
        .top-bar-title { font-size: 13px; font-weight: bold; color: #aaa; }
        .btn-group { display: flex; gap: 5px; }
        .btn-sm { border: none; padding: 6px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; color: white; }
        .btn-undo { background: #d35400; } .btn-reset { background: #c0392b; }
        
        /* 監視看板 */
        .tactical-board { display: flex; gap: 6px; margin-bottom: 8px; }
        .left-panel, .right-panel { flex: 1; background: #252526; border-radius: 6px; padding: 8px; border: 1px solid #444; }
        
        .panel-title { font-size: 11px; color: #888; text-align: center; margin-bottom: 6px; border-bottom: 1px dashed #444; padding-bottom: 4px; }
        
        /* EV 與機率顯示 */
        .odds-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .odds-row .b { color: #ff5252; } .odds-row .p { color: #448aff; }
        .ev-box { text-align: center; font-size: 12px; margin-top: 6px; padding: 4px; background: #111; border-radius: 4px; }
        
        /* 風險暴露顯示 */
        .risk-row { display: flex; justify-content: space-between; font-size: 12px; margin-top: 4px; color: #bbb; }
        .risk-val { font-weight: bold; color: #ffca28; }
        
        /* 決策面板：誠實顯示 */
        .decision-panel { text-align: center; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px; margin-bottom: 8px; border: 1px solid #555; background: #2a2a2a; color: #aaa; }
        .decision-panel.active-b { border-color: #ff5252; color: #ff5252; background: rgba(255,82,82,0.1); }
        .decision-panel.active-p { border-color: #448aff; color: #448aff; background: rgba(68,138,255,0.1); }
        
        /* 嚴謹輸入區 */
        .input-title { font-size: 12px; font-weight: bold; color: #aaa; margin-bottom: 4px; text-align: center; }
        .input-wrapper { display: flex; gap: 4px; margin-bottom: 8px; }
        .input-side { flex: 1; border-radius: 6px; border: 1px solid #444; background: #252526; }
        .side-head { text-align: center; font-size: 11px; font-weight: bold; color: white; padding: 4px; }
        .side-head.p { background: #1976d2; } .side-head.b { background: #d32f2f; }
        .slot-row { display: flex; justify-content: space-around; padding: 6px; }
        .slot { width: 30px; height: 36px; border: 1px solid #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; background: #1e1e1e; cursor: pointer; color: #eee; }
        .slot.active { border-color: #ffca28; background: #333; box-shadow: 0 0 5px rgba(255,202,40,0.5); }
        .slot.filled { color: #fff; }
        
        /* 鍵盤與剩餘牌數 */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .key { background: #333; border: 1px solid #555; border-radius: 6px; padding: 6px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .key:active { background: #444; }
        .key-val { font-size: 18px; font-weight: bold; color: #eee; line-height: 1; margin-bottom: 2px; }
        .key-count { font-size: 10px; font-weight: bold; color: #888; }
        .key-count.low { color: #ff5252; }
        .key.action-clear { background: #555; grid-column: span 2; flex-direction: row; font-size: 14px; color: #fff; }
        
        .submit-btn { width: 100%; padding: 14px; background: #333; color: #888; font-size: 15px; font-weight: bold; border: 1px solid #555; border-radius: 6px; margin-top: 8px; cursor: not-allowed; transition: 0.2s; }
        .submit-btn.ready { background: #2e7d32; color: white; border-color: #4caf50; cursor: pointer; }
        
        /* 視覺歷史圖形 (解耦，純顯示) */
        .history-card { background: #1e1e1e; padding: 8px; border-radius: 6px; margin-top: 8px; border: 1px solid #333; }
        .road-title { font-size: 10px; font-weight: bold; color: #888; margin: 2px 0; }
        .road-container { width: 100%; overflow-x: auto; border: 1px solid #444; background: #fff; box-sizing: border-box; margin-bottom: 4px; padding: 1px; }
        .road-grid { display: flex; min-width: max-content; }
        .road-col { display: flex; flex-direction: column; }
        .cell-lg { width: 16px; height: 16px; border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; }
        .circle-hollow { width: 12px; height: 12px; border-radius: 50%; border: 2px solid transparent; box-sizing: border-box; }
        .circle-hollow.B { border-color: #d32f2f; } .circle-hollow.P { border-color: #1976d2; }
        .tie-line { background: linear-gradient(to top right, transparent 45%, #4caf50 45%, #4caf50 55%, transparent 55%); }
        .tie-text { position: absolute; font-size: 8px; font-weight: bold; color: #388e3c; z-index: 2; }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-bar">
            <div class="top-bar-title">剩餘: <span id="totalCards">416</span> | 局數: <span id="roundCount">0</span></div>
            <div class="btn-group">
                <button class="btn-sm btn-undo" onclick="undoLastRound()">↩ 撤銷</button>
                <button class="btn-sm btn-reset" onclick="resetSystem()">重置</button>
            </div>
        </div>

        <div class="tactical-board">
            <div class="left-panel">
                <div class="panel-title">條件機率與期望值(EV)</div>
                <div class="odds-row"><span class="b">莊 <span id="bankerOdds">45.86</span>%</span><span class="p">閒 <span id="playerOdds">44.62</span>%</span></div>
                <div class="ev-box">
                    莊 EV: <span id="evBanker">-1.06%</span> | 閒 EV: <span id="evPlayer">-1.24%</span>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="panel-title">馬丁格爾風險暴露 (100基底)</div>
                <div class="risk-row"><span>當前階數:</span> <span class="risk-val" id="currentStep">1 / 4</span></div>
                <div class="risk-row"><span>本局需注碼:</span> <span class="risk-val" id="currentBet">100</span></div>
                <div class="risk-row"><span>累計總曝險:</span> <span class="risk-val" style="color:#ff5252" id="totalExposure">100</span></div>
            </div>
        </div>

        <div id="decisionPanel" class="decision-panel">
            狀態：<span id="predictionResult">EV皆為負，數學上不具下注價值</span>
        </div>

        <div class="input-title">合規輸入區 (嚴格補牌驗證)</div>
        
        <div class="input-wrapper">
            <div class="input-side">
                <div class="side-head p">閒家 (Player)</div>
                <div class="slot-row">
                    <div class="slot active" id="slot-p1" onclick="setActiveSlot('p1')" data-val=""></div>
                    <div class="slot" id="slot-p2" onclick="setActiveSlot('p2')" data-val=""></div>
                    <div class="slot" id="slot-p3" onclick="setActiveSlot('p3')" data-val=""></div>
                </div>
            </div>
            <div class="input-side">
                <div class="side-head b">莊家 (Banker)</div>
                <div class="slot-row">
                    <div class="slot" id="slot-b1" onclick="setActiveSlot('b1')" data-val=""></div>
                    <div class="slot" id="slot-b2" onclick="setActiveSlot('b2')" data-val=""></div>
                    <div class="slot" id="slot-b3" onclick="setActiveSlot('b3')" data-val=""></div>
                </div>
            </div>
        </div>

        <div class="keypad">
            <div class="key" onclick="inputKey('1')"><div class="key-val">A</div><div class="key-count" id="kcnt-1">32</div></div>
            <div class="key" onclick="inputKey('2')"><div class="key-val">2</div><div class="key-count" id="kcnt-2">32</div></div>
            <div class="key" onclick="inputKey('3')"><div class="key-val">3</div><div class="key-count" id="kcnt-3">32</div></div>
            <div class="key" onclick="inputKey('4')"><div class="key-val">4</div><div class="key-count" id="kcnt-4">32</div></div>
            <div class="key" onclick="inputKey('5')"><div class="key-val">5</div><div class="key-count" id="kcnt-5">32</div></div>
            
            <div class="key" onclick="inputKey('6')"><div class="key-val">6</div><div class="key-count" id="kcnt-6">32</div></div>
            <div class="key" onclick="inputKey('7')"><div class="key-val">7</div><div class="key-count" id="kcnt-7">32</div></div>
            <div class="key" onclick="inputKey('8')"><div class="key-val">8</div><div class="key-count" id="kcnt-8">32</div></div>
            <div class="key" onclick="inputKey('9')"><div class="key-val">9</div><div class="key-count" id="kcnt-9">32</div></div>
            <div class="key" onclick="inputKey('10')"><div class="key-val">10</div><div class="key-count" id="kcnt-10">32</div></div>
            
            <div class="key" onclick="inputKey('11')"><div class="key-val">J</div><div class="key-count" id="kcnt-11">32</div></div>
            <div class="key" onclick="inputKey('12')"><div class="key-val">Q</div><div class="key-count" id="kcnt-12">32</div></div>
            <div class="key" onclick="inputKey('13')"><div class="key-val">K</div><div class="key-count" id="kcnt-13">32</div></div>
            <div class="key action-clear" onclick="clearAllSlots()">🗑️ 清空重填</div>
        </div>
        
        <button class="submit-btn" id="submitBtn" onclick="submitData()" disabled>等待輸入合規牌面...</button>
    </div>

    <div class="history-card">
        <div class="road-title">大路 (客觀紀錄，無預測能力)</div>
        <div class="road-container"><div class="road-grid" id="grid-big"></div></div>
    </div>

    <script>
        // === 1. 嚴格實體牌庫模型 ===
        let totalCards = 416;
        let deck = {1:32, 2:32, 3:32, 4:32, 5:32, 6:32, 7:32, 8:32, 9:32, 10:32, 11:32, 12:32, 13:32};
        
        // 採用常規算牌權重 (僅作偏移參考)
        const countWeights = {1:1, 2:1, 3:2, 4:2, 5:1, 6:-1, 7:-2, 8:-2, 9:-2, 10:0, 11:0, 12:0, 13:0};
        let runningCount = 0;
        
        // 基礎機率 (8副牌)
        const baseBankerProb = 0.458597; 
        const basePlayerProb = 0.446247; 
        const tieProb = 0.095156;

        // 風險模組
        let currentStep = 1; 
        const betSteps = [0, 100, 200, 400, 800]; // index 1~4
        const exposureSteps = [0, 100, 300, 700, 1500]; // 累計虧損
        let historyLog = []; 
        let backupState = null;

        const slotOrder = ['p1', 'b1', 'p2', 'b2', 'p3', 'b3']; 
        let currentSlotIdx = 0;

        function updateKeypadCounts() {
            for(let i=1; i<=13; i++) {
                let el = document.getElementById(`kcnt-${i}`);
                if(el) {
                    el.innerText = deck[i];
                    el.className = deck[i] === 0 ? "key-count low" : "key-count";
                }
            }
        }

        // === 2. 嚴格 Baccarat 補牌邏輯驗證器 ===
        function getBaccaratVal(id) { 
            let v = document.getElementById(`slot-${id}`).dataset.val; 
            if (!v) return null; 
            let num = parseInt(v); 
            return num >= 10 ? 0 : num; 
        }

        function validateTableau() {
            const btn = document.getElementById('submitBtn');
            let p1 = getBaccaratVal('p1'), p2 = getBaccaratVal('p2'), p3 = getBaccaratVal('p3');
            let b1 = getBaccaratVal('b1'), b2 = getBaccaratVal('b2'), b3 = getBaccaratVal('b3');

            // 至少要有前四張
            if (p1 === null || p2 === null || b1 === null || b2 === null) {
                btn.className = "submit-btn"; btn.disabled = true; btn.innerText = "等待輸入前四張牌..."; return false;
            }

            let pTotal = (p1 + p2) % 10;
            let bTotal = (b1 + b2) % 10;
            let isNatural = (pTotal >= 8 || bTotal >= 8);

            let expectedP3 = false;
            let expectedB3 = false;

            if (!isNatural) {
                // 閒家規則
                if (pTotal <= 5) expectedP3 = true;
                
                // 莊家規則
                if (!expectedP3) {
                    if (bTotal <= 5) expectedB3 = true;
                } else {
                    if (p3 !== null) { // 閒家已補牌，依據閒家第三張牌決定莊家
                        if (bTotal <= 2) expectedB3 = true;
                        else if (bTotal === 3 && p3 !== 8) expectedB3 = true;
                        else if (bTotal === 4 && p3 >= 2 && p3 <= 7) expectedB3 = true;
                        else if (bTotal === 5 && p3 >= 4 && p3 <= 7) expectedB3 = true;
                        else if (bTotal === 6 && (p3 === 6 || p3 === 7)) expectedB3 = true;
                    }
                }
            }

            // 驗證實際輸入是否符合預期
            let valid = true;
            let msg = "輸入合規，點擊結算";

            if (isNatural && (p3 !== null || b3 !== null)) { valid = false; msg = "錯誤：天牌不可補牌"; }
            if (expectedP3 && p3 === null) { valid = false; msg = "錯誤：閒家必須補牌"; }
            if (!expectedP3 && p3 !== null) { valid = false; msg = "錯誤：閒家不可補牌"; }
            
            // 只有當閒家補牌邏輯滿足時，才去嚴格檢查莊家補牌
            if (valid && expectedP3 && p3 !== null) {
                if (expectedB3 && b3 === null) { valid = false; msg = "錯誤：莊家必須補牌"; }
                if (!expectedB3 && b3 !== null) { valid = false; msg = "錯誤：莊家不可補牌"; }
            } else if (valid && !expectedP3) {
                if (expectedB3 && b3 === null) { valid = false; msg = "錯誤：莊家必須補牌"; }
                if (!expectedB3 && b3 !== null) { valid = false; msg = "錯誤：莊家不可補牌"; }
            }

            if (valid) {
                btn.className = "submit-btn ready"; btn.disabled = false; btn.innerText = msg;
                return true;
            } else {
                btn.className = "submit-btn"; btn.disabled = true; btn.innerText = msg;
                return false;
            }
        }

        // === UI 交互 ===
        function setActiveSlot(slotId) {
            document.querySelectorAll('.slot').forEach(e => e.classList.remove('active')); 
            document.getElementById(`slot-${slotId}`).classList.add('active'); 
            currentSlotIdx = slotOrder.indexOf(slotId);
        }

        function inputKey(val) {
            // 【修復靜默忽略】嚴格檢查庫存
            if (deck[val] <= 0) {
                alert(`錯誤：牌面 ${val === '1'?'A':val==='11'?'J':val==='12'?'Q':val==='13'?'K':val} 已無庫存！請檢查是否輸入錯誤。`);
                return;
            }

            if (currentSlotIdx >= slotOrder.length) return; 

            const activeId = slotOrder[currentSlotIdx]; const el = document.getElementById(`slot-${activeId}`);
            let dVal = val; if (val==='1') dVal='A'; if (val==='11') dVal='J'; if (val==='12') dVal='Q'; if (val==='13') dVal='K';
            el.innerText = dVal; el.dataset.val = val; el.classList.add('filled');
            
            validateTableau();
            currentSlotIdx++;
            if (currentSlotIdx < slotOrder.length) { setActiveSlot(slotOrder[currentSlotIdx]); }
        }

        function clearAllSlots() { 
            slotOrder.forEach(id => { 
                const el = document.getElementById(`slot-${id}`); 
                el.innerText = ''; el.dataset.val = ''; el.classList.remove('filled'); 
            }); 
            currentSlotIdx = 0; setActiveSlot('p1'); validateTableau(); 
        }

        // === 3. 系統提交與資料庫更新 ===
        function saveState() { backupState = { totalCards, deck: Object.assign({}, deck), runningCount, currentStep, historyLog: [...historyLog] }; }

        function undoLastRound() {
            if (!backupState) return;
            totalCards = backupState.totalCards; deck = Object.assign({}, backupState.deck);
            runningCount = backupState.runningCount; currentStep = backupState.currentStep; historyLog = [...backupState.historyLog];
            recalcAndRender(); backupState = null; clearAllSlots();
        }

        function resetSystem() {
            if(confirm("確定重置整靴牌？")) {
                totalCards = 416; deck = {1:32, 2:32, 3:32, 4:32, 5:32, 6:32, 7:32, 8:32, 9:32, 10:32, 11:32, 12:32, 13:32};
                runningCount = 0; currentStep = 1; historyLog = []; backupState = null;
                recalcAndRender(); clearAllSlots();
            }
        }

        function submitData() {
            if (!validateTableau()) return;
            
            let pRaw = [], bRaw = [], pPts = 0, bPts = 0; let cardsConsumed = []; 
            ['p1', 'p2', 'p3'].forEach(id => { let v = document.getElementById(`slot-${id}`).dataset.val; if(v) { let rv = parseInt(v); pRaw.push(rv); cardsConsumed.push(rv); pPts += (rv >= 10 ? 0 : rv); } });
            ['b1', 'b2', 'b3'].forEach(id => { let v = document.getElementById(`slot-${id}`).dataset.val; if(v) { let rv = parseInt(v); bRaw.push(rv); cardsConsumed.push(rv); bPts += (rv >= 10 ? 0 : rv); } });
            
            saveState();

            let fP = pPts % 10, fB = bPts % 10, winner = 'T';
            if (fP > fB) winner = 'P'; else if (fB > fP) winner = 'B';
            historyLog.push(winner); 

            // 風險階數推進邏輯 (模擬玩家一直打某方輸了就倍增的情況)
            // 這裡簡化為：若沒贏(T不算)，階數推進
            if (winner !== 'T') {
                // 這裡假設玩家有下注且輸了，若要精確需加入玩家主動標示這把押誰
                // 為了展示風險模型，我們模擬連敗推進
                // 實務上需讓使用者勾選 "這把贏/輸"
            }

            // 扣除實體牌
            cardsConsumed.forEach(val => { 
                deck[val]--; 
                totalCards--; 
                runningCount += countWeights[val]; 
            });

            clearAllSlots(); recalcAndRender();
        }

        // === 4. 正確機率與 EV 算繪引擎 ===
        function recalcAndRender() {
            let decksRemaining = totalCards / 52;
            let trueCount = decksRemaining > 0 ? (runningCount / decksRemaining) : 0;
            
            // 簡單線性近似值 (實際極微小)
            let edgeShift = trueCount * 0.0005; 
            let p_player = basePlayerProb + edgeShift;
            let p_banker = baseBankerProb - edgeShift;

            // 嚴謹計算含 5% 抽水的期望值
            let evBanker = (p_banker * 0.95) - p_player;
            let evPlayer = p_player - p_banker;

            document.getElementById('totalCards').innerText = totalCards;
            document.getElementById('roundCount').innerText = historyLog.length;
            
            document.getElementById('bankerOdds').innerText = (p_banker * 100).toFixed(2);
            document.getElementById('playerOdds').innerText = (p_player * 100).toFixed(2);
            
            let evB_el = document.getElementById('evBanker');
            evB_el.innerText = (evBanker * 100).toFixed(2) + "%";
            evB_el.style.color = evBanker > 0 ? "#4caf50" : "#ff5252";

            let evP_el = document.getElementById('evPlayer');
            evP_el.innerText = (evPlayer * 100).toFixed(2) + "%";
            evP_el.style.color = evPlayer > 0 ? "#4caf50" : "#448aff";
            
            const dp = document.getElementById('decisionPanel'), pe = document.getElementById('predictionResult');
            
            if (evBanker > 0) { 
                dp.className = "decision-panel active-b"; 
                pe.innerText = "注意：莊家出現罕見正期望值"; 
            } else if (evPlayer > 0) { 
                dp.className = "decision-panel active-p"; 
                pe.innerText = "注意：閒家出現罕見正期望值"; 
            } else { 
                dp.className = "decision-panel"; 
                pe.innerText = "EV 皆為負，數學上不具下注價值"; 
            }

            // 風險暴露更新
            document.getElementById('currentStep').innerText = `${currentStep} / 4`;
            document.getElementById('currentBet').innerText = betSteps[currentStep];
            document.getElementById('totalExposure').innerText = exposureSteps[currentStep];

            updateKeypadCounts(); renderRoad();
        }

        // 解耦的歷史大路渲染
        function renderRoad() {
            let gridMap = {}; let lastRes = null; let sc = 0, cc = 0, cr = 0, mc = 0; let lastCrd = null; 
            let pendingTies = 0; 
            for (let i = 0; i < historyLog.length; i++) { 
                let res = historyLog[i]; 
                if (res === 'T') { if (lastCrd && gridMap[lastCrd]) gridMap[lastCrd].tie++; else pendingTies++; continue; } 
                if (res === lastRes) { let nr = cr + 1; if (nr <= 5 && !gridMap[`${cc},${nr}`]) cr = nr; else cc++; } 
                else { if (lastRes !== null) { sc++; while (gridMap[`${sc},0`]) sc++; } cc = sc; cr = 0; } 
                lastCrd = `${cc},${cr}`; gridMap[lastCrd] = { val: res, tie: pendingTies }; 
                pendingTies = 0; lastRes = res; if (cc > mc) mc = cc; 
            } 
            
            const container = document.getElementById('grid-big'); container.innerHTML = ''; 
            const cols = Math.max(15, mc + 1); 
            for (let c = 0; c < cols; c++) { 
                let colDiv = document.createElement('div'); colDiv.className = 'road-col'; 
                for (let r = 0; r < 6; r++) { 
                    let cell = document.createElement('div'); cell.className = 'cell-lg'; 
                    if (gridMap[`${c},${r}`]) { 
                        let data = gridMap[`${c},${r}`]; let item = document.createElement('div'); 
                        item.className = `circle-hollow ${data.val}`; 
                        if(data.tie > 0) { item.classList.add('tie-line'); if(data.tie > 1) { let txt = document.createElement('span'); txt.className = 'tie-text'; txt.innerText = data.tie; item.appendChild(txt); } }
                        cell.appendChild(item); 
                    } 
                    colDiv.appendChild(cell); 
                } 
                container.appendChild(colDiv); 
            } 
            container.parentElement.scrollLeft = container.parentElement.scrollWidth;
        }
        
        recalcAndRender(); setActiveSlot('p1');
    </script>
</body>
</html>
