<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>會員點數媒合商城 Human UX v1.6</title>
<style>
:root{
  --bg:#f3f6fb;--card:#fff;--text:#172033;--muted:#6b7280;--line:#e6eaf0;
  --blue:#2563eb;--blue2:#e8f0ff;--green:#16a34a;--green2:#e7f8ee;
  --red:#dc2626;--red2:#fee2e2;--amber:#d97706;--amber2:#fff3d6;
  --dark:#111827;--shadow:0 18px 40px rgba(15,23,42,.08);--radius:22px;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:radial-gradient(circle at top left,rgba(37,99,235,.08),transparent 35%),radial-gradient(circle at bottom right,rgba(22,163,74,.08),transparent 35%),var(--bg);color:var(--text)}
button,input,select,textarea{font-family:inherit}
button{border:0;cursor:pointer;border-radius:14px;padding:11px 16px;background:var(--blue);color:#fff;font-weight:800}
button.light{background:var(--blue2);color:#1d4ed8}
button.success{background:var(--green)}
button.warning{background:var(--amber)}
button.danger{background:var(--red)}
button.ghost{background:#fff;color:var(--text);border:1px solid var(--line)}
button:disabled{opacity:.45;cursor:not-allowed}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;font-size:14px;outline:none}
textarea{min-height:90px;resize:vertical}
label{display:block;font-weight:800;font-size:13px;margin-bottom:6px;color:#374151}
hr{border:0;border-top:1px solid var(--line);margin:18px 0}
.login{min-height:100vh;display:grid;place-items:center;padding:24px}
.login-shell{width:min(1120px,100%);display:grid;grid-template-columns:1.1fr .9fr;gap:22px}
.hero,.panel,.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{padding:36px}.hero h1{font-size:36px;line-height:1.2;margin:0 0 14px;letter-spacing:-.6px}.hero p{line-height:1.8;color:var(--muted);font-size:16px}
.hero-badge{display:inline-flex;background:var(--blue2);color:#1d4ed8;padding:8px 13px;border-radius:999px;font-weight:900;font-size:13px;margin-bottom:18px}
.role-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
.role-card{padding:16px;border-radius:18px;background:#f8fafc;border:1px solid var(--line)}.role-card .icon{font-size:30px;margin-bottom:8px}.role-card b{display:block;margin-bottom:5px}.role-card span{font-size:13px;color:var(--muted);line-height:1.6}
.panel{padding:24px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}.tab{padding:11px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--muted);text-align:center;font-weight:900;cursor:pointer}.tab.active{background:var(--dark);color:#fff}
.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}
aside{background:linear-gradient(180deg,#111827,#0f172a);color:#fff;padding:20px;height:100vh;position:sticky;top:0;overflow:auto}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}.logo{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#60a5fa,#22c55e);font-weight:900}.brand h2{font-size:16px;margin:0}.brand small{color:#cbd5e1}
.me{padding:16px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);margin-bottom:18px}.me b{display:block;margin-bottom:4px}.me span{font-size:13px;color:#cbd5e1;line-height:1.5}
.nav button{width:100%;background:transparent;color:#cbd5e1;text-align:left;border:1px solid transparent;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}.nav button.active{background:#fff;color:#111827}
main{padding:26px;max-width:1360px;width:100%;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:20px}.top h1{margin:0 0 6px;font-size:28px}.top p{margin:0;color:var(--muted);line-height:1.65}
.card{padding:22px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow)}.stat small{display:block;color:var(--muted);font-weight:800;margin-bottom:8px}.stat strong{font-size:27px}.stat em{display:block;color:var(--muted);font-size:12px;font-style:normal;margin-top:6px}
.task{display:grid;grid-template-columns:46px 1fr auto;gap:14px;align-items:center;padding:15px;border-radius:18px;background:#f8fafc;border:1px solid var(--line);margin-bottom:12px}.task .ico{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;background:var(--blue2);font-size:24px}.task b{display:block;margin-bottom:4px}.task span{font-size:13px;color:var(--muted)}
.shop{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.product{background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}.cover{height:140px;display:grid;place-items:center;font-size:46px;background:linear-gradient(135deg,rgba(37,99,235,.16),rgba(22,163,74,.12)),#f8fafc}.body{padding:18px;display:flex;flex-direction:column;gap:11px;flex:1}.price{font-size:24px;font-weight:950;color:#1d4ed8}
.badge{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;background:#eef2f7;color:#475569;white-space:nowrap}.badge.green{background:var(--green2);color:#166534}.badge.amber{background:var(--amber2);color:#92400e}.badge.red{background:var(--red2);color:#991b1b}.badge.blue{background:var(--blue2);color:#1d4ed8}
.mini{padding:12px;border-radius:16px;border:1px solid var(--line);background:#fff}.mini b{display:block;margin-bottom:4px}.mini span{font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap}.kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px dashed var(--line)}.kv:last-child{border-bottom:0}
.table-wrap{width:100%;overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:14px;min-width:980px}th{background:#f8fafc;text-align:left;padding:12px;border-bottom:1px solid var(--line);color:#374151}td{padding:12px;border-bottom:1px solid var(--line);vertical-align:top}
.empty{padding:34px;border:1px dashed #cbd5e1;border-radius:22px;background:#fff;color:var(--muted);text-align:center}.alert{padding:14px;border-radius:18px;background:var(--amber2);color:#92400e;border:1px solid #fde68a;line-height:1.7;margin-bottom:16px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.proof-img{max-width:180px;max-height:180px;border-radius:14px;border:1px solid var(--line);display:block;margin-top:8px}
.perm{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.perm label{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;margin:0}.perm input{width:auto}
@media(max-width:1050px){.login-shell,.app{grid-template-columns:1fr}aside{height:auto;position:static}.shop,.grid4{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:700px){main{padding:14px}.role-cards,.grid,.grid3,.grid4,.shop{grid-template-columns:1fr}.top{flex-direction:column}.task{grid-template-columns:46px 1fr}.task .actions{grid-column:1/-1}.perm{grid-template-columns:1fr}}
</style>
</head>

<body>
<div id="root"></div>

<script>
const KEY="point_mall_human_v1_6";
const SESSION="point_mall_human_session_v1_6";

const ADMIN={DEV:"system_developer",OWNER:"owner",MANAGER:"manager"};
const ROLE={customer:"顧客會員",supplier:"廠商主帳號",supplier_staff:"廠商員工",admin:"後台管理員",system_developer:"程式開發者",owner:"負責人",manager:"主管"};
const STATUS={
  active:"啟用",disabled:"停用",pending_review:"待審核",approved:"審核通過",rejected:"審核退回",
  product_pending:"商品待審核",product_active:"已上架",product_rejected:"商品退回",product_disabled:"已下架",
  product_order_reserved:"已保留庫存，待付款",product_order_reviewing:"付款證明審核中",product_order_done:"訂單完成",product_order_rejected:"付款退回，庫存已釋放",
  cashout_company_pending:"公司付款待審核",cashout_company_paid:"公司已付款",cashout_market_listed:"媒合中",cashout_market_accepted:"已被承接，待付款",cashout_market_reviewing:"媒合付款審核中",cashout_market_paid:"媒合付款完成",cashout_rejected:"退回"
};
const PERMS=[
  ["editMembers","編輯會員/廠商"],
  ["reviewProducts","審核商品上架"],
  ["setSupplierFeeRate","設定廠商上架費%"],
  ["reviewProductPayments","審核商品付款"],
  ["reviewPointPayments","審核點數付款"],
  ["reviewCashouts","審核回饋金提領"],
  ["viewReports","查看報表"],
  ["systemSettings","系統設定"],
  ["manageAdmins","管理後台帳號"]
];
const SUP_PERMS=[
  ["productCreate","上架商品"],
  ["productManage","商品管理"],
  ["orderView","訂單管理"],
  ["staffManage","員工管理"],
  ["profileEdit","結算資料"]
];

let db=loadDB();
let session=JSON.parse(sessionStorage.getItem(SESSION)||"null");
let page="home";
let loginMode="customer";

function uid(p){return p+"_"+Date.now()+"_"+Math.random().toString(16).slice(2)}
function now(){return new Date().toLocaleString("zh-TW",{hour12:false})}
function n(v){return Number(v||0).toLocaleString("zh-TW")}
function money(v){return "NT$ "+n(v)}
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function defaultPerm(level){
  if(level===ADMIN.DEV) return Object.fromEntries(PERMS.map(p=>[p[0],true]));
  if(level===ADMIN.OWNER) return {editMembers:true,reviewProducts:true,setSupplierFeeRate:true,reviewProductPayments:true,reviewPointPayments:true,reviewCashouts:true,viewReports:true,systemSettings:true,manageAdmins:false};
  return {editMembers:false,reviewProducts:true,setSupplierFeeRate:true,reviewProductPayments:true,reviewPointPayments:true,reviewCashouts:true,viewReports:true,systemSettings:false,manageAdmins:false};
}
function defaultSupplierPerm(role){
  if(role==="supervisor") return {productCreate:true,productManage:true,orderView:true,staffManage:true,profileEdit:false};
  return {productCreate:false,productManage:false,orderView:true,staffManage:false,profileEdit:false};
}
function loadDB(){
  const raw=localStorage.getItem(KEY);
  if(raw) return JSON.parse(raw);

  const c1=uid("cus"), c2=uid("cus"), a=uid("sup"), b=uid("sup");
  const data={
    settings:{platformFeeRate:8,defaultBonusRate:10,bonusName:"加成回饋金",customerRewardName:"可提領回饋金"},
    customers:[
      {id:c1,username:"customer01",password:"123456",name:"測試顧客A",phone:"0900000000",points:0,bonusCredit:0,customerRewardCredit:0,lockedRewardCredit:0,status:"active",receiveBank:"台灣銀行",receiveName:"測試顧客A",receiveAccount:"001-111-222",createdAt:now()},
      {id:c2,username:"customer02",password:"123456",name:"測試顧客B",phone:"0900000001",points:0,bonusCredit:0,customerRewardCredit:0,lockedRewardCredit:0,status:"active",receiveBank:"玉山銀行",receiveName:"測試顧客B",receiveAccount:"002-333-444",createdAt:now()}
    ],
    suppliers:[
      {id:a,username:"supplier01",password:"123456",companyName:"A 廠商",contactName:"王小姐",phone:"0911111111",bankName:"平台結算銀行A",bankAccountName:"A 廠商有限公司",bankAccount:"111-222-333",listingFeeRate:5,settlementNote:"平台結算用，不給顧客看。",status:"active",createdAt:now()},
      {id:b,username:"supplier02",password:"123456",companyName:"B 廠商",contactName:"李先生",phone:"0922222222",bankName:"平台結算銀行B",bankAccountName:"B 廠商有限公司",bankAccount:"444-555-666",listingFeeRate:8,settlementNote:"平台結算用，不給顧客看。",status:"active",createdAt:now()}
    ],
    supplierUsers:[
      {id:uid("suser"),supplierId:a,username:"a_manager",password:"123456",name:"A 廠商主管",role:"supervisor",permissions:defaultSupplierPerm("supervisor"),status:"active",createdAt:now()},
      {id:uid("suser"),supplierId:a,username:"a_staff",password:"123456",name:"A 廠商員工",role:"employee",permissions:defaultSupplierPerm("employee"),status:"active",createdAt:now()}
    ],
    admins:[
      {id:uid("adm"),username:"admin_dev",password:"123456",name:"程式開發者",adminLevel:ADMIN.DEV,permissions:defaultPerm(ADMIN.DEV),status:"active",createdAt:now()},
      {id:uid("adm"),username:"admin_owner",password:"123456",name:"負責人",adminLevel:ADMIN.OWNER,permissions:defaultPerm(ADMIN.OWNER),status:"active",createdAt:now()},
      {id:uid("adm"),username:"admin_manager",password:"123456",name:"主管",adminLevel:ADMIN.MANAGER,permissions:defaultPerm(ADMIN.MANAGER),status:"active",createdAt:now()}
    ],
    packages:[
      {id:uid("pkg"),name:"60,000 點數方案",cash:60000,basePoints:60000,bonusRate:10,status:"active"},
      {id:uid("pkg"),name:"30,000 點數方案",cash:30000,basePoints:30000,bonusRate:5,status:"active"}
    ],
    products:[
      {
        id:uid("prd"),supplierId:a,name:"限量生活選品",emoji:"🛍️",category:"生活用品",price:3600,stock:1,
        desc:"A 廠商限量商品。顧客確認購買後才會看到付款資訊。",
        payBank:"A 商品指定銀行",payee:"A 商品指定收款戶",payAccount:"123-456-789",payNote:"付款完成後請上傳付款證明。",
        note:"此商品只有 1 件，用來測試鎖庫存。",status:"product_active",createdAt:now()
      },
      {
        id:uid("prd"),supplierId:b,name:"B 廠商保健組合",emoji:"🎁",category:"保健用品",price:5000,stock:3,
        desc:"B 廠商商品，顧客確認購買後才會看到付款資訊。",
        payBank:"B 商品指定銀行",payee:"B 商品指定收款戶",payAccount:"987-654-321",payNote:"付款後請上傳截圖。",
        note:"B 廠商商品。",status:"product_active",createdAt:now()
      }
    ],
    pointOrders:[],productOrders:[],pointProofs:[],productProofs:[],
    pointLedger:[],bonusLedger:[],rewardLedger:[],
    cashoutRequests:[],cashoutProofs:[],
    logs:[]
  };
  localStorage.setItem(KEY,JSON.stringify(data));
  return data;
}

function me(){
  if(!session) return null;
  if(session.role==="customer") return db.customers.find(x=>x.id===session.id);
  if(session.role==="supplier") return db.suppliers.find(x=>x.id===session.supplierId);
  if(session.role==="supplier_staff") return db.supplierUsers.find(x=>x.id===session.staffId);
  if(session.role==="admin") return db.admins.find(x=>x.id===session.id);
  return null;
}
function currentSupplier(){
  if(!session) return null;
  if(session.role==="supplier") return db.suppliers.find(x=>x.id===session.supplierId);
  if(session.role==="supplier_staff"){
    const u=db.supplierUsers.find(x=>x.id===session.staffId);
    return u?db.suppliers.find(s=>s.id===u.supplierId):null;
  }
  return null;
}
function roleName(){
  const m=me();
  if(!m)return"";
  if(session.role==="admin")return ROLE[m.adminLevel];
  if(session.role==="supplier")return "廠商主帳號";
  if(session.role==="supplier_staff")return m.role==="supervisor"?"廠商主管":"廠商員工";
  return ROLE[session.role];
}
function hasPerm(k){const m=me();if(!session||session.role!=="admin"||!m)return false;if(m.adminLevel===ADMIN.DEV)return true;return !!(m.permissions&&m.permissions[k])}
function canEditAdmin(target){const m=me();if(!m||session.role!=="admin")return false;if(m.adminLevel===ADMIN.DEV)return target.adminLevel!==ADMIN.DEV;if(m.adminLevel===ADMIN.OWNER)return target.adminLevel===ADMIN.MANAGER;return false}
function hasSupplierPerm(k){if(session.role==="supplier")return true;if(session.role==="supplier_staff"){const u=me();return !!(u&&u.permissions&&u.permissions[k])}return false}
function supplierScopeId(){const s=currentSupplier();return s?s.id:null}
function log(action,detail){const m=me();db.logs.unshift({id:uid("log"),actor:m?(m.name||m.companyName||m.username):"未登入",role:session?session.role:"guest",action,detail,createdAt:now()});save()}
function badge(s){let cls="";if(["active","approved","product_active","product_order_done","cashout_company_paid","cashout_market_paid"].includes(s))cls="green";if(["pending_review","product_pending","product_order_reserved","product_order_reviewing","cashout_company_pending","cashout_market_listed","cashout_market_accepted","cashout_market_reviewing"].includes(s))cls="amber";if(["disabled","rejected","product_rejected","product_disabled","product_order_rejected","cashout_rejected"].includes(s))cls="red";return `<span class="badge ${cls}">${STATUS[s]||s}</span>`}
function bonus(pkg){return Math.round(Number(pkg.basePoints||0)*Number(pkg.bonusRate||0)/100)}
function listingFeeFor(supplierId,amount){const s=db.suppliers.find(x=>x.id===supplierId);return Math.round(Number(amount||0)*Number(s?s.listingFeeRate||0:0)/100)}
function availableReward(c){return Number(c.customerRewardCredit||0)}
function render(){
  const root=document.getElementById("root");
  if(!session||!me()){root.innerHTML=loginView();return}
  const m=me();
  const supplier=currentSupplier();
  root.innerHTML=`
    <div class="app">
      <aside>
        <div class="brand"><div class="logo">點</div><div><h2>會員點數媒合商城</h2><small>Human UX v1.6</small></div></div>
        <div class="me"><b>${m.name||m.companyName}</b><span>${roleName()}${supplier&&session.role==="supplier_staff"?`<br>${supplier.companyName}`:""}</span></div>
        <div class="nav">${navView()}</div>
        <button class="ghost" style="width:100%;margin-top:14px;background:transparent;color:#cbd5e1;" onclick="logout()">登出</button>
      </aside>
      <main>${pageView()}</main>
    </div>`;
}

function loginView(){
  return `
    <div class="login">
      <div class="login-shell">
        <section class="hero">
          <div class="hero-badge">v1.6｜廠商隔離、員工權限、上架費%、回饋金提領媒合</div>
          <h1>廠商資料不互通，回饋金可申請提領，並支援顧客間媒合付款。</h1>
          <p>後台可設定每個廠商的上架費百分比；廠商可建立主管與員工；顧客購買商品後取得等值可提領回饋金，提領可由公司付款或由其他顧客媒合付款。</p>
          <div class="role-cards">
            <div class="role-card"><div class="icon">👤</div><b>顧客</b><span>購買商品、取得等值回饋金、申請公司付款或顧客媒合提領。</span></div>
            <div class="role-card"><div class="icon">🏭</div><b>廠商</b><span>A 廠商只能看 A 的資料；可建立主管與員工權限。</span></div>
            <div class="role-card"><div class="icon">🛡️</div><b>後台</b><span>設定廠商上架費%、審核付款照片、審核回饋提領。</span></div>
          </div>
        </section>
        <section class="panel">
          <h2>登入系統</h2>
          <div class="tabs">
            <div class="tab ${loginMode==="customer"?"active":""}" onclick="setLogin('customer')">顧客</div>
            <div class="tab ${loginMode==="supplier"?"active":""}" onclick="setLogin('supplier')">廠商</div>
            <div class="tab ${loginMode==="admin"?"active":""}" onclick="setLogin('admin')">後台</div>
          </div>
          <div class="grid">
            <div><label>帳號</label><input id="loginUser" placeholder="customer01"></div>
            <div><label>密碼</label><input id="loginPass" type="password" placeholder="123456"></div>
          </div>
          <br><button style="width:100%;" onclick="login()">登入</button>
          <div class="alert" style="margin-top:18px;">
            測試帳號：<br>
            顧客 customer01 / 123456、customer02 / 123456<br>
            廠商主帳號 supplier01 / 123456、supplier02 / 123456<br>
            A 廠商主管 a_manager / 123456，A 廠商員工 a_staff / 123456<br>
            後台 admin_dev / 123456、admin_owner / 123456、admin_manager / 123456
          </div>
        </section>
      </div>
    </div>`;
}

function navView(){
  const items=[["home","首頁","→"]];
  if(session.role==="customer") items.push(["mall","商城","購"],["orders","我的訂單","單"],["buy_points","購買點數","點"],["cashout","回饋金提領","提"],["cashout_market","提領媒合商城","媒"],["ledger","帳戶流水","帳"]);
  if(session.role==="supplier"||session.role==="supplier_staff"){
    items.push(["supplier_home","工作台","→"]);
    if(hasSupplierPerm("productCreate"))items.push(["product_new","上架商品","＋"]);
    if(hasSupplierPerm("productManage"))items.push(["supplier_products","商品管理","品"]);
    if(hasSupplierPerm("orderView"))items.push(["supplier_orders","訂單管理","單"]);
    if(hasSupplierPerm("staffManage"))items.push(["supplier_staff","主管/員工","人"]);
    if(hasSupplierPerm("profileEdit"))items.push(["supplier_profile","結算資料","設"]);
  }
  if(session.role==="admin"){
    items.push(["admin_home","審核中心","審"]);
    if(hasPerm("reviewProductPayments")) items.push(["admin_product_pay","商品付款審核","款"]);
    if(hasPerm("reviewPointPayments")) items.push(["admin_point_pay","點數付款審核","點"]);
    if(hasPerm("reviewCashouts")) items.push(["admin_cashouts","回饋提領審核","提"]);
    if(hasPerm("reviewProducts")) items.push(["admin_products","商品審核","品"]);
    if(hasPerm("editMembers")) items.push(["admin_members","會員/廠商","員"]);
    if(hasPerm("viewReports")) items.push(["admin_report","報表","財"]);
    items.push(["admin_logs","紀錄","錄"]);

    if(hasPerm("manageAdmins")||me().adminLevel===ADMIN.OWNER) items.push(["admin_accounts","後台權限","權"]);
  }
  return items.map(x=>`<button class="${page===x[0]?"active":""}" onclick="go('${x[0]}')"><span>${x[1]}</span><small>${x[2]}</small></button>`).join("");
}

function setLogin(x){loginMode=x;render()}
function go(x){page=x;render()}
function login(){
  const u=document.getElementById("loginUser").value.trim(), p=document.getElementById("loginPass").value.trim();
  let acc=null;
  if(loginMode==="customer"){
    acc=db.customers.find(x=>x.username===u&&x.password===p);
    if(acc){session={role:"customer",id:acc.id};}
  }
  if(loginMode==="supplier"){
    acc=db.suppliers.find(x=>x.username===u&&x.password===p);
    if(acc){session={role:"supplier",supplierId:acc.id};}
    if(!acc){
      const staff=db.supplierUsers.find(x=>x.username===u&&x.password===p);
      if(staff){acc=staff;session={role:"supplier_staff",staffId:staff.id,supplierId:staff.supplierId};}
    }
  }
  if(loginMode==="admin"){
    acc=db.admins.find(x=>x.username===u&&x.password===p);
    if(acc){session={role:"admin",id:acc.id};}
  }
  if(!acc)return alert("帳號或密碼錯誤");
  if(acc.status==="disabled")return alert("此帳號已停用");
  sessionStorage.setItem(SESSION,JSON.stringify(session));page="home";log("登入",`${acc.name||acc.companyName||acc.username} 登入`);render();
}
function logout(){session=null;sessionStorage.removeItem(SESSION);page="home";render()}
function exists(username){return db.customers.some(x=>x.username===username)||db.suppliers.some(x=>x.username===username)||db.supplierUsers.some(x=>x.username===username)||db.admins.some(x=>x.username===username)}

function confirmProduct(productId){
  const p=db.products.find(x=>x.id===productId);if(!p)return;if(p.stock<=0)return alert("商品已無庫存");
  const ok=confirm(`確認購買：${p.name}\n總價：${money(p.price)}\n等值回饋金：${money(p.price)}\n\n確認後會立即鎖住庫存，付款資訊才會出現在你的訂單裡。`);
  if(!ok)return;if(p.stock<=0)return alert("商品已無庫存");
  p.stock-=1;
  const fee=Math.round(Number(p.price)*Number(db.settings.platformFeeRate||0)/100);
  const listing=listingFeeFor(p.supplierId,p.price);
  db.productOrders.unshift({
    id:uid("ord"),customerId:me().id,supplierId:p.supplierId,productId:p.id,productName:p.name,
    amount:Number(p.price),platformFee:fee,supplierAmount:Number(p.price)-fee,listingFee:listing,
    customerRewardAmount:Number(p.price),payBank:p.payBank,payee:p.payee,payAccount:p.payAccount,payNote:p.payNote,
    status:"product_order_reserved",createdAt:now()
  });
  log("建立商品訂單並鎖庫存",`${me().name} 建立 ${p.name}`);save();alert("已鎖住庫存。請到我的訂單查看付款資訊並上傳付款證明。");page="orders";render();
}

function uploadProductProof(orderId){

function createCashout(){
  const c=me();
  const amount=Number(document.getElementById("cashoutAmount").value||0);
  const method=document.getElementById("cashoutMethod").value;
  const note=document.getElementById("cashoutNote").value.trim();
  if(amount<=0)return alert("請輸入提領金額");
  if(amount>Number(c.customerRewardCredit||0))return alert("可提領回饋金不足");
  if(!c.receiveBank||!c.receiveName||!c.receiveAccount)return alert("請先設定完整收款資料");
  c.customerRewardCredit-=amount;
  c.lockedRewardCredit=Number(c.lockedRewardCredit||0)+amount;
  const status=method==="company"?"cashout_company_pending":"cashout_market_listed";
  db.cashoutRequests.unshift({id:uid("cashout"),customerId:c.id,method,amount,receiveBank:c.receiveBank,receiveName:c.receiveName,receiveAccount:c.receiveAccount,note,status,createdAt:now()});
  db.rewardLedger.unshift({id:uid("rl"),customerId:c.id,type:"回饋金提領鎖定",amount:-amount,before:c.customerRewardCredit+amount,after:c.customerRewardCredit,note:method==="company"?"公司付款提領":"媒合提領上架",createdAt:now()});
  save();alert("提領申請已建立");render();
}
function acceptCashout(idv){
  const r=db.cashoutRequests.find(x=>x.id===idv), c=me();if(!r)return;
  if(r.customerId===c.id)return alert("不能承接自己的提領單");
  if(r.status!=="cashout_market_listed")return alert("此提領單已被承接或不可承接");
  r.status="cashout_market_accepted";

  r.acceptedAt=now();
  save();alert("已承接。請依收款資料付款後上傳付款證明。");render();
}

function approveCompanyCashout(idv){
  if(!hasPerm("reviewCashouts"))return alert("權限不足");

function approveMarketCashout(idv){
  if(!hasPerm("reviewCashouts"))return alert("權限不足");

  db.rewardLedger.unshift({id:uid("rl"),customerId:c.id,type:"媒合付款提領完成",amount:-Number(r.amount||0),before:Number(c.customerRewardCredit||0),after:Number(c.customerRewardCredit||0),note:"由其他顧客媒合付款完成",createdAt:now()});

}
function rejectCashout(idv){
  if(!hasPerm("reviewCashouts"))return alert("權限不足");
  const reason=prompt("退回原因：")||"未填寫";
  const r=db.cashoutRequests.find(x=>x.id===idv);if(!r)return;

  c.customerRewardCredit=Number(c.customerRewardCredit||0)+Number(r.amount||0);

}
