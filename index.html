<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>百家樂量化終端 - v64.1</title>
<style>
:root{
  --bg:#09090b; --card:#15161b; --card2:#1a1b22; --line:#2b2d38;
  --text:#f4f4f5; --muted:#a1a1aa;
  --banker:#ef4444; --player:#3b82f6; --tie:#22c55e;
  --hl:#eab308; --warn:#f97316; --ok:#16a34a; --lab:#0ea5e9;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif}
body{padding-top:168px;overflow-x:hidden}
button,input,select{font:inherit}

.sticky-hud{
  position:fixed; top:0; left:0; right:0; z-index:3000;
  background:rgba(12,12,16,.94);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:calc(env(safe-area-inset-top) + 8px) 10px 12px;
  box-shadow:0 10px 24px rgba(0,0,0,.35);
}
.hud-header{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.hud-stats{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:800;color:var(--muted);align-items:center}
.hud-stats .val{color:var(--text);margin-left:3px;font-variant-numeric:tabular-nums}
.version-badge{background:var(--hl);color:#000;font-size:10px;font-weight:950;border-radius:6px;padding:2px 6px}
.hud-actions{display:flex;gap:6px}
.hud-btn{
  background:#242632;border:1px solid #3a3d4d;color:#fff;border-radius:10px;
  padding:7px 11px;font-size:12px;font-weight:900;cursor:pointer
}
.hud-btn:active{transform:scale(.97)}
.btn-undo{color:var(--warn)} .btn-reset{color:var(--banker)}

.oracle-box{
  text-align:center;padding:12px 8px;border-radius:14px;border:2px solid #2a2c36;background:#000;transition:.2s;
}
.oracle-box.banker{border-color:var(--banker);background:linear-gradient(180deg,rgba(239,68,68,.14),#000)}
.oracle-box.player{border-color:var(--player);background:linear-gradient(180deg,rgba(59,130,246,.14),#000)}
.oracle-box.pass{border-color:#3f3f46}
.oracle-box.locked{border-color:var(--hl);background:repeating-linear-gradient(45deg,rgba(234,179,8,.05),rgba(234,179,8,.05) 10px,#000 10px,#000 20px)}
.oracle-box.degraded{border-color:var(--warn);background:repeating-linear-gradient(45deg,rgba(249,115,22,.05),rgba(249,115,22,.05) 10px,#000 10px,#000 20px)}
.oracle-main{font-size:28px;font-weight:950;letter-spacing:1px;margin-bottom:6px}
.oracle-box.banker .oracle-main{color:var(--banker)}
.oracle-box.player .oracle-main{color:var(--player)}
.oracle-box.locked .oracle-main{color:var(--hl)}
.oracle-box.degraded .oracle-main{color:var(--warn);font-size:22px}
.reason-badge{display:inline-flex;gap:6px;flex-wrap:wrap;align-items:center;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.08);font-size:11px;font-weight:800}
.trend-alert{font-size:12px;font-weight:900;padding:4px 8px;border-radius:8px;margin-bottom:6px}
.alert-safe{color:var(--muted);background:rgba(255,255,255,.05)}
.alert-high{color:#fff;background:rgba(249,115,22,.25);border:1px solid rgba(249,115,22,.75)}
.alert-warn{color:var(--warn);background:rgba(249,115,22,.12);border:1px dashed rgba(249,115,22,.8)}
.sidebet-container{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;border-top:1px dashed #333;padding-top:10px;margin-top:10px}
.sidebet-pill{font-size:11px;font-weight:900;padding:4px 8px;border-radius:8px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid transparent}
.sidebet-pill.active{background:rgba(34,197,94,.15);color:var(--tie);border-color:var(--tie)}
.sidebet-pill.active-pair{background:rgba(234,179,8,.15);color:var(--hl);border-color:var(--hl)}

.scroll-container{padding:12px;padding-bottom:88px}
.roads-card,.input-card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:14px}
.road-title{font-size:11px;font-weight:900;color:var(--muted);margin:4px 0 6px;text-transform:uppercase}
.road-container{width:100%;overflow-x:auto;background:#fff;border-radius:10px;padding:5px;border:1px solid #dcdcdc}
.road-container + .road-container{margin-top:8px}
.road-grid{display:flex;width:max-content;min-height:106px}
.road-col{display:flex;flex-direction:column}
.cell-lg,.cell-sm{position:relative;display:flex;align-items:center;justify-content:center;background:#fff;border:.5px solid #ececec;flex-shrink:0}
.cell-lg{width:16px;height:16px}
.cell-sm{width:8px;height:8px}
.bead-dot{width:12px;height:12px;border-radius:50%}
.circle-hollow{width:12px;height:12px;border-radius:50%;border:2px solid transparent;background:transparent}
.circle-solid{width:5px;height:5px;border-radius:50%}
.slash{width:6px;height:6px}
.B,.R{background-color:var(--banker);border-color:var(--banker)}
.P,.Blue{background-color:var(--player);border-color:var(--player)}
.T{background-color:var(--tie);border-color:var(--tie)}
.has-bp::before{content:'';position:absolute;top:0;left:0;width:4px;height:4px;background:var(--banker);border:1px solid #fff;border-radius:50%;z-index:3}
.has-pp::after{content:'';position:absolute;bottom:0;right:0;width:4px;height:4px;background:var(--player);border:1px solid #fff;border-radius:50%;z-index:3}
.tie-line{position:absolute;width:100%;height:2px;background:var(--tie);transform:rotate(-45deg);z-index:2}
.tie-text{position:absolute;font-size:10px;font-weight:950;color:var(--tie);text-shadow:0 0 2px #fff}
.slash.R{background:linear-gradient(to bottom left,transparent 40%,var(--banker) 40%,var(--banker) 60%,transparent 60%)}
.slash.Blue{background:linear-gradient(to bottom left,transparent 40%,var(--player) 40%,var(--player) 60%,transparent 60%)}
.derived-roads{display:flex;gap:6px;margin-top:8px}
.derived-col{flex:1;min-width:0}

.top-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.order-select{background:#262833;color:#fff;border:1px solid #3c4051;border-radius:8px;padding:6px 8px;font-size:12px;font-weight:900}
.auto-guard{font-size:12px;color:var(--muted);font-weight:900;display:flex;align-items:center;gap:6px}
.table-layout{display:flex;gap:8px}
.table-side{flex:1;background:#000;border-radius:14px;padding:8px;border:1px solid var(--line)}
.side-label{font-size:12px;font-weight:950;text-align:center;padding:6px 0;border-radius:8px;margin-bottom:8px}
.side-label.p{background:rgba(59,130,246,.16);color:var(--player)}
.side-label.b{background:rgba(239,68,68,.16);color:var(--banker)}
.cards-row{display:flex;gap:4px}
.playing-card{flex:1;aspect-ratio:2/3;border-radius:10px;border:1px solid #3c4051;background:#20222d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:950;cursor:pointer;transition:.15s}
.playing-card.active{border-color:var(--hl);box-shadow:0 0 0 1px rgba(234,179,8,.6) inset;color:var(--hl)}
.playing-card.filled{background:#ececf1;color:#000}
.playing-card.disabled{opacity:.28;pointer-events:none}
.keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px}
.key{background:#262833;border:1px solid #3c4051;border-radius:10px;padding:10px 0;text-align:center;cursor:pointer}
.key:active{transform:scale(.97)}
.key-val{font-size:18px;font-weight:950}
.key-count{font-size:10px;color:var(--muted);margin-top:2px}
.key.action-clear{grid-column:span 2;color:var(--warn);display:flex;align-items:center;justify-content:center;font-weight:950}
.submit-btn{width:100%;margin-top:12px;border:none;border-radius:14px;padding:15px 12px;background:#2a2c36;color:#7f8088;font-size:16px;font-weight:950}
.submit-btn.ready{background:var(--ok);color:#000;cursor:pointer;box-shadow:0 0 18px rgba(22,163,74,.28)}

.fab-btn{position:fixed;right:18px;bottom:20px;z-index:4800;width:52px;height:52px;border:none;border-radius:50%;background:var(--hl);color:#000;font-size:22px;font-weight:950;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.5)}
.database-panel{
  position:fixed;left:0;right:0;bottom:0;height:88vh;z-index:5000;
  background:#111;border-radius:20px 20px 0 0;border-top:1px solid #2d2d36;
  padding:18px;padding-top:calc(env(safe-area-inset-top) + 18px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(104%);transition:transform .28s ease;pointer-events:none;
  box-shadow:0 -20px 40px rgba(0,0,0,.45)
}
.database-panel.open{transform:translateY(0);pointer-events:auto}
.db-header{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #333;background:#111}
.db-title{font-size:18px;font-weight:950;color:#fff;display:flex;gap:8px;align-items:center}
.db-close{position:relative;z-index:3;background:none;border:none;color:var(--muted);font-size:30px;line-height:1;cursor:pointer;padding:6px 10px;border-radius:10px;touch-action:manipulation}
.db-close:active{transform:scale(.96)}
.db-section{background:#1a1b22;border:1px solid #2e3140;border-radius:14px;padding:14px;margin-bottom:14px}
.db-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;font-weight:800}
.db-stat-item{display:flex;justify-content:space-between;gap:8px;background:#111;border-radius:10px;padding:8px}
.param-input{width:76px;background:#262833;color:#fff;border:1px solid #3c4051;border-radius:8px;padding:5px 6px;text-align:center}
.lab-btn{width:100%;border:none;border-radius:10px;padding:12px;background:var(--lab);color:#fff;font-weight:950;cursor:pointer;box-shadow:0 0 14px rgba(14,165,233,.24)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.small-muted{font-size:11px;color:#888;line-height:1.45}

@media (max-width:680px){
  body{padding-top:182px}
  .table-layout{flex-direction:column}
  .db-stat-grid,.grid-2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="sticky-hud">
  <div class="hud-header">
    <div class="hud-stats">
      <span class="version-badge">v64.1</span>
      <span>剩牌:<span class="val" id="hdrRemain">416</span></span>
      <span>局:<span class="val" id="hdrRound">0</span></span>
    </div>
    <div class="hud-actions">
      <button class="hud-btn btn-undo" type="button" onclick="undo()">↩ 撤銷</button>
      <button class="hud-btn btn-reset" type="button" onclick="resetShoe()">換靴</button>
    </div>
  </div>
  <div id="oracleBox" class="oracle-box pass">
    <div class="trend-alert alert-safe" id="trendAlert">📊 專家策略引擎運行中</div>
    <div class="oracle-main" id="oracleMain">等待輸入</div>
    <div class="reason-badge" id="reasonBadge">實驗室預測模型待命中</div>
    <div class="sidebet-container">
      <div class="sidebet-pill" id="sbTie">和局 --%</div>
      <div class="sidebet-pill" id="sbBP">莊對 --%</div>
      <div class="sidebet-pill" id="sbPP">閒對 --%</div>
    </div>
  </div>
</div>

<div class="scroll-container">
  <div class="roads-card">
    <div class="road-title">珠盤路 &amp; 大路</div>
    <div class="road-container"><div class="road-grid" id="grid-bead"></div></div>
    <div class="road-container"><div class="road-grid" id="grid-big"></div></div>
    <div class="road-title" style="margin-top:10px;">下三路</div>
    <div class="derived-roads">
      <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-eye"></div></div></div>
      <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-small"></div></div></div>
      <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-roach"></div></div></div>
    </div>
  </div>

  <div class="input-card">
    <div class="top-row">
      <select id="orderSel" class="order-select" onchange="changeOrder()">
        <option value="PBPB">閒莊閒莊 (國際標準)</option>
        <option value="PPBB">閒閒莊莊 (區塊派發)</option>
      </select>
      <label class="auto-guard"><input type="checkbox" id="autoGuide" checked onchange="evaluateDrawRules()">🛡️ 智慧防呆</label>
    </div>
    <div class="table-layout">
      <div class="table-side">
        <div class="side-label p">閒 PLAYER</div>
        <div class="cards-row">
          <div class="playing-card active" id="slot-p1" onclick="setActiveSlot('p1')"></div>
          <div class="playing-card" id="slot-p2" onclick="setActiveSlot('p2')"></div>
          <div class="playing-card disabled" id="slot-p3" onclick="setActiveSlot('p3')"></div>
        </div>
      </div>
      <div class="table-side">
        <div class="side-label b">莊 BANKER</div>
        <div class="cards-row">
          <div class="playing-card" id="slot-b1" onclick="setActiveSlot('b1')"></div>
          <div class="playing-card" id="slot-b2" onclick="setActiveSlot('b2')"></div>
          <div class="playing-card disabled" id="slot-b3" onclick="setActiveSlot('b3')"></div>
        </div>
      </div>
    </div>
    <div class="keypad" id="keypad"></div>
    <button class="submit-btn" id="submitBtn" type="button" onclick="submitHand()" disabled>請依照發牌順序輸入</button>
  </div>
</div>

<button class="fab-btn" type="button" onclick="toggleDB()">⚙️</button>
<div class="database-panel" id="dbPanel" aria-hidden="true">
  <div class="db-header">
    <div class="db-title">實驗室控制台 <span class="version-badge">v64.1</span></div>
    <button class="db-close" type="button" onclick="toggleDB()">×</button>
  </div>

  <div class="db-section" style="border-color:var(--lab)">
    <h3 style="margin:0 0 10px;color:var(--lab)">🔬 執行量化實驗室</h3>
    <button class="lab-btn" type="button" onclick="invokeQuantLab()">🧬 啟動 Expanding-History Walk-Forward</button>
    <div class="small-muted" style="margin-top:10px">
      嚴格使用已結算鞋做 rolling + holdout 驗證。<br>
      匯入舊資料時，若目前開靴缺乏完整快照，系統會進入降級模式並禁止續打，直到換靴為止。
    </div>
  </div>

  <div class="db-section" style="border-color:var(--hl)">
    <h3 style="margin:0 0 10px;color:var(--hl)">🤖 部署策略設定</h3>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:var(--muted);font-weight:900">期望值下注閥值 (Tau)</span>
      <input id="cfgM" class="param-input" type="number" step="0.001" onchange="saveConfig()">
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:var(--muted);font-weight:900">側注防噪閥值</span>
      <input id="cfgS" class="param-input" type="number" step="0.01" onchange="saveConfig()">
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--muted);font-weight:900">ECE Bin 數量</span>
      <input id="cfgBins" class="param-input" type="number" min="5" max="20" step="1" onchange="saveConfig()">
    </div>
  </div>

  <div class="db-section" style="border-color:var(--player)">
    <h3 style="margin:0 0 10px">🎯 本靴戰況</h3>
    <div class="db-stat-grid" id="shoeStats"></div>
  </div>
  <div class="db-section">
    <h3 style="margin:0 0 10px">📈 歷史資料庫</h3>
    <div class="db-stat-grid" id="globalStats"></div>
  </div>

  <div class="grid-2">
    <button class="hud-btn" style="background:#2563eb;border:none" type="button" onclick="exportDB()">📤 匯出資料庫</button>
    <button class="hud-btn" style="background:#16a34a;border:none" type="button" onclick="document.getElementById('impFile').click()">📥 匯入資料庫</button>
    <input id="impFile" type="file" accept="application/json,.json" style="display:none" onchange="importDB(event)">
    <button class="hud-btn" style="background:#dc2626;border:none;grid-column:1/-1" type="button" onclick="resetAll()">⚠️ 徹底清除所有數據</button>
  </div>
</div>

<script>
const DB_K = 'bac_db_v64_1';
const LAB_K = 'bac_lab_v64_1';
const ST_K = 'bac_st_v64_1';
const CF_K = 'bac_cfg_v64_1';
const LEGACY_KEYS = ['v64','v63','v62','v61','v60','v56','v55','v54','v53','v52'];
const SIDEBET_MIN_N = 12;
const WARMUP_HANDS = 15;
const PATTERN_CAP = 50000;
const countWeights = {1:1,2:1,3:2,4:2,5:1,6:-1,7:-2,8:-2,9:-2,10:0,11:0,12:0,13:0};
const NAIVE_PRIORS = {B:0.4586,P:0.4462,T:0.0952};
const PAYOUTS = {B:0.95,P:1,T:8};

let BigData = { totalHands:0, patterns:{}, acc:{recs:0,hits:0,tRecs:0,tHits:0,bpRecs:0,bpHits:0,ppRecs:0,ppHits:0}, isPolluted:false };
let LabStore = { schema_version:'v64.1', rawShoes:[], currentOpenShoe:null, experiments:[] };
let S = null;
let Config = { m:0.005, s:0.08, nBins:10 };
let bSt = null, bDB = null, bLab = null;
let cOrder = ['p1','b1','p2','b2','p3','b3'];
let cIdx = 0;

const clone = (obj) => (typeof structuredClone === 'function' ? structuredClone(obj) : JSON.parse(JSON.stringify(obj)));
const sumDeck = (deck) => Object.keys(deck || {}).reduce((a,k)=>a + (Number(deck[k])||0), 0);
const safeInt = (v, d=0) => Number.isFinite(Number(v)) ? Math.floor(Number(v)) : d;
const safeBool = (v) => v === true || v === 'true' || v === 1 || v === '1';

function readStorageWithFallback(prefix){
  let bestKey = prefix + 'v64_1';
  let bestValue = localStorage.getItem(bestKey);
  if(bestValue === null){
    for(const v of LEGACY_KEYS){
      const k = prefix + v;
      const vv = localStorage.getItem(k);
      if(vv !== null){ bestKey = k; bestValue = vv; break; }
    }
  }
  return { key: bestKey, value: bestValue };
}
function migrateToCurrentKey(sourceKey, targetKey, rawValue){
  if(sourceKey && sourceKey !== targetKey && rawValue !== null){
    localStorage.setItem(targetKey, rawValue);
  }
}
function normalizeConfig(c){
  let m = Number(c && c.m); if(!Number.isFinite(m)) m = 0.005; m = Math.max(-1, Math.min(1, m));
  let s = Number(c && c.s); if(!Number.isFinite(s)) s = 0.08; s = Math.max(0, Math.min(1, s));
  let nBins = parseInt(c && c.nBins, 10); if(!Number.isFinite(nBins)) nBins = 10; nBins = Math.max(5, Math.min(20, nBins));
  return { m, s, nBins };
}
function generateShoeId(){ return 'shoe_' + Date.now() + '_' + Math.floor(Math.random()*100000); }
function baccaratValue(rank){ return rank >= 10 ? 0 : rank; }
function createInitialState(){
  const s = {
    shoeId: Date.now(), deck:{}, history:[], runningCount:0,
    shoePerf:{recs:0,hits:0,tRecs:0,tHits:0,bpRecs:0,bpHits:0,ppRecs:0,ppHits:0},
    lastRecSide:null, lastSideBets:{tie:false,bp:false,pp:false}, isLegacyPartial:false
  };
  for(let i=1;i<=13;i++) s.deck[i] = 32;
  return s;
}
function resetShoeVarsInit(){ S = createInitialState(); return S; }
function derivePhysicalRunningCount(deck){
  let rc = 0;
  for(let i=1;i<=13;i++) rc += (32 - (Number(deck[i])||0)) * (countWeights[i]||0);
  return rc;
}
function isValidDeck(deck){
  if(!deck || typeof deck !== 'object') return false;
  for(let i=1;i<=13;i++){
    const v = Number(deck[i]);
    if(!Number.isFinite(v) || v < 0 || v > 32) return false;
  }
  return true;
}
function normalizeState(obj){
  if(!obj || typeof obj !== 'object' || !isValidDeck(obj.deck)) return null;
  const s = createInitialState();
  s.shoeId = obj.shoeId || Date.now();
  for(let i=1;i<=13;i++) s.deck[i] = Math.max(0, Math.min(32, safeInt(obj.deck[i], 32)));
  s.history = Array.isArray(obj.history) ? obj.history.map(h => ({
    w: (h && (h.w === 'B' || h.w === 'P' || h.w === 'T')) ? h.w : (typeof h === 'string' && (h==='B'||h==='P'||h==='T') ? h : 'T'),
    bp: safeBool(h && h.bp),
    pp: safeBool(h && h.pp),
    pPt: Math.max(0, Math.min(9, safeInt(h && h.pPt, 0))),
    bPt: Math.max(0, Math.min(9, safeInt(h && h.bPt, 0)))
  })) : [];
  const used = 416 - sumDeck(s.deck);
  if(used < s.history.length * 4 || used > s.history.length * 6) return null;
  s.runningCount = derivePhysicalRunningCount(s.deck);

  const keypad = document.getElementById('keypad');
  keypad.innerHTML = '';
  const pending = getPendingCounts();
  for(let i=1;i<=13;i++){
    const remain = Math.max(0, (S.deck[i] || 0) - pending[i]);
    const b = document.createElement('div');
    b.className = 'key';
    b.innerHTML = `<div class="key-val">${i===1?'A':i===11?'J':i===12?'Q':i===13?'K':i}</div><div class="key-count">${remain}</div>`;
    b.onclick = () => inputRank(i);
    keypad.appendChild(b);
  }
  const clr = document.createElement('div');
  clr.className = 'key action-clear';
  clr.textContent = '⌫ 清空重填';
  clr.onclick = clearCurrentInput;
  keypad.appendChild(clr);
}
function setActiveSlot(id){
  const el = document.getElementById('slot-' + id);
  if(!el || el.classList.contains('disabled')) return;
  document.querySelectorAll('.playing-card').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  cIdx = cOrder.indexOf(id);
}
function inputRank(rank){
  const pending = getPendingCounts();
  if(((S.deck[rank] || 0) - pending[rank]) <= 0) return;
  while(cIdx < cOrder.length && document.getElementById('slot-' + cOrder[cIdx]).classList.contains('disabled')) cIdx++;
  if(cIdx >= cOrder.length) return;
  const target = document.getElementById('slot-' + cOrder[cIdx]);
  target.textContent = rank===1?'A':rank===11?'J':rank===12?'Q':rank===13?'K':String(rank);
  target.dataset.val = String(rank);
  target.classList.add('filled');
  cIdx++;
  evaluateDrawRules();
  drawKeypad();
  while(cIdx < cOrder.length && document.getElementById('slot-' + cOrder[cIdx]).classList.contains('disabled')) cIdx++;
  if(cIdx < cOrder.length) setActiveSlot(cOrder[cIdx]);
}
function clearCurrentInput(){
  cIdx = 0;
  for(const id of ['p1','p2','p3','b1','b2','b3']){
    const el = document.getElementById('slot-' + id);
    el.textContent = '';
    el.dataset.val = '';
    el.classList.remove('filled','active');
    if(id === 'p3' || id === 'b3') el.classList.add('disabled'); else el.classList.remove('disabled');
  }
  setActiveSlot(cOrder[0]);
  evaluateDrawRules();
  drawKeypad();
}
function changeOrder(){
  cOrder = document.getElementById('orderSel').value === 'PBPB' ? ['p1','b1','p2','b2','p3','b3'] : ['p1','p2','b1','b2','p3','b3'];
  clearCurrentInput();
}
function evaluateDrawRules(){
  const isAuto = document.getElementById('autoGuide').checked;
  const btn = document.getElementById('submitBtn');
  const p3 = document.getElementById('slot-p3');
  const b3 = document.getElementById('slot-b3');
  const p1 = getVal('p1'), p2 = getVal('p2'), b1 = getVal('b1'), b2 = getVal('b2');
  if(!p1 || !p2 || !b1 || !b2){
    p3.classList.add('disabled'); b3.classList.add('disabled');
    btn.disabled = true; btn.className = 'submit-btn'; btn.textContent = '請依照發牌順序輸入';
    return;
  }
  if(!isAuto){
    p3.classList.remove('disabled'); b3.classList.remove('disabled');
    btn.disabled = false; btn.className = 'submit-btn ready'; btn.textContent = '手動覆寫模式：可結算';
    return;
  }
  const pT = (baccaratValue(p1)+baccaratValue(p2)) % 10;
  const bT = (baccaratValue(b1)+baccaratValue(b2)) % 10;
  const nat = pT >= 8 || bT >= 8;
  const p3v = getVal('p3'), b3v = getVal('b3');
  let needP3 = false, needB3 = false;
  if(!nat){
    if(pT <= 5) needP3 = true;
    if(!needP3){ if(bT <= 5) needB3 = true; }
    else if(p3v !== null){
      const pv = baccaratValue(p3v);
      if(bT <= 2) needB3 = true;
      else if(bT === 3 && pv !== 8) needB3 = true;
      else if(bT === 4 && pv >= 2 && pv <= 7) needB3 = true;
      else if(bT === 5 && pv >= 4 && pv <= 7) needB3 = true;
      else if(bT === 6 && (pv === 6 || pv === 7)) needB3 = true;
    }
  }
  if(!needP3) p3.classList.add('disabled'); else p3.classList.remove('disabled');
  if(needP3 && p3v === null) b3.classList.add('disabled'); else { if(!needB3) b3.classList.add('disabled'); else b3.classList.remove('disabled'); }
  let valid = true, msg = '✓ 牌局合法，點擊結算';
  if(nat && (p3v !== null || b3v !== null)){ valid = false; msg = '❌ 錯誤：天牌不可補牌'; }
  if(valid && needP3 && p3v === null){ valid = false; msg = '❌ 錯誤：閒家必須補牌'; }
  if(valid && !needP3 && p3v !== null){ valid = false; msg = '❌ 錯誤：閒家不可補牌'; }
  if(valid && needP3 && p3v !== null){
    if(needB3 && b3v === null){ valid = false; msg = '❌ 錯誤：莊家必須補牌'; }
    if(!needB3 && b3v !== null){ valid = false; msg = '❌ 錯誤：莊家不可補牌'; }
  } else if(valid && !needP3){
    if(needB3 && b3v === null){ valid = false; msg = '❌ 錯誤：莊家必須補牌'; }
    if(!needB3 && b3v !== null){ valid = false; msg = '❌ 錯誤：莊家不可補牌'; }
  }
  btn.disabled = !valid;
  btn.className = valid ? 'submit-btn ready' : 'submit-btn';
  btn.textContent = msg;
}

function submitHand(){
  if(S.isLegacyPartial){ alert('⚠️ 系統目前處於舊版相容降級模式，請先換靴後再繼續輸入。'); return; }
  const btn = document.getElementById('submitBtn');
  if(btn.disabled) return;
  bSt = clone(S); bDB = clone(BigData); bLab = clone(LabStore);
  const vals = { p1:getVal('p1'), p2:getVal('p2'), p3:getVal('p3'), b1:getVal('b1'), b2:getVal('b2'), b3:getVal('b3') };
  const cons = [];
  let pPts = 0, bPts = 0;
  for(const id of ['p1','p2','p3','b1','b2','b3']){
    const v = vals[id];
    if(v){
      cons.push(v);
      if(id[0] === 'p') pPts += baccaratValue(v); else bPts += baccaratValue(v);
    }
  }
  const pFinal = pPts % 10, bFinal = bPts % 10;
  const w = pFinal > bFinal ? 'P' : (bFinal > pFinal ? 'B' : 'T');
  const bp = vals.b1 != null && vals.b1 === vals.b2;
  const pp = vals.p1 != null && vals.p1 === vals.p2;
  const keyToUpdate = getPatternKeyBeforePush();
  const remainCards = sumDeck(S.deck);
  const features = { F_Base:{}, F_Comp:{ running_count:S.runningCount, remain_cards:remainCards }, F_Path:extractPathFeaturesCore(S.history) };
  const policy = getDeployedPolicy();
  const cp = keyToUpdate ? canonicalPatternLive(keyToUpdate, BigData.patterns[keyToUpdate]) : null;
  const ext = cp ? { has_pattern:true, pattern_N:cp.N, pattern_B:cp.B, pattern_P:cp.P } : { has_pattern:false };
  const livePrediction = executePolicyChain(policy.model, features, policy.tau, ext);
  const obs = captureObservation(S, features, livePrediction, vals, S.lastSideBets);
  commitObservation(obs, { winner:w, pPt:pFinal, bPt:bFinal, bp, pp });
  if(w !== 'T' && livePrediction.decision !== 'PASS'){
    S.shoePerf.recs += 1;
    if(livePrediction.decision === w) S.shoePerf.hits += 1;
  }
  if(S.lastSideBets.tie){ S.shoePerf.tRecs += 1; if(w === 'T') S.shoePerf.tHits += 1; }
  if(S.lastSideBets.bp){ S.shoePerf.bpRecs += 1; if(bp) S.shoePerf.bpHits += 1; }
  if(S.lastSideBets.pp){ S.shoePerf.ppRecs += 1; if(pp) S.shoePerf.ppHits += 1; }
  S.history.push({ w, pPt:pFinal, bPt:bFinal, bp, pp });
  for(const v of cons){ S.deck[v] = Math.max(0, (S.deck[v] || 0) - 1); S.runningCount += countWeights[v] || 0; }
  if(keyToUpdate) updatePatternDB(BigData, keyToUpdate, w, bp, pp);
  recalcDBStats(BigData);
  saveDatabase();
  clearCurrentInput();
  render();
}

async function exportDB(){
  try{
    recalcDBStats(BigData); auditLabStore(LabStore);
    const payload = { version:'v64.1', bigData:BigData, labStore:LabStore, state:S, config:Config };
    const text = JSON.stringify(payload, null, 2);
    const filename = `bac_v64_1_${new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')}.json`;
    const blob = new Blob([text], { type:'application/json' });
    if(window.showSaveFilePicker){
      try{
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description:'JSON', accept:{ 'application/json':['.json'] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        alert('✅ 匯出完成，檔案已儲存到你選擇的位置。');
        return;
      }catch(err){
        if(err && err.name !== 'AbortError') console.warn('save picker fallback', err);
        if(err && err.name === 'AbortError') return;
      }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.style.display = 'none';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    alert('✅ 已交由瀏覽器下載。Safari 通常會出現在下載項目；其他瀏覽器多半在系統的 Downloads 資料夾。');
  }catch(e){
    console.error(e); alert('匯出失敗：' + e.message);
  }
}
function importDB(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const text = String(ev.target.result || '').replace(/^\uFEFF/, '');
      const obj = JSON.parse(text);
      if(!obj || !obj.labStore || !obj.state || !obj.config) throw new Error('invalid-payload');
      let tempLab = obj.labStore;
      let tempState = normalizeState(obj.state);
      let tempCfg = normalizeConfig(obj.config);
      if(!tempState) throw new Error('invalid-state');
      tempLab.experiments = [];
      if(!Array.isArray(tempLab.rawShoes)) tempLab.rawShoes = [];
      auditLabStore(tempLab);
      if(!validateOpenShoeConsistency(tempLab, tempState)){
        console.warn('open shoe invalid; converting to fresh open state');
        tempLab.currentOpenShoe = null;
        tempState = createInitialState();
      }
      const rebuilt = rebuildBigDataFromAuditedShoes(tempLab.rawShoes);
      BigData = rebuilt;
      if(tempLab.currentOpenShoe && Array.isArray(tempLab.currentOpenShoe.hands)){
        let hist = [];
        for(const hand of tempLab.currentOpenShoe.hands){
          migrateOutcomeContract(hand);
          const key = getPatternKeyFromHistory(hist);
          if(key) updatePatternDB(BigData, key, hand.outcome.winner, !!hand.outcome.bp, !!hand.outcome.pp);
          hist.push({ w:hand.outcome.winner, pPt:hand.outcome.pPt, bPt:hand.outcome.bPt, bp:!!hand.outcome.bp, pp:!!hand.outcome.pp });
        }
      }
      LabStore = tempLab;
      S = tempState;
      Config = tempCfg;
      rebuildLiveStateMetrics(S, LabStore.currentOpenShoe);
      recalcDBStats(BigData);
      document.getElementById('cfgM').value = Config.m;
      document.getElementById('cfgS').value = Config.s;
      document.getElementById('cfgBins').value = Config.nBins;
      bSt = bDB = bLab = null;
      saveDatabase(); saveState(); localStorage.setItem(CF_K, JSON.stringify(Config));
      drawKeypad(); clearCurrentInput(); render();
      alert(`✅ 匯入成功，已載入 ${LabStore.rawShoes.length} 靴已結算資料。`);
    }catch(err){
      console.error(err);
      alert('匯入失敗：檔案格式不正確，或內容不完整。');
    }finally{
      e.target.value = '';
    }
  };
  reader.readAsText(file);
}

function buildBigRoadMeta(history){
  const grid = {}, cols = [];
  let last = null, startCol = 0, c = 0, r = 0, lastCoord = null, maxCol = 0;
  for(const d of history){
    if(d.w === 'T'){
      if(lastCoord && grid[lastCoord]) grid[lastCoord].ties = (grid[lastCoord].ties || 0) + 1;
      continue;
    }
    if(last === null || d.w !== last){
      if(last !== null){ startCol += 1; while(grid[startCol + ',0'] !== undefined) startCol += 1; }
      c = startCol; r = 0;
    }else{
      const nr = r + 1;
      if(nr <= 5 && grid[c + ',' + nr] === undefined) r = nr;
      else { c += 1; while(grid[c + ',' + r] !== undefined) c += 1; }
    }
    const key = c + ',' + r;
    grid[key] = { v:d.w, bp:d.bp, pp:d.pp, ties:0, c, r };
    if(!cols[c]) cols[c] = [];
    cols[c][r] = grid[key];
    last = d.w; lastCoord = key; maxCol = Math.max(maxCol, c);
  }
  return { grid, cols, maxCol };
}
function getDerivedRoads(meta){
  const nodes = Object.values(meta.grid).sort((a,b)=>a.c-b.c || a.r-b.r);
  const seq1 = [], seq2 = [], seq3 = [];
  const colH = (c) => { let h=0; while(meta.grid[c + ',' + h] !== undefined) h++; return h; };
  for(const node of nodes){
    const c = node.c, r = node.r;
    const calc = (off, seq) => {
      if(r === 0){ if(c >= off + 1) seq.push(colH(c-1) === colH(c-off-1) ? 'R' : 'Blue'); }
      else if(c >= off){ const a = !!meta.grid[(c-off) + ',' + r]; const b = !!meta.grid[(c-off) + ',' + (r-1)]; seq.push(a === b ? 'R' : 'Blue'); }
    };
    calc(1, seq1); calc(2, seq2); calc(3, seq3);
  }
  return { eye:seq1, small:seq2, roach:seq3 };
}
function simulatePathDerivation(hist, hyp){
  const sim = hist.slice(); sim.push({ w:hyp });
  const d = getDerivedRoads(buildBigRoadMeta(sim));
  return { eye:d.eye[d.eye.length-1] || null, small:d.small[d.small.length-1] || null, roach:d.roach[d.roach.length-1] || null };
}
function drawDerivedGrid(domId, arr, type){
  const el = document.getElementById(domId); el.innerHTML = '';
  const grid = {};
  let last = null, startCol = 0, c = 0, r = 0, maxCol = 0;
  for(const res of arr){
    if(last === null || res !== last){ if(last !== null){ startCol += 1; while(grid[startCol + ',0'] !== undefined) startCol += 1; } c = startCol; r = 0; }
    else { const nr = r + 1; if(nr <= 5 && grid[c + ',' + nr] === undefined) r = nr; else { c += 1; while(grid[c + ',' + r] !== undefined) c += 1; } }
    grid[c + ',' + r] = res; last = res; maxCol = Math.max(maxCol, c);
  }
  for(let col=0; col<Math.max(24, maxCol + 1); col++){
    const colEl = document.createElement('div'); colEl.className = 'road-col';
    for(let row=0; row<6; row++){
      const cell = document.createElement('div'); cell.className = 'cell-sm';
      const val = grid[col + ',' + row];
      if(val){
        const item = document.createElement('div');
        if(type === 'eye') item.className = 'circle-hollow ' + val;
        else if(type === 'small') item.className = 'circle-solid ' + val;
        else item.className = 'slash ' + val;
        cell.appendChild(item);
      }
      colEl.appendChild(cell);
    }
    el.appendChild(colEl);
  }
}
function renderRoads(){
  const bead = document.getElementById('grid-bead');
  const big = document.getElementById('grid-big');
  bead.innerHTML = ''; big.innerHTML = '';
  for(let c=0; c<Math.max(12, Math.ceil(S.history.length / 6)); c++){
    const col = document.createElement('div'); col.className = 'road-col';
    for(let r=0; r<6; r++){
      const cell = document.createElement('div'); cell.className = 'cell-lg';
      const idx = c * 6 + r;
      const d = S.history[idx];
      if(d){
        const dot = document.createElement('div'); dot.className = 'bead-dot ' + d.w; cell.appendChild(dot);
        if(d.bp) cell.classList.add('has-bp'); if(d.pp) cell.classList.add('has-pp');
      }
      col.appendChild(cell);
    }
    bead.appendChild(col);
  }
  const meta = buildBigRoadMeta(S.history);
  for(let c=0; c<Math.max(24, meta.maxCol + 1); c++){
    const col = document.createElement('div'); col.className = 'road-col';
    for(let r=0; r<6; r++){
      const cell = document.createElement('div'); cell.className = 'cell-lg';
      const d = meta.grid[c + ',' + r];
      if(d){
        const cir = document.createElement('div'); cir.className = 'circle-hollow ' + d.v; cell.appendChild(cir);
        if(d.ties){
          const line = document.createElement('div'); line.className = 'tie-line'; cell.appendChild(line);
          if(d.ties > 1){ const tx = document.createElement('span'); tx.className = 'tie-text'; tx.textContent = d.ties; cell.appendChild(tx); }
        }
        if(d.bp) cell.classList.add('has-bp'); if(d.pp) cell.classList.add('has-pp');
      }
      col.appendChild(cell);
    }
    big.appendChild(col);
  }
  const dr = getDerivedRoads(meta);
  drawDerivedGrid('grid-eye', dr.eye, 'eye');
  drawDerivedGrid('grid-small', dr.small, 'small');
  drawDerivedGrid('grid-roach', dr.roach, 'roach');
}

function render(livePrediction){
  const remain = sumDeck(S.deck);
  document.getElementById('hdrRemain').textContent = remain;
  document.getElementById('hdrRound').textContent = S.history.length;
  renderRoads();
  const ob = document.getElementById('oracleBox');
  const om = document.getElementById('oracleMain');
  const rb = document.getElementById('reasonBadge');
  const ta = document.getElementById('trendAlert');
  if(livePrediction == null){
    const policy = getDeployedPolicy();
    const features = { F_Base:{}, F_Comp:{ running_count:S.runningCount, remain_cards:remain }, F_Path:extractPathFeaturesCore(S.history) };
    const key = getPatternKeyBeforePush();
    const cp = key ? canonicalPatternLive(key, BigData.patterns[key]) : null;
    const ext = cp ? { has_pattern:true, pattern_N:cp.N, pattern_B:cp.B, pattern_P:cp.P } : { has_pattern:false };
    livePrediction = executePolicyChain(policy.model, features, policy.tau, ext);
  }
  if(S.history.length < 1){
    ob.className = 'oracle-box pass'; om.textContent = '等待輸入'; rb.textContent = '實驗室預測模型待命中'; ta.className = 'trend-alert alert-safe'; ta.textContent = '📊 專家策略引擎運行中';
    S.lastRecSide = 'PASS';
  }else if(S.isLegacyPartial){
    ob.className = 'oracle-box degraded'; om.textContent = '⚠️ 降級模式'; rb.textContent = '無完整快照，部分指標無法還原'; ta.className = 'trend-alert alert-warn'; ta.textContent = '⚠️ 舊版相容模式：請換靴';
    S.lastRecSide = 'PASS';
  }else if(livePrediction.isWarmup){
    ob.className = 'oracle-box locked'; om.textContent = '🔒 規律收集中'; rb.textContent = `暖機保護中 (${S.history.length}/${WARMUP_HANDS})`; ta.className = 'trend-alert alert-safe'; ta.textContent = '⚠️ 樣本不足，強制觀望';
    S.lastRecSide = 'PASS';
  }else{
    if(livePrediction.decision === 'B'){ ob.className = 'oracle-box banker'; om.textContent = '🔥 推薦莊家'; ta.className = 'trend-alert alert-high'; ta.textContent = '⚡ 優勢突破閥值'; }
    else if(livePrediction.decision === 'P'){ ob.className = 'oracle-box player'; om.textContent = '🔥 推薦閒家'; ta.className = 'trend-alert alert-high'; ta.textContent = '⚡ 優勢突破閥值'; }
    else { ob.className = 'oracle-box pass'; om.textContent = '🛡️ 觀望 (PASS)'; ta.className = 'trend-alert alert-safe'; ta.textContent = '📊 趨勢不明，建議等待'; }
    const tc = remain > 0 ? (S.runningCount / Math.max(0.5, remain / 52)).toFixed(2) : '0.00';
    const ev = (livePrediction.ev[livePrediction.decision] || 0).toFixed(4);
    rb.textContent = `真數 (TC): ${tc} | 預期淨利 (EV): ${ev}`;
    S.lastRecSide = livePrediction.decision;
  }
  const ptn = patternStatsForCurrent();
  const tieP = ptn && !ptn.weak ? ptn.tieP : 0;
  const bpP = ptn && !ptn.weak ? ptn.bpP : 0;
  const ppP = ptn && !ptn.weak ? ptn.ppP : 0;
  const hasData = !!(ptn && !ptn.weak);
  S.lastSideBets = { tie: tieP >= Config.s && hasData, bp: bpP >= Config.s && hasData, pp: ppP >= Config.s && hasData };
  const setSB = (id, label, p, pair, ok) => {
    const el = document.getElementById(id);
    if(!ok){ el.textContent = `${label} --%`; el.className = 'sidebet-pill'; return; }
    el.textContent = `${label} ${(p*100).toFixed(1)}%`;
    el.className = p >= Config.s ? (pair ? 'sidebet-pill active-pair' : 'sidebet-pill active') : 'sidebet-pill';
  };
  setSB('sbTie', '和局', tieP, false, hasData);
  setSB('sbBP', '莊對', bpP, true, hasData);
  setSB('sbPP', '閒對', ppP, true, hasData);
  updateDBUI();
  saveState();
}
function toggleDB(){
  const panel = document.getElementById('dbPanel');
  const willOpen = !panel.classList.contains('open');
  if(willOpen){ panel.classList.add('open'); panel.setAttribute('aria-hidden', 'false'); updateDBUI(); }
  else { panel.classList.remove('open'); panel.setAttribute('aria-hidden', 'true'); }
}

function computeLogLoss(samples){
  if(!samples.length) return 0;
  let sum = 0;
  for(const s of samples){ sum -= Math.log(Math.max(s.probs[s.winner], 1e-15)); }
  return sum / samples.length;
}
function computeBrierScore(samples){
  if(!samples.length) return 0;
  let sum = 0;
  for(const s of samples){
    sum += Math.pow(s.probs.B - (s.winner==='B'?1:0),2) + Math.pow(s.probs.P - (s.winner==='P'?1:0),2) + Math.pow(s.probs.T - (s.winner==='T'?1:0),2);
  }
  return sum / samples.length;
}
function initCalibrationBins(nBins){
  const mk = () => Array.from({length:nBins}, () => ({ n:0, sumP:0, sumY:0 }));
  return { nBins, B:mk(), P:mk(), T:mk() };
}
function updateCalibrationBins(bins, probs, winner){
  for(const k of ['B','P','T']){
    let idx = Math.floor(probs[k] * bins.nBins); if(idx >= bins.nBins) idx = bins.nBins - 1;
    bins[k][idx].n += 1; bins[k][idx].sumP += probs[k]; bins[k][idx].sumY += (winner === k ? 1 : 0);
  }
}
function mergeCalibrationBins(dst, src){
  for(const k of ['B','P','T']) for(let i=0;i<dst.nBins;i++){ dst[k][i].n += src[k][i].n; dst[k][i].sumP += src[k][i].sumP; dst[k][i].sumY += src[k][i].sumY; }
}
function computeECEFromBins(bins){
  const total = bins.B.reduce((a,b)=>a+b.n,0);
  if(!total) return { ece_B:0, ece_P:0, ece_T:0, ece_macro:0 };
  const calc = (arr) => arr.reduce((acc,b)=> acc + (b.n ? (b.n/total)*Math.abs((b.sumY/b.n)-(b.sumP/b.n)) : 0), 0);
  const ece_B = calc(bins.B), ece_P = calc(bins.P), ece_T = calc(bins.T);
  return { ece_B, ece_P, ece_T, ece_macro:(ece_B+ece_P+ece_T)/3 };
}
function rollingForecastOrigin(shoes, trainN, valM, testK, stepK){
  return {
    shoes, trainN, valM, testK, stepK, startIdx:0,
    next(){
      if(this.startIdx + this.trainN + this.valM + this.testK <= this.shoes.length){
        const value = {
          history: this.shoes.slice(0, this.startIdx + this.trainN + this.valM),
          test: this.shoes.slice(this.startIdx + this.trainN + this.valM, this.startIdx + this.trainN + this.valM + this.testK)
        };
        this.startIdx += this.stepK;
        return { value, done:false };
      }
      return { done:true };
    }
  };
}
function aggregateRuns(runs, nBins){
  if(!runs.length) return null;
  const globalBins = initCalibrationBins(nBins);
  const out = { split_count:runs.length, n_test_hands:0, bet_count:0, log_loss_num:0, brier_num:0, predicted_ev_sum:0, realized_return_sum:0, worst_split_max_drawdown:0 };
  for(const r of runs){
    out.n_test_hands += r.n_test_hands; out.bet_count += r.bet_count; out.log_loss_num += r.log_loss * r.n_test_hands; out.brier_num += r.brier * r.n_test_hands;
    out.predicted_ev_sum += r.predicted_ev_sum; out.realized_return_sum += r.realized_return_sum; out.worst_split_max_drawdown = Math.max(out.worst_split_max_drawdown, r.max_drawdown);
    mergeCalibrationBins(globalBins, r.calibration_bins);
  }
  const ece = computeECEFromBins(globalBins);
  return {
    split_count:out.split_count,
    n_test_hands:out.n_test_hands,
    bet_count:out.bet_count,
    log_loss: out.n_test_hands ? out.log_loss_num / out.n_test_hands : 0,
    brier_multiclass_raw: out.n_test_hands ? out.brier_num / out.n_test_hands : 0,
    ece_macro: ece.ece_macro,
    ece_details: ece,
    coverage: out.n_test_hands ? out.bet_count / out.n_test_hands : 0,
    predicted_ev_sum: out.predicted_ev_sum,
    realized_return_sum: out.realized_return_sum,
    worst_split_max_drawdown: out.worst_split_max_drawdown
  };
}
function runExperiment(spec){
  auditLabStore(LabStore);
  if(!validateOpenShoeConsistency(LabStore, S)){
    alert('目前開靴狀態不一致，請先換靴或重新匯入正確資料。');
    return null;
  }
  const closed = LabStore.rawShoes || [];
  const holdoutStart = Math.floor(closed.length * 0.8);
  const dev = closed.slice(0, holdoutStart);
  const holdout = closed.slice(holdoutStart);
  const minNeed = spec.split_config.trainN + spec.split_config.valM + spec.split_config.testK;
  if(dev.length < minNeed){ alert(`實驗鞋數不足，目前可用 ${closed.length} 靴。`); return null; }
  const policy = getDeployedPolicy();
  const runs = [];
  const gen = rollingForecastOrigin(dev, spec.split_config.trainN, spec.split_config.valM, spec.split_config.testK, spec.split_config.stepK);
  let step = gen.next();
  while(!step.done){
    const split = step.value;
    const wfDb = buildWalkForwardDB(split.history);
    const bins = initCalibrationBins(spec.calibration.nBins);
    const samples = [];
    let predicted_ev_sum = 0, realized_return_sum = 0, bankroll = 0, peak = 0, maxDD = 0, betCount = 0;
    for(const shoe of split.test){
      let hist = [], deck = {}; for(let i=1;i<=13;i++) deck[i] = 32; let rc = 0;
      for(const hand of shoe.hands){
        const key = getPatternKeyFromHistory(hist);
        const cp = key ? wfDb.patterns[key] : null;
        const ext = cp ? { has_pattern:true, pattern_N:cp.N, pattern_B:cp.B, pattern_P:cp.P } : { has_pattern:false };
        const remain = sumDeck(deck);
        const features = { F_Base:{}, F_Comp:{ running_count:rc, remain_cards:remain }, F_Path:extractPathFeaturesCore(hist) };
        const res = executePolicyChain(policy.model, features, policy.tau, ext);
        const winner = hand.outcome.winner;
        samples.push({ probs:res.probs, winner, decision:res.decision });
        updateCalibrationBins(bins, res.probs, winner);
        if(res.decision !== 'PASS'){
          betCount++;
          predicted_ev_sum += res.ev[res.decision];
          const ret = settleDecision(res.decision, winner);
          realized_return_sum += ret; bankroll += ret; peak = Math.max(peak, bankroll); maxDD = Math.max(maxDD, peak - bankroll);
        }
        const bp = hand.input.cards.b1 != null && hand.input.cards.b1 === hand.input.cards.b2;
        const pp = hand.input.cards.p1 != null && hand.input.cards.p1 === hand.input.cards.p2;
        if(key) updatePatternDB(wfDb, key, winner, bp, pp);
        for(const slot of ['p1','p2','p3','b1','b2','b3']){ const rank = hand.input.cards[slot]; if(rank != null){ deck[rank] -= 1; rc += countWeights[rank] || 0; } }
        hist.push({ w:winner, pPt:hand.outcome.pPt, bPt:hand.outcome.bPt, bp, pp });
      }
    }
    runs.push({ test_shoe_ids:split.test.map(s => s.shoe_id), n_test_hands:samples.length, bet_count:betCount, log_loss:computeLogLoss(samples), brier:computeBrierScore(samples), calibration_bins:bins, predicted_ev_sum, realized_return_sum, max_drawdown:maxDD });
    step = gen.next();
  }
  if(!runs.length) return null;
  const aggregate = aggregateRuns(runs, spec.calibration.nBins);
  const holdDb = buildWalkForwardDB(dev);
  const hb = initCalibrationBins(spec.calibration.nBins);
  const hs = [];
  let hbets = 0, hev = 0, hret = 0;
  for(const shoe of holdout){
    let hist = [], deck = {}; for(let i=1;i<=13;i++) deck[i] = 32; let rc = 0;
    for(const hand of shoe.hands){
      const key = getPatternKeyFromHistory(hist);
      const cp = key ? holdDb.patterns[key] : null;
      const ext = cp ? { has_pattern:true, pattern_N:cp.N, pattern_B:cp.B, pattern_P:cp.P } : { has_pattern:false };
      const features = { F_Base:{}, F_Comp:{ running_count:rc, remain_cards:sumDeck(deck) }, F_Path:extractPathFeaturesCore(hist) };
      const res = executePolicyChain(policy.model, features, policy.tau, ext);
      const winner = hand.outcome.winner;
      hs.push({ probs:res.probs, winner, decision:res.decision });
      updateCalibrationBins(hb, res.probs, winner);
      if(res.decision !== 'PASS'){ hbets++; hev += res.ev[res.decision]; hret += settleDecision(res.decision, winner); }
      const bp = hand.input.cards.b1 != null && hand.input.cards.b1 === hand.input.cards.b2;
      const pp = hand.input.cards.p1 != null && hand.input.cards.p1 === hand.input.cards.p2;
      if(key) updatePatternDB(holdDb, key, winner, bp, pp);
      for(const slot of ['p1','p2','p3','b1','b2','b3']){ const rank = hand.input.cards[slot]; if(rank != null){ deck[rank] -= 1; rc += countWeights[rank] || 0; } }
      hist.push({ w:winner, pPt:hand.outcome.pPt, bPt:hand.outcome.bPt, bp, pp });
    }
  }
  const hece = computeECEFromBins(hb);
  const holdMetrics = hs.length ? { n_test_hands:hs.length, bet_count:hbets, coverage:hbets/hs.length, log_loss:computeLogLoss(hs), brier:computeBrierScore(hs), ece_macro:hece.ece_macro, predicted_ev_sum:hev, realized_return_sum:hret } : null;
  let verdict = 'FLAT_RETURN_BASELINE';
  if(aggregate.n_test_hands < 50 || !holdMetrics || holdMetrics.n_test_hands < 10) verdict = 'INSUFFICIENT_DATA';
  else if(aggregate.realized_return_sum > 0 && holdMetrics.realized_return_sum > 0) verdict = 'POSITIVE_RETURN_BASELINE';
  else if(aggregate.realized_return_sum > 0 && holdMetrics.realized_return_sum <= 0) verdict = 'INCONCLUSIVE_HOLDOUT';
  else verdict = 'NEGATIVE_RETURN_BASELINE';
  const rec = { run_id:'exp_' + Date.now(), created_at:Date.now(), lab_version:'v64.1', split_config:spec.split_config, selected_config:{ tau:policy.tau, nBins:spec.calibration.nBins }, aggregate_metrics:aggregate, holdout_metrics:holdMetrics, verdict };
  LabStore.experiments = [rec];
  return rec;
}
function invokeQuantLab(){
  const total = (LabStore.rawShoes || []).length;
  let trainN = 50, valM = 0, testK = 10, stepK = 10;
  if(Math.floor(total * 0.8) < (trainN + valM + testK)){ trainN = 2; testK = 1; stepK = 1; }
  const rec = runExperiment({ split_config:{ trainN, valM, testK, stepK }, calibration:{ nBins:Config.nBins } });
  if(rec){ saveDatabase(); alert(`✅ 實驗完成\nVerdict: ${rec.verdict}\nRolling 淨利: ${rec.aggregate_metrics.realized_return_sum.toFixed(2)}\nHoldout 淨利: ${rec.holdout_metrics ? rec.holdout_metrics.realized_return_sum.toFixed(2) : 'N/A'}`); }
}

function init(){
  const cfgRaw = readStorageWithFallback('bac_cfg_');
  if(cfgRaw.value){ try{ Config = normalizeConfig(JSON.parse(cfgRaw.value)); }catch(_e){} migrateToCurrentKey(cfgRaw.key, CF_K, cfgRaw.value); }
  document.getElementById('cfgM').value = Config.m;
  document.getElementById('cfgS').value = Config.s;
  document.getElementById('cfgBins').value = Config.nBins;

  const labRaw = readStorageWithFallback('bac_lab_');
  if(labRaw.value){
    try{ LabStore = JSON.parse(labRaw.value); LabStore.experiments = []; }catch(_e){ LabStore = { schema_version:'v64.1', rawShoes:[], currentOpenShoe:null, experiments:[] }; }
    migrateToCurrentKey(labRaw.key, LAB_K, labRaw.value);
  }
  if(!Array.isArray(LabStore.rawShoes)) LabStore.rawShoes = [];
  auditLabStore(LabStore);

  const stRaw = readStorageWithFallback('bac_st_');
  if(stRaw.value){
    try{ S = normalizeState(JSON.parse(stRaw.value)) || createInitialState(); }catch(_e){ S = createInitialState(); }
    migrateToCurrentKey(stRaw.key, ST_K, stRaw.value);
  }else S = createInitialState();

  BigData = normalizeBigData({});
  BigData = rebuildBigDataFromAuditedShoes(LabStore.rawShoes);
  if(LabStore.currentOpenShoe && Array.isArray(LabStore.currentOpenShoe.hands)){
    let hist = [];
    for(const hand of LabStore.currentOpenShoe.hands){
      migrateOutcomeContract(hand);
      const key = getPatternKeyFromHistory(hist);
      if(key) updatePatternDB(BigData, key, hand.outcome.winner, !!hand.outcome.bp, !!hand.outcome.pp);
      hist.push({ w:hand.outcome.winner, pPt:hand.outcome.pPt, bPt:hand.outcome.bPt, bp:!!hand.outcome.bp, pp:!!hand.outcome.pp });
    }
  }
  if(!validateOpenShoeConsistency(LabStore, S)){
    alert('偵測到目前開靴資料與狀態不一致，系統將重置目前開靴。');
    LabStore.currentOpenShoe = null;
    S = createInitialState();
    BigData = rebuildBigDataFromAuditedShoes(LabStore.rawShoes);
  }
  rebuildLiveStateMetrics(S, LabStore.currentOpenShoe);
  recalcDBStats(BigData);
  drawKeypad(); clearCurrentInput(); render(); saveDatabase(); saveState();
}

init();
