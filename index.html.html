<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商業決策支援系統 - 專業五路圖版</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px; background-color: #f2f2f7; color: #333; margin: 0; }
        .card { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { font-size: 15px; margin-top: 0; color: #666; border-bottom: 1px solid #eee; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .reset-btn { background: #ff3b30; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-top: 10px; }
        .red-text { color: #ff3b30; } .blue-text { color: #007aff; }
        
        /* 儀表板 UI */
        .capital-dashboard { display: flex; justify-content: space-between; align-items: center; background: #333; color: #fff; padding: 12px; border-radius: 8px; margin-top: 10px; }
        .capital-step { font-size: 12px; color: #aaa; }
        .capital-amount { font-size: 22px; font-weight: bold; color: #ffd60a; margin-top: 4px; }
        .survival-rate { text-align: right; }
        .survival-rate-title { font-size: 12px; color: #aaa; }
        .survival-rate-value { font-size: 18px; font-weight: bold; color: #32d74b; margin-top: 4px; }
        .survival-warning { color: #ff453a; }
        
        .decision-box { margin-top: 12px; padding: 12px; border-radius: 8px; text-align: center; font-size: 15px; font-weight: bold; border: 2px solid transparent; }
        .decision-box.pass { background: #f2f2f7; border-color: #8e8e93; color: #8e8e93; }
        .decision-box.banker { background: #ffebee; border-color: #ff3b30; color: #ff3b30; }
        .decision-box.player { background: #e3f2fd; border-color: #007aff; color: #007aff; }
        
        /* 五路圖 UI (路單容器優化) */
        .road-title { font-size: 12px; font-weight: bold; color: #555; margin: 10px 0 5px 0; }
        .road-container { width: 100%; overflow-x: auto; border: 1px solid #ccc; background: #fff; padding: 1px; box-sizing: border-box; }
        .road-grid { display: flex; min-width: max-content; }
        .road-col { display: flex; flex-direction: column; }
        
        /* 網格與指示器 */
        .cell-lg { width: 22px; height: 22px; border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; }
        .cell-sm { width: 12px; height: 12px; border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .bead { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: bold; }
        .bead.B { background-color: #ff3b30; } .bead.P { background-color: #007aff; } .bead.T { background-color: #28a745; }
        
        .circle-hollow { width: 16px; height: 16px; border-radius: 50%; border: 2px solid transparent; box-sizing: border-box; }
        .circle-hollow.B, .circle-hollow.R { border-color: #ff3b30; } .circle-hollow.P, .circle-hollow.Blue { border-color: #007aff; }
        .tie-line { background: linear-gradient(to top right, transparent 45%, #28a745 45%, #28a745 55%, transparent 55%); }
        .tie-text { position: absolute; font-size: 9px; font-weight: bold; color: #28a745; }
        
        .circle-solid { width: 8px; height: 8px; border-radius: 50%; }
        .circle-solid.R { background-color: #ff3b30; } .circle-solid.Blue { background-color: #007aff; }
        
        .slash { width: 10px; height: 10px; }
        .slash.R { background: linear-gradient(to bottom left, transparent 40%, #ff3b30 40%, #ff3b30 60%, transparent 60%); }
        .slash.Blue { background: linear-gradient(to bottom left, transparent 40%, #007aff 40%, #007aff 60%, transparent 60%); }
        
        /* 雙欄並排佈局供下三路使用 */
        .derived-roads-wrapper { display: flex; gap: 5px; margin-top: 5px; }
        .derived-col { flex: 1; min-width: 0; }
        
        /* 輸入區 UI */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .card-slot { border: 1px solid #ccc; border-radius: 6px; padding: 8px; background: #fafafa; }
        .slot-title { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #555; }
        .select-group select { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #bbb; font-size: 14px; background: #fff; }
        select.full-width, button.submit-btn { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; font-weight: bold; }
        button.submit-btn { background: #000; color: #fff; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>
            <span>資金與生存追蹤 (<span id="totalCards">416</span> 張)</span>
            <button class="reset-btn" onclick="resetSystem()">新靴牌</button>
        </h2>
        <div class="stat-row">
            <span class="red-text">莊: <span id="bankerOdds">45.86</span>%</span>
            <span class="blue-text">閒: <span id="playerOdds">44.62</span>%</span>
        </div>
        
        <div class="capital-dashboard">
            <div>
                <div class="capital-step">當前策略階段 (<span id="stepDisplay">1</span>/4)</div>
                <div class="capital-amount">建議注碼: <span id="betAmount">100</span></div>
            </div>
            <div class="survival-rate">
                <div class="survival-rate-title">策略翻盤機率</div>
                <div class="survival-rate-value" id="flipProb">93.75%</div>
            </div>
        </div>
        <div id="decisionPanel" class="decision-box pass">
            系統訊號：<span id="predictionResult">初始化...</span>
        </div>
    </div>

    <div class="card">
        <h2>歷史軌跡與圖形分析</h2>
        
        <div class="road-title">珠盤路 (Bead Plate)</div>
        <div class="road-container"><div class="road-grid" id="grid-bead"></div></div>
        
        <div class="road-title">大路 (Big Road)</div>
        <div class="road-container"><div class="road-grid" id="grid-big"></div></div>
        
        <div class="road-title">大眼仔路 (Big Eye Boy)</div>
        <div class="road-container"><div class="road-grid" id="grid-eye"></div></div>
        
        <div class="derived-roads-wrapper">
            <div class="derived-col">
                <div class="road-title">小路 (Small Road)</div>
                <div class="road-container"><div class="road-grid" id="grid-small"></div></div>
            </div>
            <div class="derived-col">
                <div class="road-title">蟑螂路 (Cockroach)</div>
                <div class="road-container"><div class="road-grid" id="grid-roach"></div></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>物理記錄與資料輸入</h2>
        <div class="input-grid" id="cardInputsContainer"></div>
        <select id="winnerSelect" class="full-width" style="margin-top: 10px;">
            <option value="B">本局勝方：莊家 (Banker)</option>
            <option value="P">本局勝方：閒家 (Player)</option>
            <option value="T">本局勝方：和局 (Tie)</option>
        </select>
        <button class="submit-btn" onclick="submitData()">寫入資料並執行次局演算</button>
    </div>

    <script>
        // 初始化下拉選單
        const cardValues = [{val: "", label: "-無-"}, {val: "1", label: "A"}, {val: "2", label: "2"}, {val: "3", label: "3"}, {val: "4", label: "4"}, {val: "5", label: "5"}, {val: "6", label: "6"}, {val: "7", label: "7"}, {val: "8", label: "8"}, {val: "9", label: "9"}, {val: "10", label: "10"}, {val: "11", label: "J"}, {val: "12", label: "Q"}, {val: "13", label: "K"}];
        const container = document.getElementById('cardInputsContainer');
        for(let i=1; i<=6; i++) {
            container.innerHTML += `<div class="card-slot"><div class="slot-title">第 ${i} 張牌</div><div class="select-group"><select id="val-${i}">${cardValues.map(v => `<option value="${v.val}">${v.label}</option>`).join('')}</select></div></div>`;
        }

        // 系統變數
        let totalCards = 416;
        let deck = {1:32, 2:32, 3:32, 4:32, 5:32, 6:32, 7:32, 8:32, 9:32, 0:128};
        let currentStep = 1; 
        const betSteps = {1: 100, 2: 200, 3: 400, 4: 800};
        let lastRecommendedSide = null; 
        let historyLog = []; // 儲存所有局數結果 ['B', 'P', 'T', ...]

        renderAllRoads();
        calculateAndDisplay(0.4586, 0.4462);

        function resetSystem() {
            if(confirm("確定要開啟新靴牌？將清空所有數據。")) {
                totalCards = 416; deck = {1:32, 2:32, 3:32, 4:32, 5:32, 6:32, 7:32, 8:32, 9:32, 0:128};
                currentStep = 1; lastRecommendedSide = null; historyLog = [];
                renderAllRoads(); calculateAndDisplay(0.4586, 0.4462);
                for(let i=1; i<=6; i++) document.getElementById(`val-${i}`).value = "";
            }
        }

        function submitData() {
            let validCards = [];
            for(let i=1; i<=6; i++) {
                let valStr = document.getElementById(`val-${i}`).value;
                if(valStr !== "") validCards.push((parseInt(valStr) >= 10) ? 0 : parseInt(valStr));
            }
            if (validCards.length < 4 || validCards.length > 6) { alert("數據異常：每局必須消耗 4 到 6 張牌。"); return; }

            const winner = document.getElementById('winnerSelect').value;
            historyLog.push(winner); // 寫入歷史軌跡

            if (lastRecommendedSide !== null && lastRecommendedSide !== 'PASS' && winner !== 'T') {
                if (winner === lastRecommendedSide) { currentStep = 1; } 
                else {
                    currentStep++;
                    if (currentStep > 4) { alert("⚠️ 系統警告：達停損點。強制重置為 100。"); currentStep = 1; }
                }
            }

            validCards.forEach(val => { if(deck[val] > 0) { deck[val]--; totalCards--; } });

            let lowCards = deck[1] + deck[2] + deck[3] + deck[4] + deck[5];
            let highCards = deck[6] + deck[7] + deck[8] + deck[9] + deck[0];
            let ratio = lowCards / (highCards === 0 ? 1 : highCards);
            let adjustment = (ratio - 1.0) * 0.01;
            
            let p_player = Math.max(0, Math.min(1 - 0.0952, 0.4462 + adjustment));
            let p_banker = Math.max(0, Math.min(1 - 0.0952, 0.4586 - adjustment));

            calculateAndDisplay(p_banker, p_player);
            renderAllRoads();

            for(let i=1; i<=6; i++) document.getElementById(`val-${i}`).value = "";
        }

        function calculateAndDisplay(p_banker, p_player) {
            document.getElementById('totalCards').innerText = totalCards;
            document.getElementById('bankerOdds').innerText = (p_banker * 100).toFixed(2);
            document.getElementById('playerOdds').innerText = (p_player * 100).toFixed(2);
            
            const dp = document.getElementById('decisionPanel');
            const pe = document.getElementById('predictionResult');
            const edgeThreshold = 0.002; 
            const diff = Math.abs(p_banker - p_player);

            let tp = 0, op = 0;
            if (diff < edgeThreshold) { lastRecommendedSide = 'PASS'; dp.className = "decision-box pass"; pe.innerText = "優勢不足，建議觀望 (Pass)"; tp = 0.5; op = 0.5; } 
            else if (p_banker > p_player) { lastRecommendedSide = 'B'; dp.className = "decision-box banker"; pe.innerText = "優勢達標：下注莊家 (Banker)"; tp = p_banker; op = p_player; } 
            else { lastRecommendedSide = 'P'; dp.className = "decision-box player"; pe.innerText = "優勢達標：下注閒家 (Player)"; tp = p_player; op = p_banker; }

            let rem = 5 - currentStep; 
            let flipProb = 1 - Math.pow(1 - (tp / (tp + op)), rem);

            document.getElementById('stepDisplay').innerText = currentStep;
            const amt = document.getElementById('betAmount');
            if (lastRecommendedSide === 'PASS') { amt.innerText = "0 (資金鎖定)"; amt.style.color = "#aaa"; } 
            else { amt.innerText = betSteps[currentStep]; amt.style.color = "#ffd60a"; }

            const fp = document.getElementById('flipProb');
            fp.innerText = (flipProb * 100).toFixed(2) + "%";
            fp.className = flipProb < 0.60 ? "survival-rate-value survival-warning" : "survival-rate-value";
        }

        // ================= 五路圖繪製核心引擎 =================
        function renderAllRoads() {
            renderBeadPlate();
            
            // 提取大路數據與下三路布林陣列
            let bigMap = genericMatrixMapper(historyLog, true);
            let derived = generateDerivedArrays(historyLog);
            
            renderGrid('grid-big', bigMap.grid, bigMap.maxCol, 'big');
            renderGrid('grid-eye', genericMatrixMapper(derived.eye, false).grid, genericMatrixMapper(derived.eye, false).maxCol, 'eye');
            renderGrid('grid-small', genericMatrixMapper(derived.small, false).grid, genericMatrixMapper(derived.small, false).maxCol, 'small');
            renderGrid('grid-roach', genericMatrixMapper(derived.roach, false).grid, genericMatrixMapper(derived.roach, false).maxCol, 'roach');
        }

        // 珠盤路直譯
        function renderBeadPlate() {
            const container = document.getElementById('grid-bead'); container.innerHTML = '';
            const cols = Math.max(12, Math.ceil(historyLog.length / 6));
            for (let c = 0; c < cols; c++) {
                let colDiv = document.createElement('div'); colDiv.className = 'road-col';
                for (let r = 0; r < 6; r++) {
                    let cell = document.createElement('div'); cell.className = 'cell-lg';
                    let idx = c * 6 + r;
                    if (idx < historyLog.length) {
                        let res = historyLog[idx];
                        let bead = document.createElement('div');
                        bead.className = `bead ${res}`; bead.innerText = res === 'B' ? '莊' : (res === 'P' ? '閒' : '和');
                        cell.appendChild(bead);
                    }
                    colDiv.appendChild(cell);
                }
                container.appendChild(colDiv);
            }
            container.parentElement.scrollLeft = container.parentElement.scrollWidth;
        }

        // 泛用型矩陣碰撞尋路演算 (Matrix Pathfinding)
        function genericMatrixMapper(arr, supportTie) {
            let gridMap = {}; let lastRes = null; let sc = 0, cc = 0, cr = 0, mc = 0; let lastCrd = null;
            for (let i = 0; i < arr.length; i++) {
                let res = arr[i];
                if (supportTie && res === 'T') { if (lastCrd && gridMap[lastCrd]) gridMap[lastCrd].tie++; continue; }
                if (res === lastRes) {
                    let nr = cr + 1;
                    if (nr <= 5 && !gridMap[`${cc},${nr}`]) cr = nr; else cc++;
                } else {
                    if (lastRes !== null) { sc++; while (gridMap[`${sc},0`]) sc++; }
                    cc = sc; cr = 0;
                }
                lastCrd = `${cc},${cr}`;
                gridMap[lastCrd] = { val: res, tie: 0 };
                lastRes = res; if (cc > mc) mc = cc;
            }
            return { grid: gridMap, maxCol: mc };
        }

        // 產生下三路的布林陣列 (嚴謹時序法)
        function generateDerivedArrays(hist) {
            let pHist = hist.filter(x => x !== 'T');
            let pCols = []; let cCol = []; let lRes = null;
            
            // 建立純大路分欄
            for(let r of pHist) {
                if (r === lRes) cCol.push(r); else { if(cCol.length>0) pCols.push(cCol); cCol = [r]; lRes = r; }
            }
            if(cCol.length>0) pCols.push(cCol);

            let eye = [], sm = [], roach = [];
            // 時序走訪大路座標
            for (let c = 0; c < pCols.length; c++) {
                for (let r = 0; r < pCols[c].length; r++) {
                    if (c >= 1) { // 大眼仔 k=1
                        if (r === 0 && c >= 2) eye.push(pCols[c-1].length === pCols[c-2].length ? 'R' : 'Blue');
                        else if (r > 0) eye.push((pCols[c-1] && pCols[c-1].length > r) ? 'R' : ((pCols[c-1] && pCols[c-1].length === r) ? 'Blue' : 'R'));
                    }
                    if (c >= 2) { // 小路 k=2
                        if (r === 0 && c >= 3) sm.push(pCols[c-1].length === pCols[c-3].length ? 'R' : 'Blue');
                        else if (r > 0) sm.push((pCols[c-2] && pCols[c-2].length > r) ? 'R' : ((pCols[c-2] && pCols[c-2].length === r) ? 'Blue' : 'R'));
                    }
                    if (c >= 3) { // 蟑螂路 k=3
                        if (r === 0 && c >= 4) roach.push(pCols[c-1].length === pCols[c-4].length ? 'R' : 'Blue');
                        else if (r > 0) roach.push((pCols[c-3] && pCols[c-3].length > r) ? 'R' : ((pCols[c-3] && pCols[c-3].length === r) ? 'Blue' : 'R'));
                    }
                }
            }
            return { eye, small: sm, roach };
        }

        // 泛用型 DOM 渲染器
        function renderGrid(domId, gridMap, maxCol, type) {
            const container = document.getElementById(domId); container.innerHTML = '';
            const isSm = (type === 'small' || type === 'roach');
            const cols = Math.max(isSm ? 24 : 12, maxCol + 1); // 確保起始寬度
            
            for (let c = 0; c < cols; c++) {
                let colDiv = document.createElement('div'); colDiv.className = 'road-col';
                for (let r = 0; r < 6; r++) {
                    let cell = document.createElement('div'); cell.className = isSm ? 'cell-sm' : 'cell-lg';
                    if (gridMap[`${c},${r}`]) {
                        let data = gridMap[`${c},${r}`];
                        let item = document.createElement('div');
                        
                        if (type === 'big' || type === 'eye') {
                            item.className = `circle-hollow ${data.val}`;
                            if(data.tie > 0) {
                                item.classList.add('tie-line');
                                if(data.tie > 1) { let txt = document.createElement('span'); txt.className = 'tie-text'; txt.innerText = data.tie; item.appendChild(txt); }
                            }
                        } else if (type === 'small') {
                            item.className = `circle-solid ${data.val}`;
                        } else if (type === 'roach') {
                            item.className = `slash ${data.val}`;
                        }
                        cell.appendChild(item);
                    }
                    colDiv.appendChild(cell);
                }
                container.appendChild(colDiv);
            }
            container.parentElement.scrollLeft = container.parentElement.scrollWidth;
        }
    </script>
</body>
</html>
