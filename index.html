<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>百家樂決策系統 - 巨眼指揮版（嚴謹模擬 + HUD）</title>

  <style>
    :root{
      --bg:#0d0d12;
      --card:#1c1c1e;
      --border:#2c2c2e;
      --text:#f2f2f7;
      --muted:#8e8e93;
      --b:#ff3b30;
      --p:#0a84ff;
      --t:#32d74b;
      --y:#ffd60a;
      --w:#ff9f0a;
      --danger:#ff3b30;
    }

    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      padding: 8px 6px 10px;
      user-select:none;
      -webkit-font-smoothing:antialiased;

      /* ✅ 重要：給固定 HUD 讓位（避免被蓋住） */
      padding-top: calc(env(safe-area-inset-top) + 98px);
    }

    .module-card{
      background:var(--card);
      border-radius:16px;
      padding:12px;
      margin-bottom:8px;
      border:1px solid var(--border);
      box-shadow:0 4px 12px rgba(0,0,0,.3);
    }

    /* =========================
       ✅ 固定 HUD（永遠看得到）
    ========================= */
    .hud{
      position: fixed;
      top: env(safe-area-inset-top);
      left: 6px;
      right: 6px;
      z-index: 9999;

      border-radius: 18px;
      border: 2px solid #333;
      background: rgba(17,17,17,0.86);
      backdrop-filter: blur(10px);

      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      overflow: hidden;

      transition: 0.18s ease;
    }

    .hud.pass{ border-color:#444; }
    .hud.banker{
      border-color: var(--b);
      box-shadow: 0 0 26px rgba(255,59,48,.35), 0 10px 30px rgba(0,0,0,0.45);
      background: linear-gradient(180deg, rgba(255,59,48,0.18) 0%, rgba(17,17,17,0.86) 70%);
    }
    .hud.player{
      border-color: var(--p);
      box-shadow: 0 0 26px rgba(10,132,255,.35), 0 10px 30px rgba(0,0,0,0.45);
      background: linear-gradient(180deg, rgba(10,132,255,0.18) 0%, rgba(17,17,17,0.86) 70%);
    }

    .hud-top{
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap:10px;
      padding: 10px 12px;
      cursor: pointer; /* 點 HUD 可展開/收合 */
    }

    .hud-title{
      font-size: 20px;
      font-weight: 1000;
      line-height: 1.1;
      letter-spacing: .5px;
    }
    .hud-sub{
      margin-top: 4px;
      font-size: 12px;
      font-weight: 900;
      color: #c7c7cc;
      opacity: .9;
    }

    .hud-left{ min-width: 0; }
    .hud-title span.badge{
      display:inline-block;
      margin-left:8px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 1000;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--text);
      vertical-align: middle;
    }

    .hud-actions{
      display:flex;
      gap:6px;
      flex-shrink:0;
    }
    .hud-btn{
      border:none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 1000;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 2px 0 rgba(0,0,0,0.45);
      cursor:pointer;
      transition: 0.12s;
    }
    .hud-btn:active{ transform: translateY(2px); box-shadow:none; }
    .hud-btn.undo{ color: var(--w); }
    .hud-btn.reset{ color: #ff5c5c; }

    /* HUD 縮略資訊列（永遠顯示） */
    .hud-mini{
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap:10px;
      padding: 0 12px 10px;
      font-variant-numeric: tabular-nums;
    }
    .mini-item{
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      white-space: nowrap;
    }
    .mini-item b{ color: var(--text); font-weight: 1100; }
    .mini-item b.b{ color: var(--b); }
    .mini-item b.p{ color: var(--p); }
    .mini-item b.g{ color: var(--t); }

    /* 展開區（預設收起） */
    .hud-details{
      display:none;
      padding: 10px 12px 12px;
      border-top: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.10);
    }
    .hud.expanded .hud-details{ display:block; }

    .detail-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      font-variant-numeric: tabular-nums;
    }
    .detail-box{
      border-radius: 14px;
      padding:10px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.25);
    }
    .detail-box .h{
      font-size: 11px;
      font-weight: 1000;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .row{ display:flex; justify-content:space-between; margin-bottom: 6px; font-weight: 1000; font-size: 13px; }
    .row .k{ color: var(--muted); font-weight: 900; }
    .row .v{ color: var(--text); }
    .row .v.b{ color: var(--b); }
    .row .v.p{ color: var(--p); }
    .row .v.g{ color: var(--t); }

    /* =========================
       其餘原本 UI（保留）
    ========================= */

    .dashboard{ display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px; }
    .dash-box{ background: rgba(0,0,0,0.3); border-radius:12px; padding:10px; border:1px solid #2c2c2e; }
    .dash-header{ font-size:11px; color:var(--muted); font-weight:1000; text-transform:uppercase; margin-bottom:8px; display:flex; justify-content:space-between; }
    .ev-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .ev-label{ font-size:13px; font-weight:1100; }
    .ev-label.b{ color:var(--b); } .ev-label.p{ color:var(--p); }
    .ev-val{ font-size:14px; font-weight:1100; font-variant-numeric:tabular-nums; }

    .trend-dots{ display:flex; gap:4px; }
    .dot{ width:14px; height:14px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); }
    .dot.r{ background:var(--b); } .dot.b{ background:var(--p); } .dot.e{ background:#333; }
    .break-trend-alert{
      font-size:11px; font-weight:1100; color:var(--w);
      margin-top:8px; text-align:center;
      background: rgba(255,159,10,0.12);
      padding: 6px 8px; border-radius: 12px;
      border: 1px solid rgba(255,159,10,0.25);
      display:none;
    }

    .input-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .input-header span{ font-size:12px; font-weight:900; color:var(--muted); }
    .toggle-guide{ font-size:12px; font-weight:1100; color:#fff; background: rgba(10,132,255,0.3); padding: 6px 10px; border-radius: 12px; display:flex; align-items:center; gap:6px; }
    .toggle-guide input{ transform: scale(1.1); }

    .table-layout{ display:flex; gap:8px; }
    .table-side{ flex:1; background: rgba(0,0,0,0.3); border-radius:12px; padding:8px; border:1px solid #2a2a2c; }
    .side-label{ text-align:center; font-size:12px; font-weight:1100; margin-bottom:8px; padding: 6px 0; border-radius: 12px; letter-spacing:.8px; }
    .side-label.p{ background: rgba(10,132,255,0.2); color: var(--p); }
    .side-label.b{ background: rgba(255,59,48,0.2); color: var(--b); }
    .cards-row{ display:flex; justify-content:space-between; gap:6px; }

    .playing-card{
      flex:1; aspect-ratio: 2/3;
      background: #2c2c2e;
      border-radius: 12px;
      border: 1px solid #555;
      display:flex; align-items:center; justify-content:center;
      font-size: 22px; font-weight: 1200;
      color:#fff;
      cursor:pointer;
      transition: .15s;
    }
    .playing-card.active{
      background:#3a3a3c;
      border-color: var(--y);
      transform: translateY(-4px);
      box-shadow: 0 6px 12px rgba(255,214,10,0.4);
      color: var(--y);
      border-width:2px;
    }
    .playing-card.filled{ background:#e5e5ea; color:#000; border-color:#fff; }
    .playing-card.disabled{ background:#18181a !important; border-color:#222; opacity:.28; pointer-events:none; }

    .keypad{ display:grid; grid-template-columns: repeat(5,1fr); gap:8px; margin-top:12px; }
    .key{
      background:#2c2c2e;
      border-radius: 14px;
      padding: 10px 0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      cursor:pointer;
      box-shadow: 0 3px 0 #111;
      transition:.1s;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .key:active{ transform: translateY(3px); box-shadow:none; background:#444; }
    .key-val{ font-size:22px; font-weight:1200; color:#fff; line-height:1; }
    .key-count{ font-size:11px; font-weight:1100; color: var(--muted); margin-top:6px; font-variant-numeric: tabular-nums; }
    .key-count.low{ color: var(--danger); }

    .key.action-back{
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      grid-column: span 3;
      flex-direction: row;
      font-size: 16px;
      font-weight: 1100;
      gap: 6px;
    }
    .key.action-clear{
      background: rgba(255,159,10,0.15);
      color: var(--w);
      border: 1px solid rgba(255,159,10,0.3);
      grid-column: span 2;
      flex-direction: row;
      font-size: 16px;
      font-weight: 1100;
      gap: 6px;
    }

    .submit-btn{
      width:100%;
      padding: 18px;
      background:#2c2c2e;
      color:#666;
      font-size:18px;
      font-weight:1200;
      border:none;
      border-radius: 16px;
      margin-top: 16px;
      box-shadow: 0 3px 0 #111;
      cursor:not-allowed;
      transition:.2s;
    }
    .submit-btn.ready{
      background: var(--t);
      color:#000;
      box-shadow: 0 0 22px rgba(50,215,75,0.45);
      cursor:pointer;
      animation: pulse 1.2s infinite alternate;
    }
    .submit-btn.ready:active{ transform: scale(.985); }
    @keyframes pulse{ from{transform:scale(1)} to{transform:scale(1.01)} }

    .road-container{ width:100%; overflow-x:auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding:4px; box-sizing:border-box; }
    .road-grid{ display:flex; min-width:max-content; background:#fff; border-radius: 12px; padding:3px; }
    .road-col{ display:flex; flex-direction:column; }
    .cell-lg{ width:16px; height:16px; border:1px solid #f0f0f0; display:flex; align-items:center; justify-content:center; position:relative; }
    .cell-sm{ width:8px; height:8px; border:1px solid #f0f0f0; display:flex; align-items:center; justify-content:center; position:relative; }
    .circle-hollow{ width:12px; height:12px; border-radius:50%; border:2px solid transparent; box-sizing:border-box; }
    .circle-hollow.B, .circle-hollow.R{ border-color: var(--b); }
    .circle-hollow.P, .circle-hollow.Blue{ border-color: var(--p); }
    .tie-line{ background: linear-gradient(to top right, transparent 45%, var(--t) 45%, var(--t) 55%, transparent 55%); }
    .tie-text{ position:absolute; font-size:8px; font-weight:1200; color: var(--t); }
    .circle-solid{ width:6px; height:6px; border-radius:50%; }
    .circle-solid.R{ background: var(--b); }
    .circle-solid.Blue{ background: var(--p); }
    .slash{ width:8px; height:8px; }
    .slash.R{ background: linear-gradient(to bottom left, transparent 40%, var(--b) 40%, var(--b) 60%, transparent 60%); }
    .slash.Blue{ background: linear-gradient(to bottom left, transparent 40%, var(--p) 40%, var(--p) 60%, transparent 60%); }
    .derived-roads-wrapper{ display:flex; gap:6px; margin-top: 8px; }
    .derived-col{ flex:1; min-width:0; }
  </style>
</head>

<body>

  <!-- ✅ 固定 HUD：不管你滑到哪都看得到 -->
  <div id="hud" class="hud pass">
    <div class="hud-top" onclick="toggleHud()">
      <div class="hud-left">
        <div class="hud-title" id="hudMain">觀望 <span class="badge" id="hudBadge">點我展開</span></div>
        <div class="hud-sub" id="hudSub">等待輸入 / 計算中…</div>
      </div>

      <div class="hud-actions" onclick="event.stopPropagation()">
        <button class="hud-btn undo" onclick="undoLastRound()">↩ 撤銷</button>
        <button class="hud-btn reset" onclick="resetSystem()">換靴</button>
      </div>
    </div>

    <div class="hud-mini">
      <div class="mini-item">剩餘 <b id="hudRemain">416</b></div>
      <div class="mini-item">局數 <b id="hudRound">0</b></div>
      <div class="mini-item">下注 <b id="hudArmed">否</b></div>
      <div class="mini-item">SIM <b id="hudSim">--</b></div>
    </div>

    <div class="hud-details">
      <div class="detail-grid">
        <div class="detail-box">
          <div class="h">Probabilities</div>
          <div class="row"><span class="k">P(B)</span><span class="v b" id="hudPB">--</span></div>
          <div class="row"><span class="k">P(P)</span><span class="v p" id="hudPP">--</span></div>
          <div class="row"><span class="k">P(T)</span><span class="v g" id="hudPT">--</span></div>
        </div>
        <div class="detail-box">
          <div class="h">Expected Value</div>
          <div class="row"><span class="k">EV(B)</span><span class="v" id="hudEVB">--</span></div>
          <div class="row"><span class="k">EV(P)</span><span class="v" id="hudEVP">--</span></div>
          <div class="row"><span class="k">抽水</span><span class="v" id="hudCom">5%</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 原本 dashboard / UI（你可以保留，因為 HUD 已經解決「看不到」問題） -->
  <div class="dashboard">
    <div class="dash-box">
      <div class="dash-header"><span>條件機率 / EV</span><span id="simInfo" style="color:var(--y);font-weight:1100;">SIM: --</span></div>
      <div class="ev-row"><span class="ev-label b">莊 P(B)</span><span class="ev-val" id="bankerOdds">--</span></div>
      <div class="ev-row"><span class="ev-label p">閒 P(P)</span><span class="ev-val" id="playerOdds">--</span></div>
      <div class="ev-row"><span class="ev-label" style="color:var(--t)">和 P(T)</span><span class="ev-val" id="tieOdds">--</span></div>
      <div class="ev-row"><span class="ev-label b">莊 EV</span><span class="ev-val" id="evBanker">--</span></div>
      <div class="ev-row"><span class="ev-label p">閒 EV</span><span class="ev-val" id="evPlayer">--</span></div>
    </div>

    <div class="dash-box">
      <div class="dash-header">技術面（問路 / 下三路）</div>
      <div class="ev-row"><span class="ev-label b">若開莊</span><div class="trend-dots" id="askB-dots"><div class="dot e"></div><div class="dot e"></div><div class="dot e"></div></div></div>
      <div class="ev-row"><span class="ev-label p">若開閒</span><div class="trend-dots" id="askP-dots"><div class="dot e"></div><div class="dot e"></div><div class="dot e"></div></div></div>
      <div id="breakAlert" class="break-trend-alert"></div>
    </div>
  </div>

  <div class="module-card">
    <div class="input-header">
      <span>依序發牌（P1 → B1 → P2 → B2 → P3 → B3）</span>
      <label class="toggle-guide"><input type="checkbox" id="autoGuideToggle" checked onchange="evaluateDrawRules()">防呆</label>
    </div>

    <div class="table-layout">
      <div class="table-side">
        <div class="side-label p">PLAYER 閒</div>
        <div class="cards-row">
          <div class="playing-card active" id="slot-p1" onclick="setActiveSlot('p1')" data-rank=""></div>
          <div class="playing-card" id="slot-p2" onclick="setActiveSlot('p2')" data-rank=""></div>
          <div class="playing-card disabled" id="slot-p3" onclick="setActiveSlot('p3')" data-rank=""></div>
        </div>
      </div>
      <div class="table-side">
        <div class="side-label b">BANKER 莊</div>
        <div class="cards-row">
          <div class="playing-card" id="slot-b1" onclick="setActiveSlot('b1')" data-rank=""></div>
          <div class="playing-card" id="slot-b2" onclick="setActiveSlot('b2')" data-rank=""></div>
          <div class="playing-card disabled" id="slot-b3" onclick="setActiveSlot('b3')" data-rank=""></div>
        </div>
      </div>
    </div>

    <div class="keypad" id="keypad"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitData()" disabled>輸入需符合法定規則</button>
  </div>

  <div class="module-card" style="padding:8px;">
    <div class="road-container"><div class="road-grid" id="grid-big"></div></div>
    <div class="derived-roads-wrapper">
      <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-eye"></div></div></div>
      <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-small"></div></div></div>
      <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-roach"></div></div></div>
    </div>
  </div>

<script>
/* ===== 這份版本的核心是 UI：固定 HUD，不用滑上去看 ===== */

const STORE_KEY = "baccarat_giant_strict_mc_hud_v1";
const DEFAULTS = {
  decks: 8,
  commission: 0.05,
  trials: 12000,
  rankCounts: null,
  history: [],
  armed: false,      // 你有沒有“授權下注下一局”
  plannedSide: "PASS",
};
let S = loadState() || initState();
let backupState = null;

function initCounts(decks=8){
  const c = {};
  for(let r=1;r<=13;r++) c[r]=4*decks;
  return c;
}
function initState(){
  const st = structuredClone(DEFAULTS);
  st.rankCounts = initCounts(st.decks);
  return st;
}
function saveState(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){} }
function loadState(){
  try{
    const t = localStorage.getItem(STORE_KEY);
    if(!t) return null;
    const obj = JSON.parse(t);
    if(!obj.rankCounts || !obj.history) return null;
    return Object.assign(structClone(DEFAULTS), obj);
  }catch(e){ return null; }
}
function structClone(x){ return JSON.parse(JSON.stringify(x)); }
function snapshot(){ backupState = structClone(S); }

const $ = (id)=>document.getElementById(id);

const ui = {
  simInfo: $("simInfo"),
  bankerOdds: $("bankerOdds"),
  playerOdds: $("playerOdds"),
  tieOdds: $("tieOdds"),
  evBanker: $("evBanker"),
  evPlayer: $("evPlayer"),
  askB: $("askB-dots"),
  askP: $("askP-dots"),
  breakAlert: $("breakAlert"),
  autoGuideToggle: $("autoGuideToggle"),
  submitBtn: $("submitBtn"),
  keypad: $("keypad"),
  gridBig: $("grid-big"),
  gridEye: $("grid-eye"),
  gridSmall: $("grid-small"),
  gridRoach: $("grid-roach"),

  // HUD
  hud: $("hud"),
  hudMain: $("hudMain"),
  hudSub: $("hudSub"),
  hudBadge: $("hudBadge"),
  hudRemain: $("hudRemain"),
  hudRound: $("hudRound"),
  hudArmed: $("hudArmed"),
  hudSim: $("hudSim"),
  hudPB: $("hudPB"),
  hudPP: $("hudPP"),
  hudPT: $("hudPT"),
  hudEVB: $("hudEVB"),
  hudEVP: $("hudEVP"),
  hudCom: $("hudCom"),
};

let hudExpanded = false;
function toggleHud(){
  hudExpanded = !hudExpanded;
  ui.hud.classList.toggle("expanded", hudExpanded);
  ui.hudBadge.textContent = hudExpanded ? "點我收合" : "點我展開";
}

/* ===== 鍵盤 + 輸入 ===== */
const slotOrder = ["p1","b1","p2","b2","p3","b3"];
let currentSlotIdx = 0;

function rankToDisplay(n){
  n=parseInt(n,10);
  if(n===1) return "A";
  if(n===11) return "J";
  if(n===12) return "Q";
  if(n===13) return "K";
  return String(n);
}
function baccaratValFromRank(n){
  n=parseInt(n,10);
  return (n>=10)?0:n;
}
function getSlotRank(id){ return $(`slot-${id}`).dataset.rank || ""; }
function setSlotRank(id, rank){
  const el = $(`slot-${id}`);
  el.dataset.rank = rank ? String(rank) : "";
  el.textContent = rank ? rankToDisplay(rank) : "";
  el.classList.toggle("filled", !!rank);
}
function setActiveSlot(slotId){
  const el=$(`slot-${slotId}`);
  if(el.classList.contains("disabled")) return;
  document.querySelectorAll(".playing-card").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  currentSlotIdx = slotOrder.indexOf(slotId);
}
function pendingCounts(){
  const p={}; for(let r=1;r<=13;r++) p[r]=0;
  slotOrder.forEach(id=>{ const rk=getSlotRank(id); if(rk) p[parseInt(rk,10)]++; });
  return p;
}
function updateKeypadCounts(){
  const pend = pendingCounts();
  for(let r=1;r<=13;r++){
    const el = document.getElementById(`kcnt-${r}`);
    if(!el) continue;
    const remain = (S.rankCounts[r]||0) - (pend[r]||0);
    el.textContent = String(remain);
    el.className = "key-count" + (remain < 10 ? " low" : "");
  }
}
function clearAllSlots(){
  slotOrder.forEach(id=> setSlotRank(id,""));
  currentSlotIdx = 0;
  setActiveSlot("p1");
  evaluateDrawRules();
  updateKeypadCounts();
}
function backspace(){
  for(let i=slotOrder.length-1;i>=0;i--){
    const id=slotOrder[i];
    if(getSlotRank(id)){
      setSlotRank(id,"");
      currentSlotIdx=i;
      setActiveSlot(id);
      evaluateDrawRules();
      updateKeypadCounts();
      return;
    }
  }
}
function buildKeypad(){
  const keys = [
    {v:"1",t:"A"},{v:"2",t:"2"},{v:"3",t:"3"},{v:"4",t:"4"},{v:"5",t:"5"},
    {v:"6",t:"6"},{v:"7",t:"7"},{v:"8",t:"8"},{v:"9",t:"9"},{v:"10",t:"10"},
    {v:"11",t:"J"},{v:"12",t:"Q"},{v:"13",t:"K"},
  ];
  ui.keypad.innerHTML = "";
  keys.forEach(k=>{
    const btn=document.createElement("div");
    btn.className="key";
    btn.innerHTML = `<div class="key-val">${k.t}</div><div class="key-count" id="kcnt-${k.v}">--</div>`;
    btn.onclick = ()=>inputKey(k.v);
    ui.keypad.appendChild(btn);
  });

  const back=document.createElement("div");
  back.className="key action-back";
  back.innerHTML=`<span>⌫</span> 退格`;
  back.onclick = ()=>backspace();
  ui.keypad.appendChild(back);

  const clr=document.createElement("div");
  clr.className="key action-clear";
  clr.innerHTML=`<span>🗑️</span> 清空`;
  clr.onclick = ()=>clearAllSlots();
  ui.keypad.appendChild(clr);
}

function inputKey(val){
  const pend = pendingCounts();
  const r = parseInt(val,10);
  const remain = (S.rankCounts[r]||0) - (pend[r]||0);
  if(remain<=0){
    alert(`庫存不足：${rankToDisplay(r)}（含本局已輸入）`);
    return;
  }
  while(currentSlotIdx < slotOrder.length && $(`slot-${slotOrder[currentSlotIdx]}`).classList.contains("disabled")){
    currentSlotIdx++;
  }
  if(currentSlotIdx >= slotOrder.length) return;
  const id=slotOrder[currentSlotIdx];
  setSlotRank(id, val);

  evaluateDrawRules();
  updateKeypadCounts();

  currentSlotIdx++;
  while(currentSlotIdx < slotOrder.length && $(`slot-${slotOrder[currentSlotIdx]}`).classList.contains("disabled")){
    currentSlotIdx++;
  }
  if(currentSlotIdx < slotOrder.length) setActiveSlot(slotOrder[currentSlotIdx]);
  else document.querySelectorAll(".playing-card").forEach(x=>x.classList.remove("active"));
}

/* ===== 補牌防呆（嚴格） ===== */
function getBaccaratValFromSlot(id){
  const rk=getSlotRank(id);
  if(!rk) return null;
  return baccaratValFromRank(rk);
}
function totalRemaining(){
  let t=0; for(let r=1;r<=13;r++) t += (S.rankCounts[r]||0);
  return t;
}
function evaluateDrawRules(){
  const strict = ui.autoGuideToggle.checked;
  const p3El = $("slot-p3");
  const b3El = $("slot-b3");
  const btn  = ui.submitBtn;

  const p1=getBaccaratValFromSlot("p1");
  const p2=getBaccaratValFromSlot("p2");
  const b1=getBaccaratValFromSlot("b1");
  const b2=getBaccaratValFromSlot("b2");

  if(p1===null || p2===null || b1===null || b2===null){
    p3El.classList.add("disabled");
    b3El.classList.add("disabled");
    btn.disabled=true;
    btn.className="submit-btn";
    btn.textContent="等待完成前四張牌...";
    return;
  }

  if(!strict){
    p3El.classList.remove("disabled");
    b3El.classList.remove("disabled");
    btn.disabled=false;
    btn.className="submit-btn ready";
    btn.textContent="送出結算（手動覆寫）";
    return;
  }

  const pTotal=(p1+p2)%10;
  const bTotal=(b1+b2)%10;
  const isNatural=(pTotal>=8 || bTotal>=8);

  let needP3=false, needB3=false;
  const p3Val = getBaccaratValFromSlot("p3");
  const b3Val = getBaccaratValFromSlot("b3");

  if(!isNatural){
    if(pTotal<=5) needP3=true;
    if(!needP3){
      if(bTotal<=5) needB3=true;
    }else{
      if(p3Val!==null){
        if (bTotal <= 2) needB3 = true;
        else if (bTotal === 3 && p3Val !== 8) needB3 = true;
        else if (bTotal === 4 && p3Val >= 2 && p3Val <= 7) needB3 = true;
        else if (bTotal === 5 && p3Val >= 4 && p3Val <= 7) needB3 = true;
        else if (bTotal === 6 && (p3Val === 6 || p3Val === 7)) needB3 = true;
      }
    }
  }

  if(isNatural){
    p3El.classList.add("disabled");
    b3El.classList.add("disabled");
  }else{
    if(needP3) p3El.classList.remove("disabled"); else p3El.classList.add("disabled");
    if(needP3 && p3Val===null) b3El.classList.add("disabled");
    else { if(needB3) b3El.classList.remove("disabled"); else b3El.classList.add("disabled"); }
  }

  let valid=true;
  let msg="✓ 牌局合法，點擊送出結算";
  if(isNatural && (p3Val!==null || b3Val!==null)) { valid=false; msg="錯誤：天牌不可補牌"; }
  if(valid && needP3 && p3Val===null)             { valid=false; msg="錯誤：閒家必須補牌"; }
  if(valid && !needP3 && p3Val!==null)            { valid=false; msg="錯誤：閒家不可補牌"; }
  if(valid && needP3 && p3Val!==null){
    if(needB3 && b3Val===null)                    { valid=false; msg="錯誤：莊家必須補牌"; }
    if(!needB3 && b3Val!==null)                   { valid=false; msg="錯誤：莊家不可補牌"; }
  }
  if(valid && !needP3){
    if(needB3 && b3Val===null)                    { valid=false; msg="錯誤：莊家必須補牌"; }
    if(!needB3 && b3Val!==null)                   { valid=false; msg="錯誤：莊家不可補牌"; }
  }
  if(totalRemaining() < 6){ valid=false; msg="靴底不足（請換靴）"; }

  btn.disabled=!valid;
  btn.className = valid ? "submit-btn ready" : "submit-btn";
  btn.textContent = msg;
}

/* ===== 勝負判定 + 扣牌 ===== */
function cardsConsumed(){
  const arr=[];
  slotOrder.forEach(id=>{ const rk=getSlotRank(id); if(rk) arr.push(parseInt(rk,10)); });
  return arr;
}
function computeWinner(){
  let pSum=0,bSum=0;
  ["p1","p2","p3"].forEach(id=>{ const rk=getSlotRank(id); if(rk) pSum += baccaratValFromRank(rk); });
  ["b1","b2","b3"].forEach(id=>{ const rk=getSlotRank(id); if(rk) bSum += baccaratValFromRank(rk); });
  const pF=pSum%10, bF=bSum%10;
  if(pF>bF) return "P";
  if(bF>pF) return "B";
  return "T";
}

/* ===== Monte Carlo（SIM） ===== */
function drawRankFromCounts(counts,total){
  const x = Math.floor(Math.random()*total);
  let acc=0;
  for(let r=1;r<=13;r++){
    acc += counts[r];
    if(x < acc){ counts[r]--; return r; }
  }
  counts[13]--; return 13;
}
function simulateOneHand(countsBase){
  const counts=new Array(14).fill(0);
  let total=0;
  for(let r=1;r<=13;r++){ counts[r]=countsBase[r]; total+=counts[r]; }

  const p1=drawRankFromCounts(counts,total--);
  const b1=drawRankFromCounts(counts,total--);
  const p2=drawRankFromCounts(counts,total--);
  const b2=drawRankFromCounts(counts,total--);

  const pT=(baccaratValFromRank(p1)+baccaratValFromRank(p2))%10;
  const bT=(baccaratValFromRank(b1)+baccaratValFromRank(b2))%10;

  if(pT>=8 || bT>=8){
    if(pT>bT) return "P";
    if(bT>pT) return "B";
    return "T";
  }

  let p3=null,b3=null;
  if(pT<=5) p3=drawRankFromCounts(counts,total--);

  if(p3===null){
    if(bT<=5) b3=drawRankFromCounts(counts,total--);
  }else{
    const p3v=baccaratValFromRank(p3);
    let needB3=false;
    if (bT <= 2) needB3 = true;
    else if (bT === 3 && p3v !== 8) needB3 = true;
    else if (bT === 4 && p3v >= 2 && p3v <= 7) needB3 = true;
    else if (bT === 5 && p3v >= 4 && p3v <= 7) needB3 = true;
    else if (bT === 6 && (p3v === 6 || p3v === 7)) needB3 = true;
    if(needB3) b3=drawRankFromCounts(counts,total--);
  }

  const pF=(baccaratValFromRank(p1)+baccaratValFromRank(p2)+(p3?baccaratValFromRank(p3):0))%10;
  const bF=(baccaratValFromRank(b1)+baccaratValFromRank(b2)+(b3?baccaratValFromRank(b3):0))%10;

  if(pF>bF) return "P";
  if(bF>pF) return "B";
  return "T";
}
function simulateProbs(trials){
  const base=new Array(14).fill(0);
  for(let r=1;r<=13;r++) base[r]=S.rankCounts[r];

  let B=0,P=0,T=0;
  for(let i=0;i<trials;i++){
    const w=simulateOneHand(base);
    if(w==="B") B++; else if(w==="P") P++; else T++;
  }
  return {pB:B/trials, pP:P/trials, pT:T/trials};
}
function fmtPct(x){ return (x*100).toFixed(2)+"%"; }

/* ===== 路單（簡化：只保留大路與三路渲染）===== */
function genericMatrixMapper(arr,supportTie){
  let gridMap={}, lastRes=null, sc=0, cc=0, cr=0, mc=0, lastCrd=null, pendingTies=0;
  for(let i=0;i<arr.length;i++){
    let res=arr[i];
    if(supportTie && res==="T"){
      if(lastCrd && gridMap[lastCrd]) gridMap[lastCrd].tie++;
      else pendingTies++;
      continue;
    }
    if(res===lastRes){
      let nr=cr+1;
      if(nr<=5 && !gridMap[`${cc},${nr}`]) cr=nr;
      else cc++;
    }else{
      if(lastRes!==null){ sc++; while(gridMap[`${sc},0`]) sc++; }
      cc=sc; cr=0;
    }
    lastCrd=`${cc},${cr}`;
    gridMap[lastCrd]={val:res, tie:pendingTies};
    pendingTies=0; lastRes=res; if(cc>mc) mc=cc;
  }
  return {grid:gridMap, maxCol:mc};
}
function generateDerivedArrays(hist){
  let pHist=hist.filter(x=>x!=="T");
  let pCols=[], cCol=[], lRes=null;
  for(let r of pHist){
    if(r===lRes) cCol.push(r);
    else { if(cCol.length>0) pCols.push(cCol); cCol=[r]; lRes=r; }
  }
  if(cCol.length>0) pCols.push(cCol);

  let eye=[], sm=[], roach=[];
  for(let c=0;c<pCols.length;c++){
    for(let r=0;r<pCols[c].length;r++){
      if(c>=1){
        if(r===0 && c>=2) eye.push(pCols[c-1].length===pCols[c-2].length?'R':'Blue');
        else if(r>0) eye.push((pCols[c-1] && pCols[c-1].length>r)?'R':'Blue');
      }
      if(c>=2){
        if(r===0 && c>=3) sm.push(pCols[c-1].length===pCols[c-3].length?'R':'Blue');
        else if(r>0) sm.push((pCols[c-2] && pCols[c-2].length>r)?'R':'Blue');
      }
      if(c>=3){
        if(r===0 && c>=4) roach.push(pCols[c-1].length===pCols[c-4].length?'R':'Blue');
        else if(r>0) roach.push((pCols[c-3] && pCols[c-3].length>r)?'R':'Blue');
      }
    }
  }
  return {eye, small:sm, roach};
}
function renderGrid(domId,gridMap,maxCol,type){
  const container=$(domId);
  container.innerHTML="";
  const isSm=(type==="small"||type==="roach");
  const cols=Math.max(isSm?24:16, maxCol+1);

  for(let c=0;c<cols;c++){
    let colDiv=document.createElement("div");
    colDiv.className="road-col";
    for(let r=0;r<6;r++){
      let cell=document.createElement("div");
      cell.className=isSm?"cell-sm":"cell-lg";
      if(gridMap[`${c},${r}`]){
        let data=gridMap[`${c},${r}`];
        let item=document.createElement("div");
        if(type==="big"||type==="eye"){
          item.className=`circle-hollow ${data.val}`;
          if(type==="big" && data.tie>0){
            item.classList.add("tie-line");
            if(data.tie>1){
              let txt=document.createElement("span");
              txt.className="tie-text";
              txt.textContent=data.tie;
              item.appendChild(txt);
            }
          }
        }else if(type==="small") item.className=`circle-solid ${data.val}`;
        else if(type==="roach") item.className=`slash ${data.val}`;
        cell.appendChild(item);
      }
      colDiv.appendChild(cell);
    }
    container.appendChild(colDiv);
  }
  container.parentElement.scrollLeft = container.parentElement.scrollWidth;
}
function renderAllRoads(){
  const big=genericMatrixMapper(S.history,true);
  renderGrid("grid-big",big.grid,big.maxCol,"big");

  const d=generateDerivedArrays(S.history);
  const eye=genericMatrixMapper(d.eye,false);
  const sm=genericMatrixMapper(d.small,false);
  const ro=genericMatrixMapper(d.roach,false);
  renderGrid("grid-eye",eye.grid,eye.maxCol,"eye");
  renderGrid("grid-small",sm.grid,sm.maxCol,"small");
  renderGrid("grid-roach",ro.grid,ro.maxCol,"roach");
}

/* ===== HUD 更新（核心） ===== */
function setHudState(state){
  ui.hud.classList.remove("pass","banker","player");
  if(state==="B") ui.hud.classList.add("banker");
  else if(state==="P") ui.hud.classList.add("player");
  else ui.hud.classList.add("pass");
}
function recalcAndRender(){
  const total = totalRemaining();
  const trials = S.trials;

  ui.simInfo.textContent = `SIM: ${trials}`;
  ui.hudRemain.textContent = String(total);
  ui.hudRound.textContent  = String(S.history.length);
  ui.hudArmed.textContent  = S.armed ? "是" : "否";
  ui.hudSim.textContent    = String(trials);
  ui.hudCom.textContent    = (S.commission*100).toFixed(1) + "%";

  const probs = simulateProbs(trials);

  ui.bankerOdds.textContent = fmtPct(probs.pB);
  ui.playerOdds.textContent = fmtPct(probs.pP);
  ui.tieOdds.textContent    = fmtPct(probs.pT);

  ui.hudPB.textContent = fmtPct(probs.pB);
  ui.hudPP.textContent = fmtPct(probs.pP);
  ui.hudPT.textContent = fmtPct(probs.pT);

  const evB = (probs.pB*(1-S.commission)) - probs.pP;
  const evP = probs.pP - probs.pB;

  ui.evBanker.textContent = (evB*100).toFixed(2)+"%";
  ui.evPlayer.textContent = (evP*100).toFixed(2)+"%";

  ui.hudEVB.textContent = (evB*100).toFixed(2)+"%";
  ui.hudEVP.textContent = (evP*100).toFixed(2)+"%";
  ui.hudEVB.style.color = evB>0 ? "var(--t)" : "var(--muted)";
  ui.hudEVP.style.color = evP>0 ? "var(--t)" : "var(--muted)";

  // HUD 主指揮（這裡只做示範：以 EV 最大者為主，EV<=0 則觀望）
  let state="PASS", main="觀望", sub="EV ≤ 0（僅顯示條件機率）";
  if(Math.max(evB,evP) > 0){
    if(evB>=evP){ state="B"; main="🔥 押莊"; sub="EV(B) > 0"; }
    else { state="P"; main="🔥 押閒"; sub="EV(P) > 0"; }
  }
  setHudState(state);
  ui.hudMain.innerHTML = `${main} <span class="badge" id="hudBadge">${hudExpanded?"點我收合":"點我展開"}</span>`;
  ui.hudSub.textContent = sub;

  // 問路 dots（保留）
  const dB = generateDerivedArrays([...S.history,"B"]);
  const dP = generateDerivedArrays([...S.history,"P"]);
  const last = (a)=>a.length?a[a.length-1]:null;
  const askB = [last(dB.eye), last(dB.small), last(dB.roach)];
  const askP = [last(dP.eye), last(dP.small), last(dP.roach)];

  function setDots(el, arr){
    el.innerHTML="";
    arr.forEach(x=>{
      const dot=document.createElement("div");
      dot.className="dot " + (x==="R"?"r":x==="Blue"?"b":"e");
      el.appendChild(dot);
    });
  }
  setDots(ui.askB, askB);
  setDots(ui.askP, askP);

  renderAllRoads();
  updateKeypadCounts();
  evaluateDrawRules();
}

/* ===== 送出 / 撤銷 / 換靴 ===== */
function submitData(){
  if(ui.submitBtn.disabled) return;

  snapshot();

  const winner = computeWinner();
  S.history.push(winner);

  const consumed = cardsConsumed();
  consumed.forEach(r=>{ S.rankCounts[r]--; });

  clearAllSlots();
  saveState();
  recalcAndRender();
}
function undoLastRound(){
  if(!backupState){ alert("沒有可撤銷的上一局。"); return; }
  S = structClone(backupState);
  backupState = null;
  saveState();
  clearAllSlots();
  recalcAndRender();
}
function resetSystem(){
  if(!confirm("確定換靴？（重置牌庫與路單）")) return;
  snapshot();
  S.rankCounts = initCounts(S.decks);
  S.history = [];
  saveState();
  clearAllSlots();
  recalcAndRender();
}

/* ===== 初始化 ===== */
buildKeypad();
setActiveSlot("p1");
recalcAndRender();
</script>
