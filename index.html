}

function simulatePathDerivation(history, hyp){
  const sim = history.slice();
  sim.push({ w:hyp });
  const meta = buildBigRoadMeta(sim);
  const d = getDerivedRoads(meta);
  return {
    eye: d.eye.length ? d.eye[d.eye.length - 1] : null,
    small: d.small.length ? d.small[d.small.length - 1] : null,
    roach: d.roach.length ? d.roach[d.roach.length - 1] : null
  };
}

function buildRunSegments(pure){
  const runs = [];
  for(let i=0;i<pure.length;i++){
    const side = pure[i];
    if(!runs.length || runs[runs.length - 1].side !== side){
      runs.push({ side:side, len:1 });
    }else{
      runs[runs.length - 1].len += 1;
    }
  }
  return runs;
}

function getSideRunCapProfile(runs, side){
  const sideRuns = runs.filter(function(run){ return run.side === side; }).map(function(run){ return run.len; });
  const recent = sideRuns.slice(-6);
  const maxRun = sideRuns.length ? Math.max.apply(null, sideRuns) : 0;
  const exact1 = recent.filter(function(len){ return len === 1; }).length;
  const exact2 = recent.filter(function(len){ return len === 2; }).length;
  const exact3 = recent.filter(function(len){ return len === 3; }).length;
  const within2 = recent.filter(function(len){ return len <= 2; }).length;
  const within3 = recent.filter(function(len){ return len <= 3; }).length;

  const singleCapActive = recent.length >= 4 && maxRun <= 2 && exact1 / recent.length >= 0.62;
  const doubleCapActive = !singleCapActive && recent.length >= 4 && maxRun <= 3 && within2 / recent.length >= 0.72 && exact2 >= 1;
  const tripleCapActive = !singleCapActive && !doubleCapActive && recent.length >= 4 && maxRun <= 4 && within3 / recent.length >= 0.74 && exact3 >= 1;

  let capLen = null;
  let mode = null;
  let confidence = 0;

  if(singleCapActive){
    capLen = 1;
    mode = 'single';
    confidence = Math.min(0.96, 0.66 + exact1 * 0.05);
  }else if(doubleCapActive){
    capLen = 2;
    mode = 'double';
    confidence = Math.min(0.94, 0.62 + exact2 * 0.06 + Math.max(0, within2 - 4) * 0.02);
  }else if(tripleCapActive){
    capLen = 3;
    mode = 'triple';
    confidence = Math.min(0.92, 0.60 + exact3 * 0.07 + Math.max(0, within3 - 4) * 0.02);
  }

  return {
    count: sideRuns.length,
    recent: recent,
    maxRun: maxRun,
    capLen: capLen,
    mode: mode,
    confidence: Number(confidence.toFixed(2)),
    singleCapActive: singleCapActive,
    doubleCapActive: doubleCapActive,
    tripleCapActive: tripleCapActive
  };
}

function inferRegimeFromWindow(inputRuns){
  const baseRuns = Array.isArray(inputRuns) ? inputRuns.slice() : [];
  const recent = baseRuns.slice(-8);
  if(!recent.length){
    return { mode:'chaos', capLen:null, confidence:0, sourceRuns:0, fromCompleted:false };
  }

  const lens = recent.map(function(run){ return run.len; });
  const exact1 = lens.filter(function(len){ return len === 1; }).length;
  const exact2 = lens.filter(function(len){ return len === 2; }).length;
  const exact3 = lens.filter(function(len){ return len === 3; }).length;
  const fourPlus = lens.filter(function(len){ return len >= 4; }).length;
  const within2 = lens.filter(function(len){ return len <= 2; }).length;
  const within3 = lens.filter(function(len){ return len <= 3; }).length;
  const avgLen = lens.reduce(function(a,b){ return a + b; }, 0) / lens.length;

  const ratio1 = exact1 / lens.length;
  const ratio2 = exact2 / lens.length;
  const ratio3 = exact3 / lens.length;
  const ratioWithin2 = within2 / lens.length;
  const ratioWithin3 = within3 / lens.length;
  const ratioFourPlus = fourPlus / lens.length;

  let mode = 'chaos';
  let capLen = null;
  let confidence = 0;

  if(lens.length >= 4 && ratio1 >= 0.60 && ratioWithin2 >= 0.82){
    mode = 'single';
    capLen = 1;
    confidence = 0.63 + (ratio1 - 0.60) * 0.52 + Math.max(0, ratioWithin2 - 0.82) * 0.24;
  }else if(lens.length >= 4 && ratioWithin2 >= 0.76 && ratio2 >= 0.25 && ratioFourPlus <= 0.12){
    mode = 'double';
    capLen = 2;
    confidence = 0.59 + (ratioWithin2 - 0.76) * 0.46 + (ratio2 - 0.25) * 0.34;
  }else if(lens.length >= 4 && ratioWithin3 >= 0.72 && ratio3 >= 0.18 && ratioFourPlus <= 0.18){
    mode = 'triple';
    capLen = 3;
    confidence = 0.57 + (ratioWithin3 - 0.72) * 0.40 + (ratio3 - 0.18) * 0.36;
  }else if(lens.length >= 4 && (ratioFourPlus >= 0.24 || avgLen >= 3.35)){
    mode = 'dragon';
    capLen = null;
    confidence = 0.60 + Math.max(0, ratioFourPlus - 0.24) * 0.56 + Math.max(0, avgLen - 3.35) * 0.08;
  }

  confidence = Math.max(0, Math.min(0.96, confidence));
  return {
    mode: mode,
    capLen: capLen,
    confidence: Number(confidence.toFixed(2)),
    sourceRuns: recent.length,
    fromCompleted:false
  };
}

function inferDominantRegime(runs){
  const allRuns = Array.isArray(runs) ? runs.slice() : [];
  const activeRun = allRuns.length ? allRuns[allRuns.length - 1] : null;
  let baseRuns = allRuns.slice();
  if(activeRun && activeRun.len >= 2 && allRuns.length >= 2){
    baseRuns = allRuns.slice(0, -1);
  }
  if(baseRuns.length < 4){
    baseRuns = allRuns.slice();
  }
  const regime = inferRegimeFromWindow(baseRuns);
  regime.fromCompleted = baseRuns.length !== allRuns.length;
  return regime;
}

function getJumpCapSignal(path){
  const trendSide = path && path.trend_side ? path.trend_side : null;
  const regime = path && path.priorJumpRegime && path.priorJumpRegime.capLen ? path.priorJumpRegime : (path && path.dominantRegime ? path.dominantRegime : null);
  if(!trendSide || !regime || !regime.capLen) return null;
  if(['single','double','triple'].indexOf(regime.mode) === -1) return null;
  if(regime.confidence < 0.58) return null;
  if((path.trend_len || 0) < regime.capLen) return null;

  const capLen = regime.capLen;
  const penalty = capLen === 1 ? 0.86 : capLen === 2 ? 0.72 : 0.60;
  const boost = capLen === 1 ? 0.56 : capLen === 2 ? 0.44 : 0.34;
  const labelSide = trendSide === 'B' ? '莊' : '閒';
  const oppSide = trendSide === 'B' ? '閒' : '莊';
  const triggerLen = capLen + 1;
  const modeText = capLen === 1 ? '單跳' : capLen === 2 ? '雙跳' : '三跳';

  return {
    side: trendSide,
    capLen: capLen,
    mode: regime.mode,
    confidence: regime.confidence,
    penalty: Number(penalty.toFixed(2)),
    boost: Number(boost.toFixed(2)),
    text: labelSide + '家固定' + modeText + '主體，' + labelSide + '到第' + triggerLen + '顆先觀察',
    reversalText: '固定' + modeText + '主體，' + labelSide + '突破第' + triggerLen + '顆後優先看' + oppSide
  };
}

function getDragonTransitionSignal(path, candidate, aligned, oppositeAligned, gap, chopRisk, evCandidate, dataThin){
  if(!path || !candidate || candidate === 'PASS') return null;
  const regime = path.priorJumpRegime && path.priorJumpRegime.capLen ? path.priorJumpRegime : path.dominantRegime;
  if(!regime || !regime.capLen || ['single','double','triple'].indexOf(regime.mode) === -1) return null;
  const runLen = path.trend_side === candidate ? (path.trend_len || 0) : 0;
  if(runLen <= regime.capLen) return null;

  const delta = runLen - regime.capLen;
  const historicalRuns = Array.isArray(path.runs) && path.runs.length > 1 ? path.runs.slice(0, -1).filter(function(run){ return run.side === candidate; }) : [];
  const breakoutRuns = historicalRuns.filter(function(run){ return run.len > regime.capLen; }).length;
  const extend1 = historicalRuns.filter(function(run){ return run.len > regime.capLen + 1; }).length;
  const extend2 = historicalRuns.filter(function(run){ return run.len > regime.capLen + 2; }).length;
  const extend3 = historicalRuns.filter(function(run){ return run.len > regime.capLen + 3; }).length;
  const pContinue1 = (extend1 + 0.6) / (breakoutRuns + 1.6);
  const pContinue2 = (extend2 + 0.45) / (breakoutRuns + 1.45);
  const pContinue3 = (extend3 + 0.30) / (breakoutRuns + 1.30);

  const biasBonus = path.recent_shoe_bias === candidate ? 0.75 : 0;
  const thinPenalty = dataThin ? 0.42 : 0;
  const score = Number((
    aligned * 1.18 +
    gap * 0.52 -
    oppositeAligned * 0.82 -
    chopRisk * 0.96 +
    biasBonus +
    (evCandidate > 0 ? 0.55 : evCandidate > -0.003 ? 0.18 : -0.35) +
    regime.confidence * 0.82 -
    thinPenalty
  ).toFixed(2));

  const baseLabel = regime.capLen === 1 ? '單跳' : regime.capLen === 2 ? '雙跳' : '三跳';
  const adaptiveConfirm = score + pContinue2 * 1.55 + pContinue3 * 0.95;
  const adaptiveHold = score + pContinue3 * 1.45;

  if(delta === 1){
    return { state:'observe', score:score, delta:delta, text: baseLabel + '剛被突破，先進轉場觀察', pContinue1:pContinue1, pContinue2:pContinue2 };
  }
  if(delta === 2){
    if((score + pContinue1 * 1.20) >= 6.05 && aligned >= 4 && gap >= 2.4 && chopRisk <= 1){
      return { state:'candidate', score:score, delta:delta, text: baseLabel + '突破延續，但仍僅列候選', pContinue1:pContinue1, pContinue2:pContinue2 };
    }
    return { state:'observe', score:score, delta:delta, text: baseLabel + '突破延續但仍未確認轉龍', pContinue1:pContinue1, pContinue2:pContinue2 };
  }
  if(delta === 3){
    if((adaptiveConfirm >= 6.45 && aligned >= 4 && gap >= 2.7 && (chopRisk <= 1 || pContinue2 >= 0.48)) || (aligned >= 5 && gap >= 4.9 && score >= 6.1)){
      return { state:'confirmed', score:score, delta:delta, text: baseLabel + '突破後五路同步，確認轉龍', pContinue1:pContinue1, pContinue2:pContinue2 };
    }
    if(score >= 6.05 && aligned >= 4 && gap >= 2.5){
      return { state:'candidate', score:score, delta:delta, text: baseLabel + '突破已拉長，但仍僅列候選', pContinue1:pContinue1, pContinue2:pContinue2 };
    }
    return { state:'observe', score:score, delta:delta, text: baseLabel + '突破已拉長但結構不足，先不承認真龍', pContinue1:pContinue1, pContinue2:pContinue2 };
  }
  if(delta >= 4){
    if((adaptiveHold >= 6.2 && aligned >= 4 && chopRisk <= 1) || (aligned >= 5 && gap >= 4.0 && score >= 5.95)){
      return { state:'hold', score:score, delta:delta, text: baseLabel + '轉龍後結構穩定，允許續抱', pContinue2:pContinue2, pContinue3:pContinue3 };
    }
    if(score >= 5.9 && aligned >= 4 && gap >= 2.4){
      return { state:'candidate', score:score, delta:delta, text: baseLabel + '轉龍後仍在高位，但僅列候選', pContinue2:pContinue2, pContinue3:pContinue3 };
    }
    return { state:'fatigue', score:score, delta:delta, text: baseLabel + '轉龍後結構轉弱，優先退場', pContinue2:pContinue2, pContinue3:pContinue3 };
  }
  return null;
}

function getDragonBreakCooldown(path, candidate, aligned, oppositeAligned, gap, evCandidate){
  if(!path || !Array.isArray(path.runs) || path.runs.length < 2) return null;
  const last = path.runs[path.runs.length - 1];
  const prev = path.runs[path.runs.length - 2];
  if(!last || !prev || prev.len < 4 || last.len > 2) return null;

  const priorJump = path.priorJumpRegime && ['single','double','triple'].indexOf(path.priorJumpRegime.mode) !== -1 ? path.priorJumpRegime : null;
  const jumpRecoverGap = priorJump ? (priorJump.capLen === 1 ? 2.8 : priorJump.capLen === 2 ? 2.2 : 1.9) : 9;
  const recoveringJump = !!(
    priorJump &&
    candidate === prev.side &&
    aligned >= 3 &&
    gap >= jumpRecoverGap &&
    (oppositeAligned <= 2 || path.recent_shoe_bias === candidate)
  );
  const newOppositeRegime = !!(
    candidate === last.side &&
    aligned >= 4 &&
    gap >= 2.1 &&
    evCandidate > -0.003 &&
    (last.len >= 2 || path.recent_shoe_bias === candidate)
  );

  if(last.len === 1){
    if(newOppositeRegime && aligned >= 5 && gap >= 3.2){
      return { active:false, resolved:'new_regime_fast', text:'斷龍後反向能量快速成形，提前解除冷卻' };
    }
    return {
      active:true,
      stage:'observe',
      dragonSide:prev.side,
      currentSide:last.side,
      stepsRemaining:2,
      text:'長龍剛斷，進入動態觀察窗'
    };
  }

  if(last.len === 2){
    if(newOppositeRegime){
      return { active:false, resolved:'new_regime', text:'斷龍後反向延續成形，解除冷卻' };
    }
    if(recoveringJump){
      return { active:false, resolved:'jump_recover', text:'斷龍後原跳型重現，解除冷卻' };
    }
    return {
      active:true,
      stage:'probe',
      dragonSide:prev.side,
      currentSide:last.side,
      stepsRemaining:1,
      text:'長龍斷後第二手試探，仍未確認新規則'
    };
  }
  return null;
}


function getLongDragonSignal(path, candidate, aligned, oppositeAligned, gap, chopRisk, candidateHist, energy, regimeProbs){
  if(!path || !candidate || candidate === 'PASS' || candidate !== path.trend_side) return null;
  const trendLen = path.trend_len || 0;
  const dominantDragon = (regimeProbs.dragon || 0) >= 0.28 || ((path.dominantRegime && path.dominantRegime.mode) === 'dragon');
  if(!dominantDragon || trendLen < 5) return null;

  const nextSideProb = normalizeFiniteNumber(candidateHist && candidateHist.nextSideProb, 0.5);
  const continueSame = normalizeFiniteNumber(candidateHist && candidateHist.continue_same, 0.5);
  const breakOpp = normalizeFiniteNumber(candidateHist && candidateHist.break_to_opposite, 0.5);
  const fakeBreak = normalizeFiniteNumber(candidateHist && candidateHist.fake_breakout, 0);
  const energyGap = normalizeFiniteNumber(energy && energy.energy_gap, 0);
  const score = aligned * 1.10 + gap * 0.46 + energyGap * 0.28 + nextSideProb * 2.0 + continueSame * 1.2 - oppositeAligned * 0.9 - chopRisk * 1.1 - fakeBreak * 2.2;

  if(trendLen === 5){
    return { state:'observe', score:Number(score.toFixed(2)), text:'長龍第5手先觀察，不做首追' };
  }
  if(trendLen === 6){
    if(aligned >= 4 && gap >= 2.6 && energyGap >= 2.4 && nextSideProb >= 0.55 && continueSame > breakOpp + 0.02 && fakeBreak < 0.18 && chopRisk <= 1){
      return { state:'follow', score:Number(score.toFixed(2)), text:'長龍首追確認，允許第6手跟進' };
    }
    return { state:'observe', score:Number(score.toFixed(2)), text:'長龍第6手未完成確認，先觀察' };
  }
  if(trendLen >= 7){
    if(aligned >= 4 && gap >= 2.0 && energyGap >= 2.0 && continueSame >= breakOpp && fakeBreak < 0.18 && chopRisk <= 1){
      return { state:'hold', score:Number(score.toFixed(2)), text:'長龍續抱條件成立' };
    }
    return { state:'exit', score:Number(score.toFixed(2)), text:'長龍續抱條件失守，先退場' };
  }
  return null;
}

function extractPathFeaturesCore(history){
  const pure = history.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
  const runs = buildRunSegments(pure);

  let trend_side = null, trend_len = 0;
  if(runs.length > 0){
    trend_side = runs[runs.length - 1].side;
    trend_len = runs[runs.length - 1].len;
  }

  const recent = pure.slice(-15);
  let recentB = 0, recentP = 0;
  for(let i=0;i<recent.length;i++){
    if(recent[i] === 'B') recentB++;
    else if(recent[i] === 'P') recentP++;
  }

  let recent_shoe_bias = null;
  if(recent.length >= 10){
    if(recentB / recent.length >= 0.6) recent_shoe_bias = 'B';
    else if(recentP / recent.length >= 0.6) recent_shoe_bias = 'P';
  }

  let chop_count = 0;
  for(let i=1;i<recent.length;i++){
    if(recent[i] !== recent[i-1]) chop_count++;
  }

  const askB = simulatePathDerivation(history, 'B');
  const askP = simulatePathDerivation(history, 'P');

  const ask_B_red = [askB.eye, askB.small, askB.roach].filter(function(x){ return x === 'R'; }).length;
  const ask_P_red = [askP.eye, askP.small, askP.roach].filter(function(x){ return x === 'R'; }).length;

  const sideCaps = {
    B: getSideRunCapProfile(runs, 'B'),
    P: getSideRunCapProfile(runs, 'P')
  };

  const dominantRegime = inferDominantRegime(runs);
  const priorRuns = runs.length ? runs.slice(0, -1) : [];
  const priorJumpRegimeRaw = inferRegimeFromWindow(priorRuns);
  const priorJumpRegime = ['single','double','triple'].indexOf(priorJumpRegimeRaw.mode) !== -1 ? priorJumpRegimeRaw : null;
  const recentRuns = runs.slice(-6);
  const alternatingTight = recentRuns.length >= 5 && recentRuns.every(function(run){ return run.len <= 2; });
  const alternatingThree = recentRuns.length >= 4 && recentRuns.every(function(run){ return run.len <= 3; });

  let jumpPatternMode = null;
  if(priorJumpRegime){
    jumpPatternMode = priorJumpRegime.mode;
  }else if(dominantRegime.mode === 'single' || dominantRegime.mode === 'double' || dominantRegime.mode === 'triple'){
    jumpPatternMode = dominantRegime.mode;
  }else if(sideCaps.B.capLen === 1 && sideCaps.P.capLen === 1){
    jumpPatternMode = 'single';
  }else if(alternatingTight && (sideCaps.B.capLen === 2 || sideCaps.P.capLen === 2)){
    jumpPatternMode = 'double';
  }else if(alternatingThree && (sideCaps.B.capLen === 3 || sideCaps.P.capLen === 3)){
    jumpPatternMode = 'triple';
  }

  const breakoutBaseRegime = priorJumpRegime || dominantRegime;
  const breakoutFromRegime =
    breakoutBaseRegime && breakoutBaseRegime.capLen &&
    trend_side &&
    trend_len > breakoutBaseRegime.capLen &&
    ['single','double','triple'].indexOf(breakoutBaseRegime.mode) !== -1;

  return {
    history_len: history.length,
    trend_side,
    trend_len,
    recent_shoe_bias,
    ask_B_red,
    ask_P_red,
    chop_count,
    runs:runs,
    last_run_len: runs.length ? runs[runs.length - 1].len : 0,
    previous_run_len: runs.length >= 2 ? runs[runs.length - 2].len : 0,
    sideCaps: sideCaps,
    alternatingTight: alternatingTight,
    jumpPatternMode: jumpPatternMode,
    dominantRegime: dominantRegime,
    priorJumpRegime: priorJumpRegime,
    breakoutFromRegime: breakoutFromRegime
  };
}

function derivedRoadDecision(label, askBVal, askPVal){
  if(askBVal === 'R' && askPVal === 'Blue'){
    return { label, side:'B', strength:1.15, text: label + ' 問莊紅 / 問閒藍' };
  }
  if(askBVal === 'Blue' && askPVal === 'R'){
    return { label, side:'P', strength:1.15, text: label + ' 問閒紅 / 問莊藍' };
  }
  if(askBVal === 'R' && askPVal === 'R'){
    return { label, side:null, strength:0, text: label + ' 雙紅，方向未分離' };
  }
  if(askBVal === 'Blue' && askPVal === 'Blue'){
    return { label, side:null, strength:0, text: label + ' 雙藍，方向未分離' };
  }
  return { label, side:null, strength:0, text: label + ' 待命' };
}

function getRoadSuite(history){
  const pure = history.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
  const path = extractPathFeaturesCore(history);
  const roads = [];

  const beadRecent = pure.slice(-6);
  let beadB = 0, beadP = 0;
  for(let i=0;i<beadRecent.length;i++){
    if(beadRecent[i] === 'B') beadB++;
    else if(beadRecent[i] === 'P') beadP++;
  }
  let beadSide = null, beadStrength = 0, beadText = '珠盤待命';
  if(beadRecent.length >= 4){
    if(beadB > beadP){
      beadSide = 'B';
      beadStrength = beadB >= 5 ? 1.5 : 1.0;
      beadText = '珠盤最近 ' + beadB + ':' + beadP + ' 偏莊';
    }else if(beadP > beadB){
      beadSide = 'P';
      beadStrength = beadP >= 5 ? 1.5 : 1.0;
      beadText = '珠盤最近 ' + beadP + ':' + beadB + ' 偏閒';
    }else{
      beadText = '珠盤均衡';
    }
  }
  roads.push({ label:'珠盤', side:beadSide, strength:beadStrength, text:beadText });

  let bigSide = path.trend_side;
  let bigStrength = 0;
  let bigText = '大路待命';
  if(bigSide){
    if(path.trend_len >= 5) bigStrength = 2.4;
    else if(path.trend_len === 4) bigStrength = 2.0;
    else if(path.trend_len === 3) bigStrength = 1.6;
    else if(path.trend_len === 2) bigStrength = 1.1;
    else bigStrength = 0.5;
    bigText = '大路 ' + path.trend_len + ' 連' + (bigSide === 'B' ? '莊' : '閒');
  }
  roads.push({ label:'大路', side:bigSide, strength:bigStrength, text:bigText });

  const askB = simulatePathDerivation(history, 'B');
  const askP = simulatePathDerivation(history, 'P');

  roads.push(derivedRoadDecision('大眼', askB.eye, askP.eye));
  roads.push(derivedRoadDecision('小路', askB.small, askP.small));
  roads.push(derivedRoadDecision('曱甴', askB.roach, askP.roach));

  return { roads, path };
}


function buildGenericRuns(seq){
  const runs = [];
  (seq || []).forEach(function(token){
    if(token === null || token === undefined) return;
    if(!runs.length || runs[runs.length - 1].token !== token) runs.push({ token:token, len:1 });
    else runs[runs.length - 1].len += 1;
  });
  return runs;
}

function mapTokenSide(token, fallback){
  if(token === 'B' || token === 'R') return fallback || 'B';
  if(token === 'P' || token === 'Blue') return fallback || 'P';
  return fallback || null;
}

function formatPct(v){
  return (clamp01(v) * 100).toFixed(0) + '%';
}

function getRoadSignalByLabel(roads, label){
  return (roads || []).find(function(r){ return r && r.label === label; }) || null;
}

function buildRoadSequences(history){
  const pure = (history || []).filter(function(x){ return x && x.w !== 'T'; }).map(function(x){ return x.w; });
  const meta = buildBigRoadMeta(history || []);
  const derived = getDerivedRoads(meta);
  return { big:pure, eye:derived.eye || [], small:derived.small || [], roach:derived.roach || [] };
}

function analyzePatternBrainSequence(sequence, opts){
  const label = opts && opts.label ? opts.label : '規律腦';
  const currentSide = opts && opts.currentSide ? opts.currentSide : null;
  const seq = (sequence || []).filter(function(x){ return x !== null && x !== undefined; });
  if(!seq.length){
    return { label:label, mode:'待機', mainSide:currentSide, mainConfidence:0, regularity_score:0, irregularity_score:1, continue_prob:0.5, reverse_prob:0.5, fake_break_prob:0.18, passRisk:0.72, note:'資料不足' };
  }
  const runs = buildGenericRuns(seq);
  const lens = runs.map(function(r){ return r.len; });
  const current = runs[runs.length - 1];
  const avgLen = lens.reduce(function(a,b){ return a + b; }, 0) / lens.length;
  const altRate = runs.length > 1 ? (runs.length - 1) / Math.max(1, seq.length - 1) : 0;
  const within1 = lens.filter(function(len){ return len === 1; }).length / lens.length;
  const within2 = lens.filter(function(len){ return len <= 2; }).length / lens.length;
  const within3 = lens.filter(function(len){ return len <= 3; }).length / lens.length;
  const fourPlus = lens.filter(function(len){ return len >= 4; }).length / lens.length;
  let mode = '混合';
  if(within1 >= 0.62 && within2 >= 0.82) mode = '單跳';
  else if(within2 >= 0.74 && fourPlus <= 0.18) mode = '雙跳';
  else if(within3 >= 0.74 && fourPlus <= 0.22) mode = '三跳';
  else if(avgLen >= 3.3 || fourPlus >= 0.30) mode = '長龍';
  else if(altRate >= 0.78 && avgLen <= 2.2) mode = '亂流';
  const regularity = clamp01(
    (mode === '長龍' ? 0.62 : mode === '單跳' ? 0.60 : mode === '雙跳' ? 0.58 : mode === '三跳' ? 0.56 : mode === '混合' ? 0.46 : 0.28) +
    Math.max(0, Math.min(0.18, (current.len - 1) * 0.04)) -
    Math.max(0, altRate - 0.68) * 0.36 +
    Math.max(0, fourPlus - 0.22) * (mode === '長龍' ? 0.18 : -0.24)
  );
  const irregularity = clamp01(1 - regularity * 0.82 + (mode === '亂流' ? 0.18 : 0) + Math.max(0, altRate - 0.72) * 0.18);
  let continueProb = clamp01(0.48 + regularity * 0.18 + (mode === '長龍' ? 0.12 : 0) - irregularity * 0.14 + (current.len >= 2 ? 0.04 : -0.02));
  let fakeBreakProb = clamp01(0.12 + irregularity * 0.28 + ((mode === '單跳' || mode === '雙跳' || mode === '三跳') && current.len >= 3 ? 0.16 : 0));
  if(mode === '單跳' && current.len >= 2){ continueProb -= 0.12; fakeBreakProb += 0.18; }
  if(mode === '雙跳' && current.len >= 3){ continueProb -= 0.10; fakeBreakProb += 0.16; }
  if(mode === '三跳' && current.len >= 4){ continueProb -= 0.08; fakeBreakProb += 0.12; }
  if(mode === '長龍' && current.len >= 5) continueProb += 0.06;
  continueProb = clamp01(continueProb);
  const reverseProb = clamp01(1 - continueProb + irregularity * 0.12 + fakeBreakProb * 0.08);
  const confidence = clamp01(0.28 + regularity * 0.44 + Math.min(0.18, runs.length / 18));
  const passRisk = clamp01(irregularity * 0.52 + fakeBreakProb * 0.28 + (current.len <= 1 && mode === '亂流' ? 0.14 : 0));
  const note = mode === '長龍' ? '規律腦判定長龍延續結構' : mode === '亂流' ? '規律腦判定不規律偏高' : '規律腦判定' + mode + '主體';
  return {
    label:label,
    mode:mode,
    mainSide:currentSide || null,
    mainConfidence:confidence,
    regularity_score:regularity,
    irregularity_score:irregularity,
    continue_prob:continueProb,
    reverse_prob:reverseProb,
    fake_break_prob:fakeBreakProb,
    passRisk:passRisk,
    note:note
  };
}

function analyzeDragonBrainSequence(sequence, opts){
  const label = opts && opts.label ? opts.label : '龍腦';
  const currentSide = opts && opts.currentSide ? opts.currentSide : null;
  const seq = (sequence || []).filter(function(x){ return x !== null && x !== undefined; });
  const runs = buildGenericRuns(seq);
  if(!runs.length){
    return { label:label, dragon_state:'無龍', dragon_side:currentSide || null, dragon_strength:0, dragon_continue_prob:0.34, dragon_break_prob:0.56, new_dragon_prob:0.20, dragon_fatigue:0, dragon_is_true:false, note:'尚未形成龍' };
  }
  const current = runs[runs.length - 1];
  const altRate = runs.length > 1 ? (runs.length - 1) / Math.max(1, seq.length - 1) : 0;
  const sameCompleted = runs.slice(0, -1).filter(function(run){ return run.token === current.token; });
  const longer = sameCompleted.filter(function(run){ return run.len >= current.len; }).length;
  let continueProb = current.len < 2 ? 0.34 : clamp01((longer + 0.9) / (sameCompleted.length + 1.8) + current.len * 0.05 - altRate * 0.16 + (current.len >= 4 ? 0.08 : 0));
  let breakProb = current.len < 2 ? 0.56 : clamp01(1 - continueProb + (current.len >= 5 ? 0.10 : 0) + altRate * 0.08);
  const fatigue = clamp01((current.len >= 4 ? (current.len - 3) * 0.12 : 0) + Math.max(0, breakProb - continueProb) * 0.8);
  let state = '無龍';
  if(current.len >= 2) state = '初龍';
  if(current.len >= 4) state = '成龍';
  if(current.len >= 6) state = '強龍';
  if(fatigue >= 0.62 || (current.len >= 4 && breakProb > continueProb + 0.12)) state = '疲勞龍';
  const dragonStrength = clamp01((current.len / 6) * 0.54 + continueProb * 0.38 - fatigue * 0.14);
  const newDragonProb = clamp01((state === '無龍' ? 0.34 : breakProb * 0.46) + Math.max(0, altRate - 0.70) * 0.22);
  const dragonIsTrue = current.len >= 3 && continueProb >= 0.48 && fatigue < 0.72;
  const side = mapTokenSide(current.token, currentSide);
  const note = state === '無龍' ? '龍腦判定無龍' : ('龍腦判定' + state + (fatigue >= 0.62 ? '，斷龍風險升高' : ''));
  return {
    label:label,
    dragon_state:state,
    dragon_side:side,
    dragon_strength:dragonStrength,
    dragon_continue_prob:continueProb,
    dragon_break_prob:breakProb,
    new_dragon_prob:newDragonProb,
    dragon_fatigue:fatigue,
    dragon_is_true:dragonIsTrue,
    note:note
  };
}

function computeRecentRoadEffectiveness(history, label){
  const rows = [];
  for(let i=2;i<history.length-1;i++){
    const prefix = history.slice(0, i);
    const next = history[i];
    if(!next || next.w === 'T') continue;
    const sig = getRoadSignalByLabel(getRoadSuite(prefix).roads, label);
    if(!sig || !sig.side) continue;
    rows.push({ hit:sig.side === next.w ? 1 : 0, side:sig.side });
  }
  const recent = rows.slice(-6);
  const hits = recent.reduce(function(a,b){ return a + b.hit; }, 0);
  return { sample:recent.length, hits:hits, recent6_acc:recent.length ? hits / recent.length : 0 };
}

function chooseDominantLowerRoad(roadRows){
  const cands = (roadRows || []).filter(function(row){ return ['大眼','小路','曱甴'].indexOf(row.label) !== -1 && row.sample >= 4 && row.side; }).sort(function(a,b){
    return (b.recent6_acc - a.recent6_acc) || (b.pattern.regularity_score - a.pattern.regularity_score);
  });
  if(!cands.length) return null;
  const best = cands[0];
  const second = cands[1] || null;
  if(best.recent6_acc >= 0.67 && (!second || best.recent6_acc - second.recent6_acc >= 0.17)){
    return Object.assign({}, best, { followRoad:true });
  }
  return null;
}

function analyzeDualBrainSystem(history, suite){
  const seqs = buildRoadSequences(history);
  const defs = [
    { label:'大路', seq:seqs.big },
    { label:'大眼', seq:seqs.eye },
    { label:'小路', seq:seqs.small },
    { label:'曱甴', seq:seqs.roach }
  ];
  const roadRows = defs.map(function(def){
    const signal = getRoadSignalByLabel(suite.roads, def.label);
    const pattern = analyzePatternBrainSequence(def.seq, { label:def.label + ' 規律腦', currentSide:signal && signal.side ? signal.side : null });
    const dragon = analyzeDragonBrainSequence(def.seq, { label:def.label + ' 龍腦', currentSide:signal && signal.side ? signal.side : null });
    const eff = computeRecentRoadEffectiveness(history, def.label);
    return {
      label:def.label,
      side:signal && signal.side ? signal.side : null,
      pattern:pattern,
      dragon:dragon,
      recent6_acc:eff.recent6_acc,
      recent6_hits:eff.hits,
      sample:eff.sample,
      focus:false
    };
  });
  const mainRow = roadRows[0];
  const dominantLowerRoad = chooseDominantLowerRoad(roadRows);
  if(dominantLowerRoad){
    roadRows.forEach(function(row){ if(row.label === dominantLowerRoad.label) row.focus = true; });
  }
  const consensusCount = roadRows.filter(function(row){ return row.side && row.side === mainRow.side; }).length;
  const arbiter = {
    blockByDragonBreak: mainRow.dragon.dragon_state !== '無龍' && mainRow.dragon.dragon_break_prob >= 0.62 && mainRow.dragon.dragon_break_prob > mainRow.dragon.dragon_continue_prob + 0.06,
    blockByPatternIrregular: mainRow.pattern.passRisk >= 0.66 && mainRow.pattern.regularity_score <= 0.46,
    dominantRoadLabel: dominantLowerRoad ? dominantLowerRoad.label : '',
    roadFollowSide: dominantLowerRoad ? dominantLowerRoad.side : null,
    roadFollowBoost: dominantLowerRoad ? clamp01(0.20 + dominantLowerRoad.recent6_acc * 0.52 + dominantLowerRoad.pattern.regularity_score * 0.12) : 0,
    consensus: clamp01(consensusCount / 4)
  };
  return {
    patternMain: mainRow.pattern,
    dragonMain: mainRow.dragon,
    roadBrains: roadRows,
    dominantLowerRoad: dominantLowerRoad,
    arbiter: arbiter
  };
}

function calcEVFromProbs(probs){
  return {
    B: probs.B * PAYOUTS.B - probs.P,
    P: probs.P * PAYOUTS.P - probs.B
  };
}


function executePolicyChain(features, patternDb, tau){
  tau = Number.isFinite(Number(tau)) ? Number(tau) : Config.tau;

  const hist = Array.isArray(features.__history) ? features.__history : [];
  const suite = getRoadSuite(hist);
  const path = suite.path;
  const roads = suite.roads;
  const dualBrain = analyzeDualBrainSystem(hist, suite);
  const patternBrain = dualBrain.patternMain;
  const dragonBrain = dualBrain.dragonMain;
  const roadBrains = dualBrain.roadBrains;
  const dominantLowerRoad = dualBrain.dominantLowerRoad;
  const arbiter = dualBrain.arbiter;
  const dataThin = (patternDb.totalHands || 0) < DATA_THIN_TOTALHANDS;

  let scoreB = 0, scoreP = 0, alignedB = 0, alignedP = 0;
  roads.forEach(function(r){
    if(r.side === 'B'){ scoreB += r.strength; alignedB++; }
    if(r.side === 'P'){ scoreP += r.strength; alignedP++; }
  });

  const regimePack = computeRegimeProbabilities(path);
  const regimeProbs = regimePack.probs;
  const histB = getHistoricalTransitionProbabilities(path, 'B');
  const histP = getHistoricalTransitionProbabilities(path, 'P');
  scoreB += histB.directionBoost;
  scoreP += histP.directionBoost;

  const pure = hist.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
  const ptnKey = pure.length >= 3 ? pure.slice(-3).join(',') : null;
  const cp = ptnKey ? canonicalPattern(ptnKey, patternDb.patterns[ptnKey]) : null;

  let probs = { B:NAIVE_PRIORS.B, P:NAIVE_PRIORS.P };
  if(cp && cp.N >= (dataThin ? 18 : 10)){
    const bpBase = cp.B + cp.P;
    if(bpBase > 0){
      const dataB = cp.B / bpBase;
      const dataP = cp.P / bpBase;
      const w = Math.min(dataThin ? 0.10 : 0.18, cp.N * 0.0055);
      probs.B = probs.B * (1 - w) + dataB * w;
      probs.P = probs.P * (1 - w) + dataP * w;
    }
  }

  const histBlendW = Math.min(0.18, (histB.sample + histP.sample) / 260);
  probs.B = probs.B * (1 - histBlendW) + histB.nextB * histBlendW;
  probs.P = probs.P * (1 - histBlendW) + histP.nextP * histBlendW;

  const roadDeltaRaw = (scoreB - scoreP) * (dataThin ? 0.0058 : 0.0048);
  const roadDelta = Math.max(-0.05, Math.min(0.05, roadDeltaRaw));
  probs.B = Math.max(0.001, probs.B + roadDelta);
  probs.P = Math.max(0.001, probs.P - roadDelta);

  const tc = features.F_Comp.running_count / Math.max(0.5, features.F_Comp.remain_cards / 52);
  probs.B = Math.max(0, probs.B - tc * 0.0005);
  probs.P = Math.max(0, probs.P + tc * 0.0005);

  const z = probs.B + probs.P;
  probs = { B: probs.B / z, P: probs.P / z };
  const ev = calcEVFromProbs(probs);

  const energy = computeEnergyModel(path, scoreB, scoreP, alignedB, alignedP, Math.abs(scoreB - scoreP), path.chop_count || 0, regimeProbs, histB, histP, features.F_Comp.running_count, features.F_Comp.remain_cards);
  const chaosMode = detectChaosMode(path, regimeProbs, histB, histP, energy, path.chop_count >= 6 ? 2 : path.chop_count >= 4 ? 1 : 0);
  scoreB += energy.B_energy * (chaosMode.active ? 0.16 : 0.26);
  scoreP += energy.P_energy * (chaosMode.active ? 0.16 : 0.26);

  if(patternBrain.mainSide === 'B') scoreB += 0.24 + patternBrain.mainConfidence * 0.52;
  if(patternBrain.mainSide === 'P') scoreP += 0.24 + patternBrain.mainConfidence * 0.52;
  if(dragonBrain.dragon_side === 'B' && dragonBrain.dragon_state !== '無龍') scoreB += Math.max(-0.55, Math.min(0.95, (dragonBrain.dragon_continue_prob - dragonBrain.dragon_break_prob) * 1.9 + dragonBrain.dragon_strength * 0.38));
  if(dragonBrain.dragon_side === 'P' && dragonBrain.dragon_state !== '無龍') scoreP += Math.max(-0.55, Math.min(0.95, (dragonBrain.dragon_continue_prob - dragonBrain.dragon_break_prob) * 1.9 + dragonBrain.dragon_strength * 0.38));
  if(dominantLowerRoad && dominantLowerRoad.followRoad && dominantLowerRoad.side === 'B') scoreB += 0.18 + arbiter.roadFollowBoost * 0.52;
  if(dominantLowerRoad && dominantLowerRoad.followRoad && dominantLowerRoad.side === 'P') scoreP += 0.18 + arbiter.roadFollowBoost * 0.52;

  const gapNow = Math.abs(scoreB - scoreP);
  const predictiveReleaseB =
    (histB.nextSideProb - 0.5) * 5.0 +
    (histB.true_transition - histB.fake_breakout) * 3.6 +
    (energy.B_energy - energy.P_energy) * 0.20 +
    ((regimeProbs.dragon || 0) * (path.trend_side === 'B' ? 1.20 : 0.45));
  const predictiveReleaseP =
    (histP.nextSideProb - 0.5) * 5.0 +
    (histP.true_transition - histP.fake_breakout) * 3.6 +
    (energy.P_energy - energy.B_energy) * 0.20 +
    ((regimeProbs.dragon || 0) * (path.trend_side === 'P' ? 1.20 : 0.45));

  const strongEarlyDragonRelease =
    !chaosMode.blockBet &&
    features.F_Path.history_len >= 5 &&
    (
      (alignedB >= 3 && (scoreB - scoreP) >= 3.9 && energy.energy_gap >= 4.0 && predictiveReleaseB >= 1.16 && (regimeProbs.dragon >= 0.18 || regimeProbs.triple >= 0.22)) ||
      (alignedP >= 3 && (scoreP - scoreB) >= 3.9 && energy.energy_gap >= 4.0 && predictiveReleaseP >= 1.16 && (regimeProbs.dragon >= 0.18 || regimeProbs.triple >= 0.22)) ||
      (alignedB >= 4 && (scoreB - scoreP) >= 3.0 && energy.energy_gap >= 3.2 && predictiveReleaseB >= 0.88) ||
      (alignedP >= 4 && (scoreP - scoreB) >= 3.0 && energy.energy_gap >= 3.2 && predictiveReleaseP >= 0.88)
    );

  const warmupPredictiveRelease =
    !chaosMode.blockBet &&
    features.F_Path.history_len < WARMUP_HANDS &&
    features.F_Path.history_len >= 3 &&
    (

function getPendingCounts(){
  const pending = {};
  for(let i=1;i<=13;i++) pending[i] = 0;
  ['p1','p2','p3','b1','b2','b3'].forEach(function(id){
    const v = getVal(id);
    if(v) pending[v]++;
  });
  return pending;
}

function drawKeypad(){
  const k = document.getElementById('keypad');
  k.innerHTML = '';
  const pending = getPendingCounts();

  for(let i=1;i<=13;i++){
    const remain = Math.max(0, (S.deck[i] || 0) - pending[i]);
    const b = document.createElement('div');
    b.className = 'key';
    b.innerHTML =
      '<div class="key-val">' + (i===1?'A':i===11?'J':i===12?'Q':i===13?'K':i) + '</div>' +
      '<div class="key-count">' + remain + '</div>';
    b.onclick = function(){ inputRank(i); };
    k.appendChild(b);
  }

  const clr = document.createElement('div');
  clr.className = 'key action-clear';
  clr.textContent = '⌫ 清空重填';
  clr.onclick = clearCurrentInput;
  k.appendChild(clr);
}

function getVal(id){
  const el = document.getElementById('slot-' + id);
  const v = el ? el.dataset.val : null;
  return v ? parseInt(v, 10) : null;
}

function setActiveSlot(id){
  const el = document.getElementById('slot-' + id);
  if(!el || el.classList.contains('disabled')) return;
  document.querySelectorAll('.playing-card').forEach(function(x){ x.classList.remove('active'); });
  el.classList.add('active');
  cIdx = cOrder.indexOf(id);
}

function inputRank(rank){
  const pending = getPendingCounts();
  if(((S.deck[rank] || 0) - pending[rank]) <= 0) return;

  while(cIdx < cOrder.length && document.getElementById('slot-' + cOrder[cIdx]).classList.contains('disabled')) cIdx++;
  if(cIdx >= cOrder.length) return;

  const target = document.getElementById('slot-' + cOrder[cIdx]);
  target.textContent = rank===1?'A':rank===11?'J':rank===12?'Q':rank===13?'K':String(rank);
  target.dataset.val = String(rank);
  target.classList.add('filled');

  cIdx++;
  evaluateDrawRules();
  drawKeypad();

  while(cIdx < cOrder.length && document.getElementById('slot-' + cOrder[cIdx]).classList.contains('disabled')) cIdx++;
  if(cIdx < cOrder.length) setActiveSlot(cOrder[cIdx]);
}

function clearCurrentInput(){
  cIdx = 0;
  const ids = ['p1','p2','p3','b1','b2','b3'];
  ids.forEach(function(id){
    const e = document.getElementById('slot-' + id);
    e.textContent = '';
    e.dataset.val = '';
    e.classList.remove('filled', 'active');
    if(id === 'p3' || id === 'b3') e.classList.add('disabled');
    else e.classList.remove('disabled');
  });
  setActiveSlot(cOrder[0]);
  evaluateDrawRules();
  drawKeypad();
}

    ? ['p1','b1','p2','b2','p3','b3']

function evaluateDrawRules(){
  const isAuto = document.getElementById('autoGuide').checked;
  const btn = document.getElementById('submitBtn');
  const p3 = document.getElementById('slot-p3');
  const b3 = document.getElementById('slot-b3');

  const p1 = getVal('p1');
  const p2 = getVal('p2');
  const b1 = getVal('b1');
  const b2 = getVal('b2');

  if(!p1 || !p2 || !b1 || !b2){
    p3.classList.add('disabled');
    b3.classList.add('disabled');
    btn.disabled = true;
    btn.className = 'submit-btn';
    btn.textContent = '請依照發牌順序輸入';
    return;
  }

  if(!isAuto){
    p3.classList.remove('disabled');
    b3.classList.remove('disabled');
    btn.disabled = false;
    btn.className = 'submit-btn ready';
    btn.textContent = '手動覆寫模式：可結算';
    return;
  }

  const pT = (baccaratValue(p1) + baccaratValue(p2)) % 10;
  const bT = (baccaratValue(b1) + baccaratValue(b2)) % 10;
  const isNat = pT >= 8 || bT >= 8;
  const p3v = getVal('p3');
  const b3v = getVal('b3');

  let needP3 = false;
  let needB3 = false;

  if(!isNat){
    if(pT <= 5) needP3 = true;
    if(!needP3){
      if(bT <= 5) needB3 = true;
    }else if(p3v !== null){
      const p3b = baccaratValue(p3v);
      if(bT <= 2) needB3 = true;
      else if(bT === 3 && p3b !== 8) needB3 = true;
      else if(bT === 4 && p3b >= 2 && p3b <= 7) needB3 = true;
      else if(bT === 5 && p3b >= 4 && p3b <= 7) needB3 = true;
      else if(bT === 6 && (p3b === 6 || p3b === 7)) needB3 = true;
    }
  }

  if(!needP3) p3.classList.add('disabled');
  else p3.classList.remove('disabled');

  if(needP3 && p3v === null) b3.classList.add('disabled');
  else{
    if(!needB3) b3.classList.add('disabled');
    else b3.classList.remove('disabled');
  }

  let valid = true;
  let msg = '✓ 牌局合法，點擊結算';

  if(isNat && (p3v !== null || b3v !== null)){ valid = false; msg = '❌ 錯誤：天牌不可補牌'; }
  if(valid && needP3 && p3v === null){ valid = false; msg = '❌ 錯誤：閒家必須補牌'; }
  if(valid && !needP3 && p3v !== null){ valid = false; msg = '❌ 錯誤：閒家不可補牌'; }

  if(valid && needP3 && p3v !== null){
    if(needB3 && b3v === null){ valid = false; msg = '❌ 錯誤：莊家必須補牌'; }
    if(!needB3 && b3v !== null){ valid = false; msg = '❌ 錯誤：莊家不可補牌'; }
  }else if(valid && !needP3){
    if(needB3 && b3v === null){ valid = false; msg = '❌ 錯誤：莊家必須補牌'; }
    if(!needB3 && b3v !== null){ valid = false; msg = '❌ 錯誤：莊家不可補牌'; }
  }

  if(S.isLegacyPartial){
    valid = false;
    msg = '⚠️ 降級模式：請先換靴';
  }

  btn.disabled = !valid;
  btn.className = valid ? 'submit-btn ready' : 'submit-btn';
  btn.textContent = msg;
}

function submitHand(){
  if(S.isLegacyPartial){
    alert('⚠️ 系統目前處於舊版相容降級模式，請先按「換靴」後再繼續。');
    return;
  }

  const btn = document.getElementById('submitBtn');
  if(btn.disabled) return;

  bSt = JSON.parse(JSON.stringify(S));
  bDB = JSON.parse(JSON.stringify(BigData));
  bLab = JSON.parse(JSON.stringify(LabStore));

  const vals = {
    p1:getVal('p1'), p2:getVal('p2'), p3:getVal('p3'),
    b1:getVal('b1'), b2:getVal('b2'), b3:getVal('b3')
  };

  const cons = [];
  let pPts = 0, bPts = 0;
  ['p1','p2','p3','b1','b2','b3'].forEach(function(id){
    const v = vals[id];
    if(v){
      cons.push(v);
      if(id[0] === 'p') pPts += baccaratValue(v);
      else bPts += baccaratValue(v);
    }
  });

  const pFinal = pPts % 10;
  const bFinal = bPts % 10;
  const w = pFinal > bFinal ? 'P' : bFinal > pFinal ? 'B' : 'T';
  const bp = vals.b1 != null && vals.b2 != null && vals.b1 === vals.b2;
  const pp = vals.p1 != null && vals.p2 != null && vals.p1 === vals.p2;

  const updateKey = getPatternKeyBeforePush();

  const remainCards = Object.values(S.deck).reduce(function(a,b){ return a + b; }, 0);
  const features = {
    F_Comp:{ running_count:S.runningCount, remain_cards:remainCards },
    F_Path:extractPathFeaturesCore(S.history),
    __history:S.history.slice()
  };
  const prediction = executePolicyChain(features, BigData, Config.tau);

  const observation = captureObservation(S, features, prediction, vals);
  commitObservation(observation, { winner:w, pPt:pFinal, bPt:bFinal, bp, pp });

  if(prediction.decision !== 'PASS'){
    S.shoePerf.recs += 1;
    S.shoePerf.returnSum += settleDecision(prediction.decision, w);
    if(w === 'T') S.shoePerf.pushes += 1;
    else if(prediction.decision === w) S.shoePerf.hits += 1;
  }

  S.history.push({ w, pPt:pFinal, bPt:bFinal, bp, pp });
  for(let i=0;i<cons.length;i++){
    const v = cons[i];
    S.deck[v] = Math.max(0, (S.deck[v] || 0) - 1);
    S.runningCount += countWeights[v] || 0;
  }

  if(updateKey) updatePatternDB(BigData, updateKey, w, bp, pp);

  recalcDBStats(BigData, materializeAllShoes());
  clearCurrentInput();
  render();
}

function undo(){
  if(!bSt || !bDB || !bLab){
    alert('無可撤銷資料');
    return;
  }
  S = JSON.parse(JSON.stringify(bSt));
  BigData = JSON.parse(JSON.stringify(bDB));
  LabStore = JSON.parse(JSON.stringify(bLab));
  normalizeLabSnapshots();
  recalcDBStats(BigData);
  clearCurrentInput();
  render();
}

function resetShoe(){
  if(!confirm('換靴？本靴已輸入牌局會結算進資料庫，本靴畫面會清空。')) return;
  closeCurrentShoe();
  S = createInitialState();
  bSt = null; bDB = null; bLab = null;
  BigData = rebuildBigDataFromAllShoes(materializeAllShoes());
  clearCurrentInput();
  render();
}

function resetAll(){

  [
    DB_K, LAB_K, ST_K, CF_K,

    'bac_v64_db','bac_v64_lab','bac_v64_state','bac_v64_cfg',

function saveConfig(){
  Config = normalizeConfig({
    tau: document.getElementById('cfgTau').value,
    nBins: document.getElementById('cfgBins').value
  });
  document.getElementById('cfgTau').value = Config.tau;
  document.getElementById('cfgBins').value = Config.nBins;
  recalcDBStats(BigData, materializeAllShoes());
  render();
}

async function exportDB(){
  try{
    normalizeLabSnapshots();

    const payload = {
      version:'v66.1',
      exported_at:new Date().toISOString(),
      bigData:BigData,
      labStore:LabStore,
      materializedShoes:materializeAllShoes(),
      state:S,
      config:Config,
      unifiedAudit:UnifiedAudit
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type:'application/json' });
    const fileName = 'bac_v66_1_export_' + new Date().toISOString().replace(/[:.]/g,'-') + '.json';

    if(window.showSaveFilePicker){
      try{
        const handle = await window.showSaveFilePicker({
          suggestedName:fileName,
          types:[{
            description:'JSON Files',
            accept:{ 'application/json':['.json'] }
          }]
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        alert('✅ 匯出完成：已由瀏覽器讓你選擇儲存位置。');
        return;
      }catch(err){
        if(err && err.name === 'AbortError') return;
      }
    }

    try{
      const file = new File([blob], fileName, { type:'application/json' });
      if(navigator.canShare && navigator.canShare({ files:[file] }) && navigator.share){
        await navigator.share({
          files:[file],
          title:'百家樂資料匯出',
          text:'bac v66.1 匯出資料'
        });
        return;
      }
    }catch(err){}

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 1200);

    alert('✅ 匯出已觸發。若你使用手機，檔案通常會進入「下載」或瀏覽器下載列表。');
  }catch(err){
    console.error(err);
    alert('匯出失敗：' + (err && err.message ? err.message : err));
  }
}

function stripLegacySidebetFields(obj){
  if(!obj || typeof obj !== 'object') return obj;
  delete obj.s;
  delete obj.recommend_tie;
  delete obj.recommend_bp;
  delete obj.recommend_pp;
  delete obj.tRecs; delete obj.tHits; delete obj.bpRecs; delete obj.bpHits; delete obj.ppRecs; delete obj.ppHits;
  return obj;
}

function importDB(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const text = String(ev.target.result || '').replace(/^\uFEFF/, '');
      const obj = JSON.parse(text);

      if(!obj || typeof obj !== 'object') throw new Error('invalid-json');
      if(!obj.labStore || !obj.state) throw new Error('missing-fields');

      const importedMaterialized = Array.isArray(obj.materializedShoes) ? obj.materializedShoes : null;
      let recoveredByMaterialized = false;

      const tempLab = {
        schema_version:'v66.1',
        rawShoes:Array.isArray(obj.labStore.rawShoes) ? obj.labStore.rawShoes : [],
        currentOpenShoe: obj.labStore.currentOpenShoe || null,
        experiments:[]
      };
      const tempState = normalizeState(obj.state);
      if(!tempState) throw new Error('invalid-state');

      const tempCfg = normalizeConfig(obj.config || {});

      LabStore = tempLab;
      S = tempState;
      Config = tempCfg;

      normalizeLabSnapshots();

      LabStore.rawShoes.forEach(function(shoe){
        (shoe.hands || []).forEach(function(h){
          if(h.policy_snapshot) stripLegacySidebetFields(h.policy_snapshot);
          if(h.current_eval) stripLegacySidebetFields(h.current_eval);
          if(h.live_prediction) stripLegacySidebetFields(h.live_prediction);
        });
      });
      if(LabStore.currentOpenShoe && Array.isArray(LabStore.currentOpenShoe.hands)){
        LabStore.currentOpenShoe.hands.forEach(function(h){
          if(h.policy_snapshot) stripLegacySidebetFields(h.policy_snapshot);
          if(h.current_eval) stripLegacySidebetFields(h.current_eval);
          if(h.live_prediction) stripLegacySidebetFields(h.live_prediction);
        });
      }

      BigData = rebuildBigDataFromAllShoes(materializeAllShoes());

      if(!validateOpenShoeConsistency(LabStore, S)){
        if(importedMaterialized && importedMaterialized.length){
          LabStore = {
            schema_version:'v66.1',
            rawShoes:importedMaterialized,
            currentOpenShoe:null,
            experiments:[]
          };
          normalizeLabSnapshots();
          BigData = rebuildBigDataFromAllShoes(LabStore.rawShoes);
          S = createInitialState();
          recoveredByMaterialized = true;
        }else{
          const fallbackShoes = materializeAllShoes();
          if(fallbackShoes.length){
            LabStore = {
              schema_version:'v66.1',
              rawShoes:fallbackShoes,
              currentOpenShoe:null,
              experiments:[]
            };
            normalizeLabSnapshots();
            BigData = rebuildBigDataFromAllShoes(LabStore.rawShoes);
          }else{
            LabStore.currentOpenShoe = null;
            BigData = rebuildBigDataFromAllShoes(LabStore.rawShoes);
          }
          S = createInitialState();
        }
      }else{
        rebuildLiveStateMetrics();
      }

      document.getElementById('cfgTau').value = Config.tau;
      document.getElementById('cfgBins').value = Config.nBins;

      bSt = null; bDB = null; bLab = null;
      clearCurrentInput();
      render();

      alert(
        recoveredByMaterialized
          ? '✅ 匯入成功：已用 materializedShoes 回復資料；舊版側注欄位已停用並升版到 v66.1。'
          : '✅ 匯入成功：已載入 ' + materializeAllShoes().length + ' 雙鞋資料，舊版側注欄位已停用並升版到 v66.1。'
      );
    }catch(err){
      console.error(err);
      alert('匯入失敗：檔案格式不正確或內容不完整。');
    }finally{
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

function settleDecision(decision, winner){
  if(decision === 'PASS') return 0;
  if(decision === 'B') return winner === 'B' ? PAYOUTS.B : (winner === 'T' ? 0 : -1);
  if(decision === 'P') return winner === 'P' ? PAYOUTS.P : (winner === 'T' ? 0 : -1);
  return 0;
}


function invokeQuantLab(){
  refreshUnifiedAudit();

  const shoes = materializeAllShoes();
  if(shoes.length < 1){
    alert('目前沒有可分析的鞋資料。');
    return;
  }

  const shoeRows = Object.values(UnifiedAudit.byShoe || {}).sort(function(a,b){
    return Number(a.started_at || 0) - Number(b.started_at || 0);
  }).map(function(row){
    return {
      shoe_id:row.shoe_id,
      label:row.label,
      replay_bets:row.replay.bets,
      replay_hits:row.replay.hits,
      replay_return:row.replay.returnSum,
      replay_coverage:row.replay.coverage,
      original_bets:row.original.bets,
      original_hits:row.original.hits,
      original_return:row.original.returnSum,
      original_coverage:row.original.coverage
    };
  });

  const versionRows = Object.values(UnifiedAudit.byVersion || {}).map(function(row){
    return { version:row.version, original:row.original, replay:row.replay };
  }).sort(function(a,b){ return String(a.version).localeCompare(String(b.version)); });

  const reasonRows = Object.values(UnifiedAudit.byReason || {}).sort(function(a,b){
    return Number(b.returnSum || 0) - Number(a.returnSum || 0);
  });

  const result = {
    version:'v66.1',
    generated_at:new Date().toISOString(),
    replay_model_id:'dual_brain_v66_1',
    shoes:shoeRows.length,
    original:UnifiedAudit.original,
    replay:UnifiedAudit.replay,
    by_recent_shoes:{
      labels:(UnifiedAudit.recentShoes && UnifiedAudit.recentShoes.labels) ? UnifiedAudit.recentShoes.labels.slice() : [],
      original:UnifiedAudit.recentShoes ? UnifiedAudit.recentShoes.original : makeAuditBucket(),
      replay:UnifiedAudit.recentShoes ? UnifiedAudit.recentShoes.replay : makeAuditBucket()
    },
    by_shoe:shoeRows,
    by_version:versionRows,
    by_reason:reasonRows
  };

  LabStore.experiments = [result];
  saveAll();
  console.log('🧬 v66.1 Quant Lab:', JSON.parse(JSON.stringify(result)));
  alert(
    '✅ 實驗室完成\n' +
    '全部現版: ' + result.replay.hits + '/' + result.replay.bets + '｜' + (result.replay.returnSum >= 0 ? '+' : '') + result.replay.returnSum.toFixed(2) + '\n' +
    '近兩靴現版: ' + result.by_recent_shoes.replay.hits + '/' + result.by_recent_shoes.replay.bets + '｜' + (result.by_recent_shoes.replay.returnSum >= 0 ? '+' : '') + result.by_recent_shoes.replay.returnSum.toFixed(2) + '\n\n' +
    '詳細資料已輸出到 Console。'
  );}

function toggleDB(forceState){
  const panel = document.getElementById('dbPanel');
  const backdrop = document.getElementById('dbBackdrop');
  const fab = document.getElementById('fabBtn');
  const floatClose = document.getElementById('dbFloatClose');

  const shouldOpen = typeof forceState === 'boolean'
    ? forceState
    : !panel.classList.contains('open');

  panel.classList.toggle('open', shouldOpen);
  backdrop.classList.toggle('open', shouldOpen);
  fab.classList.toggle('hidden', shouldOpen);
  floatClose.classList.toggle('show', shouldOpen);
  panel.setAttribute('aria-hidden', shouldOpen ? 'false' : 'true');
  document.body.classList.toggle('panel-open', shouldOpen);

  if(shouldOpen){
    requestAnimationFrame(function(){
      panel.scrollTop = 0;
    });
  }

  updateDBUI();
  syncViewportLayout();
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    const panel = document.getElementById('dbPanel');
    if(panel.classList.contains('open')) toggleDB(false);
  }
});

window.addEventListener('resize', syncViewportLayout, { passive:true });
window.addEventListener('orientationchange', syncViewportLayout);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', syncViewportLayout);
}

function init(){
  const panel = document.getElementById('dbPanel');
  const backdrop = document.getElementById('dbBackdrop');
  const fab = document.getElementById('fabBtn');
  const floatClose = document.getElementById('dbFloatClose');
  panel.classList.remove('open');
  backdrop.classList.remove('open');
  fab.classList.remove('hidden');
  floatClose.classList.remove('show');
  panel.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('panel-open');

  syncViewportLayout();
  loadAll();

  BigData = rebuildBigDataFromAllShoes(materializeAllShoes());

  if(!validateOpenShoeConsistency(LabStore, S)){
    const fallbackShoes = materializeAllShoes();
    if(fallbackShoes.length){
      LabStore = {
        schema_version:'v66.1',
        rawShoes:fallbackShoes,
        currentOpenShoe:null,
        experiments:[]
      };
      normalizeLabSnapshots();
      BigData = rebuildBigDataFromAllShoes(LabStore.rawShoes);
    }else{
      LabStore.currentOpenShoe = null;
      BigData = rebuildBigDataFromAllShoes(LabStore.rawShoes);
    }
    S = createInitialState();
  }else{
    rebuildLiveStateMetrics();
  }

  drawKeypad();
  clearCurrentInput();
  render();
  syncViewportLayout();
}

init();
