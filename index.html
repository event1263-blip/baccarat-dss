<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>百家樂量化終端 - v66.1 Dual-Brain Predictive Engine</title>
  <style>
    :root{
      --bg:#09090b; --card:#18181b; --card2:#111114; --border:#27272a;
      --text:#f4f4f5; --muted:#a1a1aa;
      --b:#ef4444; --p:#3b82f6; --t:#22c55e;
      --hl:#eab308; --warn:#f97316; --ok:#16a34a; --lab:#0ea5e9;
      --soft:#3f3f46;
      --app-vh:100vh;
      --hud-h:132px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;height:100%;
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
      overflow:hidden;
    }
    body{overflow:hidden}
    body.panel-open{overflow:hidden}
    button,input,select{font:inherit}

    .sticky-hud{
      position:sticky; top:0; z-index:1200;
      background:rgba(12,12,16,.94);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:calc(env(safe-area-inset-top) + 6px) 10px 7px;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }
    body.panel-open .sticky-hud{
      z-index:1 !important;
      pointer-events:none;
    }

    .hud-header{
      display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:5px;
    }
    .hud-stats{
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      font-size:12px; font-weight:800; color:var(--muted)
    }
    .version-badge{
      background:var(--hl); color:#000; font-weight:900; font-size:10px;
      padding:2px 6px; border-radius:5px;
    }
    .hud-stats .val{color:var(--text); margin-left:3px; font-variant-numeric:tabular-nums}
    .hud-actions{display:flex; gap:6px}
    .hud-btn{
      background:#27272a; color:#fff; border:1px solid #3f3f46; border-radius:8px;
      padding:6px 10px; font-size:12px; font-weight:800; cursor:pointer;
      touch-action:manipulation;
    }
    .hud-btn:active{transform:scale(.97)}
    .btn-undo{color:var(--warn)}
    .btn-reset{color:var(--b)}

    .oracle-box{
      text-align:center; padding:7px 8px; border-radius:14px;
      border:2px solid var(--border); background:#000; transition:.25s;
    }
    .oracle-box.banker{border-color:var(--b); background:linear-gradient(180deg, rgba(239,68,68,.16) 0%, #000 100%)}
    .oracle-box.player{border-color:var(--p); background:linear-gradient(180deg, rgba(59,130,246,.16) 0%, #000 100%)}
    .oracle-box.pass{border-color:#3f3f46}
    .oracle-box.locked{
      border-color:var(--hl);
      background:repeating-linear-gradient(45deg, rgba(234,179,8,.05), rgba(234,179,8,.05) 10px, #000 10px, #000 20px)
    }
    .oracle-box.degraded{
      border-color:var(--warn);
      background:repeating-linear-gradient(45deg, rgba(249,115,22,.05), rgba(249,115,22,.05) 10px, #000 10px, #000 20px)
    }
    .trend-alert{
      font-size:11px; font-weight:900; margin-bottom:4px; padding:4px 8px; border-radius:7px;
      text-align:center; letter-spacing:.2px;
    }
    .alert-high{color:#fff; background:rgba(249,115,22,.28); border:1px solid rgba(249,115,22,.7)}
    .alert-info{color:#c7e0ff; background:rgba(59,130,246,.16); border:1px solid rgba(59,130,246,.35)}
    .alert-safe{color:var(--muted); background:rgba(255,255,255,.05)}
    .alert-warn{color:var(--warn); background:rgba(249,115,22,.12); border:1px dashed rgba(249,115,22,.65)}
    .oracle-main{
      font-size:23px; font-weight:950; letter-spacing:.5px; margin-bottom:3px;
    }
    .oracle-box.banker .oracle-main{color:var(--b); text-shadow:0 0 12px rgba(239,68,68,.45)}
    .oracle-box.player .oracle-main{color:var(--p); text-shadow:0 0 12px rgba(59,130,246,.45)}
    .oracle-box.locked .oracle-main{color:var(--hl)}
    .oracle-box.degraded .oracle-main{color:var(--warn); font-size:22px}
    .reason-badge{
      display:inline-flex; flex-wrap:wrap; gap:6px; align-items:center;
      font-size:9px; font-weight:800; color:var(--text);
      padding:4px 8px; border-radius:9px; background:rgba(255,255,255,.08)
    }

    .oracle-road-wrap{
      margin-top:8px;
      border-top:1px dashed rgba(255,255,255,.12);
      padding-top:8px;
    }

    .road-explain-grid{
      display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:3px; margin-top:0;
      flex:0 0 auto;
    }
    .road-pill-card{
      background:#0d0d11; border:1px solid #2b2b33; border-radius:10px; padding:4px 3px; min-height:34px;
      display:flex; flex-direction:column; gap:2px; justify-content:center;
    }
    .road-pill{
      display:inline-flex; align-self:center; padding:2px 4px; border-radius:999px;
      font-size:8px; font-weight:950; letter-spacing:.2px; border:1px solid transparent;
      white-space:nowrap;
    }
    .road-pill.b{background:rgba(239,68,68,.12); color:var(--b); border-color:rgba(239,68,68,.35)}
    .road-pill.p{background:rgba(59,130,246,.12); color:var(--p); border-color:rgba(59,130,246,.35)}
    .road-pill.n{background:rgba(255,255,255,.06); color:var(--muted); border-color:rgba(255,255,255,.08)}
    .road-text{
      text-align:center; font-size:7px; line-height:1.15; color:#e4e4e7; font-weight:800;
      word-break:break-word;
    }


    .scroll-container{
      height:calc(var(--app-vh) - var(--hud-h));
      padding:8px;
      display:grid;
      grid-template-columns:minmax(0, 1.12fr) minmax(330px, .88fr);
      gap:8px;
      overflow:hidden;
      align-items:stretch;
    }
    .scroll-container > *{min-width:0; min-height:0}

    .roads-card,.input-card{
      background:linear-gradient(180deg, #15151a 0%, #101015 100%);
      border:1px solid var(--border); border-radius:16px; padding:8px;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      margin-bottom:0;
      min-height:0;
      height:100%;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .road-title{
      font-size:10px; font-weight:900; color:var(--muted); margin:2px 2px 4px; text-transform:uppercase;
      line-height:1.2;
    }
    .road-container{
      width:100%; overflow-x:auto; overflow-y:hidden;
      background:#fff; padding:2px; border-radius:8px;
      border:1px solid #e5e5ea; margin-bottom:4px;
      flex:0 0 auto;
    }
    .road-grid{display:flex; width:max-content}
    .road-col{display:flex; flex-direction:column}
    .cell-lg,.cell-sm{
      position:relative; flex-shrink:0; display:flex; align-items:center; justify-content:center;
      background:#fff; border:.5px solid #eee;
    }
    .cell-lg{width:11px;height:11px}
    .cell-sm{width:5px;height:5px}
    .bead-dot{width:7px;height:7px;border-radius:50%}
    .circle-hollow{width:7px;height:7px;border-radius:50%;border:2px solid transparent;background:transparent}
    .circle-solid{width:3px;height:3px;border-radius:50%}
    .slash{width:3px;height:3px}
    .B,.R{background-color:var(--b);border-color:var(--b)}
    .P,.Blue{background-color:var(--p);border-color:var(--p)}
    .T{background-color:var(--t);border-color:var(--t)}
    .has-bp::before{
      content:''; position:absolute; top:0; left:0; width:3px; height:3px; background:var(--b);
      border-radius:50%; border:1px solid #fff; z-index:2;
    }
    .has-pp::after{
      content:''; position:absolute; bottom:0; right:0; width:3px; height:3px; background:var(--p);
      border-radius:50%; border:1px solid #fff; z-index:2;
    }
    .tie-line{
      position:absolute; width:100%; height:2px; background:var(--t); transform:rotate(-45deg); z-index:1;
    }
    .tie-text{
      position:absolute; font-size:6px; font-weight:900; color:var(--t); z-index:3;
      text-shadow:0 0 2px #fff, 0 0 2px #fff;
    }
    .slash.R{background:linear-gradient(to bottom left, transparent 40%, var(--b) 40%, var(--b) 60%, transparent 60%)}
    .slash.Blue{background:linear-gradient(to bottom left, transparent 40%, var(--p) 40%, var(--p) 60%, transparent 60%)}
    .derived-roads{display:flex; gap:4px}
    .derived-col{flex:1; min-width:0}

    .bar-row{
      display:flex; justify-content:space-between; align-items:center; gap:6px; margin-bottom:5px;
      flex:0 0 auto;
    }
    .order-select{
      background:#27272a; color:#fff; border:1px solid #3f3f46; border-radius:8px;
      font-size:10px; padding:4px 6px; font-weight:800; outline:none;
      max-width:68%;
    }

    .table-layout{
      display:flex; gap:4px; margin-top:2px;
      flex:0 0 auto;
    }
    .table-side{
      flex:1; background:#000; border-radius:12px; padding:4px; border:1px solid var(--border);
      min-width:0;
    }
    .side-label{
      text-align:center; font-size:9px; font-weight:950; padding:4px 0; border-radius:8px; margin-bottom:4px;
    }
    .side-label.p{background:rgba(59,130,246,.15); color:var(--p)}
    .side-label.b{background:rgba(239,68,68,.15); color:var(--b)}

    .cards-row{display:flex; gap:4px}
    .playing-card{
      flex:1; aspect-ratio:2/3; background:#27272a; border:1px solid #3f3f46; border-radius:8px;
      display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:950; color:#fff;
      cursor:pointer; transition:.15s;
      touch-action:manipulation;
    }
    .playing-card.active{
      border-color:var(--hl); background:#333; color:var(--hl); box-shadow:0 0 10px rgba(234,179,8,.3);
      transform:translateY(-2px);
    }
    .playing-card.filled{background:#e4e4e7;color:#000}
    .playing-card.disabled{opacity:.22; pointer-events:none}

    .keypad{
      display:grid; grid-template-columns:repeat(5,1fr); gap:4px; margin-top:5px;
      flex:1 1 auto;
      align-content:start;
    }
    .key{
      background:#27272a; border:1px solid #3f3f46; border-radius:8px; padding:4px 0;
      text-align:center; cursor:pointer; user-select:none;
      touch-action:manipulation;
      min-height:34px;
    }
    .key:active{transform:scale(.97); background:#3a3a44}
    .key-val{font-size:11px; font-weight:950}
    .key-count{font-size:8px; color:var(--muted); margin-top:1px}
    .key.action-clear{
      grid-column:span 2; color:var(--warn); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900;
    }

    .submit-btn{
      width:100%; border:none; border-radius:10px; margin-top:5px; padding:9px;
      background:#27272a; color:#777; font-size:11px; font-weight:950;
      touch-action:manipulation;
      flex:0 0 auto;
    }
    .submit-btn.ready{background:var(--ok); color:#000; box-shadow:0 0 15px rgba(22,163,74,.35); cursor:pointer}

    .fab-btn{
      position:fixed; right:14px; bottom:max(12px, env(safe-area-inset-bottom)); z-index:1300;
      width:48px; height:48px; border:none; border-radius:50%;
      background:var(--hl); color:#000; font-size:20px; font-weight:900; cursor:pointer;
      box-shadow:0 8px 22px rgba(0,0,0,.5);
      touch-action:manipulation;
    }
    .fab-btn.hidden{opacity:0; pointer-events:none}

    .db-backdrop{
      position:fixed; inset:0; z-index:9000;
      background:rgba(0,0,0,.48);
      opacity:0; pointer-events:none;
      transition:opacity .25s ease;
    }
    .db-backdrop.open{
      opacity:1; pointer-events:auto;
    }

    .database-panel{
      position:fixed; left:0; right:0; bottom:0; height:84vh; z-index:9001;
      background:#111; border-radius:20px 20px 0 0; border-top:1px solid #2d2d36;
      padding:16px 14px 18px; overflow-y:auto;
      transform:translateY(104%);
      transition:transform .28s ease;
      pointer-events:none;
      box-shadow:0 -20px 40px rgba(0,0,0,.45);
      will-change:transform;
      -webkit-overflow-scrolling:touch;
    }
    .database-panel.open{
      transform:translateY(0);
      pointer-events:auto;
    }

    .db-float-close-fixed{
      position:fixed;
      top:calc(env(safe-area-inset-top) + 10px);
      right:12px;
      z-index:9002;
      width:48px;
      height:48px;
      border:none;
      border-radius:999px;
      background:var(--hl);
      color:#000;
      font-size:28px;
      font-weight:950;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 18px rgba(0,0,0,.45);
      touch-action:manipulation;
      cursor:pointer;
      opacity:0;
      pointer-events:none;
      transform:scale(.92);
      transition:opacity .18s ease, transform .18s ease;
    }
    .db-float-close-fixed.show{
      opacity:1;
      pointer-events:auto;
      transform:scale(1);
    }

    .db-header{
      display:flex; justify-content:flex-start; align-items:center; gap:8px;
      margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #333;
      position:sticky; top:0; background:#111; z-index:4;
      padding-top:calc(env(safe-area-inset-top) + 4px);
      min-height:48px;
    }
    .db-title{
      font-size:17px; font-weight:950; color:#fff; display:flex; align-items:center; gap:8px;
      line-height:1.2;
    }

    .db-section{
      background:#1a1a1f; border:1px solid #333; border-radius:14px; padding:14px; margin-bottom:14px;
    }
    .db-stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:12px; font-weight:800}
    .db-stat-item{
      display:flex; justify-content:space-between; gap:8px; padding:8px 10px;
      background:#101014; border-radius:10px;
    }
    .param-input{
      width:68px; background:#27272a; border:1px solid #3f3f46; color:#fff;
      border-radius:8px; text-align:center; padding:5px;
    }
    .lab-btn{
      width:100%; border:none; border-radius:10px; padding:12px; margin-bottom:10px;
      background:var(--lab); color:#fff; font-size:14px; font-weight:950; cursor:pointer;
      box-shadow:0 0 10px rgba(14,165,233,.28);
      touch-action:manipulation;
    }
    .db-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    .db-actions button{border:none; border-radius:10px; padding:12px; font-weight:900; cursor:pointer; touch-action:manipulation}


    .brain-panel-grid{
      display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px;
    }
    .brain-card{
      background:#0d0d11; border:1px solid #2b2b33; border-radius:12px; padding:6px 7px; min-height:76px;
      display:flex; flex-direction:column; gap:4px;
    }
    .brain-card .brain-title{
      font-size:9px; font-weight:950; color:var(--muted); letter-spacing:.2px; text-transform:uppercase;
    }
    .brain-main-line{
      font-size:11px; font-weight:900; color:#f4f4f5; line-height:1.2;
    }
    .brain-sub-line{
      font-size:8px; line-height:1.25; color:#d4d4d8; font-weight:800;
    }
    .brain-chip-row{display:flex; flex-wrap:wrap; gap:4px;}
    .brain-chip{
      font-size:8px; font-weight:900; padding:2px 5px; border-radius:999px; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.05); color:#e4e4e7;
    }
    .brain-chip.warn{color:var(--warn); border-color:rgba(249,115,22,.45); background:rgba(249,115,22,.10)}
    .brain-chip.ok{color:var(--t); border-color:rgba(34,197,94,.45); background:rgba(34,197,94,.10)}
    .brain-chip.hl{color:var(--hl); border-color:rgba(234,179,8,.45); background:rgba(234,179,8,.12)}
    .road-brain-grid{
      display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:4px; margin-top:8px;
    }
    .road-brain-card{
      background:#0d0d11; border:1px solid #2b2b33; border-radius:10px; padding:5px 4px; min-height:58px;
      display:flex; flex-direction:column; gap:2px; justify-content:center;
    }
    .road-brain-card.focus{border-color:rgba(234,179,8,.55); box-shadow:0 0 0 1px rgba(234,179,8,.20) inset}
    .road-brain-label{font-size:8px; font-weight:950; text-align:center; color:var(--muted)}
    .road-brain-side{font-size:9px; font-weight:950; text-align:center; color:#f4f4f5}
    .road-brain-meta{font-size:7px; line-height:1.2; text-align:center; color:#d4d4d8; font-weight:800}

    @media (max-width:1100px){
      .scroll-container{
        grid-template-columns:1fr;
        grid-template-rows:auto auto;
        overflow-y:auto;
        align-content:start;
        -webkit-overflow-scrolling:touch;
        padding-bottom:calc(96px + env(safe-area-inset-bottom));
      }
      .roads-card,.input-card{
        height:auto;
        overflow:visible;
      }
      .db-stat-grid{grid-template-columns:1fr}
    }

    @media (max-width:720px){
      .road-title{font-size:9px; margin:2px 2px 3px}
      .road-container{padding:1px; margin-bottom:3px}
      .cell-lg{width:10px;height:10px}
      .cell-sm{width:4px;height:4px}
      .bead-dot{width:6px;height:6px}
      .circle-hollow{width:6px;height:6px}
      .circle-solid{width:3px;height:3px}
      .slash{width:3px;height:3px}
      .tie-text{font-size:5px}

      .road-explain-grid{
        grid-template-columns:repeat(5, minmax(56px,1fr));
        gap:2px;
      }
      .road-pill-card{min-height:30px; padding:3px 2px}
      .road-pill{font-size:7px; padding:2px 3px}
      .road-text{font-size:6px}
      .brain-panel-grid{grid-template-columns:1fr}
      .road-brain-grid{grid-template-columns:repeat(2, minmax(0,1fr))}
      .brain-card{min-height:70px}

      .scroll-container{
        padding:7px;
        gap:7px;
        padding-bottom:calc(104px + env(safe-area-inset-bottom));
      }

      .fab-btn{
        width:44px;
        height:44px;
        font-size:18px;
        right:10px;
        bottom:max(10px, env(safe-area-inset-bottom));
      }

      .db-float-close-fixed{
        width:50px;
        height:50px;
        font-size:29px;
      }
    }

    @media (max-height:760px){
      .key{min-height:32px}
      .submit-btn{padding:8px}
    }
  </style>
</head>
<body>
  <div class="sticky-hud">
    <div class="hud-header">
      <div class="hud-stats">
        <span class="version-badge">v66.1</span>
        <span>剩牌:<span class="val" id="hdrRemain">416</span></span>
        <span>局:<span class="val" id="hdrRound">0</span></span>
        <span>命中:<span class="val" id="hdrHit">0/0</span></span>
      </div>
      <div class="hud-actions">
        <button type="button" class="hud-btn btn-undo" onclick="undo()">↩ 撤銷</button>
        <button type="button" class="hud-btn btn-reset" onclick="resetShoe()">換靴</button>
      </div>
    </div>

    <div id="oracleBox" class="oracle-box pass">
      <div class="trend-alert alert-safe" id="trendAlert">📊 預判主體待命中</div>
      <div class="oracle-main" id="oracleMain">等待輸入</div>
      <div class="reason-badge" id="reasonBadge">v66.1：雙腦架構 / 下三路雙腦後台統計 / 僅顯示大路摘要 / 仲裁器整合</div>

      <div class="oracle-road-wrap">
        <div class="road-explain-grid" id="roadExplain"></div>

        <div class="brain-panel-grid">
          <div class="brain-card" id="patternBrainCard"></div>
          <div class="brain-card" id="dragonBrainCard"></div>
        </div>
        <div class="road-brain-grid" id="roadBrainGrid"></div>

      </div>
      </div>
    </div>
  </div>

  <div class="scroll-container">
    <div class="roads-card">
      <div class="road-title">珠盤路 & 大路</div>
      <div class="road-container"><div class="road-grid" id="grid-bead"></div></div>
      <div class="road-container"><div class="road-grid" id="grid-big"></div></div>

      <div class="road-title" style="margin-top:4px;">下三路</div>
      <div class="derived-roads">
        <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-eye"></div></div></div>
        <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-small"></div></div></div>
        <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-roach"></div></div></div>
      </div>
    </div>

    <div class="input-card">
      <div class="bar-row">
        <select id="orderSel" class="order-select" onchange="changeOrder()">
          <option value="PBPB">閒莊閒莊 (國際標準)</option>
          <option value="PPBB">閒閒莊莊 (區塊派發)</option>
        </select>
        <label style="font-size:10px;color:var(--muted);font-weight:900;white-space:nowrap;">
          <input type="checkbox" id="autoGuide" checked onchange="evaluateDrawRules()"> 🛡️ 智慧防呆
        </label>
      </div>

      <div class="table-layout">
        <div class="table-side">
          <div class="side-label p">閒 PLAYER</div>
          <div class="cards-row">

<script>
const DB_K = 'bac_v66_1_db';

const LEGACY_CF_KEYS = ['bac_v65_4_cfg','bac_v65_3_cfg','bac_v64_3_cfg','bac_v64_2_cfg','bac_v64_cfg','bac_cfg_v63','bac_cfg_v62','bac_cfg_v61'];

function syncViewportLayout(){
  const viewportH = window.innerHeight || document.documentElement.clientHeight || 0;

function materializeAllShoes(){
  const shoes = Array.isArray(LabStore.rawShoes) ? JSON.parse(JSON.stringify(LabStore.rawShoes)) : [];
  if(LabStore.currentOpenShoe && Array.isArray(LabStore.currentOpenShoe.hands) && LabStore.currentOpenShoe.hands.length > 0){

    snap.ended_at = snap.ended_at || Date.now();
    shoes.push(snap);

function deepClone(v){
  return JSON.parse(JSON.stringify(v));
}

function findFirstLocalStorageKey(keys){
  for(let i=0;i<keys.length;i++){
    const raw = localStorage.getItem(keys[i]);
    if(raw) return raw;
  }
  return null;
}

function normalizeFiniteNumber(v, fallback){
  return Number.isFinite(Number(v)) ? Number(v) : fallback;
}

function normalizeDecision(v){
  return v === 'B' || v === 'P' || v === 'PASS' ? v : 'PASS';
}

function normalizeOutcomeWinner(v){
  return v === 'B' || v === 'P' || v === 'T' ? v : 'T';
}


function normalizeRoadSignals(arr){
  return Array.isArray(arr) ? arr.map(function(x){
    return {
      label: x && typeof x.label === 'string' ? x.label : '',
      side: x && (x.side === 'B' || x.side === 'P' || x.side === null) ? x.side : null,
      strength: normalizeFiniteNumber(x && x.strength, 0),
      text: x && typeof x.text === 'string' ? x.text : ''
    };
  }) : [];
}

function normalizeProbabilityMap(raw, keys){
  const map = {};
  let sum = 0;
  (keys || []).forEach(function(key){
    const value = Math.max(0, normalizeFiniteNumber(raw && raw[key], 0));
    map[key] = value;
    sum += value;
  });
  if(sum <= 0){
    const base = keys && keys.length ? 1 / keys.length : 0;
    (keys || []).forEach(function(key){ map[key] = base; });
    return map;
  }
  (keys || []).forEach(function(key){ map[key] = map[key] / sum; });
  return map;
}

function normalizeTransitionProbabilities(raw){
  return normalizeProbabilityMap(raw, ['nextB','nextP','continue_same','break_to_opposite','fake_breakout','true_transition']);
}

function normalizeRegimeProbabilities(raw){
  return normalizeProbabilityMap(raw, ['single','double','triple','dragon','hybrid','chaos']);
}

function normalizeEnergyShape(raw){
  raw = raw && typeof raw === 'object' ? raw : {};
  const breakdownB = raw.breakdownB && typeof raw.breakdownB === 'object' ? raw.breakdownB : {};
  const breakdownP = raw.breakdownP && typeof raw.breakdownP === 'object' ? raw.breakdownP : {};
  return {
    B_energy: normalizeFiniteNumber(raw.B_energy, 0),
    P_energy: normalizeFiniteNumber(raw.P_energy, 0),
    energy_gap: normalizeFiniteNumber(raw.energy_gap, 0),
    energy_trend: normalizeFiniteNumber(raw.energy_trend, 0),
    breakdownB: {
      road: normalizeFiniteNumber(breakdownB.road, 0),
      regime: normalizeFiniteNumber(breakdownB.regime, 0),
      momentum: normalizeFiniteNumber(breakdownB.momentum, 0),
      history: normalizeFiniteNumber(breakdownB.history, 0),
      count: normalizeFiniteNumber(breakdownB.count, 0),
      interference: normalizeFiniteNumber(breakdownB.interference, 0)
    },
    breakdownP: {
      road: normalizeFiniteNumber(breakdownP.road, 0),
      regime: normalizeFiniteNumber(breakdownP.regime, 0),
      momentum: normalizeFiniteNumber(breakdownP.momentum, 0),
      history: normalizeFiniteNumber(breakdownP.history, 0),
      count: normalizeFiniteNumber(breakdownP.count, 0),
      interference: normalizeFiniteNumber(breakdownP.interference, 0)
    }
  };
}

function normalizeRegimeStateShape(raw){
  raw = raw && typeof raw === 'object' ? raw : {};
  return {
    name: typeof raw.name === 'string' ? raw.name : 'stable',
    dominant: typeof raw.dominant === 'string' ? raw.dominant : 'chaos',
    breakout_delta: Math.max(0, Math.floor(normalizeFiniteNumber(raw.breakout_delta, 0))),
    confidence: normalizeFiniteNumber(raw.confidence, 0),
    note: typeof raw.note === 'string' ? raw.note : '',
    cooldown_active: !!raw.cooldown_active
  };
}


function normalizePatternBrainShape(raw){
  raw = raw && typeof raw === 'object' ? raw : {};
  return {
    label: typeof raw.label === 'string' ? raw.label : '規律腦',
    mode: typeof raw.mode === 'string' ? raw.mode : '待機',
    mainSide: raw.mainSide === 'B' || raw.mainSide === 'P' ? raw.mainSide : null,
    mainConfidence: clamp01(raw.mainConfidence),
    regularity_score: clamp01(raw.regularity_score),
    irregularity_score: clamp01(raw.irregularity_score),
    continue_prob: clamp01(raw.continue_prob),
    reverse_prob: clamp01(raw.reverse_prob),
    fake_break_prob: clamp01(raw.fake_break_prob),
    passRisk: clamp01(raw.passRisk),
    note: typeof raw.note === 'string' ? raw.note : ''
  };
}

function normalizeDragonBrainShape(raw){
  raw = raw && typeof raw === 'object' ? raw : {};
  return {
    label: typeof raw.label === 'string' ? raw.label : '龍腦',
    dragon_state: typeof raw.dragon_state === 'string' ? raw.dragon_state : '無龍',
    dragon_side: raw.dragon_side === 'B' || raw.dragon_side === 'P' ? raw.dragon_side : null,
    dragon_strength: clamp01(raw.dragon_strength),
    dragon_continue_prob: clamp01(raw.dragon_continue_prob),
    dragon_break_prob: clamp01(raw.dragon_break_prob),
    new_dragon_prob: clamp01(raw.new_dragon_prob),
    dragon_fatigue: clamp01(raw.dragon_fatigue),
    dragon_is_true: !!raw.dragon_is_true,
    note: typeof raw.note === 'string' ? raw.note : ''
  };
}

function normalizeRoadBrainRows(raw){
  return Array.isArray(raw) ? raw.map(function(row){
    row = row && typeof row === 'object' ? row : {};
    return {
      label: typeof row.label === 'string' ? row.label : '',
      side: row.side === 'B' || row.side === 'P' ? row.side : null,
      recent6_acc: clamp01(row.recent6_acc),
      recent6_hits: Math.max(0, Math.floor(normalizeFiniteNumber(row.recent6_hits, 0))),
      sample: Math.max(0, Math.floor(normalizeFiniteNumber(row.sample, 0))),
      focus: !!row.focus,
      pattern: normalizePatternBrainShape(row.pattern),
      dragon: normalizeDragonBrainShape(row.dragon)
    };
  }) : [];
}

function normalizeArbiterShape(raw){
  raw = raw && typeof raw === 'object' ? raw : {};
  return {
    blockByDragonBreak: !!raw.blockByDragonBreak,
    blockByPatternIrregular: !!raw.blockByPatternIrregular,
    dominantRoadLabel: typeof raw.dominantRoadLabel === 'string' ? raw.dominantRoadLabel : '',
    roadFollowSide: raw.roadFollowSide === 'B' || raw.roadFollowSide === 'P' ? raw.roadFollowSide : null,
    roadFollowBoost: clamp01(raw.roadFollowBoost),
    consensus: clamp01(raw.consensus)
  };
}

function softmaxMap(scores){
  scores = scores || {};
  const keys = Object.keys(scores);
  if(!keys.length) return {};
  const maxV = Math.max.apply(null, keys.map(function(k){ return normalizeFiniteNumber(scores[k], 0); }));
  let sum = 0;
  const exps = {};
  keys.forEach(function(k){
    exps[k] = Math.exp(normalizeFiniteNumber(scores[k], 0) - maxV);
    sum += exps[k];
  });
  const out = {};
  keys.forEach(function(k){ out[k] = sum > 0 ? exps[k] / sum : 1 / keys.length; });
  return out;
}

function clamp01(v){
  return Math.max(0, Math.min(1, normalizeFiniteNumber(v, 0)));
}


function normalizePolicySnapshotShape(raw){
  const originalModelId = raw && typeof raw.model_id === 'string'
    ? raw.model_id
    : (raw && typeof raw.model_id_original === 'string' ? raw.model_id_original : 'legacy');

  const tau = normalizeFiniteNumber(raw && raw.tau, Config.tau);
  const effectiveTau = Math.max(0, normalizeFiniteNumber(raw && raw.effectiveTau, tau));

  return {
    model_id: originalModelId,
    model_id_original: originalModelId,
    snapshot_schema_version:'v66.1',
    tau: tau,
    effectiveTau: Math.max(0, effectiveTau),
    main_decision: normalizeDecision(raw && raw.main_decision),
    is_warmup: !!(raw && raw.is_warmup),
    is_warmup_soft: !!(raw && raw.is_warmup_soft),
    data_thin: !!(raw && raw.data_thin)
  };
}


function normalizeLivePredictionShape(raw){
  const tau = normalizeFiniteNumber(raw && raw.tau, Config.tau);
  const effectiveTau = Math.max(0, normalizeFiniteNumber(raw && raw.effectiveTau, tau));
  const decision = normalizeDecision(raw && raw.decision);
  let reasons = Array.isArray(raw && raw.reasons) ? raw.reasons.map(function(x){ return String(x); }).filter(Boolean) : [];
  const normalized = {
    probs: raw && raw.probs && typeof raw.probs === 'object' ? {
      B: normalizeFiniteNumber(raw.probs.B, NAIVE_PRIORS.B),
      P: normalizeFiniteNumber(raw.probs.P, NAIVE_PRIORS.P)
    } : { B:NAIVE_PRIORS.B, P:NAIVE_PRIORS.P },
    ev: raw && raw.ev && typeof raw.ev === 'object' ? {
      B: normalizeFiniteNumber(raw.ev.B, 0),
      P: normalizeFiniteNumber(raw.ev.P, 0)
    } : { B:0, P:0 },
    decision: decision,
    tau: tau,
    effectiveTau: effectiveTau,
    tier: raw && typeof raw.tier === 'string' ? raw.tier : (raw && raw.isWarmup ? 'WARMUP' : 'PASS'),
    isWarmup: !!(raw && raw.isWarmup),
    warmupSoft: !!(raw && raw.warmupSoft),
    dataThin: !!(raw && raw.dataThin),
    scoreB: normalizeFiniteNumber(raw && raw.scoreB, 0),
    scoreP: normalizeFiniteNumber(raw && raw.scoreP, 0),
    alignedB: Math.max(0, Math.floor(normalizeFiniteNumber(raw && raw.alignedB, 0))),
    alignedP: Math.max(0, Math.floor(normalizeFiniteNumber(raw && raw.alignedP, 0))),
    gap: normalizeFiniteNumber(raw && raw.gap, 0),
    overheat: Math.max(0, Math.floor(normalizeFiniteNumber(raw && raw.overheat, 0))),
    chopRisk: Math.max(0, Math.floor(normalizeFiniteNumber(raw && raw.chopRisk, 0))),
    reasons: reasons,
    roadSignals: normalizeRoadSignals(raw && raw.roadSignals),
    regime_probs: normalizeRegimeProbabilities(raw && raw.regime_probs),
    transition_probs: normalizeTransitionProbabilities(raw && raw.transition_probs),
    energy: normalizeEnergyShape(raw && raw.energy),
    regime_state: normalizeRegimeStateShape(raw && raw.regime_state),
    brain_pattern: normalizePatternBrainShape(raw && raw.brain_pattern),
    brain_dragon: normalizeDragonBrainShape(raw && raw.brain_dragon),
    road_brains: normalizeRoadBrainRows(raw && raw.road_brains),
    arbiter: normalizeArbiterShape(raw && raw.arbiter)
  };
  if(normalized.reasons.length === 0){
    normalized.reasons = buildNativeReasonList(normalized);
  }
  return normalized;
}



function normalizeCurrentEvalShape(raw){
  if(!raw || typeof raw !== 'object') return null;
  const tau = normalizeFiniteNumber(raw.tau, Config.tau);
  const effectiveTau = Math.max(0, normalizeFiniteNumber(raw.effectiveTau, tau));
  const decision = normalizeDecision(raw.decision);
  let reasons = Array.isArray(raw.reasons) ? raw.reasons.map(function(x){ return String(x); }).filter(Boolean) : [];
  const normalized = {
    model_id: typeof raw.model_id === 'string' ? raw.model_id : 'dual_brain_v66_1',
    replay_schema_version:'v66.1',
    decision: decision,
    tier: typeof raw.tier === 'string' ? raw.tier : (decision === 'PASS' ? 'PASS' : 'MID'),
    tau: tau,
    effectiveTau: effectiveTau,
    isWarmup: !!raw.isWarmup,
    warmupSoft: !!raw.warmupSoft,
    dataThin: !!raw.dataThin,
    alignedB: Math.max(0, Math.floor(normalizeFiniteNumber(raw.alignedB, 0))),
    alignedP: Math.max(0, Math.floor(normalizeFiniteNumber(raw.alignedP, 0))),
    gap: normalizeFiniteNumber(raw.gap, 0),
    overheat: Math.max(0, Math.floor(normalizeFiniteNumber(raw.overheat, 0))),
    chopRisk: Math.max(0, Math.floor(normalizeFiniteNumber(raw.chopRisk, 0))),
    reasons: reasons,
    settled_return: normalizeFiniteNumber(raw.settled_return, 0),
    hit_main: !!raw.hit_main,
    push_main: !!raw.push_main,
    regime_probs: normalizeRegimeProbabilities(raw.regime_probs),
    transition_probs: normalizeTransitionProbabilities(raw.transition_probs),
    energy: normalizeEnergyShape(raw.energy),
    regime_state: normalizeRegimeStateShape(raw.regime_state),
    brain_pattern: normalizePatternBrainShape(raw.brain_pattern),
    brain_dragon: normalizeDragonBrainShape(raw.brain_dragon),
    road_brains: normalizeRoadBrainRows(raw.road_brains),
    arbiter: normalizeArbiterShape(raw.arbiter)
  };
  if(normalized.reasons.length === 0){
    normalized.reasons = buildNativeReasonList(normalized);
  }
  return normalized;
}


function normalizeHandRecord(hand){
  if(!hand || typeof hand !== 'object') return hand;

  hand.live_prediction = normalizeLivePredictionShape(hand.live_prediction || {});
  hand.policy_snapshot = normalizePolicySnapshotShape(hand.policy_snapshot || {});
  hand.current_eval = normalizeCurrentEvalShape(hand.current_eval || null);

  hand.audit = {
    created_at: normalizeFiniteNumber(hand.audit && hand.audit.created_at, Date.now()),
    spec_version:'v66.1',
    original_spec_version: hand.audit && typeof hand.audit.original_spec_version === 'string'
      ? hand.audit.original_spec_version
      : (hand.audit && typeof hand.audit.spec_version === 'string' ? hand.audit.spec_version : 'legacy'),
    snapshot_normalized:true
  };

  if(hand.outcome && typeof hand.outcome === 'object'){
    hand.outcome.winner = normalizeOutcomeWinner(hand.outcome.winner || hand.outcome.w);
    hand.outcome.w = hand.outcome.winner;
    hand.outcome.pPt = Math.max(0, Math.min(9, Math.floor(normalizeFiniteNumber(hand.outcome.pPt, 0))));
    hand.outcome.bPt = Math.max(0, Math.min(9, Math.floor(normalizeFiniteNumber(hand.outcome.bPt, 0))));
    hand.outcome.bp = !!hand.outcome.bp;
    hand.outcome.pp = !!hand.outcome.pp;
  }

  return hand;
}

function normalizeLabSnapshots(){
  const normalizeShoe = function(shoe){
    if(!shoe || !Array.isArray(shoe.hands)) return shoe;
    shoe.hands = shoe.hands.map(function(h){
      return normalizeHandRecord(h);
    });
    return shoe;
  };

  LabStore.rawShoes = Array.isArray(LabStore.rawShoes)
    ? LabStore.rawShoes.map(function(shoe){ return normalizeShoe(shoe); })
    : [];

  if(LabStore.currentOpenShoe){
    LabStore.currentOpenShoe = normalizeShoe(LabStore.currentOpenShoe);
  }
}

function detectHistoricalVersion(hand){
  if(!hand || typeof hand !== 'object') return 'legacy';
  const snap = hand.policy_snapshot || {};
  const audit = hand.audit || {};
  return String(
    snap.model_id_original ||
    snap.model_id ||
    audit.original_spec_version ||
    audit.spec_version ||
    'legacy'
  );
}

function makeAuditBucket(){
  return {
    hands:0, bets:0, hits:0, pushes:0, returnSum:0, coverage:0
  };
}

function cloneAuditBucket(bucket){
  return JSON.parse(JSON.stringify(bucket || makeAuditBucket()));
}

function finalizeAuditBucket(bucket){
  bucket.coverage = bucket.hands ? bucket.bets / bucket.hands : 0;
  return bucket;
}

function mergeAuditBucket(target, source){
  if(!target || !source) return target;
  ['hands','bets','hits','pushes','returnSum'].forEach(function(k){
    target[k] = Number(target[k] || 0) + Number(source[k] || 0);
  });
  return finalizeAuditBucket(target);
}

function buildNativeReasonList(pred){
  pred = pred || {};
  const decision = pred.decision || 'PASS';
  const reasons = [];
  const regimeState = pred.regime_state && pred.regime_state.name ? pred.regime_state : null;
  const regimeProbs = pred.regime_probs || {};
  const energy = pred.energy || {};
  if(decision === 'PASS'){
    if(pred.isWarmup) reasons.push('暖機保護');
    else if(regimeState && regimeState.note) reasons.push(regimeState.note);
    else reasons.push('PASS');
    return reasons;
  }
  const aligned = decision === 'B' ? Number(pred.alignedB || 0) : Number(pred.alignedP || 0);
  const energyGap = normalizeFiniteNumber(energy.energy_gap, 0);
  reasons.push('五路支持 ' + aligned + '/5');
  reasons.push('結構分差 ' + Number(pred.gap || 0).toFixed(2));

let HistoricalTransitionCache = { fingerprint:'', contexts:[] };

function computeRegimeProbabilities(path){
  const runs = path && Array.isArray(path.runs) ? path.runs.slice(-10) : [];
  if(!runs.length){
    return { scores:{ single:0, double:0, triple:0, dragon:0, hybrid:0, chaos:1 }, probs:normalizeRegimeProbabilities({ chaos:1 }), dominant:'chaos' };
  }
  const lens = runs.map(function(run){ return run.len; });
  const pureCount = lens.reduce(function(a,b){ return a + b; }, 0);
  const runCount = lens.length;
  const exact1 = lens.filter(function(len){ return len === 1; }).length / lens.length;
  const exact2 = lens.filter(function(len){ return len === 2; }).length / lens.length;
  const exact3 = lens.filter(function(len){ return len === 3; }).length / lens.length;
  const within2 = lens.filter(function(len){ return len <= 2; }).length / lens.length;
  const within3 = lens.filter(function(len){ return len <= 3; }).length / lens.length;
  const fourPlus = lens.filter(function(len){ return len >= 4; }).length / lens.length;
  const avgLen = lens.reduce(function(a,b){ return a + b; }, 0) / lens.length;
  const dominant = path && path.dominantRegime ? path.dominantRegime.mode : 'chaos';
  const prior = path && path.priorJumpRegime ? path.priorJumpRegime.mode : null;
  const regimeBreakout = path && path.breakoutFromRegime ? 1 : 0;
  const scores = {
    single: 1.20 * exact1 + 0.44 * within2 + 0.28 * (path && path.alternatingTight ? 1 : 0) - 0.96 * fourPlus + (dominant === 'single' ? 0.12 : 0) + (prior === 'single' ? 0.10 : 0),
    double: 1.08 * exact2 + 0.62 * within2 + 0.16 * exact1 - 0.78 * fourPlus + (dominant === 'double' ? 0.12 : 0) + (prior === 'double' ? 0.10 : 0),
    triple: 1.08 * exact3 + 0.60 * within3 + 0.10 * exact2 - 0.52 * fourPlus + (dominant === 'triple' ? 0.12 : 0) + (prior === 'triple' ? 0.10 : 0),
    dragon: 1.46 * fourPlus + 0.28 * Math.max(0, avgLen - 2.5) + ((path && path.trend_len >= 4) ? 0.30 : 0) + (dominant === 'dragon' ? 0.18 : 0),
    hybrid: 0.96 * Math.min(within2, fourPlus + 0.40) + 0.46 * Math.max(exact2, exact3) + 0.36 * regimeBreakout,
    chaos: 0.86 * clamp01((path && path.chop_count ? path.chop_count : 0) / 6) + 0.28 * Math.abs(exact1 - exact2) + 0.22 * Math.abs(exact2 - exact3)
  };
  if(runCount <= 2 || pureCount <= 4){
    scores.single *= 0.32;
    scores.double *= 0.34;
    scores.triple *= 0.36;
    scores.dragon *= 0.22;
    scores.hybrid *= 0.68;
    scores.chaos += 1.55;
  }else if(runCount <= 3 || pureCount <= 6){
    scores.single *= 0.56;
    scores.double *= 0.62;
    scores.triple *= 0.70;
    scores.dragon *= 0.46;
    scores.hybrid *= 0.82;
    scores.chaos += 0.78;
  }else if(pureCount <= 8){
    scores.single *= 0.76;
    scores.double *= 0.82;
    scores.triple *= 0.86;
    scores.dragon *= 0.72;
    scores.hybrid *= 0.94;
    scores.chaos += 0.30;
  }
  const probs = normalizeRegimeProbabilities(softmaxMap(scores));
  let dominantKey = 'chaos';
  let dominantVal = -1;
  Object.keys(probs).forEach(function(key){ if(probs[key] > dominantVal){ dominantVal = probs[key]; dominantKey = key; } });
  return { scores:scores, probs:probs, dominant:dominantKey };
}

function getHistoricalTransitionFingerprint(){
  const shoes = materializeAllShoes();
  let hands = 0;
  shoes.forEach(function(shoe){ hands += Array.isArray(shoe && shoe.hands) ? shoe.hands.length : 0; });
  return shoes.length + ':' + hands + ':' + (BigData && BigData.totalHands || 0);
}

function buildHistoricalTransitionContexts(){
  const fingerprint = getHistoricalTransitionFingerprint();
  if(HistoricalTransitionCache.fingerprint === fingerprint && Array.isArray(HistoricalTransitionCache.contexts)) return HistoricalTransitionCache.contexts;
  const contexts = [];
  const shoes = materializeAllShoes();
  shoes.forEach(function(shoe){
    const hands = Array.isArray(shoe && shoe.hands) ? shoe.hands : [];
    let simHist = [];
    for(let i=0;i<hands.length;i++){
      const h = hands[i];
      const winner = h && h.outcome && (h.outcome.winner || h.outcome.w) ? (h.outcome.winner || h.outcome.w) : 'T';
      const path = extractPathFeaturesCore(simHist);
      if(path && path.history_len >= 4){
        const regime = path.priorJumpRegime && path.priorJumpRegime.mode ? path.priorJumpRegime : (path.dominantRegime || { mode:'chaos', capLen:null });
        const capLen = regime && regime.capLen ? regime.capLen : 0;
        const breakoutDelta = capLen && path.trend_side && path.trend_len > capLen ? Math.min(4, path.trend_len - capLen) : 0;
        const futurePure = [];
        for(let j=i;j<hands.length;j++){
          const fw = hands[j] && hands[j].outcome && (hands[j].outcome.winner || hands[j].outcome.w) ? (hands[j].outcome.winner || hands[j].outcome.w) : 'T';
          if(fw !== 'T') futurePure.push(fw);
        }
        const nextPure = futurePure.length ? futurePure[0] : null;
        let futureContinuation = 0;
        if(path.trend_side && futurePure.length && futurePure[0] === path.trend_side){
          while(futureContinuation < futurePure.length && futurePure[futureContinuation] === path.trend_side) futureContinuation++;
        }
        const finalRunLen = path.trend_len + futureContinuation;
        contexts.push({
          regimeMode: regime && regime.mode ? regime.mode : 'chaos',
          capLen: capLen || 0,
          trendSide: path.trend_side || null,
          trendLen: path.trend_len || 0,
          breakoutDelta: breakoutDelta,
          recentBias: path.recent_shoe_bias || null,
          chop: path.chop_count || 0,
          nextPure: nextPure,
          continueSame: !!(path.trend_side && nextPure === path.trend_side),
          breakOpposite: !!(path.trend_side && nextPure && nextPure !== path.trend_side),
          fakeBreakout: !!(breakoutDelta > 0 && finalRunLen <= capLen + 1),
          trueTransition: !!(breakoutDelta > 0 && finalRunLen >= capLen + 3),
          finalRunLen: finalRunLen
        });
      }
      simHist.push({
        w:winner,
        pPt:Number(h && h.outcome && h.outcome.pPt) || 0,
        bPt:Number(h && h.outcome && h.outcome.bPt) || 0,
        bp:!!(h && h.outcome && h.outcome.bp),
        pp:!!(h && h.outcome && h.outcome.pp)
      });
    }
  });
  HistoricalTransitionCache = { fingerprint:fingerprint, contexts:contexts };
  return contexts;
}

function getHistoricalTransitionProbabilities(path, candidate){
  const regime = path && (path.priorJumpRegime && path.priorJumpRegime.mode ? path.priorJumpRegime : path.dominantRegime)
    ? (path.priorJumpRegime && path.priorJumpRegime.mode ? path.priorJumpRegime : path.dominantRegime)
    : { mode:'chaos', capLen:0 };
  const capLen = regime && regime.capLen ? regime.capLen : 0;
  const breakoutDelta = capLen && path && path.trend_side && path.trend_len > capLen ? Math.min(4, path.trend_len - capLen) : 0;
  const pathPureCount = path && path.runs ? path.runs.reduce(function(a,run){ return a + (run.len || 0); }, 0) : 0;
  const contexts = buildHistoricalTransitionContexts();
  let matched = 0;
  let totalW = 0;
  let nextBW = 0, nextPW = 0, continueW = 0, breakW = 0, fakeW = 0, trueW = 0;

  contexts.forEach(function(ctx){
    let w = 0;
    if(ctx.regimeMode === regime.mode) w += 1.18;
    if((ctx.capLen || 0) === (capLen || 0)) w += 0.64;
    if((ctx.trendSide || null) === (path.trend_side || null)) w += 0.26;
    const trendDiff = Math.abs((ctx.trendLen || 0) - (path.trend_len || 0));
    if(trendDiff <= 1) w += 0.34;
    else if(trendDiff <= 2) w += 0.14;
    const breakDiff = Math.abs((ctx.breakoutDelta || 0) - breakoutDelta);
    if(breakDiff === 0) w += 0.82;
    else if(breakDiff === 1) w += 0.20;
    if((ctx.recentBias || null) === (path.recent_shoe_bias || null)) w += 0.12;
    const chopDiff = Math.abs((ctx.chop || 0) - (path.chop_count || 0));
    if(chopDiff <= 1) w += 0.10;
    else if(chopDiff <= 2) w += 0.04;
    if(w < 1.08) return;
    matched += 1;
    totalW += w;
    if(ctx.nextPure === 'B') nextBW += w;
    if(ctx.nextPure === 'P') nextPW += w;
    if(path && path.trend_side && candidate === path.trend_side){
      if(ctx.continueSame) continueW += w;
      if(ctx.breakOpposite) breakW += w;
      if(ctx.fakeBreakout) fakeW += w;
      if(ctx.trueTransition) trueW += w;
    }else if(path && path.trend_side && candidate && candidate !== path.trend_side){
      if(ctx.breakOpposite) continueW += w;
      if(ctx.continueSame) breakW += w;
      if(ctx.fakeBreakout) continueW += w * 0.78;
      if(ctx.trueTransition) trueW += w * 0.52;
    }
  });

  const priorNextB = path && path.recent_shoe_bias === 'B' ? 0.55 : path && path.recent_shoe_bias === 'P' ? 0.45 : NAIVE_PRIORS.B;
  const priorNextP = path && path.recent_shoe_bias === 'P' ? 0.55 : path && path.recent_shoe_bias === 'B' ? 0.45 : NAIVE_PRIORS.P;
  const priorContinue = path && path.trend_side ? (
    (regime.mode === 'dragon' ? 0.56 : 0.47) +
    Math.max(0, (path.trend_len || 0) - (capLen || 1)) * 0.035
  ) : 0.50;
  const priorBreak = 1 - priorContinue;
  const priorFake = breakoutDelta > 0 && regime.mode !== 'dragon' ? 0.34 : 0.18;
  const priorTrue = breakoutDelta > 0 ? (regime.mode === 'dragon' ? 0.48 : 0.26) : 0.15;

  const priorMass = matched >= 24 ? 0.40 : matched >= 12 ? 0.90 : 1.80;
  const denom = totalW + priorMass;
  let nextB = clamp01((nextBW + priorNextB * priorMass) / Math.max(0.001, denom));
  let nextP = clamp01((nextPW + priorNextP * priorMass) / Math.max(0.001, denom));
  let continueSame = clamp01((continueW + priorContinue * priorMass) / Math.max(0.001, denom));
  let breakOpposite = clamp01((breakW + priorBreak * priorMass) / Math.max(0.001, denom));
  let fakeBreakout = clamp01((fakeW + priorFake * priorMass) / Math.max(0.001, denom));
  let trueTransition = clamp01((trueW + priorTrue * priorMass) / Math.max(0.001, denom));

  const confidence = clamp01(((matched - 4) / 20)) * (pathPureCount <= 4 ? 0.32 : pathPureCount <= 6 ? 0.48 : pathPureCount <= 10 ? 0.72 : 1);
  const nextCap = pathPureCount <= 4 ? 0.05 : pathPureCount <= 8 ? 0.08 : 0.14;
  nextB = 0.5 + Math.max(-nextCap, Math.min(nextCap, nextB - 0.5)) * (0.42 + 0.58 * confidence);
  nextP = 0.5 + Math.max(-nextCap, Math.min(nextCap, nextP - 0.5)) * (0.42 + 0.58 * confidence);
  continueSame = priorContinue + (continueSame - priorContinue) * (0.38 + 0.62 * confidence);
  breakOpposite = priorBreak + (breakOpposite - priorBreak) * (0.38 + 0.62 * confidence);
  fakeBreakout = priorFake + (fakeBreakout - priorFake) * (0.34 + 0.66 * confidence);
  trueTransition = priorTrue + (trueTransition - priorTrue) * (0.34 + 0.66 * confidence);

  const nextSideProb = candidate === 'B' ? nextB : nextP;
  const edge = nextSideProb - 0.5;
  const transitionEdge = trueTransition - fakeBreakout;
  const directionBoost = Math.max(-1.20, Math.min(1.20,
    (edge * 6.2 + transitionEdge * (candidate === (path && path.trend_side) ? 3.0 : 2.0)) * (0.42 + 0.58 * confidence) +
    (matched >= 16 ? 0.10 : matched >= 8 ? 0.04 : 0)
  ));

  return {
    sample: matched,
    confidence: confidence,
    nextB: nextB,
    nextP: nextP,
    nextSideProb: nextSideProb,
    continue_same: continueSame,
    break_to_opposite: breakOpposite,
    fake_breakout: fakeBreakout,
    true_transition: trueTransition,
    directionBoost: directionBoost
  };
}

function computeEnergyModel(path, scoreB, scoreP, alignedB, alignedP, gap, chopRisk, regimeProbs, histB, histP, runningCount, remainCards){
  const jumpProb = (regimeProbs.single || 0) + (regimeProbs.double || 0) + (regimeProbs.triple || 0);
  const capLen = path && ((path.priorJumpRegime && path.priorJumpRegime.capLen) || (path.dominantRegime && path.dominantRegime.capLen)) ? ((path.priorJumpRegime && path.priorJumpRegime.capLen) || (path.dominantRegime && path.dominantRegime.capLen)) : null;
  const tc = remainCards > 0 ? normalizeFiniteNumber(runningCount, 0) / Math.max(0.5, remainCards / 52) : 0;
  const momentum = path && path.runs && path.runs.length >= 2 ? (path.runs[path.runs.length - 1].len - path.runs[path.runs.length - 2].len) : 0;
  function sideEnergy(side, roadScore, aligned, hist, oppositeAligned){
    let regime = 0;
    if((regimeProbs.dragon || 0) >= 0.34){ regime += path.trend_side === side ? 0.95 : -0.35; }
    if(jumpProb >= 0.40 && capLen && path.trend_side){
      if(path.trend_len >= capLen && side !== path.trend_side) regime += 0.62;
      if(path.trend_len >= capLen + 1 && side === path.trend_side) regime -= 0.66;
      if(path.trend_len < capLen && side === path.trend_side) regime += 0.16;
    }
    if((regimeProbs.hybrid || 0) >= 0.22) regime += side === path.trend_side ? 0.20 : 0.10;
    const histComp = (hist.nextSideProb - 0.5) * 4.8 + (hist.true_transition - hist.fake_breakout) * 2.4 + (hist.confidence || 0) * 0.32;
    const mom = (path.trend_side === side ? momentum : -momentum) * 0.16 + (path.recent_shoe_bias === side ? 0.20 : 0);
    const cnt = side === 'B' ? (-tc * 0.05) : (tc * 0.05);
    const interference = oppositeAligned * 0.28 + chopRisk * 0.20;
    const total = roadScore * 0.92 + aligned * 0.22 + regime + histComp + mom + cnt - interference;
    return { total:total, road:roadScore * 1.02 + aligned * 0.26, regime:regime, momentum:mom, history:histComp, count:cnt, interference:-interference };
  }
  const b = sideEnergy('B', scoreB, alignedB, histB, alignedP);
  const p = sideEnergy('P', scoreP, alignedP, histP, alignedB);
  return {
    B_energy:Number(b.total.toFixed(3)),
    P_energy:Number(p.total.toFixed(3)),
    energy_gap:Number(Math.abs(b.total - p.total).toFixed(3)),
    energy_trend:Number((path.trend_side === 'B' ? b.total - p.total : p.total - b.total).toFixed(3)),
    breakdownB:{ road:Number(b.road.toFixed(3)), regime:Number(b.regime.toFixed(3)), momentum:Number(b.momentum.toFixed(3)), history:Number(b.history.toFixed(3)), count:Number(b.count.toFixed(3)), interference:Number(b.interference.toFixed(3)) },
    breakdownP:{ road:Number(p.road.toFixed(3)), regime:Number(p.regime.toFixed(3)), momentum:Number(p.momentum.toFixed(3)), history:Number(p.history.toFixed(3)), count:Number(p.count.toFixed(3)), interference:Number(p.interference.toFixed(3)) }
  };
}

function detectChaosMode(path, regimeProbs, histB, histP, energy, chopRisk){
  const recentRuns = path && Array.isArray(path.runs) ? path.runs.slice(-9) : [];
  if(!recentRuns.length){
    return { active:false, level:'none', score:0, confidence:0, note:'', subtype:'', smallShare:0, fakeMax:0, transitionFlat:false, shielded:false, blockBet:false, suggestChangeShoe:false };
  }
  const smallShare = recentRuns.filter(function(run){ return (run && run.len || 0) <= 3; }).length / recentRuns.length;
  const cappedLens = recentRuns.map(function(run){ return Math.min(4, (run && run.len) || 0); });
  const distinctCount = Array.from(new Set(cappedLens)).length;
  const topRegimes = Object.keys(regimeProbs || {}).map(function(key){ return { key:key, val:normalizeFiniteNumber(regimeProbs[key], 0) }; }).sort(function(a,b){ return b.val - a.val; });
  const top1Key = topRegimes.length ? topRegimes[0].key : 'chaos';
  const top1 = topRegimes.length ? topRegimes[0].val : 0;
  const top2 = topRegimes.length > 1 ? topRegimes[1].val : 0;
  const regimeFlat = top1 < 0.48 || (top1 - top2) < 0.09;
  const fakeMax = Math.max(normalizeFiniteNumber(histB && histB.fake_breakout, 0), normalizeFiniteNumber(histP && histP.fake_breakout, 0));
  const continueSameMax = Math.max(normalizeFiniteNumber(histB && histB.continue_same, 0), normalizeFiniteNumber(histP && histP.continue_same, 0));
  const breakOppMax = Math.max(normalizeFiniteNumber(histB && histB.break_to_opposite, 0), normalizeFiniteNumber(histP && histP.break_to_opposite, 0));
  const nextEdge = Math.abs(normalizeFiniteNumber(histB && histB.nextB, 0.5) - normalizeFiniteNumber(histP && histP.nextP, 0.5));
  const transitionFlat = nextEdge <= 0.07;
  const energyGap = normalizeFiniteNumber(energy && energy.energy_gap, 0);
  const energyTrend = Math.abs(normalizeFiniteNumber(energy && energy.energy_trend, 0));
  const energyReversalRisk = energyGap >= 1.8 && energyTrend <= energyGap * 0.58;
  const mixedRuns = distinctCount >= 3;
  const niceContinuationShield = (
    ['single','double','triple'].indexOf(top1Key) !== -1 &&
    top1 >= 0.56 &&
    (path && (path.trend_len || 0) <= 2) &&
    fakeMax < 0.20 &&
    nextEdge >= 0.11 &&
    continueSameMax >= breakOppMax &&
    energyGap >= 1.9
  );
  const dragonShield = (
    top1Key === 'dragon' && top1 >= 0.42 && (path && (path.trend_len || 0) >= 4) && nextEdge >= 0.09 && fakeMax < 0.20
  );
  let score = 0;
  if(chopRisk >= 2) score += 0.96;
  if(smallShare >= 0.78) score += 0.52;
  if(mixedRuns) score += 0.34;
  if(regimeFlat) score += 0.44;
  if(fakeMax >= 0.26) score += 0.50;
  if(transitionFlat) score += 0.30;
  if(energyReversalRisk) score += 0.34;
  if((path && path.trend_len || 0) <= 3) score += 0.12;
  if(breakOppMax >= continueSameMax + 0.04) score += 0.22;

  let subtype = '';
  if(fakeMax >= 0.28 && breakOppMax >= continueSameMax + 0.03 && transitionFlat) subtype = 'fake_breakout_fade';
  else if(breakOppMax >= continueSameMax + 0.02 && nextEdge >= 0.08 && energyGap >= 2.4) subtype = 'true_reversal';
  else if((path && (path.trend_len || 0) >= 3) && energyReversalRisk) subtype = 'fatigue_fade';

  const shielded = !!(niceContinuationShield || dragonShield);
  const baseConfidence = clamp01((score - 1.35) / 1.45) * (shielded ? 0.42 : 1);
  let level = 'none';
  if(!shielded && subtype){
    if(score >= 2.55 || (score >= 2.28 && chopRisk >= 2 && fakeMax >= 0.26)) level = 'severe';
    else if(score >= 1.96) level = 'confirmed';
    else if(score >= 1.42) level = 'candidate';
  }

  const noteMap = {
    candidate:{
      fake_breakout_fade:'亂流候選：疑似假突破回補',
      true_reversal:'亂流候選：疑似真反轉形成',
      fatigue_fade:'亂流候選：尾段疲勞' 
    },
    confirmed:{
      fake_breakout_fade:'目前亂流中，不建議下注（假突破回補）',
      true_reversal:'目前亂流中，不建議下注（真反轉確認前）',
      fatigue_fade:'目前亂流中，不建議下注（尾段疲勞）'
    },
    severe:{
      fake_breakout_fade:'嚴重亂流中，不建議下注，建議換靴',
      true_reversal:'嚴重亂流中，不建議下注，建議換靴',
      fatigue_fade:'嚴重亂流中，不建議下注，建議換靴'
    }
  };

  return {
    active: level !== 'none',
    level: level,
    score: Number(score.toFixed(3)),
    confidence: Number(baseConfidence.toFixed(3)),
    note: level === 'none' ? '' : noteMap[level][subtype],
    subtype: level === 'none' ? '' : subtype,
    smallShare: Number(smallShare.toFixed(3)),
    fakeMax: Number(fakeMax.toFixed(3)),
    transitionFlat: transitionFlat,
    shielded: shielded,
    blockBet: level === 'confirmed' || level === 'severe',
    suggestChangeShoe: level === 'severe'
  };
}

function deriveRegimeState(path, regimeProbs, dragonTransition, dragonBreakCooldown, chaosMode){

      name:map[dragonTransition.state] || 'stable',
      dominant:dominant,
      breakout_delta:Math.max(0, dragonTransition.delta || 0),
      confidence:clamp01((dragonTransition.score || 0) / 8),
      note:dragonTransition.text || '',
      cooldown_active:false,
      block_bet: dragonTransition.state === 'candidate' || dragonTransition.state === 'observe' || dragonTransition.state === 'fatigue'
    };
  }
  return { name:'stable', dominant:dominant, breakout_delta:0, confidence:clamp01(regimeProbs[dominant] || 0), note:dominant === 'dragon' ? '龍型主體穩定' : dominant === 'chaos' ? '混沌主體，嚴控追價' : '跳型主體穩定', cooldown_active:false };
}

function makeCurrentEvalSnapshot(pred, outcome){
  pred = ensureDecisionReasons(pred || {});
  const winner = outcome && outcome.winner ? outcome.winner : 'T';
  return {
    model_id:'dual_brain_v66_1',
    replay_schema_version:'v66.1',
    decision: pred.decision,
    tier: pred.tier,
    tau: pred.tau,
    effectiveTau: Math.max(0, pred.effectiveTau),
    isWarmup: !!pred.isWarmup,
    warmupSoft: !!pred.warmupSoft,
    dataThin: !!pred.dataThin,
    alignedB: pred.alignedB || 0,
    alignedP: pred.alignedP || 0,
    gap: pred.gap || 0,
    overheat: pred.overheat || 0,
    chopRisk: pred.chopRisk || 0,
    reasons: pred.reasons.slice(),
    settled_return: pred.decision !== 'PASS' ? settleDecision(pred.decision, winner) : 0,
    hit_main: winner !== 'T' && pred.decision === winner,
    push_main: winner === 'T' && pred.decision !== 'PASS',
    regime_probs: normalizeRegimeProbabilities(pred.regime_probs),
    transition_probs: normalizeTransitionProbabilities(pred.transition_probs),
    energy: normalizeEnergyShape(pred.energy),
    regime_state: normalizeRegimeStateShape(pred.regime_state),
    brain_pattern: normalizePatternBrainShape(pred.brain_pattern),
    brain_dragon: normalizeDragonBrainShape(pred.brain_dragon),
    road_brains: normalizeRoadBrainRows(pred.road_brains),
    arbiter: normalizeArbiterShape(pred.arbiter)
  };
}


function getChronologicalShoeRefs(){
  const refs = [];
  if(Array.isArray(LabStore.rawShoes)){
    LabStore.rawShoes.forEach(function(shoe, idx){
      refs.push({ key:'raw_' + idx, shoe:shoe, started_at:Number(shoe && shoe.started_at) || 0 });
    });
  }
  if(LabStore.currentOpenShoe && Array.isArray(LabStore.currentOpenShoe.hands) && LabStore.currentOpenShoe.hands.length){
    refs.push({ key:'open_current', shoe:LabStore.currentOpenShoe, started_at:Number(LabStore.currentOpenShoe.started_at) || Date.now() });
  }
  refs.sort(function(a,b){ return a.started_at - b.started_at; });
  return refs;
}

function applyCurrentModelReplayToLabStore(){
  const refs = getChronologicalShoeRefs();
  const priorShoes = [];

  for(let i=0;i<refs.length;i++){
    const ref = refs[i];
    const db = rebuildBigDataFromAllShoes(priorShoes);

    let simDeck = {};
    for(let r=1;r<=13;r++) simDeck[r] = 32;
    let simRC = 0;
    let simHist = [];

    const hands = Array.isArray(ref.shoe && ref.shoe.hands) ? ref.shoe.hands : [];
    for(let j=0;j<hands.length;j++){
      const h = hands[j];
      const remainCards = Object.values(simDeck).reduce(function(a,b){ return a + b; }, 0);
      const features = {
        F_Comp:{ running_count:simRC, remain_cards:remainCards },
        F_Path:extractPathFeaturesCore(simHist),
        __history:simHist.slice()
      };

      const pred = ensureDecisionReasons(executePolicyChain(features, db, Config.tau));
      const winner = h && h.outcome && (h.outcome.winner || h.outcome.w) ? (h.outcome.winner || h.outcome.w) : 'T';
      const outcome = {
        winner: winner,
        bp: !!(h && h.outcome && h.outcome.bp),
        pp: !!(h && h.outcome && h.outcome.pp)
      };

      h.current_eval = makeCurrentEvalSnapshot(pred, outcome);

      const pure = simHist.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
      const key = pure.length >= 3 ? pure.slice(-3).join(',') : null;
      if(key){
        updatePatternDB(db, key, winner, outcome.bp, outcome.pp);
      }

      ['p1','p2','p3','b1','b2','b3'].forEach(function(slot){
        const rank = h && h.input && h.input.cards ? h.input.cards[slot] : null;
        if(rank !== null && rank !== undefined && countWeights.hasOwnProperty(rank)){
          simDeck[rank] -= 1;
          simRC += countWeights[rank];
        }
      });

      simHist.push({
        w:winner,
        pPt:Number(h && h.outcome && h.outcome.pPt) || 0,
        bPt:Number(h && h.outcome && h.outcome.bPt) || 0,
        bp:outcome.bp,
        pp:outcome.pp
      });
    }

    priorShoes.push(JSON.parse(JSON.stringify(ref.shoe)));
  }
}

function buildUnifiedReplayAudit(shoes){
  const ordered = (Array.isArray(shoes) ? shoes.slice() : []).sort(function(a,b){
    return Number(a && a.started_at || 0) - Number(b && b.started_at || 0);
  });

  const summary = {
    generated_at:new Date().toISOString(),
    replayModelId:'dual_brain_v66_1',
    replay:makeAuditBucket(),
    original:makeAuditBucket(),
    byVersion:{},
    byShoe:{},
    byReason:{},
    recentShoes:{ labels:[], original:makeAuditBucket(), replay:makeAuditBucket() }
  };

  const ensureVersionBucket = function(ver){
    if(!summary.byVersion[ver]){
      summary.byVersion[ver] = { version:ver, original:makeAuditBucket(), replay:makeAuditBucket() };
    }
    return summary.byVersion[ver];
  };

  const ensureShoeBucket = function(shoe, idx){
    const shoeId = shoe && shoe.shoe_id ? String(shoe.shoe_id) : ('shoe_' + idx);
    if(!summary.byShoe[shoeId]){
      summary.byShoe[shoeId] = {
        shoe_id:shoeId,
        label:(shoe && shoe.meta && shoe.meta.source ? shoe.meta.source + '｜' : '') + shoeId,
        started_at:Number(shoe && shoe.started_at) || 0,
        original:makeAuditBucket(),
        replay:makeAuditBucket()
      };
    }
    return summary.byShoe[shoeId];
  };

  const ensureReasonBucket = function(reason){
    if(!summary.byReason[reason]) summary.byReason[reason] = { reason:reason, bets:0, hits:0, pushes:0, returnSum:0 };
    return summary.byReason[reason];
  };

  for(let i=0;i<ordered.length;i++){
    const shoe = ordered[i];
    const shoeBucket = ensureShoeBucket(shoe, i);
    const hands = Array.isArray(shoe && shoe.hands) ? shoe.hands : [];
    for(let j=0;j<hands.length;j++){
      const h = hands[j];
      const winner = h && h.outcome && (h.outcome.winner || h.outcome.w) ? (h.outcome.winner || h.outcome.w) : 'T';
      const outcome = { winner:winner, bp:!!(h && h.outcome && h.outcome.bp), pp:!!(h && h.outcome && h.outcome.pp) };
      const historicalVersion = detectHistoricalVersion(h);
      const versionBucket = ensureVersionBucket(historicalVersion);

      const snap = h && h.policy_snapshot ? h.policy_snapshot : {};
      recordDecisionToBucket(summary.original, snap.main_decision, winner);
      recordDecisionToBucket(versionBucket.original, snap.main_decision, winner);
      recordDecisionToBucket(shoeBucket.original, snap.main_decision, winner);

      const replay = normalizeCurrentEvalShape(h && h.current_eval ? h.current_eval : null) || makeCurrentEvalSnapshot({
        decision:'PASS', tier:'PASS', tau:Config.tau, effectiveTau:Config.tau, isWarmup:false, warmupSoft:false, dataThin:true,
        alignedB:0, alignedP:0, gap:0, overheat:0, chopRisk:0, reasons:['PASS']
      }, outcome);

      recordDecisionToBucket(summary.replay, replay.decision, winner);
      recordDecisionToBucket(versionBucket.replay, replay.decision, winner);
      recordDecisionToBucket(shoeBucket.replay, replay.decision, winner);

      if(replay.decision !== 'PASS'){
        const primaryReason = replay.reasons && replay.reasons.length ? replay.reasons[0] : '未標註理由';
        const reasonBucket = ensureReasonBucket(primaryReason);
        reasonBucket.bets += 1;
        if(winner === 'T') reasonBucket.pushes += 1;
        else if(replay.decision === winner) reasonBucket.hits += 1;
        reasonBucket.returnSum += settleDecision(replay.decision, winner);
      }
    }
  }

  finalizeAuditBucket(summary.original);
  finalizeAuditBucket(summary.replay);
  Object.keys(summary.byVersion).forEach(function(k){ finalizeAuditBucket(summary.byVersion[k].original); finalizeAuditBucket(summary.byVersion[k].replay); });
  Object.keys(summary.byShoe).forEach(function(k){ finalizeAuditBucket(summary.byShoe[k].original); finalizeAuditBucket(summary.byShoe[k].replay); });

  const recentRows = Object.values(summary.byShoe).sort(function(a,b){ return Number(a.started_at || 0) - Number(b.started_at || 0); }).slice(-2);
  summary.recentShoes.labels = recentRows.map(function(row){ return row.label; });
  recentRows.forEach(function(row){
    mergeAuditBucket(summary.recentShoes.original, row.original);
    mergeAuditBucket(summary.recentShoes.replay, row.replay);
  });
  finalizeAuditBucket(summary.recentShoes.original);
  finalizeAuditBucket(summary.recentShoes.replay);

  return summary;
}

function refreshUnifiedAudit(){
  applyCurrentModelReplayToLabStore();
  UnifiedAudit = buildUnifiedReplayAudit(materializeAllShoes());
}


function calcEffectiveTau(baseTau, aligned, gap, dataThin, warmupSoft){
  let eff = Number.isFinite(Number(baseTau)) ? Number(baseTau) : Config.tau;
  if(dataThin) eff = Math.min(eff, 0.0028);
  if(aligned >= 3 && gap >= 2.2) eff = Math.min(eff, 0.0020);
  if(aligned >= 4 && gap >= 2.8) eff = Math.min(eff, 0.0012);
  if(aligned >= 5 && gap >= 4.0) eff = Math.min(eff, 0.0002);
  if(warmupSoft) eff = Math.min(eff, 0.0008);
  return Math.max(0, Math.min(1, eff));
}

function createInitialState(){
  const s = {
    shoeId: Date.now(),
    deck:{},
    history:[],
    runningCount:0,
    shoePerf:{recs:0,hits:0,pushes:0,returnSum:0},
    lastRecSide:null,
    isLegacyPartial:false
  };
  for(let i=1;i<=13;i++) s.deck[i] = 32;
  return s;
}

function normalizeConfig(cfg){
  const tau = Number.isFinite(Number(cfg && (cfg.tau ?? cfg.m))) ? Number(cfg.tau ?? cfg.m) : 0.005;
  const nBins = Number.isFinite(Number(cfg && cfg.nBins)) ? Math.max(5, Math.min(20, Math.floor(Number(cfg.nBins)))) : 10;
  return {
    tau: Math.max(0, Math.min(1, tau)),
    nBins
  };
}

function isValidDeck(deck){
  if(!deck || typeof deck !== 'object') return false;
  for(let i=1;i<=13;i++){
    if(typeof deck[i] !== 'number' || !Number.isFinite(deck[i]) || deck[i] < 0 || deck[i] > 32) return false;
  }
  return true;
}

function derivePhysicalRunningCount(deck){
  let rc = 0;
  for(let i=1;i<=13;i++) rc += (32 - deck[i]) * (countWeights[i] || 0);
  return rc;
}

function normalizeState(obj){
  if(!obj || typeof obj !== 'object') return null;
  if(!isValidDeck(obj.deck)) return null;

  const s = createInitialState();
  s.shoeId = obj.shoeId || Date.now();

  let deckSum = 0;
  for(let i=1;i<=13;i++){
    s.deck[i] = Math.max(0, Math.min(32, Math.floor(Number(obj.deck[i]))));
    deckSum += s.deck[i];
  }

  if(Array.isArray(obj.history)){
    s.history = obj.history.map(function(x){
      if(typeof x === 'string') return { w:x, bp:false, pp:false, pPt:0, bPt:0 };
      return {
        w: x.w === 'B' || x.w === 'P' || x.w === 'T' ? x.w : 'T',
        bp: !!x.bp,
        pp: !!x.pp,
        pPt: Number.isFinite(Number(x.pPt)) ? Math.max(0, Math.min(9, Math.floor(Number(x.pPt)))) : 0,
        bPt: Number.isFinite(Number(x.bPt)) ? Math.max(0, Math.min(9, Math.floor(Number(x.bPt)))) : 0
      };
    });
  }

  const usedCards = 416 - deckSum;
  if(usedCards < s.history.length * 4 || usedCards > s.history.length * 6) return null;

  s.runningCount = derivePhysicalRunningCount(s.deck);
  s.shoePerf = obj.shoePerf && typeof obj.shoePerf === 'object' ? {
    recs:Number(obj.shoePerf.recs)||0,
    hits:Number(obj.shoePerf.hits)||0,
    pushes:Number(obj.shoePerf.pushes)||0,
    returnSum:Number(obj.shoePerf.returnSum)||0
  } : s.shoePerf;

  s.lastRecSide = obj.lastRecSide === 'B' || obj.lastRecSide === 'P' || obj.lastRecSide === 'PASS' ? obj.lastRecSide : null;
  s.isLegacyPartial = !!obj.isLegacyPartial;
  return s;
}

function canonicalPattern(key, raw){
  if(!/^(B|P)(,(B|P)){2}$/.test(String(key||''))) return null;
  if(!raw || typeof raw !== 'object') return null;
  const B = Math.max(0, Math.floor(Number(raw.B) || 0));
  const P = Math.max(0, Math.floor(Number(raw.P) || 0));
  const T = Math.max(0, Math.floor(Number(raw.T) || 0));
  const N = B + P + T;
  if(N <= 0 || N > PATTERN_CAP) return null;
  return { B,P,T,N };
}

function updatePatternDB(dbWrapper, key, w, cap){
  cap = cap || PATTERN_CAP;
  if(!key || dbWrapper.patternSamples >= cap) return;
  let cp = dbWrapper.patterns[key] || { B:0,P:0,T:0,N:0 };
  if(w === 'B') cp.B += 1;
  else if(w === 'P') cp.P += 1;
  else cp.T += 1;
  cp.N += 1;
  dbWrapper.patterns[key] = cp;
  dbWrapper.patternSamples += 1;
}

function recalcDBStats(db, shoes){
  db.acc = {recs:0,hits:0,pushes:0,returnSum:0};
  let totalHands = 0;
  let patternSamples = 0;
  const cleaned = {};
  const keys = Object.keys(db.patterns || {});
  for(let i=0;i<keys.length;i++){
    const key = keys[i];
    const cp = canonicalPattern(key, db.patterns[key]);
    if(!cp) continue;
    cleaned[key] = cp;
    patternSamples += cp.N;
  }
  db.patterns = cleaned;
  db.patternSamples = patternSamples;

  const rows = Array.isArray(shoes) ? shoes : [];
  rows.forEach(function(shoe){
    const hands = Array.isArray(shoe && shoe.hands) ? shoe.hands : [];
    totalHands += hands.length;
    hands.forEach(function(h){
      const winner = h && h.outcome && (h.outcome.winner || h.outcome.w) ? (h.outcome.winner || h.outcome.w) : 'T';
      const replay = normalizeCurrentEvalShape(h && h.current_eval ? h.current_eval : null);
      const live = !replay ? normalizeLivePredictionShape(h && h.live_prediction ? h.live_prediction : null) : null;
      const decision = replay ? replay.decision : (live ? live.decision : (h && h.policy_snapshot ? normalizeDecision(h.policy_snapshot.main_decision) : 'PASS'));
      if(decision !== 'PASS'){
        db.acc.recs += 1;
        db.acc.returnSum += settleDecision(decision, winner);
        if(winner === 'T') db.acc.pushes += 1;
        else if(decision === winner) db.acc.hits += 1;
      }
    });
  });

  db.totalHands = totalHands;
}

function getPatternKeyBeforePush(){
  const pure = S.history.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
  return pure.length >= 3 ? pure.slice(-3).join(',') : null;
}

function replayShoeIntoDB(shoe, db){

    if(key){
      updatePatternDB(db, key, winner, !!(h.outcome && h.outcome.bp), !!(h.outcome && h.outcome.pp));
    }
    simHist.push({
      w:winner,
      pPt:Number(h.outcome && h.outcome.pPt) || 0,
      bPt:Number(h.outcome && h.outcome.bPt) || 0,
      bp:!!(h.outcome && h.outcome.bp),
      pp:!!(h.outcome && h.outcome.pp)
    });
  }
}

function rebuildBigDataFromAllShoes(rawShoes){

  for(let i=0;i<shoes.length;i++) replayShoeIntoDB(shoes[i], db);

function baccaratValue(rank){
  return rank >= 10 ? 0 : rank;
}

function validateOpenShoeConsistency(labStore, state){
  if(!labStore.currentOpenShoe){
    return state.history.length === 0 && state.runningCount === derivePhysicalRunningCount(state.deck);
  }

  const shoe = labStore.currentOpenShoe;
  if(!shoe || shoe.status !== 'open' || !Array.isArray(shoe.hands)) return false;
  if(shoe.hands.length !== state.history.length) return false;

  let deck = {};
  for(let i=1;i<=13;i++) deck[i] = 32;
  let rc = 0;
  let replayHist = [];
  const slots = ['p1','p2','p3','b1','b2','b3'];

  for(let i=0;i<shoe.hands.length;i++){
    const h = shoe.hands[i];
    if(!h || !h.input || !h.input.cards || !h.outcome) return false;
    if(!h.pre_state || !isValidDeck(h.pre_state.remaining_deck)) return false;
    if(h.pre_state.history_len !== i) return false;
    if(h.pre_state.running_count !== rc) return false;

    for(let r=1;r<=13;r++){
      if(h.pre_state.remaining_deck[r] !== deck[r]) return false;
    }

    let pPts = 0, bPts = 0;
    for(let j=0;j<slots.length;j++){
      const key = slots[j];
      const rank = h.input.cards[key];
      if(rank !== null && rank !== undefined){
        if(!countWeights.hasOwnProperty(rank)) return false;
        if(deck[rank] <= 0) return false;
        deck[rank] -= 1;
        rc += countWeights[rank];
        if(key[0] === 'p') pPts += baccaratValue(rank);
        else bPts += baccaratValue(rank);
      }
    }

    const pFinal = pPts % 10;
    const bFinal = bPts % 10;
    const winner = pFinal > bFinal ? 'P' : bFinal > pFinal ? 'B' : 'T';
    const bp = h.input.cards.b1 != null && h.input.cards.b2 != null && h.input.cards.b1 === h.input.cards.b2;
    const pp = h.input.cards.p1 != null && h.input.cards.p2 != null && h.input.cards.p1 === h.input.cards.p2;

    if((h.outcome.winner || h.outcome.w) !== winner) return false;
    if(Number(h.outcome.pPt) !== pFinal || Number(h.outcome.bPt) !== bFinal) return false;
    if(!!h.outcome.bp !== bp || !!h.outcome.pp !== pp) return false;

    replayHist.push({ w:winner, pPt:pFinal, bPt:bFinal, bp, pp });
  }

  for(let r=1;r<=13;r++){
    if(deck[r] !== state.deck[r]) return false;
  }
  if(rc !== state.runningCount) return false;
  if(replayHist.length !== state.history.length) return false;

  for(let i=0;i<replayHist.length;i++){
    const a = replayHist[i], b = state.history[i];
    if(!b) return false;
    if(a.w !== b.w || a.pPt !== b.pPt || a.bPt !== b.bPt || !!a.bp !== !!b.bp || !!a.pp !== !!b.pp) return false;
  }

  return true;
}

function rebuildLiveStateMetrics(){
  S.shoePerf = {recs:0,hits:0,pushes:0,returnSum:0};
  S.lastRecSide = null;
  S.isLegacyPartial = false;

  if(!LabStore.currentOpenShoe || !Array.isArray(LabStore.currentOpenShoe.hands)) return;

  for(let i=0;i<S.history.length;i++){
    const hOutcome = S.history[i];
    const hand = LabStore.currentOpenShoe.hands[i];
    if(hand){
      const evalSnap = normalizeCurrentEvalShape(hand.current_eval || null) || normalizeLivePredictionShape(hand.live_prediction || null);
      const decision = evalSnap ? evalSnap.decision : (hand.policy_snapshot ? normalizeDecision(hand.policy_snapshot.main_decision) : 'PASS');
      if(decision !== 'PASS'){
        S.shoePerf.recs += 1;
        S.shoePerf.returnSum += settleDecision(decision, hOutcome.w);
        if(hOutcome.w === 'T') S.shoePerf.pushes += 1;
        else if(decision === hOutcome.w) S.shoePerf.hits += 1;
      }
      if(i === S.history.length - 1){
        S.lastRecSide = decision;
      }
    }else{
      S.isLegacyPartial = true;
    }
  }
}

function buildBigRoadMeta(history){
  const grid = {};
  const cols = [];
  let last = null, startCol = 0, c = 0, r = 0, lastCoord = null, maxCol = 0;

  for(let i=0;i<history.length;i++){
    const d = history[i];
    if(d.w === 'T'){
      if(lastCoord && grid[lastCoord]) grid[lastCoord].ties = (grid[lastCoord].ties || 0) + 1;
      continue;
    }

    if(last === null || d.w !== last){
      if(last !== null){
        startCol += 1;
        while(grid[startCol + ',0'] !== undefined) startCol += 1;
      }
      c = startCol;
      r = 0;
    }else{
      const nr = r + 1;
      if(nr <= 5 && grid[c + ',' + nr] === undefined){
        r = nr;
      }else{
        c += 1;
        while(grid[c + ',' + r] !== undefined) c += 1;
      }
    }

    const key = c + ',' + r;
    grid[key] = { v:d.w, bp:d.bp, pp:d.pp, ties:0, c, r };
    if(!cols[c]) cols[c] = [];
    cols[c][r] = grid[key];
    last = d.w;
    lastCoord = key;
    maxCol = Math.max(maxCol, c);
  }

  return { grid, cols, maxCol };
}

function getDerivedRoads(meta){
  const nodes = Object.values(meta.grid).sort(function(a,b){ return a.c - b.c || a.r - b.r; });
  const seq1 = [], seq2 = [], seq3 = [];

  const colH = function(c){
    let h = 0;
    while(meta.grid[c + ',' + h] !== undefined) h++;
    return h;
  };

  for(let i=0;i<nodes.length;i++){
    const node = nodes[i];
    const c = node.c, r = node.r;

    const calc = function(off, seq){
      if(r === 0){
        if(c >= off + 1){
          seq.push(colH(c - 1) === colH(c - off - 1) ? 'R' : 'Blue');
        }
      }else{
        if(c >= off){
          const a = !!meta.grid[(c - off) + ',' + r];
          const b = !!meta.grid[(c - off) + ',' + (r - 1)];
          seq.push(a === b ? 'R' : 'Blue');
        }
      }
    };

    calc(1, seq1);
    calc(2, seq2);
    calc(3, seq3);
  }

  return { eye:seq1, small:seq2, roach:seq3 };
}

function drawDerivedGrid(domId, arr, type){
  const el = document.getElementById(domId);
  el.innerHTML = '';

  const grid = {};
  let last = null, startCol = 0, c = 0, r = 0, maxCol = 0;

  for(let i=0;i<arr.length;i++){
    const res = arr[i];
    if(last === null || res !== last){
      if(last !== null){
        startCol += 1;
        while(grid[startCol + ',0'] !== undefined) startCol += 1;
      }
      c = startCol;
      r = 0;
    }else{
      const nr = r + 1;
      if(nr <= 5 && grid[c + ',' + nr] === undefined){
        r = nr;
      }else{
        c += 1;
        while(grid[c + ',' + r] !== undefined) c += 1;
      }
    }
    grid[c + ',' + r] = res;
    last = res;
    maxCol = Math.max(maxCol, c);
  }

  for(let i=0;i<Math.max(24, maxCol + 1); i++){
    const col = document.createElement('div');
    col.className = 'road-col';
    for(let j=0;j<6;j++){
      const cell = document.createElement('div');
      cell.className = 'cell-sm';
      const val = grid[i + ',' + j];
      if(val){
        const item = document.createElement('div');
        if(type === 'eye') item.className = 'circle-hollow ' + val;
        else if(type === 'small') item.className = 'circle-solid ' + val;
        else item.className = 'slash ' + val;
        cell.appendChild(item);
      }
      col.appendChild(cell);
    }
    el.appendChild(col);
  }
}
