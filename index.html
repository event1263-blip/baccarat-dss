<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>百家樂量化終端 - v64.3 Panel Fix</title>
  <style>
    :root{
      --bg:#09090b; --card:#18181b; --card2:#111114; --border:#27272a;
      --text:#f4f4f5; --muted:#a1a1aa;
      --b:#ef4444; --p:#3b82f6; --t:#22c55e;
      --hl:#eab308; --warn:#f97316; --ok:#16a34a; --lab:#0ea5e9;
      --soft:#3f3f46;
      --app-vh:100vh;
      --hud-h:132px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;height:100%;
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
      overflow:hidden;
    }
    body{overflow:hidden}
    body.panel-open{overflow:hidden}
    button,input,select{font:inherit}

    .sticky-hud{
      position:sticky; top:0; z-index:1200;
      background:rgba(12,12,16,.94);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:calc(env(safe-area-inset-top) + 8px) 10px 10px;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }
    body.panel-open .sticky-hud{
      z-index:1 !important;
      pointer-events:none;
    }

    .hud-header{
      display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px;
    }
    .hud-stats{
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      font-size:12px; font-weight:800; color:var(--muted)
    }
    .version-badge{
      background:var(--hl); color:#000; font-weight:900; font-size:10px;
      padding:2px 6px; border-radius:5px;
    }
    .hud-stats .val{color:var(--text); margin-left:3px; font-variant-numeric:tabular-nums}
    .hud-actions{display:flex; gap:6px}
    .hud-btn{
      background:#27272a; color:#fff; border:1px solid #3f3f46; border-radius:8px;
      padding:6px 10px; font-size:12px; font-weight:800; cursor:pointer;
      touch-action:manipulation;
    }
    .hud-btn:active{transform:scale(.97)}
    .btn-undo{color:var(--warn)}
    .btn-reset{color:var(--b)}

    .oracle-box{
      text-align:center; padding:10px 8px; border-radius:14px;
      border:2px solid var(--border); background:#000; transition:.25s;
    }
    .oracle-box.banker{border-color:var(--b); background:linear-gradient(180deg, rgba(239,68,68,.16) 0%, #000 100%)}
    .oracle-box.player{border-color:var(--p); background:linear-gradient(180deg, rgba(59,130,246,.16) 0%, #000 100%)}
    .oracle-box.pass{border-color:#3f3f46}
    .oracle-box.locked{
      border-color:var(--hl);
      background:repeating-linear-gradient(45deg, rgba(234,179,8,.05), rgba(234,179,8,.05) 10px, #000 10px, #000 20px)
    }
    .oracle-box.degraded{
      border-color:var(--warn);
      background:repeating-linear-gradient(45deg, rgba(249,115,22,.05), rgba(249,115,22,.05) 10px, #000 10px, #000 20px)
    }
    .trend-alert{
      font-size:12px; font-weight:900; margin-bottom:5px; padding:4px 8px; border-radius:7px;
      text-align:center; letter-spacing:.2px;
    }
    .alert-high{color:#fff; background:rgba(249,115,22,.28); border:1px solid rgba(249,115,22,.7)}
    .alert-info{color:#c7e0ff; background:rgba(59,130,246,.16); border:1px solid rgba(59,130,246,.35)}
    .alert-safe{color:var(--muted); background:rgba(255,255,255,.05)}
    .alert-warn{color:var(--warn); background:rgba(249,115,22,.12); border:1px dashed rgba(249,115,22,.65)}
    .oracle-main{
      font-size:26px; font-weight:950; letter-spacing:.5px; margin-bottom:5px;
    }
    .oracle-box.banker .oracle-main{color:var(--b); text-shadow:0 0 12px rgba(239,68,68,.45)}
    .oracle-box.player .oracle-main{color:var(--p); text-shadow:0 0 12px rgba(59,130,246,.45)}
    .oracle-box.locked .oracle-main{color:var(--hl)}
    .oracle-box.degraded .oracle-main{color:var(--warn); font-size:22px}
    .reason-badge{
      display:inline-flex; flex-wrap:wrap; gap:6px; align-items:center;
      font-size:10px; font-weight:800; color:var(--text);
      padding:5px 9px; border-radius:9px; background:rgba(255,255,255,.08)
    }

    .sidebet-container{
      display:flex; justify-content:center; gap:6px; flex-wrap:wrap;
      border-top:1px dashed #333; padding-top:8px; margin-top:8px;
    }
    .sidebet-pill{
      font-size:10px; font-weight:850; padding:4px 8px; border-radius:7px;
      background:rgba(255,255,255,.05); color:var(--muted); border:1px solid transparent;
      font-variant-numeric:tabular-nums;
    }
    .sidebet-pill.active{background:rgba(34,197,94,.15); color:var(--t); border-color:var(--t)}
    .sidebet-pill.active-pair{background:rgba(234,179,8,.15); color:var(--hl); border-color:var(--hl)}

    .scroll-container{
      height:calc(var(--app-vh) - var(--hud-h));
      padding:10px;
      display:grid;
      grid-template-columns:minmax(0, 1.12fr) minmax(330px, .88fr);
      gap:10px;
      overflow:hidden;
      align-items:stretch;
    }
    .scroll-container > *{min-width:0; min-height:0}

    .roads-card,.input-card{
      background:linear-gradient(180deg, #15151a 0%, #101015 100%);
      border:1px solid var(--border); border-radius:16px; padding:10px;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      margin-bottom:0;
      min-height:0;
      height:100%;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .road-title{
      font-size:11px; font-weight:900; color:var(--muted); margin:4px 2px 6px; text-transform:uppercase;
      line-height:1.2;
    }
    .road-container{
      width:100%; overflow-x:auto; overflow-y:hidden;
      background:#fff; padding:3px; border-radius:8px;
      border:1px solid #e5e5ea; margin-bottom:6px;
      flex:0 0 auto;
    }
    .road-grid{display:flex; width:max-content}
    .road-col{display:flex; flex-direction:column}
    .cell-lg,.cell-sm{
      position:relative; flex-shrink:0; display:flex; align-items:center; justify-content:center;
      background:#fff; border:.5px solid #eee;
    }
    .cell-lg{width:14px;height:14px}
    .cell-sm{width:7px;height:7px}
    .bead-dot{width:10px;height:10px;border-radius:50%}
    .circle-hollow{width:10px;height:10px;border-radius:50%;border:2px solid transparent;background:transparent}
    .circle-solid{width:4px;height:4px;border-radius:50%}
    .slash{width:5px;height:5px}
    .B,.R{background-color:var(--b);border-color:var(--b)}
    .P,.Blue{background-color:var(--p);border-color:var(--p)}
    .T{background-color:var(--t);border-color:var(--t)}
    .has-bp::before{
      content:''; position:absolute; top:0; left:0; width:3px; height:3px; background:var(--b);
      border-radius:50%; border:1px solid #fff; z-index:2;
    }
    .has-pp::after{
      content:''; position:absolute; bottom:0; right:0; width:3px; height:3px; background:var(--p);
      border-radius:50%; border:1px solid #fff; z-index:2;
    }
    .tie-line{
      position:absolute; width:100%; height:2px; background:var(--t); transform:rotate(-45deg); z-index:1;
    }
    .tie-text{
      position:absolute; font-size:8px; font-weight:900; color:var(--t); z-index:3;
      text-shadow:0 0 2px #fff, 0 0 2px #fff;
    }
    .slash.R{background:linear-gradient(to bottom left, transparent 40%, var(--b) 40%, var(--b) 60%, transparent 60%)}
    .slash.Blue{background:linear-gradient(to bottom left, transparent 40%, var(--p) 40%, var(--p) 60%, transparent 60%)}
    .derived-roads{display:flex; gap:4px}
    .derived-col{flex:1; min-width:0}

    .road-explain-grid{
      display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:6px; margin-top:6px;
      flex:0 0 auto;
    }
    .road-pill-card{
      background:#0d0d11; border:1px solid #2b2b33; border-radius:11px; padding:7px 5px; min-height:56px;
      display:flex; flex-direction:column; gap:4px; justify-content:center;
    }
    .road-pill{
      display:inline-flex; align-self:center; padding:3px 6px; border-radius:999px;
      font-size:10px; font-weight:950; letter-spacing:.2px; border:1px solid transparent;
      white-space:nowrap;
    }
    .road-pill.b{background:rgba(239,68,68,.12); color:var(--b); border-color:rgba(239,68,68,.35)}
    .road-pill.p{background:rgba(59,130,246,.12); color:var(--p); border-color:rgba(59,130,246,.35)}
    .road-pill.n{background:rgba(255,255,255,.06); color:var(--muted); border-color:rgba(255,255,255,.08)}
    .road-text{
      text-align:center; font-size:10px; line-height:1.25; color:#e4e4e7; font-weight:800;
      word-break:break-word;
    }

    .bar-row{
      display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px;
      flex:0 0 auto;
    }
    .order-select{
      background:#27272a; color:#fff; border:1px solid #3f3f46; border-radius:8px;
      font-size:11px; padding:5px 7px; font-weight:800; outline:none;
    }
    .table-layout{
      display:flex; gap:6px; margin-top:4px;
      flex:0 0 auto;
    }
    .table-side{
      flex:1; background:#000; border-radius:14px; padding:7px; border:1px solid var(--border);
      min-width:0;
    }
    .side-label{
      text-align:center; font-size:11px; font-weight:950; padding:5px 0; border-radius:8px; margin-bottom:6px;
    }
    .side-label.p{background:rgba(59,130,246,.15); color:var(--p)}
    .side-label.b{background:rgba(239,68,68,.15); color:var(--b)}

    .cards-row{display:flex; gap:4px}
    .playing-card{
      flex:1; aspect-ratio:2/3; background:#27272a; border:1px solid #3f3f46; border-radius:10px;
      display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:950; color:#fff;
      cursor:pointer; transition:.15s;
      touch-action:manipulation;
    }
    .playing-card.active{
      border-color:var(--hl); background:#333; color:var(--hl); box-shadow:0 0 10px rgba(234,179,8,.3);
      transform:translateY(-2px);
    }
    .playing-card.filled{background:#e4e4e7;color:#000}
    .playing-card.disabled{opacity:.22; pointer-events:none}

    .keypad{
      display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-top:8px;
      flex:1 1 auto;
      align-content:start;
    }
    .key{
      background:#27272a; border:1px solid #3f3f46; border-radius:9px; padding:8px 0;
      text-align:center; cursor:pointer; user-select:none;
      touch-action:manipulation;
    }
    .key:active{transform:scale(.97); background:#3a3a44}
    .key-val{font-size:16px; font-weight:950}
    .key-count{font-size:9px; color:var(--muted); margin-top:2px}
    .key.action-clear{
      grid-column:span 2; color:var(--warn); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900;
    }

    .submit-btn{
      width:100%; border:none; border-radius:10px; margin-top:8px; padding:12px;
      background:#27272a; color:#777; font-size:14px; font-weight:950;
      touch-action:manipulation;
      flex:0 0 auto;
    }
    .submit-btn.ready{background:var(--ok); color:#000; box-shadow:0 0 15px rgba(22,163,74,.35); cursor:pointer}

    .fab-btn{
      position:fixed; right:14px; bottom:max(12px, env(safe-area-inset-bottom)); z-index:1300;
      width:48px; height:48px; border:none; border-radius:50%;
      background:var(--hl); color:#000; font-size:20px; font-weight:900; cursor:pointer;
      box-shadow:0 8px 22px rgba(0,0,0,.5);
      touch-action:manipulation;
    }
    .fab-btn.hidden{opacity:0; pointer-events:none}

    .db-backdrop{
      position:fixed; inset:0; z-index:9000;
      background:rgba(0,0,0,.48);
      opacity:0; pointer-events:none;
      transition:opacity .25s ease;
    }
    .db-backdrop.open{
      opacity:1; pointer-events:auto;
    }

    .database-panel{
      position:fixed; left:0; right:0; bottom:0; height:84vh; z-index:9001;
      background:#111; border-radius:20px 20px 0 0; border-top:1px solid #2d2d36;
      padding:18px; overflow-y:auto;
      transform:translateY(104%);
      transition:transform .28s ease;
      pointer-events:none;
      box-shadow:0 -20px 40px rgba(0,0,0,.45);
      will-change:transform;
      -webkit-overflow-scrolling:touch;
    }
    .database-panel.open{
      transform:translateY(0);
      pointer-events:auto;
    }
    .db-header{
      display:flex; justify-content:space-between; align-items:center; gap:8px;
      margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #333;
      position:sticky; top:0; background:#111; z-index:2;
      padding-top:calc(env(safe-area-inset-top) + 2px);
    }
    .db-title{font-size:18px; font-weight:950; color:#fff; display:flex; align-items:center; gap:8px}
    .db-close{
      background:none; border:none; color:var(--muted); font-size:30px; line-height:1; cursor:pointer;
      position:relative; z-index:5; padding:4px 8px; touch-action:manipulation;
    }
    .db-section{
      background:#1a1a1f; border:1px solid #333; border-radius:14px; padding:14px; margin-bottom:14px;
    }
    .db-stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:12px; font-weight:800}
    .db-stat-item{
      display:flex; justify-content:space-between; gap:8px; padding:8px 10px;
      background:#101014; border-radius:10px;
    }
    .param-input{
      width:68px; background:#27272a; border:1px solid #3f3f46; color:#fff;
      border-radius:8px; text-align:center; padding:5px;
    }
    .lab-btn{
      width:100%; border:none; border-radius:10px; padding:12px; margin-bottom:10px;
      background:var(--lab); color:#fff; font-size:14px; font-weight:950; cursor:pointer;
      box-shadow:0 0 10px rgba(14,165,233,.28);
      touch-action:manipulation;
    }
    .db-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    .db-actions button{border:none; border-radius:10px; padding:12px; font-weight:900; cursor:pointer; touch-action:manipulation}

    @media (max-width:1100px){
      .scroll-container{
        grid-template-columns:1fr;
        grid-template-rows:minmax(0, .95fr) minmax(0, 1.05fr);
      }
      .db-stat-grid{grid-template-columns:1fr}
    }

    @media (max-width:720px){
      .sticky-hud{
        padding:calc(env(safe-area-inset-top) + 6px) 8px 8px;
      }
      .hud-header{margin-bottom:6px}
      .hud-stats{gap:6px; font-size:11px}
      .hud-btn{padding:5px 8px; font-size:11px}
      .oracle-box{padding:8px 6px; border-radius:12px}
      .trend-alert{font-size:11px; margin-bottom:4px; padding:4px 6px}
      .oracle-main{font-size:23px; margin-bottom:4px}
      .reason-badge{font-size:9px; padding:4px 7px; gap:4px}
      .sidebet-container{gap:4px; padding-top:7px; margin-top:7px}
      .sidebet-pill{font-size:9px; padding:3px 6px}

      .scroll-container{
        padding:8px;
        gap:8px;
        grid-template-rows:minmax(0, .9fr) minmax(0, 1.1fr);
      }

      .roads-card,.input-card{
        padding:8px;
        border-radius:14px;
      }
      .road-title{font-size:10px; margin:3px 2px 5px}
      .road-container{padding:3px; margin-bottom:5px}
      .cell-lg{width:13px;height:13px}
      .cell-sm{width:6px;height:6px}
      .bead-dot{width:9px;height:9px}
      .circle-hollow{width:9px;height:9px;border-width:2px}
      .circle-solid{width:4px;height:4px}
      .slash{width:4px;height:4px}
      .tie-text{font-size:7px}
      .road-explain-grid{gap:4px; margin-top:5px}
      .road-pill-card{padding:6px 4px; min-height:50px; border-radius:10px}
      .road-pill{font-size:9px; padding:3px 5px}
      .road-text{font-size:9px}

      .bar-row{gap:6px; margin-bottom:7px}
      .order-select{font-size:10px; padding:4px 6px}
      .table-layout{gap:5px; margin-top:3px}
      .table-side{padding:6px; border-radius:12px}
      .side-label{font-size:10px; padding:4px 0; margin-bottom:5px}
      .playing-card{border-radius:8px; font-size:15px}

      .keypad{gap:4px; margin-top:7px}
      .key{padding:7px 0; border-radius:8px}
      .key-val{font-size:14px}
      .key-count{font-size:8px}
      .key.action-clear{font-size:12px}
      .submit-btn{margin-top:7px; padding:11px; font-size:13px}
      .fab-btn{width:46px;height:46px;font-size:19px}
    }

    @media (max-height:760px){
      .sticky-hud{padding-bottom:7px}
      .hud-header{margin-bottom:5px}
      .oracle-box{padding:7px 6px}
      .trend-alert{margin-bottom:3px}
      .oracle-main{font-size:21px}
      .reason-badge{font-size:9px; padding:4px 6px}
      .sidebet-container{padding-top:6px; margin-top:6px}

      .scroll-container{padding:7px; gap:7px}
      .roads-card,.input-card{padding:7px}
      .road-title{margin:3px 2px 4px}
      .road-container{margin-bottom:4px}
      .cell-lg{width:12px;height:12px}
      .cell-sm{width:6px;height:6px}
      .bead-dot{width:8px;height:8px}
      .circle-hollow{width:8px;height:8px;border-width:2px}
      .slash{width:4px;height:4px}
      .road-pill-card{min-height:46px; padding:5px 4px}
      .road-pill{font-size:9px}
      .road-text{font-size:8px}
      .table-side{padding:5px}
      .side-label{font-size:10px; margin-bottom:4px}
      .playing-card{font-size:14px}
      .key{padding:6px 0}
      .key-val{font-size:13px}
      .submit-btn{padding:10px; font-size:12px}
    }
  </style>
</head>
<body>
  <div class="sticky-hud">
    <div class="hud-header">
      <div class="hud-stats">
        <span class="version-badge">v64.3</span>
        <span>剩牌:<span class="val" id="hdrRemain">416</span></span>
        <span>局:<span class="val" id="hdrRound">0</span></span>
        <span>命中:<span class="val" id="hdrHit">0/0</span></span>
      </div>
      <div class="hud-actions">
        <button type="button" class="hud-btn btn-undo" onclick="undo()">↩ 撤銷</button>
        <button type="button" class="hud-btn btn-reset" onclick="resetShoe()">換靴</button>
      </div>
    </div>

    <div id="oracleBox" class="oracle-box pass">
      <div class="trend-alert alert-safe" id="trendAlert">📊 五路結構門檻策略待命中</div>
      <div class="oracle-main" id="oracleMain">等待輸入</div>
      <div class="reason-badge" id="reasonBadge">五種路判讀與下注決策已脫鉤</div>
      <div class="sidebet-container">
        <div class="sidebet-pill" id="sbTie">和局 --%</div>
        <div class="sidebet-pill" id="sbBP">莊對 --%</div>
        <div class="sidebet-pill" id="sbPP">閒對 --%</div>
      </div>
    </div>
  </div>

  <div class="scroll-container">
    <div class="roads-card">
      <div class="road-title">珠盤路 & 大路</div>
      <div class="road-container"><div class="road-grid" id="grid-bead"></div></div>
      <div class="road-container"><div class="road-grid" id="grid-big"></div></div>

      <div class="road-title" style="margin-top:6px;">下三路</div>
      <div class="derived-roads">
        <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-eye"></div></div></div>
        <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-small"></div></div></div>
        <div class="derived-col"><div class="road-container"><div class="road-grid" id="grid-roach"></div></div></div>
      </div>

      <div class="road-title" style="margin-top:6px;">五種路判讀</div>
      <div class="road-explain-grid" id="roadExplain"></div>
    </div>

    <div class="input-card">
      <div class="bar-row">
        <select id="orderSel" class="order-select" onchange="changeOrder()">
          <option value="PBPB">閒莊閒莊 (國際標準)</option>
          <option value="PPBB">閒閒莊莊 (區塊派發)</option>
        </select>
        <label style="font-size:11px;color:var(--muted);font-weight:900;white-space:nowrap;">
          <input type="checkbox" id="autoGuide" checked onchange="evaluateDrawRules()"> 🛡️ 智慧防呆
        </label>
      </div>

      <div class="table-layout">
        <div class="table-side">
          <div class="side-label p">閒 PLAYER</div>
          <div class="cards-row">
            <div class="playing-card active" id="slot-p1" onclick="setActiveSlot('p1')"></div>
            <div class="playing-card" id="slot-p2" onclick="setActiveSlot('p2')"></div>
            <div class="playing-card disabled" id="slot-p3" onclick="setActiveSlot('p3')"></div>
          </div>
        </div>
        <div class="table-side">
          <div class="side-label b">莊 BANKER</div>
          <div class="cards-row">

<script>
const DB_K = 'bac_v64_3_db';
const LAB_K = 'bac_v64_3_lab';
const ST_K = 'bac_v64_3_state';
const CF_K = 'bac_v64_3_cfg';

const WARMUP_HANDS = 15;
const SIDEBET_MIN_N = 12;
const PATTERN_CAP = 50000;

const countWeights = {1:1,2:1,3:2,4:2,5:1,6:-1,7:-2,8:-2,9:-2,10:0,11:0,12:0,13:0};
const NAIVE_PRIORS = { B:0.4586, P:0.4462, T:0.0952 };
const PAYOUTS = { B:0.95, P:1.0, T:8.0 };

let BigData = { totalHands:0, patterns:{}, acc:{recs:0,hits:0,tRecs:0,tHits:0,bpRecs:0,bpHits:0,ppRecs:0,ppHits:0} };
let LabStore = { schema_version:'v64.3', rawShoes:[], currentOpenShoe:null, experiments:[] };
let S = null;
let Config = { tau:0.005, side:0.08, nBins:10 };

let bSt = null, bDB = null, bLab = null;
let cOrder = ['p1','b1','p2','b2','p3','b3'];
let cIdx = 0;

function syncViewportLayout(){
  const viewportH = window.innerHeight || document.documentElement.clientHeight || 0;
  if(viewportH){
    document.documentElement.style.setProperty('--app-vh', viewportH + 'px');
  }

  const hud = document.querySelector('.sticky-hud');
  if(hud){
    requestAnimationFrame(function(){
      document.documentElement.style.setProperty('--hud-h', hud.offsetHeight + 'px');
    });
  }
}

function createInitialState(){
  const s = {
    shoeId: Date.now(),
    deck:{},
    history:[],
    runningCount:0,
    shoePerf:{recs:0,hits:0,tRecs:0,tHits:0,bpRecs:0,bpHits:0,ppRecs:0,ppHits:0},
    lastRecSide:null,
    lastSideBets:{tie:false,bp:false,pp:false},
    isLegacyPartial:false
  };
  for(let i=1;i<=13;i++) s.deck[i] = 32;
  return s;
}

function normalizeConfig(cfg){
  const tau = Number.isFinite(Number(cfg && (cfg.tau ?? cfg.m))) ? Number(cfg.tau ?? cfg.m) : 0.005;
  const side = Number.isFinite(Number(cfg && (cfg.side ?? cfg.s))) ? Number(cfg.side ?? cfg.s) : 0.08;
  const nBins = Number.isFinite(Number(cfg && cfg.nBins)) ? Math.max(5, Math.min(20, Math.floor(Number(cfg.nBins)))) : 10;
  return {
    tau: Math.max(-1, Math.min(1, tau)),
    side: Math.max(0, Math.min(1, side)),
    nBins
  };
}

function isValidDeck(deck){
  if(!deck || typeof deck !== 'object') return false;
  for(let i=1;i<=13;i++){
    if(typeof deck[i] !== 'number' || !Number.isFinite(deck[i]) || deck[i] < 0 || deck[i] > 32) return false;
  }
  return true;
}

function derivePhysicalRunningCount(deck){
  let rc = 0;
  for(let i=1;i<=13;i++) rc += (32 - deck[i]) * (countWeights[i] || 0);
  return rc;
}

function normalizeState(obj){
  if(!obj || typeof obj !== 'object') return null;
  if(!isValidDeck(obj.deck)) return null;

  const s = createInitialState();
  s.shoeId = obj.shoeId || Date.now();

  let deckSum = 0;
  for(let i=1;i<=13;i++){
    s.deck[i] = Math.max(0, Math.min(32, Math.floor(Number(obj.deck[i]))));
    deckSum += s.deck[i];
  }

  if(Array.isArray(obj.history)){
    s.history = obj.history.map(function(x){
      if(typeof x === 'string') return { w:x, bp:false, pp:false, pPt:0, bPt:0 };
      return {
        w: x.w === 'B' || x.w === 'P' || x.w === 'T' ? x.w : 'T',
        bp: !!x.bp,
        pp: !!x.pp,
        pPt: Number.isFinite(Number(x.pPt)) ? Math.max(0, Math.min(9, Math.floor(Number(x.pPt)))) : 0,
        bPt: Number.isFinite(Number(x.bPt)) ? Math.max(0, Math.min(9, Math.floor(Number(x.bPt)))) : 0
      };
    });
  }

  const usedCards = 416 - deckSum;
  if(usedCards < s.history.length * 4 || usedCards > s.history.length * 6) return null;

  s.runningCount = derivePhysicalRunningCount(s.deck);
  s.shoePerf = obj.shoePerf && typeof obj.shoePerf === 'object' ? {
    recs:Number(obj.shoePerf.recs)||0, hits:Number(obj.shoePerf.hits)||0,
    tRecs:Number(obj.shoePerf.tRecs)||0, tHits:Number(obj.shoePerf.tHits)||0,
    bpRecs:Number(obj.shoePerf.bpRecs)||0, bpHits:Number(obj.shoePerf.bpHits)||0,
    ppRecs:Number(obj.shoePerf.ppRecs)||0, ppHits:Number(obj.shoePerf.ppHits)||0
  } : s.shoePerf;

  s.lastRecSide = obj.lastRecSide === 'B' || obj.lastRecSide === 'P' || obj.lastRecSide === 'PASS' ? obj.lastRecSide : null;
  s.lastSideBets = obj.lastSideBets && typeof obj.lastSideBets === 'object' ? {
    tie: !!obj.lastSideBets.tie,
    bp: !!obj.lastSideBets.bp,
    pp: !!obj.lastSideBets.pp
  } : { tie:false,bp:false,pp:false };

  s.isLegacyPartial = !!obj.isLegacyPartial;
  return s;
}

function canonicalPattern(key, raw){
  if(!/^(B|P)(,(B|P)){2}$/.test(String(key||''))) return null;
  if(!raw || typeof raw !== 'object') return null;
  const B = Math.max(0, Math.floor(Number(raw.B) || 0));
  const P = Math.max(0, Math.floor(Number(raw.P) || 0));
  const T = Math.max(0, Math.floor(Number(raw.T) || 0));
  const N = B + P + T;
  if(N <= 0 || N > PATTERN_CAP) return null;
  const BP = Math.min(N, Math.max(0, Math.floor(Number(raw.BP) || 0)));
  const PP = Math.min(N, Math.max(0, Math.floor(Number(raw.PP) || 0)));
  return { B,P,T,BP,PP,N };
}

function updatePatternDB(dbWrapper, key, w, bp, pp, cap){
  cap = cap || PATTERN_CAP;
  if(!key || dbWrapper.totalHands >= cap) return;
  let cp = dbWrapper.patterns[key] || { B:0,P:0,T:0,BP:0,PP:0,N:0 };
  if(w === 'B') cp.B += 1;
  else if(w === 'P') cp.P += 1;
  else cp.T += 1;
  if(bp) cp.BP += 1;
  if(pp) cp.PP += 1;
  cp.N += 1;
  cp.BP = Math.min(cp.BP, cp.N);
  cp.PP = Math.min(cp.PP, cp.N);
  dbWrapper.patterns[key] = cp;
  dbWrapper.totalHands += 1;
}

function recalcDBStats(db){
  db.acc = {recs:0,hits:0,tRecs:0,tHits:0,bpRecs:0,bpHits:0,ppRecs:0,ppHits:0};
  let totalHands = 0;
  const cleaned = {};
  const keys = Object.keys(db.patterns || {});
  for(let i=0;i<keys.length;i++){
    const key = keys[i];
    const cp = canonicalPattern(key, db.patterns[key]);
    if(!cp) continue;
    cleaned[key] = cp;
    totalHands += cp.N;

    const bpBase = cp.B + cp.P;
    const allBase = cp.B + cp.P + cp.T;

    if(bpBase >= 5){
      const bRatio = cp.B / bpBase;
      const pRatio = cp.P / bpBase;
      if(bRatio >= 0.55){ db.acc.recs += bpBase; db.acc.hits += cp.B; }
      else if(pRatio >= 0.55){ db.acc.recs += bpBase; db.acc.hits += cp.P; }
    }
    if(cp.N >= SIDEBET_MIN_N){
      if((cp.T + 0.5) / (allBase + 5) >= Config.side){ db.acc.tRecs += allBase; db.acc.tHits += cp.T; }
      if((cp.BP + 0.4) / (allBase + 5) >= Config.side){ db.acc.bpRecs += allBase; db.acc.bpHits += cp.BP; }
      if((cp.PP + 0.4) / (allBase + 5) >= Config.side){ db.acc.ppRecs += allBase; db.acc.ppHits += cp.PP; }
    }
  }
  db.patterns = cleaned;
  db.totalHands = totalHands;
}

function getPatternKeyBeforePush(){
  const pure = S.history.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
  return pure.length >= 3 ? pure.slice(-3).join(',') : null;
}

function patternStatsForCurrent(){
  const key = getPatternKeyBeforePush();
  if(!key) return null;
  const cp = canonicalPattern(key, BigData.patterns[key]);
  if(!cp) return null;

  const bpBase = cp.B + cp.P;
  const allBase = cp.B + cp.P + cp.T;

  if(cp.N < SIDEBET_MIN_N){
    return {
      key, weak:true, n:cp.N,
      b:cp.B, pl:cp.P, t:cp.T, bp:cp.BP, pp:cp.PP,
      mainB:0, mainP:0, tieP:0, bpP:0, ppP:0
    };
  }

  return {
    key, weak:false, n:cp.N,
    b:cp.B, pl:cp.P, t:cp.T, bp:cp.BP, pp:cp.PP,
    mainB: bpBase > 0 ? cp.B / bpBase : 0,
    mainP: bpBase > 0 ? cp.P / bpBase : 0,
    tieP: (cp.T + 0.5) / (allBase + 5),
    bpP: (cp.BP + 0.4) / (allBase + 5),
    ppP: (cp.PP + 0.4) / (allBase + 5)
  };
}

function generateShoeId(){
  return 'shoe_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
}

function openNewShoe(){
  if(LabStore.currentOpenShoe && LabStore.currentOpenShoe.hands.length > 0) closeCurrentShoe();
  LabStore.currentOpenShoe = {
    shoe_id: generateShoeId(),
    started_at: Date.now(),
    ended_at: null,
    status: 'open',
    meta: {
      deck_size_start: 416,
      order_mode: document.getElementById('orderSel') ? document.getElementById('orderSel').value : 'PBPB',
      source: 'live_input'
    },
    hands: []
  };
}

function closeCurrentShoe(){
  if(LabStore.currentOpenShoe && LabStore.currentOpenShoe.status === 'open'){
    LabStore.currentOpenShoe.status = 'closed';
    LabStore.currentOpenShoe.ended_at = Date.now();
    if(LabStore.currentOpenShoe.hands.length > 0){
      LabStore.rawShoes.push(JSON.parse(JSON.stringify(LabStore.currentOpenShoe)));
    }
    LabStore.currentOpenShoe = null;
  }
}

function saveAll(){
  localStorage.setItem(DB_K, JSON.stringify(BigData));
  localStorage.setItem(LAB_K, JSON.stringify(LabStore));
  localStorage.setItem(ST_K, JSON.stringify(S));
  localStorage.setItem(CF_K, JSON.stringify(Config));
}

function loadAll(){
  const cfgRaw = localStorage.getItem(CF_K);
  if(cfgRaw){
    try{ Config = normalizeConfig(JSON.parse(cfgRaw)); }catch(e){}
  }else{
    const oldCfg = localStorage.getItem('bac_v64_2_cfg') || localStorage.getItem('bac_v64_cfg') || localStorage.getItem('bac_cfg_v63') || localStorage.getItem('bac_cfg_v62') || localStorage.getItem('bac_cfg_v61');
    if(oldCfg){ try{ Config = normalizeConfig(JSON.parse(oldCfg)); }catch(e){} }
  }

  const labRaw = localStorage.getItem(LAB_K);
  if(labRaw){
    try{
      const lab = JSON.parse(labRaw);
      if(lab && typeof lab === 'object'){
        LabStore = {
          schema_version:'v64.3',
          rawShoes:Array.isArray(lab.rawShoes) ? lab.rawShoes : [],
          currentOpenShoe: lab.currentOpenShoe || null,
          experiments:[]
        };
      }
    }catch(e){}
  }else{
    const oldLab = localStorage.getItem('bac_v64_2_lab') || localStorage.getItem('bac_v64_lab') || localStorage.getItem('bac_lab_v63') || localStorage.getItem('bac_lab_v62') || localStorage.getItem('bac_lab_v61');
    if(oldLab){
      try{
        const lab = JSON.parse(oldLab);
        LabStore = {
          schema_version:'v64.3',
          rawShoes:Array.isArray(lab.rawShoes) ? lab.rawShoes : [],
          currentOpenShoe: lab.currentOpenShoe || null,
          experiments:[]
        };
      }catch(e){}
    }
  }

  const stRaw = localStorage.getItem(ST_K);
  if(stRaw){
    try{
      const s = normalizeState(JSON.parse(stRaw));
      S = s || createInitialState();
    }catch(e){ S = createInitialState(); }
  }else{
    const oldSt = localStorage.getItem('bac_v64_2_state') || localStorage.getItem('bac_v64_state') || localStorage.getItem('bac_st_v63') || localStorage.getItem('bac_st_v62') || localStorage.getItem('bac_st_v61');
    if(oldSt){
      try{
        const s = normalizeState(JSON.parse(oldSt));
        S = s || createInitialState();
      }catch(e){ S = createInitialState(); }
    }else{
      S = createInitialState();
    }
  }

  document.getElementById('cfgTau').value = Config.tau;
  document.getElementById('cfgSide').value = Config.side;
  document.getElementById('cfgBins').value = Config.nBins;
}

function replayShoeIntoDB(shoe, db){
  let simHist = [];
  for(let i=0;i<shoe.hands.length;i++){
    const h = shoe.hands[i];
    const winner = h.outcome && h.outcome.winner ? h.outcome.winner : (h.outcome && h.outcome.w) || 'T';
    const pure = simHist.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
    const key = pure.length >= 3 ? pure.slice(-3).join(',') : null;
    if(key){
      updatePatternDB(db, key, winner, !!(h.outcome && h.outcome.bp), !!(h.outcome && h.outcome.pp));
    }
    simHist.push({
      w:winner,
      pPt:Number(h.outcome && h.outcome.pPt) || 0,
      bPt:Number(h.outcome && h.outcome.bPt) || 0,
      bp:!!(h.outcome && h.outcome.bp),
      pp:!!(h.outcome && h.outcome.pp)
    });
  }
}

function rebuildBigDataFromAllShoes(rawShoes){
  const db = { totalHands:0, patterns:{}, acc:{recs:0,hits:0,tRecs:0,tHits:0,bpRecs:0,bpHits:0,ppRecs:0,ppHits:0} };
  const shoes = Array.isArray(rawShoes) ? rawShoes : [];
  for(let i=0;i<shoes.length;i++) replayShoeIntoDB(shoes[i], db);
  recalcDBStats(db);
  return db;
}

function applyOpenShoePatternsToBigData(){
  if(!LabStore.currentOpenShoe || !Array.isArray(LabStore.currentOpenShoe.hands)) return;
  replayShoeIntoDB(LabStore.currentOpenShoe, BigData);
  recalcDBStats(BigData);
}

function captureObservation(state, features, livePrediction, inputs, sideBetsSnapshot){
  if(!LabStore.currentOpenShoe) openNewShoe();
  return {
    hand_index: LabStore.currentOpenShoe.hands.length + 1,
    pre_state: {
      remaining_deck: JSON.parse(JSON.stringify(state.deck)),
      running_count: state.runningCount,
      history_len: state.history.length
    },
    features: JSON.parse(JSON.stringify(features)),
    live_prediction: JSON.parse(JSON.stringify(livePrediction)),
    policy_snapshot: {
      model_id:'five_road_v64_3',
      tau: livePrediction.tau,
      s: Config.side,
      main_decision: livePrediction.decision,
      recommend_tie: !!sideBetsSnapshot.tie,
      recommend_bp: !!sideBetsSnapshot.bp,
      recommend_pp: !!sideBetsSnapshot.pp,
      is_warmup: !!livePrediction.isWarmup
    },
    input:{ cards: JSON.parse(JSON.stringify(inputs)) },
    audit:{ created_at: Date.now(), spec_version:'v64.3' }
  };
}

function commitObservation(obs, outcome){
  if(!LabStore.currentOpenShoe) return;
  obs.outcome = outcome;
  LabStore.currentOpenShoe.hands.push(obs);
}

function baccaratValue(rank){
  return rank >= 10 ? 0 : rank;
}

function validateOpenShoeConsistency(labStore, state){
  if(!labStore.currentOpenShoe){
    return state.history.length === 0 && state.runningCount === derivePhysicalRunningCount(state.deck);
  }

  const shoe = labStore.currentOpenShoe;
  if(!shoe || shoe.status !== 'open' || !Array.isArray(shoe.hands)) return false;
  if(shoe.hands.length !== state.history.length) return false;

  let deck = {};
  for(let i=1;i<=13;i++) deck[i] = 32;
  let rc = 0;
  let replayHist = [];
  const slots = ['p1','p2','p3','b1','b2','b3'];

  for(let i=0;i<shoe.hands.length;i++){
    const h = shoe.hands[i];
    if(!h || !h.input || !h.input.cards || !h.outcome) return false;
    if(!h.pre_state || !isValidDeck(h.pre_state.remaining_deck)) return false;
    if(h.pre_state.history_len !== i) return false;
    if(h.pre_state.running_count !== rc) return false;

    for(let r=1;r<=13;r++){
      if(h.pre_state.remaining_deck[r] !== deck[r]) return false;
    }

    let pPts = 0, bPts = 0;
    for(let j=0;j<slots.length;j++){
      const key = slots[j];
      const rank = h.input.cards[key];
      if(rank !== null && rank !== undefined){
        if(!countWeights.hasOwnProperty(rank)) return false;
        if(deck[rank] <= 0) return false;
        deck[rank] -= 1;
        rc += countWeights[rank];
        if(key[0] === 'p') pPts += baccaratValue(rank);
        else bPts += baccaratValue(rank);
      }
    }

    const pFinal = pPts % 10;
    const bFinal = bPts % 10;
    const winner = pFinal > bFinal ? 'P' : bFinal > pFinal ? 'B' : 'T';
    const bp = h.input.cards.b1 != null && h.input.cards.b2 != null && h.input.cards.b1 === h.input.cards.b2;
    const pp = h.input.cards.p1 != null && h.input.cards.p2 != null && h.input.cards.p1 === h.input.cards.p2;

    if((h.outcome.winner || h.outcome.w) !== winner) return false;
    if(Number(h.outcome.pPt) !== pFinal || Number(h.outcome.bPt) !== bFinal) return false;
    if(!!h.outcome.bp !== bp || !!h.outcome.pp !== pp) return false;

    replayHist.push({ w:winner, pPt:pFinal, bPt:bFinal, bp, pp });
  }

  for(let r=1;r<=13;r++){
    if(deck[r] !== state.deck[r]) return false;
  }
  if(rc !== state.runningCount) return false;
  if(replayHist.length !== state.history.length) return false;

  for(let i=0;i<replayHist.length;i++){
    const a = replayHist[i], b = state.history[i];
    if(!b) return false;
    if(a.w !== b.w || a.pPt !== b.pPt || a.bPt !== b.bPt || !!a.bp !== !!b.bp || !!a.pp !== !!b.pp) return false;
  }

  return true;
}

function rebuildLiveStateMetrics(){
  S.shoePerf = {recs:0,hits:0,tRecs:0,tHits:0,bpRecs:0,bpHits:0,ppRecs:0,ppHits:0};
  S.lastRecSide = null;
  S.lastSideBets = { tie:false,bp:false,pp:false };
  S.isLegacyPartial = false;

  if(!LabStore.currentOpenShoe || !Array.isArray(LabStore.currentOpenShoe.hands)) return;

  for(let i=0;i<S.history.length;i++){
    const hOutcome = S.history[i];
    const hand = LabStore.currentOpenShoe.hands[i];
    if(hand && hand.policy_snapshot){
      const snap = hand.policy_snapshot;
      if(hOutcome.w !== 'T'){
        if(snap.main_decision !== 'PASS'){
          S.shoePerf.recs += 1;
          if(snap.main_decision === hOutcome.w) S.shoePerf.hits += 1;
        }
      }
      if(snap.recommend_tie){ S.shoePerf.tRecs += 1; if(hOutcome.w === 'T') S.shoePerf.tHits += 1; }
      if(snap.recommend_bp){ S.shoePerf.bpRecs += 1; if(hOutcome.bp) S.shoePerf.bpHits += 1; }
      if(snap.recommend_pp){ S.shoePerf.ppRecs += 1; if(hOutcome.pp) S.shoePerf.ppHits += 1; }

      if(i === S.history.length - 1){
        S.lastRecSide = snap.main_decision;
        S.lastSideBets = { tie:!!snap.recommend_tie, bp:!!snap.recommend_bp, pp:!!snap.recommend_pp };
      }
    }else{
      S.isLegacyPartial = true;
    }
  }
}

function buildBigRoadMeta(history){
  const grid = {};
  const cols = [];
  let last = null, startCol = 0, c = 0, r = 0, lastCoord = null, maxCol = 0;

  for(let i=0;i<history.length;i++){
    const d = history[i];
    if(d.w === 'T'){
      if(lastCoord && grid[lastCoord]) grid[lastCoord].ties = (grid[lastCoord].ties || 0) + 1;
      continue;
    }

    if(last === null || d.w !== last){
      if(last !== null){
        startCol += 1;
        while(grid[startCol + ',0'] !== undefined) startCol += 1;
      }
      c = startCol;
      r = 0;
    }else{
      const nr = r + 1;
      if(nr <= 5 && grid[c + ',' + nr] === undefined){
        r = nr;
      }else{
        c += 1;
        while(grid[c + ',' + r] !== undefined) c += 1;
      }
    }

    const key = c + ',' + r;
    grid[key] = { v:d.w, bp:d.bp, pp:d.pp, ties:0, c, r };
    if(!cols[c]) cols[c] = [];
    cols[c][r] = grid[key];
    last = d.w;
    lastCoord = key;
    maxCol = Math.max(maxCol, c);
  }

  return { grid, cols, maxCol };
}

function getDerivedRoads(meta){
  const nodes = Object.values(meta.grid).sort(function(a,b){ return a.c - b.c || a.r - b.r; });
  const seq1 = [], seq2 = [], seq3 = [];

  const colH = function(c){
    let h = 0;
    while(meta.grid[c + ',' + h] !== undefined) h++;
    return h;
  };

  for(let i=0;i<nodes.length;i++){
    const node = nodes[i];
    const c = node.c, r = node.r;

    const calc = function(off, seq){
      if(r === 0){
        if(c >= off + 1){
          seq.push(colH(c - 1) === colH(c - off - 1) ? 'R' : 'Blue');
        }
      }else{
        if(c >= off){
          const a = !!meta.grid[(c - off) + ',' + r];
          const b = !!meta.grid[(c - off) + ',' + (r - 1)];
          seq.push(a === b ? 'R' : 'Blue');
        }
      }
    };

    calc(1, seq1);
    calc(2, seq2);
    calc(3, seq3);
  }

  return { eye:seq1, small:seq2, roach:seq3 };
}

function drawDerivedGrid(domId, arr, type){
  const el = document.getElementById(domId);
  el.innerHTML = '';

  const grid = {};
  let last = null, startCol = 0, c = 0, r = 0, maxCol = 0;

  for(let i=0;i<arr.length;i++){
    const res = arr[i];
    if(last === null || res !== last){
      if(last !== null){
        startCol += 1;
        while(grid[startCol + ',0'] !== undefined) startCol += 1;
      }
      c = startCol;
      r = 0;
    }else{
      const nr = r + 1;
      if(nr <= 5 && grid[c + ',' + nr] === undefined){
        r = nr;
      }else{
        c += 1;
        while(grid[c + ',' + r] !== undefined) c += 1;
      }
    }
    grid[c + ',' + r] = res;
    last = res;
    maxCol = Math.max(maxCol, c);
  }

  for(let i=0;i<Math.max(24, maxCol + 1); i++){
    const col = document.createElement('div');
    col.className = 'road-col';
    for(let j=0;j<6;j++){

      cell.className = 'cell-sm';

        else if(type === 'small') item.className = 'circle-solid ' + val;
        else item.className = 'slash ' + val;
        cell.appendChild(item);
      }
      col.appendChild(cell);
    }
    el.appendChild(col);
  }
}

function simulatePathDerivation(history, hyp){
  const sim = history.slice();
  sim.push({ w:hyp });
  const meta = buildBigRoadMeta(sim);
  const d = getDerivedRoads(meta);
  return {
    eye: d.eye.length ? d.eye[d.eye.length - 1] : null,
    small: d.small.length ? d.small[d.small.length - 1] : null,
    roach: d.roach.length ? d.roach[d.roach.length - 1] : null
  };
}

function extractPathFeaturesCore(history){
  const pure = history.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });

  let trend_side = null, trend_len = 0;
  if(pure.length > 0){
    trend_side = pure[pure.length - 1];
    trend_len = 1;
    for(let i=pure.length - 2; i>=0; i--){
      if(pure[i] === trend_side) trend_len++;
      else break;
    }
  }

  const recent = pure.slice(-15);
  let recentB = 0, recentP = 0;
  for(let i=0;i<recent.length;i++){
    if(recent[i] === 'B') recentB++;
    else if(recent[i] === 'P') recentP++;
  }

  let recent_shoe_bias = null;
  if(recent.length >= 10){
    if(recentB / recent.length >= 0.6) recent_shoe_bias = 'B';
    else if(recentP / recent.length >= 0.6) recent_shoe_bias = 'P';
  }

  let chop_count = 0;
  for(let i=1;i<recent.length;i++){
    if(recent[i] !== recent[i-1]) chop_count++;
  }

  const askB = simulatePathDerivation(history, 'B');
  const askP = simulatePathDerivation(history, 'P');

  const ask_B_red = [askB.eye, askB.small, askB.roach].filter(function(x){ return x === 'R'; }).length;
  const ask_P_red = [askP.eye, askP.small, askP.roach].filter(function(x){ return x === 'R'; }).length;

  return {
    history_len: history.length,
    trend_side,
    trend_len,
    recent_shoe_bias,
    ask_B_red,
    ask_P_red,
    chop_count
  };
}

function derivedRoadDecision(label, askBVal, askPVal){
  if(askBVal === 'R' && askPVal === 'Blue'){
    return { label, side:'B', strength:1.15, text: label + ' 問莊紅 / 問閒藍' };
  }
  if(askBVal === 'Blue' && askPVal === 'R'){
    return { label, side:'P', strength:1.15, text: label + ' 問閒紅 / 問莊藍' };
  }
  if(askBVal === 'R' && askPVal === 'R'){
    return { label, side:null, strength:0, text: label + ' 雙紅，方向未分離' };
  }
  if(askBVal === 'Blue' && askPVal === 'Blue'){
    return { label, side:null, strength:0, text: label + ' 雙藍，方向未分離' };
  }
  return { label, side:null, strength:0, text: label + ' 待命' };
}

function getRoadSuite(history){
  const pure = history.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
  const path = extractPathFeaturesCore(history);
  const roads = [];

  const beadRecent = pure.slice(-6);
  let beadB = 0, beadP = 0;
  for(let i=0;i<beadRecent.length;i++){
    if(beadRecent[i] === 'B') beadB++;
    else if(beadRecent[i] === 'P') beadP++;
  }
  let beadSide = null, beadStrength = 0, beadText = '珠盤待命';
  if(beadRecent.length >= 4){
    if(beadB > beadP){
      beadSide = 'B';
      beadStrength = beadB >= 5 ? 1.5 : 1.0;
      beadText = '珠盤最近 ' + beadB + ':' + beadP + ' 偏莊';
    }else if(beadP > beadB){
      beadSide = 'P';
      beadStrength = beadP >= 5 ? 1.5 : 1.0;
      beadText = '珠盤最近 ' + beadP + ':' + beadB + ' 偏閒';
    }else{
      beadText = '珠盤均衡';
    }
  }
  roads.push({ label:'珠盤', side:beadSide, strength:beadStrength, text:beadText });

  let bigSide = path.trend_side;
  let bigStrength = 0;
  let bigText = '大路待命';
  if(bigSide){
    if(path.trend_len >= 5) bigStrength = 2.4;
    else if(path.trend_len === 4) bigStrength = 2.0;
    else if(path.trend_len === 3) bigStrength = 1.6;
    else if(path.trend_len === 2) bigStrength = 1.1;
    else bigStrength = 0.5;
    bigText = '大路 ' + path.trend_len + ' 連' + (bigSide === 'B' ? '莊' : '閒');
  }
  roads.push({ label:'大路', side:bigSide, strength:bigStrength, text:bigText });

  const askB = simulatePathDerivation(history, 'B');
  const askP = simulatePathDerivation(history, 'P');

  roads.push(derivedRoadDecision('大眼', askB.eye, askP.eye));
  roads.push(derivedRoadDecision('小路', askB.small, askP.small));
  roads.push(derivedRoadDecision('曱甴', askB.roach, askP.roach));

  return { roads, path };
}

function calcEVFromProbs(probs){
  return {
    B: probs.B * PAYOUTS.B + probs.P * (-1) + probs.T * 0,
    P: probs.P * PAYOUTS.P + probs.B * (-1) + probs.T * 0,
    T: probs.T * PAYOUTS.T + (probs.B + probs.P) * (-1)
  };
}

function executePolicyChain(features, patternDb, tau){
  tau = Number.isFinite(Number(tau)) ? Number(tau) : Config.tau;

  const hist = Array.isArray(features.__history) ? features.__history : [];
  const suite = getRoadSuite(hist);
  const path = suite.path;
  const roads = suite.roads;

  let scoreB = 0, scoreP = 0, alignedB = 0, alignedP = 0;
  roads.forEach(function(r){
    if(r.side === 'B'){ scoreB += r.strength; alignedB++; }
    if(r.side === 'P'){ scoreP += r.strength; alignedP++; }
  });

  const pure = hist.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
  const ptnKey = pure.length >= 3 ? pure.slice(-3).join(',') : null;
  const cp = ptnKey ? canonicalPattern(ptnKey, patternDb.patterns[ptnKey]) : null;

  let probs = { B:NAIVE_PRIORS.B, P:NAIVE_PRIORS.P, T:NAIVE_PRIORS.T };

  if(cp && cp.N >= 10){
    const bpBase = cp.B + cp.P;
    if(bpBase > 0){
      const dataB = cp.B / bpBase;
      const dataP = cp.P / bpBase;
      const w = Math.min(0.18, cp.N * 0.006);
      probs.B = probs.B * (1 - w) + dataB * w;
      probs.P = probs.P * (1 - w) + dataP * w;
    }
  }

  const tc = features.F_Comp.running_count / Math.max(0.5, features.F_Comp.remain_cards / 52);
  probs.B = Math.max(0, probs.B - tc * 0.0005);
  probs.P = Math.max(0, probs.P + tc * 0.0005);

  const z = probs.B + probs.P + probs.T;
  probs = { B: probs.B / z, P: probs.P / z, T: probs.T / z };
  const ev = calcEVFromProbs(probs);

  if(features.F_Path.history_len < WARMUP_HANDS){
    return {
      probs,
      ev:{B:0,P:0,T:0},
      decision:'PASS',
      tau,
      tier:'WARMUP',
      isWarmup:true,
      scoreB:Number(scoreB.toFixed(2)),
      scoreP:Number(scoreP.toFixed(2)),
      alignedB, alignedP,
      gap:Number(Math.abs(scoreB - scoreP).toFixed(2)),
      overheat: path.trend_len >= 4 ? (path.trend_len >= 5 ? 2 : 1) : 0,
      chopRisk: path.chop_count >= 6 ? 2 : path.chop_count >= 4 ? 1 : 0,
      reasons:['暖機保護'],
      roadSignals: roads
    };
  }

  const reasons = [];
  let decision = 'PASS';
  let tier = 'PASS';

  const trendSide = path.trend_side;
  const trendLen = path.trend_len || 0;
  const candidate = scoreB > scoreP ? 'B' : scoreP > scoreB ? 'P' : 'PASS';
  const gap = Math.abs(scoreB - scoreP);
  const aligned = candidate === 'B' ? alignedB : alignedP;
  const oppositeAligned = candidate === 'B' ? alignedP : alignedB;
  const trendContinuing = candidate !== 'PASS' && candidate === trendSide;
  const reversalCandidate = candidate !== 'PASS' && trendSide && candidate !== trendSide;
  const overheat = trendLen >= 4 ? (trendLen >= 5 ? 2 : 1) : 0;
  const chopRisk = path.chop_count >= 6 ? 2 : path.chop_count >= 4 ? 1 : 0;

  if(gap < 1.5){
    reasons.push('五路分差不足');
  }else if(candidate === 'PASS'){
    reasons.push('五路無明確主方向');
  }else if(aligned < 2){
    reasons.push('支持路數不足');
  }else if(oppositeAligned >= 2 && gap < 3){
    reasons.push('反向衝突過強');
  }else{
    if(trendContinuing){
      if(overheat >= 2 && aligned < 5) reasons.push('5連以上過熱，禁追');
      else if(overheat >= 1 && aligned < 4) reasons.push('4連過熱但未達4路一致');
      else if(trendLen >= 3 && aligned < 3) reasons.push('3連以上需至少3路一致');
      else if(chopRisk >= 2 && aligned < 4) reasons.push('近期切換過快，禁止追延續');
    }
    if(reversalCandidate){
      if(trendLen < 2) reasons.push('原趨勢不足，反轉條件不成立');
      else if(aligned < 3) reasons.push('反轉至少要3路同步');
      else if(gap < 2) reasons.push('反轉分差不足');
    }
  }

  if(reasons.length === 0){
    const evCandidate = candidate === 'B' ? ev.B : candidate === 'P' ? ev.P : 0;
    if(!Number.isFinite(evCandidate) || evCandidate <= tau){
      reasons.push('結構成立但 EV 未過閥值');
    }else{
      decision = candidate;
      if(aligned >= 4 && gap >= 3) tier = 'STRONG';
      else if(aligned >= 3 && gap >= 2) tier = 'MID';
      else tier = 'WEAK';
    }
  }

  if(decision === 'PASS' && reasons.length === 0) reasons.push('PASS');

  return {
    probs,
    ev,
    decision,
    tau,
    tier,
    isWarmup:false,
    scoreB:Number(scoreB.toFixed(2)),
    scoreP:Number(scoreP.toFixed(2)),
    alignedB, alignedP,
    gap:Number(gap.toFixed(2)),
    overheat,
    chopRisk,
    reasons,
    roadSignals: roads
  };
}

function getCurrentPrediction(){
  const remainCards = Object.values(S.deck).reduce(function(a,b){ return a + b; }, 0);
  const features = {
    F_Comp:{ running_count:S.runningCount, remain_cards:remainCards },
    F_Path:extractPathFeaturesCore(S.history),
    __history:S.history.slice()
  };
  return executePolicyChain(features, BigData, Config.tau);
}

      om.textContent = livePrediction.tier === 'STRONG' ? '🔥 強推莊家' : '📌 推薦莊家';
      ta.className = livePrediction.tier === 'STRONG' ? 'trend-alert alert-high' : 'trend-alert alert-info';
      ta.textContent = '五路支持 ' + livePrediction.alignedB + '/5｜分差 ' + livePrediction.gap;
    }else if(livePrediction.decision === 'P'){
      ob.className = 'oracle-box player';
      om.textContent = livePrediction.tier === 'STRONG' ? '🔥 強推閒家' : '📌 推薦閒家';
      ta.className = livePrediction.tier === 'STRONG' ? 'trend-alert alert-high' : 'trend-alert alert-info';
      ta.textContent = '五路支持 ' + livePrediction.alignedP + '/5｜分差 ' + livePrediction.gap;
    }else{
      ob.className = 'oracle-box pass';
      om.textContent = '🛡️ 觀望 (PASS)';
      ta.className = livePrediction.reasons.some(function(x){ return /過熱|禁追/.test(x); }) ? 'trend-alert alert-warn' : 'trend-alert alert-safe';
      ta.textContent = livePrediction.reasons[0] || '結構不足，建議等待';
    }

    const tc = remain > 0 ? (S.runningCount / Math.max(0.5, remain / 52)).toFixed(2) : '0.00';
    const ev = livePrediction.decision === 'B' ? livePrediction.ev.B : livePrediction.decision === 'P' ? livePrediction.ev.P : 0;

    rb.innerHTML =
      'Tier: <b>' + livePrediction.tier + '</b>｜TC: ' + tc +
      '｜EV: ' + ev.toFixed(4) +
      '｜理由：' + livePrediction.reasons.join(' / ');

    updateRoadExplain(displayRoads);
    S.lastRecSide = livePrediction.decision;
  }

  const ptn = patternStatsForCurrent();
  const hasPatternData = ptn && !ptn.weak;
  const fT = hasPatternData ? ptn.tieP : 0;
  const fBP = hasPatternData ? ptn.bpP : 0;
  const fPP = hasPatternData ? ptn.ppP : 0;

  S.lastSideBets = {
    tie: fT >= Config.side,
    bp: fBP >= Config.side,
    pp: fPP >= Config.side
  };

  setSideBetPill('sbTie', '和局', fT, false, hasPatternData);
  setSideBetPill('sbBP', '莊對', fBP, true, hasPatternData);
  setSideBetPill('sbPP', '閒對', fPP, true, hasPatternData);

  updateDBUI();
  saveAll();
  evaluateDrawRules();
  syncViewportLayout();
}

function getPendingCounts(){
  const pending = {};
  for(let i=1;i<=13;i++) pending[i] = 0;
  ['p1','p2','p3','b1','b2','b3'].forEach(function(id){
    const v = getVal(id);
    if(v) pending[v]++;
  });
  return pending;
}

function drawKeypad(){
  const k = document.getElementById('keypad');
  k.innerHTML = '';
  const pending = getPendingCounts();

  for(let i=1;i<=13;i++){
    const remain = Math.max(0, (S.deck[i] || 0) - pending[i]);
    const b = document.createElement('div');
    b.className = 'key';
    b.innerHTML =
      '<div class="key-val">' + (i===1?'A':i===11?'J':i===12?'Q':i===13?'K':i) + '</div>' +
      '<div class="key-count">' + remain + '</div>';
    b.onclick = function(){ inputRank(i); };
    k.appendChild(b);
  }

  const clr = document.createElement('div');
  clr.className = 'key action-clear';
  clr.textContent = '⌫ 清空重填';
  clr.onclick = clearCurrentInput;
  k.appendChild(clr);
}

function getVal(id){
  const el = document.getElementById('slot-' + id);
  const v = el ? el.dataset.val : null;
  return v ? parseInt(v, 10) : null;
}

function setActiveSlot(id){
  const el = document.getElementById('slot-' + id);
  if(!el || el.classList.contains('disabled')) return;
  document.querySelectorAll('.playing-card').forEach(function(x){ x.classList.remove('active'); });
  el.classList.add('active');
  cIdx = cOrder.indexOf(id);
}

function inputRank(rank){
  const pending = getPendingCounts();
  if(((S.deck[rank] || 0) - pending[rank]) <= 0) return;

  while(cIdx < cOrder.length && document.getElementById('slot-' + cOrder[cIdx]).classList.contains('disabled')) cIdx++;
  if(cIdx >= cOrder.length) return;

  const target = document.getElementById('slot-' + cOrder[cIdx]);
  target.textContent = rank===1?'A':rank===11?'J':rank===12?'Q':rank===13?'K':String(rank);
  target.dataset.val = String(rank);
  target.classList.add('filled');

  cIdx++;
  evaluateDrawRules();
  drawKeypad();

  while(cIdx < cOrder.length && document.getElementById('slot-' + cOrder[cIdx]).classList.contains('disabled')) cIdx++;
  if(cIdx < cOrder.length) setActiveSlot(cOrder[cIdx]);
}

function clearCurrentInput(){
  cIdx = 0;
  const ids = ['p1','p2','p3','b1','b2','b3'];
  ids.forEach(function(id){
    const e = document.getElementById('slot-' + id);
    e.textContent = '';
    e.dataset.val = '';
    e.classList.remove('filled', 'active');
    if(id === 'p3' || id === 'b3') e.classList.add('disabled');
    else e.classList.remove('disabled');
  });
  setActiveSlot(cOrder[0]);
  evaluateDrawRules();
  drawKeypad();
}

function changeOrder(){
  cOrder = document.getElementById('orderSel').value === 'PBPB'
    ? ['p1','b1','p2','b2','p3','b3']
    : ['p1','p2','b1','b2','p3','b3'];
  clearCurrentInput();
}

function evaluateDrawRules(){
  const isAuto = document.getElementById('autoGuide').checked;
  const btn = document.getElementById('submitBtn');
  const p3 = document.getElementById('slot-p3');
  const b3 = document.getElementById('slot-b3');

  const p1 = getVal('p1');
  const p2 = getVal('p2');
  const b1 = getVal('b1');
  const b2 = getVal('b2');

  if(!p1 || !p2 || !b1 || !b2){
    p3.classList.add('disabled');
    b3.classList.add('disabled');
    btn.disabled = true;
    btn.className = 'submit-btn';
    btn.textContent = '請依照發牌順序輸入';
    return;
  }

  if(!isAuto){
    p3.classList.remove('disabled');
    b3.classList.remove('disabled');
    btn.disabled = false;
    btn.className = 'submit-btn ready';
    btn.textContent = '手動覆寫模式：可結算';
    return;
  }

  const pT = (baccaratValue(p1) + baccaratValue(p2)) % 10;
  const bT = (baccaratValue(b1) + baccaratValue(b2)) % 10;
  const isNat = pT >= 8 || bT >= 8;
  const p3v = getVal('p3');
  const b3v = getVal('b3');

  let needP3 = false;
  let needB3 = false;

  if(!isNat){
    if(pT <= 5) needP3 = true;
    if(!needP3){
      if(bT <= 5) needB3 = true;
    }else if(p3v !== null){
      const p3b = baccaratValue(p3v);
      if(bT <= 2) needB3 = true;
      else if(bT === 3 && p3b !== 8) needB3 = true;
      else if(bT === 4 && p3b >= 2 && p3b <= 7) needB3 = true;
      else if(bT === 5 && p3b >= 4 && p3b <= 7) needB3 = true;
      else if(bT === 6 && (p3b === 6 || p3b === 7)) needB3 = true;
    }
  }

  if(!needP3) p3.classList.add('disabled');
  else p3.classList.remove('disabled');

  if(needP3 && p3v === null) b3.classList.add('disabled');
  else{
    if(!needB3) b3.classList.add('disabled');
    else b3.classList.remove('disabled');
  }

  let valid = true;
  let msg = '✓ 牌局合法，點擊結算';

  if(isNat && (p3v !== null || b3v !== null)){ valid = false; msg = '❌ 錯誤：天牌不可補牌'; }
  if(valid && needP3 && p3v === null){ valid = false; msg = '❌ 錯誤：閒家必須補牌'; }
  if(valid && !needP3 && p3v !== null){ valid = false; msg = '❌ 錯誤：閒家不可補牌'; }

  if(valid && needP3 && p3v !== null){
    if(needB3 && b3v === null){ valid = false; msg = '❌ 錯誤：莊家必須補牌'; }
    if(!needB3 && b3v !== null){ valid = false; msg = '❌ 錯誤：莊家不可補牌'; }
  }else if(valid && !needP3){
    if(needB3 && b3v === null){ valid = false; msg = '❌ 錯誤：莊家必須補牌'; }
    if(!needB3 && b3v !== null){ valid = false; msg = '❌ 錯誤：莊家不可補牌'; }
  }

  if(S.isLegacyPartial){
    valid = false;
    msg = '⚠️ 降級模式：請先換靴';
  }

  btn.disabled = !valid;
  btn.className = valid ? 'submit-btn ready' : 'submit-btn';
  btn.textContent = msg;
}

function submitHand(){
  if(S.isLegacyPartial){
    alert('⚠️ 系統目前處於舊版相容降級模式，請先按「換靴」後再繼續。');
    return;
  }

  const btn = document.getElementById('submitBtn');
  if(btn.disabled) return;

  bSt = JSON.parse(JSON.stringify(S));
  bDB = JSON.parse(JSON.stringify(BigData));
  bLab = JSON.parse(JSON.stringify(LabStore));

  const vals = {
    p1:getVal('p1'), p2:getVal('p2'), p3:getVal('p3'),
    b1:getVal('b1'), b2:getVal('b2'), b3:getVal('b3')
  };

  const cons = [];
  let pPts = 0, bPts = 0;
  ['p1','p2','p3','b1','b2','b3'].forEach(function(id){
    const v = vals[id];
    if(v){
      cons.push(v);
      if(id[0] === 'p') pPts += baccaratValue(v);
      else bPts += baccaratValue(v);
    }
  });

  const pFinal = pPts % 10;
  const bFinal = bPts % 10;
  const w = pFinal > bFinal ? 'P' : bFinal > pFinal ? 'B' : 'T';
  const bp = vals.b1 != null && vals.b2 != null && vals.b1 === vals.b2;
  const pp = vals.p1 != null && vals.p2 != null && vals.p1 === vals.p2;

  const updateKey = getPatternKeyBeforePush();

  const remainCards = Object.values(S.deck).reduce(function(a,b){ return a + b; }, 0);
  const features = {
    F_Comp:{ running_count:S.runningCount, remain_cards:remainCards },
    F_Path:extractPathFeaturesCore(S.history),
    __history:S.history.slice()
  };
  const prediction = executePolicyChain(features, BigData, Config.tau);

  const observation = captureObservation(S, features, prediction, vals, S.lastSideBets);
  commitObservation(observation, { winner:w, pPt:pFinal, bPt:bFinal, bp, pp });

  if(w !== 'T'){
    if(prediction.decision !== 'PASS'){
      S.shoePerf.recs += 1;
      if(prediction.decision === w) S.shoePerf.hits += 1;
    }
  }
  if(S.lastSideBets.tie){ S.shoePerf.tRecs += 1; if(w === 'T') S.shoePerf.tHits += 1; }
  if(S.lastSideBets.bp){ S.shoePerf.bpRecs += 1; if(bp) S.shoePerf.bpHits += 1; }
  if(S.lastSideBets.pp){ S.shoePerf.ppRecs += 1; if(pp) S.shoePerf.ppHits += 1; }

  S.history.push({ w, pPt:pFinal, bPt:bFinal, bp, pp });
  for(let i=0;i<cons.length;i++){
    const v = cons[i];
    S.deck[v] = Math.max(0, (S.deck[v] || 0) - 1);
    S.runningCount += countWeights[v] || 0;
  }

  if(updateKey) updatePatternDB(BigData, updateKey, w, bp, pp);

  recalcDBStats(BigData);
  clearCurrentInput();
  render();
}

async function exportDB(){
  try{
    const payload = {
      version:'v64.3',
      exported_at:new Date().toISOString(),
      bigData:BigData,
      labStore:LabStore,
      state:S,
      config:Config
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type:'application/json' });
    const fileName = 'bac_v64_3_export_' + new Date().toISOString().replace(/[:.]/g,'-') + '.json';

    if(window.showSaveFilePicker){
      try{
        const handle = await window.showSaveFilePicker({
          suggestedName:fileName,
          types:[{
            description:'JSON Files',
            accept:{ 'application/json':['.json'] }
          }]
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        alert('✅ 匯出完成：已由瀏覽器讓你選擇儲存位置。');
        return;
      }catch(err){
        if(err && err.name === 'AbortError') return;
      }
    }

    try{
      const file = new File([blob], fileName, { type:'application/json' });
      if(navigator.canShare && navigator.canShare({ files:[file] }) && navigator.share){
        await navigator.share({
          files:[file],
          title:'百家樂資料匯出',
          text:'bac v64.3 匯出資料'
        });
        return;
      }
    }catch(err){}

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 1200);

    alert('✅ 匯出已觸發。若你使用手機，檔案通常會進入「下載」或瀏覽器下載列表。');
  }catch(err){
    console.error(err);
    alert('匯出失敗：' + (err && err.message ? err.message : err));
  }
}

function importDB(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const text = String(ev.target.result || '').replace(/^\uFEFF/, '');
      const obj = JSON.parse(text);

      if(!obj || typeof obj !== 'object') throw new Error('invalid-json');
      if(!obj.labStore || !obj.state) throw new Error('missing-fields');

      const tempLab = {
        schema_version:'v64.3',
        rawShoes:Array.isArray(obj.labStore.rawShoes) ? obj.labStore.rawShoes : [],
        currentOpenShoe: obj.labStore.currentOpenShoe || null,
        experiments:[]
      };
      const tempState = normalizeState(obj.state);
      if(!tempState) throw new Error('invalid-state');

      const tempCfg = normalizeConfig(obj.config || {});

      LabStore = tempLab;
      S = tempState;
      Config = tempCfg;

      BigData = rebuildBigDataFromAllShoes(LabStore.rawShoes);
      applyOpenShoePatternsToBigData();

      if(!validateOpenShoeConsistency(LabStore, S)){
        LabStore.currentOpenShoe = null;
        S = createInitialState();
        BigData = rebuildBigDataFromAllShoes(LabStore.rawShoes);
      }else{
        rebuildLiveStateMetrics();
      }

      document.getElementById('cfgTau').value = Config.tau;
      document.getElementById('cfgSide').value = Config.side;
      document.getElementById('cfgBins').value = Config.nBins;

      bSt = null; bDB = null; bLab = null;
      clearCurrentInput();
      render();
      alert('✅ 匯入成功：已載入 ' + LabStore.rawShoes.length + ' 雙已結算鞋靴資料。');
    }catch(err){
      console.error(err);
      alert('匯入失敗：檔案格式不正確或內容不完整。');
    }finally{
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

function settleDecision(decision, winner){
  if(decision === 'PASS') return 0;
  if(decision === 'B') return winner === 'B' ? PAYOUTS.B : (winner === 'T' ? 0 : -1);
  if(decision === 'P') return winner === 'P' ? PAYOUTS.P : (winner === 'T' ? 0 : -1);
  return 0;
}

function invokeQuantLab(){
  const shoes = Array.isArray(LabStore.rawShoes) ? LabStore.rawShoes.slice() : [];
  if(shoes.length < 3){
    alert('實驗鞋靴不足，至少需要 3 雙已結算鞋靴。');
    return;
  }

  let totalHands = 0, betCount = 0, realized = 0, predicted = 0;
  const runs = [];

  for(let i=1;i<shoes.length;i++){
    const train = shoes.slice(0, i);
    const test = shoes[i];
    const db = rebuildBigDataFromAllShoes(train);

    let simDeck = {};
    for(let r=1;r<=13;r++) simDeck[r] = 32;
    let simRC = 0;
    let simHist = [];
    let localHands = 0, localBets = 0, localRealized = 0, localPred = 0;

    for(let j=0;j<test.hands.length;j++){
      const h = test.hands[j];
      const remainCards = Object.values(simDeck).reduce(function(a,b){ return a + b; }, 0);
      const features = {
        F_Comp:{ running_count:simRC, remain_cards:remainCards },
        F_Path:extractPathFeaturesCore(simHist),
        __history:simHist.slice()
      };
      const pred = executePolicyChain(features, db, Config.tau);
      const winner = h.outcome && h.outcome.winner ? h.outcome.winner : 'T';

      localHands++;
      totalHands++;

      if(pred.decision !== 'PASS'){
        localBets++;
        betCount++;
        localPred += pred.ev[pred.decision] || 0;
        predicted += pred.ev[pred.decision] || 0;

        const rt = settleDecision(pred.decision, winner);
        localRealized += rt;
        realized += rt;
      }

      const pure = simHist.filter(function(x){ return x.w !== 'T'; }).map(function(x){ return x.w; });
      const key = pure.length >= 3 ? pure.slice(-3).join(',') : null;
      if(key){
        updatePatternDB(db, key, winner, !!h.outcome.bp, !!h.outcome.pp);
      }

      ['p1','p2','p3','b1','b2','b3'].forEach(function(slot){
        const rank = h.input && h.input.cards ? h.input.cards[slot] : null;
        if(rank !== null && rank !== undefined && countWeights.hasOwnProperty(rank)){
          simDeck[rank] -= 1;
          simRC += countWeights[rank];
        }
      });

      simHist.push({
        w:winner,
        pPt:Number(h.outcome.pPt)||0,
        bPt:Number(h.outcome.bPt)||0,
        bp:!!h.outcome.bp,
        pp:!!h.outcome.pp
      });
    }

    runs.push({
      shoe_id:test.shoe_id,
      hands:localHands,
      bets:localBets,
      predicted_ev:localPred,
      realized:localRealized
    });
  }

  const result = {
    version:'v64.3',
    shoes:shoes.length,
    test_shoes:runs.length,
    hands:totalHands,
    bets:betCount,
    coverage: totalHands ? betCount / totalHands : 0,
    predicted_ev_sum: predicted,
    realized_return_sum: realized,
    verdict:
      totalHands < 30 ? 'INSUFFICIENT_DATA' :
      realized > 0 ? 'POSITIVE_RETURN_BASELINE' :
      realized === 0 ? 'FLAT_RETURN_BASELINE' :
      'NEGATIVE_RETURN_BASELINE',
    runs:runs
  };

  LabStore.experiments = [result];
  saveAll();
  console.log('🧬 v64.3 Quant Lab:', JSON.parse(JSON.stringify(result)));
  alert(
    '✅ 實驗室完成\n' +
    'Verdict: ' + result.verdict + '\n' +
    '測試手數: ' + result.hands + '\n' +
    '下注手數: ' + result.bets + '\n' +
    'Coverage: ' + (result.coverage * 100).toFixed(1) + '%\n' +
    'Pred EV Sum: ' + result.predicted_ev_sum.toFixed(3) + '\n' +
    'Realized: ' + result.realized_return_sum.toFixed(3) + '\n\n' +
    '詳細資料已輸出到 Console。'
  );
}

  }

  drawKeypad();
  clearCurrentInput();
  render();
  syncViewportLayout();
}

init();
</script>
